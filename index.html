function normUnit(u){
  // О•ОҪОҝПҖОҝОҜО·ПғО· ОөОјПҶО¬ОҪО№ПғО·ПӮ: 0.7L/0.7LTвҶ’700ml, 0.2LвҶ’200ml, 1LвҶ’1000ml (ОјПҢОҪОҝ ОіО№Оұ О»ОҜП„ПҒОұ<10)
  let s=String(u==null?'':u).trim();if(!s)return '';
  const m=s.match(/^(\d+(?:[.,]\d+)?)\s*(L|LT|LITRE|ОӣОҷОӨ|Оӣ)\.?$/i);
  if(m){const v=parseFloat(m[1].replace(',','.'));if(!isNaN(v)&&v>0&&v<10){return Math.round(v*1000)+'ml';}}
  // ОәОұОҪОҝОҪО№ОәОҝПҖОҝОҜО·ПғО· ML ОіПҒОұПҶО®ПӮ: "200ML"/"200 ml"вҶ’"200ml"
  const m2=s.match(/^(\d+)\s*(ML|ОңОӣ)\.?$/i);if(m2){return m2[1]+'ml';}
  return s;
}

// в”Җв”Җ ОңОұО¶О№ОәО® ОөО№ПғОұОіПүОіО® ПҖПҒОҝПҠПҢОҪП„ПүОҪ ОұПҖПҢ CSV в”Җв”Җ
function parseCsv(text){
  text=text.replace(/\r\n?/g,'\n').replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===',' ){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
async function importCsv(inp){
  const f=inp.files&&inp.files[0]; if(!f)return; inp.value='';
  const text=await f.text();
  const rows=parseCsv(text);
  if(rows.length<2){toast('вқҢ ОҡОөОҪПҢ О® О»О¬ОёОҝПӮ CSV');return;}
  const head=rows[0].map(h=>String(h).trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const iSku=idx('sku'), iKind=idx('kind'), iCat=idx('category'), iSub=idx('sub_category'),
        iInv=idx('invoice_name'), iPack=idx('packaging'), iSize=idx('size_ml'), iUnits=idx('units'),
        iMu=idx('measure_unit'), iAlc=idx('alcohol_pct'), iRet=idx('retail_price');
  if(iSku<0){toast('вқҢ ОӣОөОҜПҖОөО№ О· ПғП„О®О»О· sku ПғП„Оҝ CSV');return;}
  const tid=curTenant();
  if(!tid){toast('вқҢ О”ОөОҪ ОІПҒОӯОёО·ОәОө ОјОұОіОұО¶ОҜ');return;}
  const num=v=>{const n=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(n)?null:n;};
  const recs=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const sku=(c[iSku]||'').trim(); if(!sku)continue;
    let kind=(iKind>=0?(c[iKind]||'').trim().toLowerCase():'beverage');
    if(['beverage','food','supplies'].indexOf(kind)<0)kind='beverage';
    const size=iSize>=0?num(c[iSize]):null;
    const alc=iAlc>=0?num(c[iAlc]):null;
    const cat=iCat>=0?(c[iCat]||'').trim():''; const sub=iSub>=0?(c[iSub]||'').trim():'';
    const rec={tenant_id:tid,kind:kind,sku:sku,
      category:cat||null,sub_category:sub||null,
      invoice_name:iInv>=0?((c[iInv]||'').trim()||null):null,
      packaging:iPack>=0?((c[iPack]||'').trim()||null):null,
      size_ml:size, units:iUnits>=0?num(c[iUnits]):null,
      measure_unit:iMu>=0?((c[iMu]||'').trim()||null):null,
      alcohol_pct:alc, retail_price:iRet>=0?num(c[iRet]):null};
    if(kind==='beverage'&&alc){const efk=computeEFK(cat,sub,sku,size,alc);if(efk!=null)rec.efk=efk;}
    recs.push(rec);
  }
  if(!recs.length){toast('вқҢ ОҡОұОјОҜОұ ОӯОіОәП…ПҒО· ОіПҒОұОјОјО®');return;}
  if(!confirm('О•О№ПғОұОіПүОіО® '+recs.length+' ПҖПҒОҝПҠПҢОҪП„ПүОҪ ПғП„Оҝ ОјОұОіОұО¶ОҜ;'))return;
  let ok=0,fail=0;
  for(let i=0;i<recs.length;i+=100){
    const batch=recs.slice(i,i+100);
    try{const {data,error}=await sb.from('products').insert(batch).select();
      if(error)throw error; ok+=(data?data.length:batch.length);
    }catch(e){fail+=batch.length;console.error(e);}
  }
  _canon=null; await loadAll();
  toast('вң… ОңПҖО®ОәОұОҪ '+ok+' ПҖПҒОҝПҠПҢОҪП„Оұ'+(fail?(' В· '+fail+' ОұПҖОӯП„П…ПҮОұОҪ'):''));
}

async function acceptTerms(){
  const btn=document.getElementById('tc-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user)throw new Error(L('О”ОөОҪ ОІПҒОӯОёО·ОәОө ПҮПҒО®ПғП„О·ПӮ','No user found'));
    // 1О· ПҖПҒОҝПғПҖО¬ОёОөО№Оұ: RPC (ПҖОұПҒОұОәО¬ОјПҖП„ОөО№ RLS ОјОө ОұПғПҶО¬О»ОөО№Оұ)
    let saved=false;
    try{const {error:rpcErr}=await sb.rpc('accept_terms'); if(!rpcErr)saved=true;}catch(e){}
    // 2О· ПҖПҒОҝПғПҖО¬ОёОөО№Оұ: ОәОұОҪОҝОҪО№ОәПҢ update (ОұОҪ П…ПҖО¬ПҒПҮОөО№ ОҙО№ОәОұОҜПүОјОұ)
    if(!saved){
      const {error}=await sb.from('profiles').update({terms_accepted_at:new Date().toISOString()}).eq('id',user.id);
      if(error)throw error;
    }
    // О•ПҖОұО»О®ОёОөП…ПғО· ПҢП„О№ ПҢОҪП„ПүПӮ ПғПҺОёО·ОәОө
    const {data:chk}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).maybeSingle();
    if(!chk||!chk.terms_accepted_at)throw new Error(L('О— ОұПҖОҝОҙОҝПҮО® ОҙОөОҪ ОұПҖОҝОёО·ОәОөПҚП„О·ОәОө (RLS). ОӨПҒОӯОҫОө П„Оҝ SQL: accept_terms().','Acceptance was not saved (RLS). Run the SQL: accept_terms().'));
    ST.termsOk=true;
    toast('вң… '+L('О•П…ПҮОұПҒО№ПғП„ОҝПҚОјОө!','Thank you!'));
    ST.view='list';
    await enterShop();
  }catch(e){
    ST.termsOk=false;
    if(btn){btn.disabled=false;btn.innerHTML='вң… '+L('О‘ПҖОҝОҙОӯПҮОҝОјОұО№ & ОЈП…ОҪОӯПҮОөО№Оұ','Accept & Continue');}
    alert('вқҢ '+(e.message||e));
  }
}

async function guardTerms(){
  if(ST.termsOk)return;                       // О®ОҙО· ОұПҖОҝОҙОөОәП„ОҝОҜ ПғОө ОұП…П„О® П„О· ПғП…ОҪОөОҙПҒОҜОұ
  const app=document.getElementById('appView');
  if(!app||app.style.display==='none')return; // ОҙОөОҪ ОөОҜОҪОұО№ ОјОӯПғОұ ПғП„О·ОҪ ОөПҶОұПҒОјОҝОіО®
  try{
    const {data:{user}}=await sb.auth.getUser(); if(!user)return;
    const {data:pr}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).single();
    if(pr&&pr.terms_accepted_at){ST.termsOk=true;return;}
    if(ST.view!=='terms')termsGate();          // ОҙОөОҪ ОұПҖОҝОҙОӯПҮП„О·ОәОө вҶ’ ОҫОұОҪОұОҙОөОҜОҫ' П„Оҝ
  }catch(e){}
}

  {needle:'price_history.notes',sql:"alter table price_history add column if not exists notes text;"},
  {needle:'products.notes',sql:"alter table products add column if not exists notes text;"},
  {needle:'price_history.supplier_name',sql:"alter table price_history add column if not exists supplier_name text;"},

async function loadAll(){
  _canon=null;
  const c=document.getElementById('content');
  c.innerHTML='<div class="card center" style="min-height:40vh"><span class="spin"></span></div>';
  const T=curTenant();
  const ft=(qb)=>T?qb.eq('tenant_id',T):qb;   // ПҶОҜО»П„ПҒОҝ ОјОұОіОұО¶О№ОҝПҚ (admin ОІО»ОӯПҖОөО№ ОјПҢОҪОҝ П„Оҝ ОөПҖО№О»ОөОіОјОӯОҪОҝ)
  const res=await Promise.all([
    ft(sb.from('products').select('*')).order('category'),
    ft(sb.from('suppliers').select('*')).order('name'),
    ft(sb.from('product_prices').select('*')),
    sb.from('product_best_price').select('product_id,best_price,best_supplier'),
    ft(sb.from('order_lines').select('*')),
    ft(sb.from('price_history').select('*')).order('date',{ascending:false}).limit(400),
    ft(sb.from('invoices').select('*')).order('date',{ascending:false}).limit(300),
    ft(sb.from('recipes').select('*')),
    ft(sb.from('recipe_ingredients').select('*')),
    ft(sb.from('agreements').select('*')),
    ft(sb.from('agreement_blocks').select('*')),
    ft(sb.from('order_history').select('*')).order('created_at',{ascending:false}).limit(500),
    ft(sb.from('settings').select('*')).in('key',['labels','shop_name'])
  ]);
  ST.products=res[0].data||[];ST.suppliers=res[1].data||[];ST.prices=res[2].data||[];
  ST.orders={};(res[4].data||[]).forEach(o=>ST.orders[o.product_id]=o);
  ST.history=res[5].data||[];ST.invoices=res[6].data||[];
  ST.recipes=res[7].data||[];ST.recipeIng=res[8].data||[];ST.agreements=res[9].data||[];ST.agreementBlocks=res[10].data||[];ST.orderHistory=res[11].data||[];
  try{const rows=(res[12]&&res[12].data)||[]; const labRow=rows.find(r=>r.key==='labels'); const shopRow=rows.find(r=>r.key==='shop_name');
    const v=(labRow&&labRow.value)?JSON.parse(labRow.value):{};
    ST.labels=(v&&(v.el||v.en))?{el:v.el||{},en:v.en||{}}:{el:{},en:v||{}};   // legacy flat -> EN
    ST.shopName=(shopRow&&shopRow.value)?shopRow.value:'';
    try{if(ST.shopName)localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
  }catch(e){ST.labels={el:{},en:{}};}
  ST.best={};(res[3].data||[]).forEach(b=>ST.best[b.product_id]={price:b.best_price,sup:b.best_supplier});
  // в”Җв”Җ ОӯО»ОөОіПҮОҝПӮ setup: ОјО¬О¶ОөПҲОө ПҢ,П„О№ SQL ПҮПҒОөО№О¬О¶ОөП„ОұО№
  const msgs=res.map(r=>r.error&&r.error.message||'').join(' | ');
  const need=MIGRATIONS.filter(m=>msgs.indexOf(m.needle)>=0);
  ST.setupSql=need.map(m=>m.sql).join('\n');
  if(res[0].error&&!ST.products.length&&msgs.indexOf('products')>=0){
    c.innerHTML='<div class="err">ОЈПҶО¬О»ОјОұ ПғПҚОҪОҙОөПғО·ПӮ: '+esc(res[0].error.message)+'</div>';return;
  }
  try{const nav=JSON.parse(localStorage.getItem('ciq_nav')||localStorage.getItem('ciq_section')&&JSON.stringify({section:localStorage.getItem('ciq_section')})||'{}');
    if(nav.section)ST.section=nav.section;
    // (О· ОіО»ПҺПғПғОұ ПҶОҝПҒП„ПҺОҪОөП„ОұО№ ОұОҪО¬ ПҮПҒО®ПғП„О· ОұПҖПҢ П„Оҝ profile, ПҢПҮО№ ОұПҖПҢ localStorage)
    if(nav.kind)ST.kind=nav.kind; if(nav.okind)ST.okind=nav.okind; if(nav.invsub)ST.invsub=nav.invsub; if(nav.repsub)ST.repsub=nav.repsub;
    ST.homeView=!!nav.homeView;
    if(nav.prod){const p=ST.products.find(x=>x.id===nav.prod);if(p){ST.prod=p;ST.section='products';ST.view='detail';}}
    else if(nav.recipe){const r=ST.recipes.find(x=>x.id===nav.recipe);if(r){ST.recipe=r;ST.section='recipes';ST.view='detail';}}
    else if(nav.inv){const i=ST.invoices.find(x=>x.id===nav.inv);if(i){ST.inv=i;ST.section='invoices';ST.view='detail';}}
    else if(nav.view&&nav.view!=='detail'){ST.view=nav.view;}
  }catch(e){}
  rerenderCurrent();
}

function bevCalc(p,bestPrice){
  const size=parseFloat(p.size_ml)||0, measure=parseFloat(p.measure)||0, retail=parseFloat(p.retail_price)||0;
  let waste=parseFloat(p.waste_pct)||0; if(waste>1)waste=waste/100;
  const costMl=size>0?bestPrice/size:0;
  const unitCost=costMl*measure;
  const realCost=(waste>0&&waste<1)?unitCost/(1-waste):unitCost;
  const exVat=retail*(1-0.24);
  const gross=exVat-realCost;
  const bevCost=exVat>0?realCost/exVat:0;
  return {costMl,unitCost,realCost,exVat,gross,bevCost};
}
function cmColor(bc){return bc<=0?'#888':(bc<0.25?'var(--ok)':(bc<=0.30?'var(--warn)':'var(--bad)'));}
// в”Җв”Җ О•ОҰОҡ ОұП…П„ПҢОјОұП„ОҝПӮ П…ПҖОҝО»ОҝОіО№ПғОјПҢПӮ (ОҜОҙО№ОҝПӮ ОјОө П„Оҝ app updateEFK) в”Җв”Җ
function computeEFK(category,sub,sku,sizeMl,alcohol){
  const c=normStr(category)+' '+normStr(sub)+' '+normStr(sku);
  let rate=null;
  if(/VERMOUTH|О’О•ОЎОңОҹОҘОӨ|MARTINI|CINZANO|CUCIELO|DANTE|LILLET|PUNT.?E.?MES/.test(c))rate=-1.06;
  else if(/ОҹОҘО–Оҹ|OUZO|ОӨОЈОҷО ОҹОҘОЎОҹ|TSIPOURO|ОӨОЈОҷОҡОҹОҘО”ОҷО‘|RAKI|ОЎО‘Оҡ/.test(c))rate=12.75;
  else if(/WINE|ОҡОЎО‘ОЈОҷ|SPARKLING|PROSECCO|CHAMPAGNE|О‘ОҰОЎО©О”/.test(c))rate=0;
  else if(/GIN|VODKA|RUM|TEQUILA|WHISK|LIQUEUR|LIQUER|ОӣОҷОҡО•ОЎ|BRANDY|COGNAC|MEZCAL|SPIRIT|О‘О ОҹОЈОӨО‘О“ОңО‘|APERITIF|APERITIVO|APERITIVE|О‘О О•ОЎОҷОӨОҷОҰ|BITTER|AMARO|METAXA|ОңО•ОӨО‘ОһО‘/.test(c))rate=25.50;
  else if(/SOFT|SODA|JUICE|WATER|ОқО•ОЎОҹ|О§ОҘОңОҹ|NON.?ALC|О‘ОқО‘ОЁОҘОҡОӨ/.test(c))rate=0;
  if(/BEER|ОңО ОҘОЎО‘|ОңО ОҷОЎО‘|LAGER|IPA|PILSNER|\bALE\b|STOUT|WEISS|RADLER|STELLA|HEINEKEN|AMSTEL|CORONA|О‘ОҳО—ОқО‘ОҷОҡО—|VERGINA|О’О•ОЎО“ОҷОқО‘|FIX|ОҰОҷОһ|VOREIA|О’ОҹОЎО•ОҷО‘/.test(c)){
    const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
    const a=parseFloat(alcohol)||0; if(a<=0)return null;
    const alcPct=a>1?a:a*100;
    const plato=2.5*alcPct;                    // ОІОұОёОјОҝОҜ Plato вүҲ 2.5 Г— ОұО»ОәОҝПҢО»%
    return Math.round(((sml/1000)/100)*plato*5*100)/100;  // (ОӣОҜП„ПҒОұГ·100)Г—PlatoГ—5вӮ¬/hL
  }
  if(rate===null)return null;
  const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
  const sizeL=sml/1000; const a=parseFloat(alcohol)||0;

}
function historyForProduct(pid){
  const p=ST.products.find(x=>x.id===pid);if(!p)return [];
  const keys=keyWords(p.invoice_name||p.sku);
  return (ST.history||[]).filter(r=>{
    if(r.product_id===pid)return true;               // О¬ОјОөПғО· ПғПҚОҪОҙОөПғО·
    if(r.product_id)return false;                    // ОұОҪО®ОәОөО№ ПғОө О¬О»О»Оҝ ПҖПҒОҝПҠПҢОҪ
    if(!keys.length)return false;
    const rtok=normStr(r.raw_product||'').split(' ');  // П„ОұОҜПҒО№ОұПғОјОұ ОјОө П„Оҝ ПҢОҪОҝОјОұ П„О№ОјОҝО»ОҝОіОҜОҝП…
    return keys.every(k=>rtok.some(w=>w===k||w.startsWith(k)));
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ОЈОҘОқОӨО‘О“О•ОЈ (Recipes) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function ingredientsFor(rid){return (ST.recipeIng||[]).filter(x=>x.recipe_id===rid);}
function homemadeByName(name){return (ST.recipes||[]).find(x=>x.is_homemade && String(x.name)===String(name));}
function homemadeUnitCost(hr,depth){
  if(depth>3)return 0;
  const inner=recipeCalc(hr,depth+1);
  const y=parseFloat(hr.yield_qty)||0;
  return y>0?inner.realCost/y:0;   // ОәПҢПғП„ОҝПӮ ОұОҪО¬ ОјОҝОҪО¬ОҙОұ ПҖОұПҒОұОіПүОіО®ПӮ
}
function recipeCalc(rec,depth){
  depth=depth||0;
  const ings=ingredientsFor(rec.id);
  let total=0; const lines=[];
  ings.forEach(ing=>{
    const qty=parseFloat(ing.quantity)||0;
    let serve=0,costMl=0,size=0,matched=false,isHome=false;
    const hr=homemadeByName(ing.ingredient);
    if(hr){                                   // П…О»О№ОәПҢ = П…ПҖОҝПғП…ОҪП„ОұОіО® Homemade
      costMl=homemadeUnitCost(hr,depth); size=parseFloat(hr.yield_qty)||0;
      serve=qty*costMl; matched=true; isHome=true;
    }else{
      let pid=ing.product_id, prod=pid?ST.products.find(x=>x.id===pid):null;
      if(!prod){pid=matchProduct(ing.ingredient); prod=pid?ST.products.find(x=>x.id===pid):null;}
      const bestPrice=prod?(parseFloat((ST.best[prod.id]||{}).price)||0):0;
      size=(parseFloat(ing.size)||0)>0?parseFloat(ing.size):(prod?(parseFloat(prod.size_ml)||0):0);
      costMl=size>0?bestPrice/size:0;
      serve=qty*costMl; matched=!!prod;
    }
    total+=serve;
    lines.push({name:ing.ingredient,qty,unit:ing.unit||'',size,costMl,serve,matched,isHome});
  });
  let waste=parseFloat(rec.waste_pct)||0; if(waste>1)waste=waste/100;
  const realCost=total*(1+waste);
  const retail=parseFloat(rec.retail_price)||0;
  const retailNet=retail*(1-0.24);
  const netProfit=retailNet-realCost;
  const costPct=retailNet>0?realCost/retailNet:0;
  return {lines,total,waste,realCost,retail,retailNet,netProfit,costPct};
}

function matchIngredientProduct(name){
  const exact=(ST.products||[]).find(p=>String(p.sku)===String(name));
  const prod=exact||(function(){const pid=matchProduct(name);return pid?ST.products.find(x=>x.id===pid):null;})();
  return prod?{product_id:prod.id,size:(parseFloat(prod.size_ml)||null)}:{product_id:null,size:null};
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ОЈОҘОңОҰО©ОқОҷО•ОЈ (Agreements) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function agreementAchieved(sku){
  const keys=keyWords(sku); if(!keys.length)return 0;
  let total=0;
  (ST.history||[]).forEach(r=>{
    const rt=normStr(r.raw_product||'').split(' ');
    if(keys.every(k=>rt.some(w=>w===k||w.startsWith(k)))) total+=parseFloat(r.quantity)||0;
  });
  return total;
}
function efkForSku(sku){
  const pid=matchProduct(sku); const p=pid?ST.products.find(x=>x.id===pid):null;
  return (p&&parseFloat(p.efk)>0)?parseFloat(p.efk):0;
}
// в”Җв”Җ ОҘПҖОҝО»ОҝОіО№ПғОјОҝОҜ block О‘ОҡОЎОҷО’О©ОЈ ПҢПҖПүПӮ waAgreementsBlocks в”Җв”Җ
function blockCalc(block){
  const prods=(ST.agreements||[]).filter(a=>a.block_id===block.id);
  let tgtEfk=0,tgtNo=0,actEfk=0,actNo=0,rebTgt=0,rebAct=0,mktVar=0,mktAct=0,sumT=0,sumA=0;
  const rows=prods.map(a=>{
    const agp=(parseFloat(a.agreement_price)||0)>0?parseFloat(a.agreement_price):(parseFloat(a.price_incl_excise)||0);
    let efk=efkForSku(a.sku); if(!efk)efk=parseFloat(a.excise_duty)||0;
    const priceNo=agp-efk;
    const target=parseFloat(a.target)||0;
    let rebate=parseFloat(a.rebate)||0; if(rebate>1)rebate=rebate/100;
    const mkt=parseFloat(a.marketing)||0;
    const achieved=agreementAchieved(a.sku);
    const ratio=target>0?Math.min(1,achieved/target):0;
    const rt=priceNo*target*rebate;
    tgtEfk+=agp*target; tgtNo+=priceNo*target; actEfk+=agp*achieved; actNo+=priceNo*achieved;
    rebTgt+=rt; rebAct+=rt*ratio; mktVar+=mkt; mktAct+=mkt*ratio; sumT+=target; sumA+=achieved;
    return {a,agp,efk,priceNo,target,rebate,mkt,achieved,ratio,rebActual:rt*ratio};
  });
  const fixed=parseFloat(block.fixed_marketing)||0;
  const mktTotal=mktVar+fixed, mktActual=mktAct+fixed;
  const proposed=tgtNo>0?(rebTgt+mktTotal)/tgtNo:0;
  return {rows,target:sumT,achieved:sumA,purchaseTarget:tgtNo,purchaseTargetEfk:tgtEfk,
    purchaseActual:actNo,purchaseActualEfk:actEfk,fixed,mktVariable:mktVar,mkt:mktTotal,
    mktCredited:mktActual,rebateTotal:rebTgt,rebateActual:rebAct,proposed};
}

  const c=document.getElementById('content');ST.view='list';
  let h=sectionNav();

// Backfill: ОіОөОјОҜО¶ОөО№ П„О№ОјОӯПӮ ПҖПҒОҝОјО·ОёОөП…П„О® ОұПҖПҢ П„Оҝ О№ПғП„ОҝПҒО№ОәПҢ (smart-match), ПҢПҖПүПӮ waBackfillSupplier_ П„ОҝП… app
async function backfillSupplier(sid,sname){
  if(!confirm('ОқОұ ОіОөОјОҜПғПү П„О№ПӮ П„О№ОјОӯПӮ П„ОҝП… "'+sname+'" ОұПҖПҢ П„Оҝ О№ПғП„ОҝПҒО№ОәПҢ ОұОіОҝПҒПҺОҪ;'))return;
  const tid=curTenant();
  const supN=normStr(sname);
  // 1) О’ПҒОөПӮ ОіПҒОұОјОјОӯПӮ О№ПғП„ОҝПҒО№ОәОҝПҚ ОұП…П„ОҝПҚ П„ОҝП… ПҖПҒОҝОјО·ОёОөП…П„О® (ПҢПҖОҝП… П…ПҖО¬ПҒПҮОөО№ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ)
  //    + ОіПҒОұОјОјОӯПӮ ПҮПүПҒОҜПӮ ПҖПҒОҝОјО·ОёОөП…П„О® ОҙОөОҪ ОұПҖОҝОҙОҜОҙОҝОҪП„ОұО№ ПғОө ОұП…П„ПҢОҪ (ОҙОөОҪ ОҫОӯПҒОҝП…ОјОө ПҖОҝО№ОұОҪОҝПҚ ОөОҜОҪОұО№)
  const latest={};  // productId -> {price, date}
  (ST.history||[]).forEach(r=>{
    const rSup=resolveSupName(r);
    if(!rSup||rSup==='вҖ”')return;                 // ПҮПүПҒОҜПӮ ПҖПҒОҝОјО·ОёОөП…П„О® вҶ’ ОұОіОҪПҢО·ПғОӯ П„Оҝ
    if(normStr(rSup)!==supN && !normStr(rSup).includes(supN) && !supN.includes(normStr(rSup)))return;
    const pid=resolveProductId(r);if(!pid)return;
    const price=parseFloat(r.price)||0;if(price<=0)return;
    const d=r.date||'';
    if(!latest[pid]||d>=latest[pid].date)latest[pid]={price:price,date:d};
  });
  const pids=Object.keys(latest);
  if(!pids.length){toast('в„№пёҸ ОҡОұОјОҜОұ П„О№ОјО® ПғП„Оҝ О№ПғП„ОҝПҒО№ОәПҢ ОіО№Оұ '+sname);return;}
  let n=0;
  for(const pid of pids){
    try{
      await sb.from('product_prices').upsert({tenant_id:tid,product_id:pid,supplier_id:sid,price:latest[pid].price,is_override:false},{onConflict:'product_id,supplier_id'});
      n++;
    }catch(e){console.error(e);}
  }
  await refreshPrices();
  toast('вң… О“ОӯОјО№ПғОұОҪ '+n+' П„О№ОјОӯПӮ ОіО№Оұ '+sname);
  renderSuppliers();
}

function stockTotalValue(){
  const isBev=ST.okind==='beverage';let t=0;
  ST.products.filter(p=>p.kind===ST.okind).forEach(p=>{
    const b=ST.best[p.id]||{};const ol=ST.orders[p.id]||{};
    const gg=k=>{const el=document.getElementById('o-'+p.id+'-'+k);return el?(parseFloat(el.value)||0):(parseFloat(ol[k])||0);};
    const stk=isBev?(gg('cellar_count')+gg('bar_count')+gg('floor_count')):(gg('cellar_count')+gg('kitchen_count'));
    t+=stk*(parseFloat(b.price)||0);
  });
  return t;
}
function updateStockTotal(){const el=document.getElementById('stockTotal');if(el)el.textContent=money(stockTotalValue());}
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ рҹ“ё О‘О ОҹО“ОЎО‘ОҰО•ОЈ (Stock Takes) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function kindLabel(k){return k==='beverage'?('рҹҚә '+lbl('kindBeverage','О ОҝП„О¬')):(k==='food'?('рҹҚҪпёҸ '+lbl('kindFood','ОӨПҒПҢПҶО№ОјОұ')):('рҹ“Ұ '+lbl('kindSupplies','О‘ОҪОұО»ПҺПғО№ОјОұ')));}
// ОңОұО¶ОөПҚОөО№ П„О№ПӮ П„ПҒОӯПҮОҝП…ПғОөПӮ ОіПҒОұОјОјОӯПӮ ОұПҖОҝОёОӯОјОұП„ОҝПӮ П„ОҝП… ОөОҪОөПҒОіОҝПҚ П„ОјО®ОјОұП„ОҝПӮ (ОұПҖПҢ П„Оұ ПҖОөОҙОҜОұ О® П„О· ОІО¬ПғО·)
function currentStockLines(){
  const isBev=ST.okind==='beverage';const lines=[];let total=0;
  ST.products.filter(p=>p.kind===ST.okind).forEach(p=>{
    const b=ST.best[p.id]||{};const ol=ST.orders[p.id]||{};
    const gg=k=>{const el=document.getElementById('o-'+p.id+'-'+k);return el?(parseFloat(el.value)||0):(parseFloat(ol[k])||0);};
    const stk=isBev?(gg('cellar_count')+gg('bar_count')+gg('floor_count')):(gg('cellar_count')+gg('kitchen_count'));
    if(stk<=0)return;                       // ОјПҢОҪОҝ ПҖПҒОҝПҠПҢОҪП„Оұ ОјОө ПҖОҝПғПҢП„О·П„Оұ
    const price=parseFloat(b.price)||0;const val=stk*price;total+=val;
    lines.push({product_id:p.id,sku:p.sku,category:p.category||'',qty:stk,unit_price:price,line_value:Math.round(val*100)/100});
  });
  return {lines,total:Math.round(total*100)/100};
}
async function saveStockTake(){
  if(ST.plan==='basic'){toast('рҹ”’ '+L('ОӨОҝ ОұПҒПҮОөОҜОҝ ОұПҖОҝОіПҒОұПҶПҺОҪ ОөОҜОҪОұО№ ПғП„Оҝ ПҖОұОәОӯП„Оҝ ADVANCED','Stock-take archive is an ADVANCED feature'));return;}
  const {lines,total}=currentStockLines();
  if(!lines.length){toast('вқҢ '+L('О”ОөОҪ П…ПҖО¬ПҒПҮОөО№ ОұПҖПҢОёОөОјОұ ПғОө ОұП…П„ПҢ П„Оҝ П„ОјО®ОјОұ (ОІО¬О»Оө ПҖОҝПғПҢП„О·П„ОөПӮ ПҖПҒПҺП„Оұ)','No stock in this section (enter quantities first)'));return;}

  if(!confirm(kindLabel(ST.okind)+' В· '+money(total)+' В· '+dGRs(take_date)+'\n\n'+L('ОқОұ ОәО»ОөО№ОҙПүОёОөОҜ ОұП…П„О® О· ОұПҖОҝОіПҒОұПҶО®;','Save this stock-take?')))return;

    const {data:head,error:hErr}=await sb.from('stock_takes').insert({tenant_id:tid,kind:ST.okind,take_date:take_date,total_value:total,item_count:lines.length,created_by:ST.userEmail||null}).select().single();

  }catch(e){toast('вқҢ '+(e.message||e)+' вҖ” '+L('ОӯП„ПҒОөОҫОөПӮ П„Оҝ SQL ОұПҖОҝОіПҒОұПҶПҺОҪ;','did you run the stock-takes SQL?'));}

function calcOrd(pid){

async function saveOrder(pid){
  const p=ST.products.find(x=>x.id===pid);const isBev=ST.okind==='beverage';
  const g=k=>{const el=document.getElementById('o-'+pid+'-'+k);const v=el?parseFloat(el.value):0;return isNaN(v)?0:v;};

async function logOrder(supName){
  const s=ST.suppliers.find(x=>x.name===supName)||{};
  const today=new Date().toISOString().slice(0,10);
  const rows=[];const pids=[];
  ST.products.forEach(p=>{
    const ol=ST.orders[p.id];if(!ol)return;const oq=parseFloat(ol.order_qty)||0;if(oq<=0)return;
    const b=ST.best[p.id]||{};if((b.sup||'вҖ”')!==supName)return;
    const prev=stockOf(ol,p.kind==='beverage');
    rows.push({tenant_id:p.tenant_id,product_id:p.id,supplier_id:s.id||null,date:today,sku:p.sku,qty:oq,value:Math.round(oq*(parseFloat(b.price)||0)*100)/100,status:'Pending',prev_stock:prev});
    pids.push(p.id);
  });
  if(!rows.length)return;   // О®ОҙО· ОәОұП„ОұПҮПүПҒО·ОјОӯОҪО· / ОәОұОјОҜОұ ПҖОҝПғПҢП„О·П„Оұ
  try{const {data,error}=await sb.from('order_history').insert(rows).select();
    if(error)throw error;(data||[]).forEach(r=>ST.orderHistory.unshift(r));
    // ОәОұОёО¬ПҒО№ПғОө П„Оҝ Order ОұПҖПҢ П„О·ОҪ ОөПҖО№ПғОәПҢПҖО·ПғО· (ОјО·ОҙОөОҪОҜО¶ОөО№ order_qty)
    for(const pid of pids){
      const ol=ST.orders[pid]||{};const p=ST.products.find(x=>x.id===pid);
      const row={tenant_id:(p&&p.tenant_id),product_id:pid,cellar_count:parseFloat(ol.cellar_count)||0,bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};
      await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;
    }
    toast('вң… '+L('ОЈП„О¬О»ОёО·ОәОө вҖ” ОјПҖО®ОәОө ПғП„Оҝ О№ПғП„ОҝПҒО№ОәПҢ','Sent вҖ” logged')+' ('+rows.length+')');orderSummary();
  }catch(e){toast('вқҢ '+(e.message||e));}
}

async function delOrderHistory(id){
  const r=(ST.orderHistory||[]).find(x=>x.id===id);
  try{await sb.from('order_history').delete().eq('id',id);
    ST.orderHistory=ST.orderHistory.filter(x=>x.id!==id);
    if(r&&r.product_id){const ol=ST.orders[r.product_id];if(ol&&(parseFloat(ol.order_qty)||0)>0){const row=Object.assign({},ol,{order_qty:0,updated_at:new Date().toISOString()});await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[r.product_id]=row;}}
    toast('рҹ—‘ О”О№ОұОіПҒО¬ПҶО·ОәОө');renderOrderHistory();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function checkDeliveries(){
  // Delivered ОұОҪ П„Оҝ sku ОөОјПҶОұОҪО№ПғП„ОөОҜ ПғП„Оҝ Price History ОјОө О·Ој. >= О·Ој. ПҖОұПҒОұОіОіОөО»ОҜОұПӮВ· ОұПҖПҢОёОөОјОұ += ПҖОұПҒОұО»ОұОІО®
  let n=0;const done=[];
  for(const r of (ST.orderHistory||[])){
    if(r.status==='Delivered')continue;
    const keys=keyWords(r.sku);if(!keys.length)continue;
    const found=(ST.history||[]).some(ph=>{
      if(!ph.date||ph.date<r.date)return false;
      const rt=normStr(ph.raw_product||'').split(' ');
      return keys.every(k=>rt.some(w=>w===k||w.startsWith(k)));
    });
    if(!found)continue;
    try{
      await sb.from('order_history').update({status:'Delivered'}).eq('id',r.id);
      r.status='Delivered';n++;
      // ОұПҖПҢОёОөОјОұ += ПҖОұПҒОұО»ОұОІО® (ПғП„Оҝ cellar_count)
      if(r.product_id){
        const p=ST.products.find(x=>x.id===r.product_id);
        const ol=ST.orders[r.product_id]||{};
        const newCellar=(parseFloat(ol.cellar_count)||0)+(parseFloat(r.qty)||0);
        const row={tenant_id:(p&&p.tenant_id)||r.tenant_id,product_id:r.product_id,
          cellar_count:newCellar,bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,kitchen_count:parseFloat(ol.kitchen_count)||0,
          par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};
        await sb.from('order_lines').upsert(row,{onConflict:'product_id'});
        ST.orders[r.product_id]=row;
      }
    }catch(e){toast('вқҢ '+(e.message||e));return;}
  }
  if(!n){toast('ОҡОұОјОҜОұ ОҪОӯОұ ПҖОұПҒОұО»ОұОІО®');return;}
  toast('вң… '+n+' Delivered В· ОөОҪО·ОјОөПҒПҺОёО·ОәОө ОұПҖПҢОёОөОјОұ');renderOrderHistory();
}

function dashHtml(){

    tile('рҹ§ҫ',lbl('iInvoices','ОӨО№ОјОҝО»ПҢОіО№Оұ'),inv.length)+
    tile('рҹ“Ҳ','ОңОӯПғО· ОјОөП„ОұОІ.',(avgCh>=0?'+':'')+(avgCh*100).toFixed(1)+'%',avgCh>0?'var(--bad)':'var(--ok)')+

    h+='</div>';
  }
  // Top ПҖПҒОҝПҠПҢОҪП„Оұ (ОҙОұПҖО¬ОҪО· = П„О№ОјО® Г— ПҖОҝПғПҢП„О·П„Оұ)
  const byProd={};hist.forEach(r=>{const p=ST.products.find(x=>x.id===r.product_id);const nm=p?p.sku:(r.raw_product||'вҖ”');const sp=(parseFloat(r.price)||0)*(parseFloat(r.quantity)||0);if(sp>0)byProd[nm]=(byProd[nm]||0)+sp;});
  const topProd=Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(topProd.length){
    const pmax=topProd[0][1]||1;
    h+='<div class="card" style="margin-top:10px"><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">рҹ“Ұ TOP О ОЎОҹОӘОҹОқОӨО‘ (ОҙОұПҖО¬ОҪО·)</h3>';

    h+='</div>';
  }
  return h;

// О•О»О»О·ОҪО№ОәО® О·ОјОөПҒОҝОјО·ОҪОҜОұ: ОҙОӯПҮОөП„ОұО№ 15/07/2026 О® 2026-07-15 вҶ’ ОөПҖО№ПғП„ПҒОӯПҶОөО№ ISO
function parseGRDate(s){
  s=String(s||'').trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);   // 15/07/2026
  if(m)return m[3]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;           // О®ОҙО· ISO
  return null;
}

function scoreClass(score,cmHigh,sellHigh){
  // 4 П„ОөП„ПҒО¬ОіПүОҪОұ: ОәОӯПҒОҙОҝПӮ(CM) Г— ОҙО·ОјОҝП„О№ОәПҢП„О·П„Оұ(ПҖПүО»О®ПғОөО№ПӮ)
  if(sellHigh&&cmHigh)return {k:'champion',emo:'рҹҹў',col:'var(--ok)',el:'О ПҒПүП„ОұОёО»О·П„О®ПӮ',en:'Champion',tipEl:'ОҡПҒО¬П„Оұ & О ПҒПҢОІОұО»Оӯ П„Оҝ',tipEn:'Keep & Promote it'};
  if(sellHigh&&!cmHigh)return {k:'fix',emo:'рҹҹЎ',col:'#e0a800',el:'ОҳОӯО»ОөО№ О”О№ПҢПҒОёПүПғО·',en:'Needs Fixing',tipEl:'О‘ОҪОӯОІОұПғОө ОӨО№ОјО® О® ОЎОҜОҫОө ОҡПҢПғП„ОҝПӮ',tipEn:'Raise Price or Cut Cost'};
  if(!sellHigh&&cmHigh)return {k:'hidden',emo:'рҹ”ө',col:'var(--accent)',el:'ОҡПҒП…ОјОјОӯОҪОҝПӮ ОҳО·ПғОұП…ПҒПҢПӮ',en:'Hidden Gem',tipEl:'О”О№ОұПҶО®ОјО№ПғОӯ П„Оҝ В· ОҡОұО»ПҚП„ОөПҒО· ОҳОӯПғО· ПғП„Оҝ ОңОөОҪОҝПҚ',tipEn:'Promote it В· Better Menu Spot'};
  return {k:'cut',emo:'рҹ”ҙ',col:'var(--bad)',el:'ОҘПҖОҝПҲО®ПҶО№Оҝ ОіО№Оұ ОҡПҢПҲО№ОјОҝ',en:'Consider Cutting',tipEl:'ОЈОәОӯПҲОҝП… ОҪОұ П„Оҝ О’ОіО¬О»ОөО№ПӮ ОұПҖПҢ П„Оҝ ОңОөОҪОҝПҚ',tipEn:'Consider Removing from Menu'};
}
// ОҘПҖОҝО»ОҝОіОҜО¶ОөО№ П„О·ОҪ ОұОҪО¬О»П…ПғО· ОұПҖПҢ П„Оұ recipes П„О·ПӮ ОәОұП„О·ОіОҝПҒОҜОұПӮ + П„О№ПӮ ПҖПүО»О®ПғОөО№ПӮ (ST.meSold) + on/off (ST.meOff)
function menuEngCalc(){
  const kind=ST.meKind||'cocktail';
  const sub=ST.meSub||'';
  const recs=(ST.recipes||[]).filter(r=>r.kind===kind && !r.is_homemade && (!sub || r.sub_category===sub));
  const sold=ST.meSold||(ST.meSold={});
  const off=ST.meOff||(ST.meOff={});
  const rows=[];
  let totalSold=0,totalRev=0,totalCM=0,totalCost=0,activeCount=0,sumCM=0;
  recs.forEach(r=>{
    if(off[r.id])return;                                // ОөОҫОұО№ПҒОӯОёО·ОәОө (on/off)
    const cc=recipeCalc(r);
    const n=parseFloat(sold[r.id])||0;
    const price=parseFloat(r.retail_price)||0;
    const cm=cc.netProfit;                              // ПғП…ОҪОөО№ПғПҶОҝПҒО¬ ОұОҪО¬ П„ОөОјО¬ПҮО№Оҝ (ОәОұОёОұПҒПҢ - ОәПҢПғП„ОҝПӮ)
    rows.push({id:r.id,name:r.name,n,price,cost:cc.realCost,cm,netRev:cc.retailNet});
    totalSold+=n; totalRev+=cc.retailNet*n; totalCM+=cm*n; totalCost=(totalCost||0)+cc.realCost*n; sumCM+=cm; activeCount++;
  });
  const avgCM=activeCount?sumCM/activeCount:0;          // ОјОӯПғО· ПғП…ОҪОөО№ПғПҶОҝПҒО¬ (ПҢПҒО№Оҝ High/Low ОәОӯПҒОҙОҝП…ПӮ)
  // ОҢПҒО№Оҝ ОҙО·ОјОҝП„О№ОәПҢП„О·П„ОұПӮ: 70% Г— ОјОӯПғОҝ ОјОөПҒОҜОҙО№Оҝ (ОәО»ОұПғО№ОәПҢПӮ ОәОұОҪПҢОҪОұПӮ menu engineering)
  const fairShare=activeCount?(totalSold/activeCount):0;
  const popThreshold=fairShare*0.70;
  rows.forEach(r=>{
    r.mix=totalSold>0?(r.n/totalSold*100):0;
    const cmHigh=r.cm>=avgCM;
    const sellHigh=r.n>=popThreshold;
    r.cls=scoreClass(0,cmHigh,sellHigh);
    // ОЈОәОҝПҒ 0-100: 50 ОұПҖПҢ ОәОӯПҒОҙОҝПӮ (ПғПҮОөП„О№ОәПҢ ОјОө max CM) + 50 ОұПҖПҢ ПҖПүО»О®ПғОөО№ПӮ (ПғПҮОөП„О№ОәПҢ ОјОө max ПҖПүО»О®ПғОөО№ПӮ)
    const maxCM=Math.max.apply(null,rows.map(x=>x.cm).concat([0.0001]));
    const maxN=Math.max.apply(null,rows.map(x=>x.n).concat([0.0001]));
    r.score=Math.round((r.cm/maxCM)*50 + (r.n/maxN)*50);
  });
  rows.sort((a,b)=>b.score-a.score);
  return {rows,totalSold,totalRev,totalCM,totalCost,avgCM,activeCount};
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ вҡ пёҸ О•ОӣО•О“О§ОҹОЈ О О‘ОЎО‘ОӣО‘О’О—ОЈ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function checkDelivery(sid,invDate,lines){
  if(!sid||!lines||!lines.length)return;
  const cutoff=new Date(Date.now()-21*86400000).toISOString().slice(0,10);   // ПҖОұПҒОұОіОіОөО»ОҜОөПӮ П„ОөО»ОөП…П„ОұОҜПүОҪ 21 О·ОјОөПҒПҺОҪ
  // О•ОәОәПҒОөОјОөОҜПӮ ПҖОұПҒОұОіОіОөО»ОҜОөПӮ ОұП…П„ОҝПҚ П„ОҝП… ПҖПҒОҝОјО·ОёОөП…П„О®
  const pend=(ST.orderHistory||[]).filter(r=>r.supplier_id===sid&&(r.status||'')==='Pending'&&(r.date||'')>=cutoff);
  if(!pend.length)return;

  const missing=[], received=[];
  const byProd={};
  lines.forEach(l=>{ if(l.productId)byProd[l.productId]=(byProd[l.productId]||0)+(parseFloat(l.qty)||0); });

  for(const po of pend){
    const got=byProd[po.product_id]||0;
    const ord=parseFloat(po.qty)||0;
    if(got>0){
      received.push({po,ord,got});
      const st=(got>=ord)?'Delivered':'Partial';
      try{await sb.from('order_history').update({status:st,qty_received:got}).eq('id',po.id);}catch(e){}
      po.status=st; po.qty_received=got;
      if(got<ord)missing.push({name:po.sku,ord,got,miss:Math.round((ord-got)*10)/10});
    }
  }
  if(!received.length)return;

  // в”Җв”Җ О•ОҪО·ОјОӯПҒПүПғО· ОұПҖОҝОёОӯОјОұП„ОҝПӮ (ОңОҹОқОҹ ОұОҪ П…ПҖО¬ПҒПҮОөО№ ОұПҖОҝОёО·ОәОөП…ОјОӯОҪОҝ ОұПҖПҢОёОөОјОұ) в”Җв”Җ
  let stockMsg=[];
  for(const r of received){
    const pid=r.po.product_id;
    const ol=ST.orders[pid]; if(!ol)continue;
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)continue;
    const isBev=p.kind==='beverage';
    const cur=stockOf(ol,isBev);
    if(cur<=0)continue;                       // ОҙОөОҪ ОӯПҮОөО№ ПғПҺПғОөО№ ОұПҖПҢОёОөОјОұ вҶ’ ОјО· ПҖОөО№ПҒО¬ОҫОөО№ПӮ
    const field=isBev?'cellar_count':'cellar_count';
    const newVal=(parseFloat(ol[field])||0)+r.got;
    const row={tenant_id:p.tenant_id,product_id:pid,
      cellar_count:isBev?newVal:(parseFloat(ol.cellar_count)||0)+r.got,
      bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,
      kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,
      order_qty:parseFloat(ol.order_qty)||0,
      last_delivery:invDate||null,last_delivery_qty:r.got,
      updated_at:new Date().toISOString()};
    try{await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;}catch(e){}
    stockMsg.push(p.sku+': '+cur+' + '+r.got+' = '+(cur+r.got));
  }

  // в”Җв”Җ ОңО®ОҪП…ОјОұ в”Җв”Җ
  let msg='';
  if(missing.length){
    msg='вҡ пёҸ '+L('О”О•Оқ О—ОЎОҳО‘Оқ ОҹОӣО‘','NOT ALL DELIVERED')+'\n\n';
    missing.forEach(m=>{msg+='вҖў '+m.name+': '+L('ПҖОұПҒО®ОіОіОөО№О»ОөПӮ','ordered')+' '+m.ord+' В· '+L('О®ПҒОёОұОҪ','received')+' '+m.got+' вҶ’ '+L('О»ОөОҜПҖОҝП…ОҪ','missing')+' '+m.miss+'\n';});
  } else {
    msg='вң… '+L('ОҢО»Оұ ПҖОұПҒОұО»О®ПҶОёО·ОәОұОҪ ПғПүПғП„О¬','All delivered correctly')+'\n';
  }
  if(stockMsg.length){
    msg+='\nрҹ“Ұ '+L('О‘ПҖПҢОёОөОјОұ ОөОҪО·ОјОөПҒПҺОёО·ОәОө','Stock updated')+' ('+dGRs(invDate)+'):\n';
    stockMsg.forEach(x=>{msg+='вҖў '+x+'\n';});
  }
  alert(msg);
}
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ОҡО•ОЎО”ОҹОҰОҹОЎОҷО‘ (Profit / P&L) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function profitView(){ return '<div id="profitBox" style="min-height:30vh;display:flex;align-items:center;justify-content:center"><span class="spin"></span></div>'; }
function pPeriodDates(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  let s,e;
  if(t==='month'){ s=new Date(d.getFullYear(),d.getMonth(),1); e=new Date(d.getFullYear(),d.getMonth()+1,0); }
  else if(t==='quarter'){ const q=Math.floor(d.getMonth()/3); s=new Date(d.getFullYear(),q*3,1); e=new Date(d.getFullYear(),q*3+3,0); }
  else if(t==='half'){ const hh=d.getMonth()<6?0:6; s=new Date(d.getFullYear(),hh,1); e=new Date(d.getFullYear(),hh+6,0); }
  else { s=new Date(d.getFullYear(),0,1); e=new Date(d.getFullYear(),11,31); }
  const f=x=>{const y=x.getFullYear(),m=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;};
  return {start:f(s),end:f(e)};
}
function monthNamesFull(){
  return ST.lang==='en'
    ?['January','February','March','April','May','June','July','August','September','October','November','December']
    :['ОҷОұОҪОҝП…О¬ПҒО№ОҝПӮ','ОҰОөОІПҒОҝП…О¬ПҒО№ОҝПӮ','ОңО¬ПҒП„О№ОҝПӮ','О‘ПҖПҒОҜО»О№ОҝПӮ','ОңО¬О№ОҝПӮ','ОҷОҝПҚОҪО№ОҝПӮ','ОҷОҝПҚО»О№ОҝПӮ','О‘ПҚОіОҝП…ПғП„ОҝПӮ','ОЈОөПҖП„ОӯОјОІПҒО№ОҝПӮ','ОҹОәП„ПҺОІПҒО№ОҝПӮ','ОқОҝОӯОјОІПҒО№ОҝПӮ','О”ОөОәОӯОјОІПҒО№ОҝПӮ'];
}
function pLabel(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  const M=monthNamesFull();
  if(t==='month')return M[d.getMonth()]+' '+d.getFullYear();
  if(t==='quarter')return 'Q'+(Math.floor(d.getMonth()/3)+1)+' '+d.getFullYear();

}
// О‘ОіОҝПҒОӯПӮ ОұПҖПҢ П„Оұ П„О№ОјОҝО»ПҢОіО№Оұ (ОұП…П„ПҢОјОұП„Оұ, ОұОҪО¬ П„ОјО®ОјОұ)
function autoPurchases(start,end){
  const out={food:0,bev:0,sup:0};
  (ST.history||[]).forEach(r=>{
    const d=(r.date||'').slice(0,10); if(d<start||d>end)return;
    const p=(ST.products||[]).find(x=>x.id===r.product_id);
    const kind=p?p.kind:'beverage';
    const val=(parseFloat(r.price)||0)*(parseFloat(r.quantity)||0);
    if(kind==='food')out.food+=val; else if(kind==='supplies')out.sup+=val; else out.bev+=val;
  });
  return out;
}

function pfNum(id){const el=document.getElementById(id);return el?(parseFloat(el.value)||0):0;}
function calcProfit(p){
  const inclVat=!!p.sales_incl_vat;
  const vf=(parseFloat(p.vat_food)||13)/100, vb=(parseFloat(p.vat_bev)||24)/100;
  const sfRaw=parseFloat(p.sales_food)||0, sbRaw=parseFloat(p.sales_bev)||0, cashRaw=parseFloat(p.sales_cash_unrec)||0;
  // ОҡОұОёОұПҒОӯПӮ ПҖПүО»О®ПғОөО№ПӮ (ПҮПүПҒОҜПӮ ОҰО О‘)
  const sf=inclVat?sfRaw/(1+vf):sfRaw;
  const sb=inclVat?sbRaw/(1+vb):sbRaw;
  const cash=inclVat?cashRaw/(1+vb):cashRaw;   // ОјОөП„ПҒО·П„О¬: П…ПҖОҝОёОӯП„ОҝП…ОјОө ПғП…ОҪП„ОөО»ОөПғП„О® ПҖОҝП„ПҺОҪ
  const salesDecl=sf+sb;              // ОҙО·О»ПүОјОӯОҪОөПӮ (ОәОұОёОұПҒОӯПӮ)
  const salesReal=salesDecl+cash;     // ПҖПҒОұОіОјОұП„О№ОәОӯПӮ (ОәОұОёОұПҒОӯПӮ)
  // О‘ОіОҝПҒОӯПӮ
  const auto=autoPurchases(p.period_start,p.period_end);
  const pFood=(p.purch_food_manual!=null&&p.purch_food_manual!=='')?parseFloat(p.purch_food_manual):auto.food;
  const pBev=(p.purch_bev_manual!=null&&p.purch_bev_manual!=='')?parseFloat(p.purch_bev_manual):auto.bev;
  const pSup=(p.purch_sup_manual!=null&&p.purch_sup_manual!=='')?parseFloat(p.purch_sup_manual):auto.sup;
  const purchases=pFood+pBev+pSup;
  // О ПҒОҝПғПүПҖО№ОәПҢ & О»ОөО№П„ОҝП…ПҒОіО№ОәО¬
  const labour=(parseFloat(p.wages)||0)+(parseFloat(p.social)||0);
  const opex=(parseFloat(p.rent)||0)+(parseFloat(p.utilities)||0)+(parseFloat(p.other_expenses)||0);
  const mk=(sales)=>{
    const gp=sales-purchases;
    const np=gp-labour-opex;
    const pc=purchases+labour;
    const taxPct=parseFloat(p.tax_pct)||0;
    const tax=(np>0)?(np*taxPct/100):0;      // ПҶПҢПҒОҝПӮ ОјПҢОҪОҝ ПғОө ОәОӯПҒОҙОҝПӮ
    const after=np-tax;
    return {
      sales, purchases, gp, gpPct:sales?gp/sales*100:0,
      labour, labourPct:sales?labour/sales*100:0,
      opex, np, npPct:sales?np/sales*100:0,
      taxPct, tax, after, afterPct:sales?after/sales*100:0,
      prime:pc, primePct:sales?pc/sales*100:0,
      foodPct:sf?pFood/(inclVat?sf:sf)*100:0,
      bevPct:sb?pBev/(inclVat?sb:sb)*100:0
    };
  };
  return {decl:mk(salesDecl), real:mk(salesReal), sf, sb, cash, pFood, pBev, pSup, auto, hasCash:cash>0};
}
function profitResultsHtml(R){

async function loadProfitList(){
  const box=document.getElementById('pf-saved'); if(!box)return;
  let rows=[];
  try{const {data}=await sb.from('profit_periods').select('*').eq('tenant_id',curTenant()).order('period_start',{ascending:false});rows=data||[];}catch(e){}
  if(!rows.length){box.innerHTML='';return;}
  const T=(el,en)=>L(el,en);
  let h='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px)"><div style="max-width:1400px;margin:0 auto"><div class="card"><h3 style="font-size:13px;color:var(--muted);margin-bottom:4px">рҹ“… '+T('О‘ПҖОҝОёО·ОәОөП…ОјОӯОҪОөПӮ О ОөПҒОҜОҝОҙОҝО№','Saved Periods')+'</h3><p class="muted" style="font-size:11px;margin:0 0 8px">'+T('О О¬П„Оұ ОјО№Оұ ПҖОөПҒОҜОҝОҙОҝ ОіО№Оұ О¬ОҪОҝО№ОіОјОұ','Tap a period to open')+'</p>';
  rows.forEach(r=>{
    const R=profitCalcFromRow(r);
    const prof=R&&R.np!=null?R.np:null;

    const name=periodLabelFromDates(r.period_start,r.period_end);
    h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px">'+
      '<div style="cursor:pointer;flex:1;min-width:0" onclick="openProfitPeriod(\''+r.period_start+'\',\''+r.period_end+'\')"><b>'+esc(name)+'</b>'+
      (prof!=null?('<div style="color:'+col+';font-weight:700">'+T('ОҡОұОёОұПҒПҢ','Net')+': '+money(prof)+'</div>'):'')+'</div>'+
      '<span onclick="delProfitPeriod(\''+r.period_start+'\',\''+r.period_end+'\')" style="cursor:pointer;color:var(--bad);font-size:18px">рҹ—‘</span></div>';
  });
  h+='</div></div></div>';
  box.innerHTML=h;
}
function periodLabelFromDates(start,end){
  // О О»О®ПҒОөПӮ ПҢОҪОҝОјОұ ОјО®ОҪОұ + ОӯП„ОҝПӮ, ПғП„О·ОҪ П„ПҒОӯПҮОҝП…ПғОұ ОіО»ПҺПғПғОұ
  try{
    const s=new Date(start+'T12:00:00');   // ОјОөПғО·ОјОӯПҒО№ ОіО№Оұ ОұПҖОҝПҶП…ОіО® timezone shift
    return monthNamesFull()[s.getMonth()]+' '+s.getFullYear();
  }catch(e){return start;}
}
function profitCalcFromRow(r){
  try{return calcProfit(r);}catch(e){return null;}
}
async function openProfitPeriod(start,end){
  // О’ПҒОөПӮ П„ОҝОҪ ПғПүПғП„ПҢ П„ПҚПҖОҝ ПҖОөПҒО№ПҢОҙОҝП… ОұПҖПҢ П„О№ПӮ О·ОјОөПҒОҝОјО·ОҪОҜОөПӮ
  const s=new Date(start),e=new Date(end);
  const months=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth())+1;
  ST.pfType=(months>=12?'year':months>=6?'half':months>=3?'quarter':'month');
  ST.pfDate=start;
  try{const {data}=await sb.from('profit_periods').select('*').eq('tenant_id',curTenant()).eq('period_start',start).eq('period_end',end).maybeSingle();ST.pf=data||null;}catch(e){}
  drawProfit();
  window.scrollTo({top:0,behavior:'smooth'});
}
async function delProfitPeriod(start,end){
  if(!confirm(L('О”О№ОұОіПҒОұПҶО® ПҖОөПҒО№ПҢОҙОҝП…;','Delete period?')))return;
  try{await sb.from('profit_periods').delete().eq('tenant_id',curTenant()).eq('period_start',start).eq('period_end',end);toast('вң… '+L('О”О№ОұОіПҒО¬ПҶО·ОәОө','Deleted'));loadProfitList();}
  catch(e){toast('вқҢ '+(e.message||e));}
}

// ОҡПҢПғП„ОҝПӮ ОөОҪПҢПӮ item ОұОҪО¬ О‘ОӨОҹОңОҹ (О»ОұОјОІО¬ОҪОөО№ П…ПҖПҢПҲО· П„Оҝ В«ОұОҪО¬ ПҖПҢПғОұ О¬П„ОҝОјОұВ»)
function evItemCost(it){
  const qty=parseFloat(it.qty_per_guest)||0;
  const per=parseFloat(it.per_guests)||1;      // ПҖ.ПҮ. 1 ПғОұО»О¬П„Оұ ОұОҪО¬ 4 О¬П„ОҝОјОұ вҶ’ per=4
  const effective=per>0?(qty/per):0;           // ПҖПҒОұОіОјОұП„О№ОәО® ПҖОҝПғПҢП„О·П„Оұ ОұОҪО¬ О¬П„ОҝОјОҝ
  if(it.recipe_id){
    const r=(ST.recipes||[]).find(x=>x.id===it.recipe_id);
    if(!r)return 0;
    const cc=recipeCalc(r);
    return (cc.realCost||0)*effective;
  }
  if(it.product_id){
    const p=(ST.products||[]).find(x=>x.id===it.product_id);
    if(!p)return 0;
    const b=ST.best[p.id]||{};
    return (parseFloat(b.price)||0)*effective;
  }
  return 0;
}
function evCalc(){
  const e=ST.event||{}; const items=ST.eventItems||[];
  const guests=parseFloat(e.guests)||0;
  let perGuest=0; items.forEach(it=>{perGuest+=evItemCost(it);});
  const foodCost=perGuest*guests;
  const extra=parseFloat(e.extra_costs)||0;
  const totalCost=foodCost+extra;
  const price=parseFloat(e.price_per_guest)||0;
  const revenue=price*guests;
  const profit=revenue-totalCost;
  const marginPct=revenue>0?(profit/revenue*100):0;
  const costPct=revenue>0?(totalCost/revenue*100):0;
  const costPerGuest=guests>0?(totalCost/guests):0;
  return {guests,perGuest,foodCost,extra,totalCost,price,revenue,profit,marginPct,costPct,costPerGuest};
}

function evShopList(){
  const e=ST.event, R=evCalc(), g=R.guests;
  if(!g){toast('вқҢ '+L('О’О¬О»Оө ОұПҒО№ОёОјПҢ ОұП„ПҢОјПүОҪ','Enter number of guests'));return;}
  // ОңО¬О¶ОөПҲОө ОҹОӣО‘ П„Оұ П…О»О№ОәО¬ (ОұОҪОұО»ПҚОҝОҪП„ОұПӮ П„О№ПӮ ПғП…ОҪП„ОұОіОӯПӮ ПғОө ПҖПҒОҝПҠПҢОҪП„Оұ)
  const need={};   // product_id -> {qty, unit}
  const addProd=(pid,qty,unit)=>{
    if(!pid)return;
    if(!need[pid])need[pid]={qty:0,unit:unit||''};
    need[pid].qty+=qty;
  };
  const expand=(recId,mult,depth)=>{
    if((depth||0)>4)return;
    const ings=(ST.recipeIng||[]).filter(x=>x.recipe_id===recId);
    ings.forEach(ing=>{
      const nm=(ing.ingredient||'').trim();
      const sub=(ST.recipes||[]).find(r=>r.is_homemade&&(r.name||'').trim().toLowerCase()===nm.toLowerCase());
      const q=(parseFloat(ing.quantity)||0)*mult;
      if(sub){ const y=parseFloat(sub.yield_qty)||1; expand(sub.id,q/y,(depth||0)+1); }
      else { const p=(ST.products||[]).find(x=>(x.sku||'').trim().toLowerCase()===nm.toLowerCase());
             if(p)addProd(p.id,q,ing.unit||''); }
    });
  };
  (ST.eventItems||[]).forEach(it=>{
    const qty=parseFloat(it.qty_per_guest)||0;
    const pg=parseFloat(it.per_guests)||1;
    const total=(qty/pg)*g;                    // ПғП…ОҪОҝО»О№ОәОӯПӮ ОјОөПҒОҜОҙОөПӮ/ПҖОҝП„О¬ ОіО№Оұ ПҢО»О· П„О·ОҪ ОөОәОҙО®О»ПүПғО·
    if(it.recipe_id)expand(it.recipe_id,total,0);
    else if(it.product_id)addProd(it.product_id,total,'');
  });
  let h='<div style="margin-top:10px"><div class="card" style="background:var(--accent-bg);border-color:var(--accent)"><b style="color:var(--accent)">рҹӣ’ '+L('ОӣОҜПғП„Оұ О‘ОіОҝПҒПҺОҪ','Shopping List')+'</b><div style="font-size:12px;color:var(--muted)">'+esc(e.name)+' В· '+g+' '+L('О¬П„ОҝОјОұ','guests')+'</div></div>';
  const ids=Object.keys(need);
  if(!ids.length)h+='<div class="card muted" style="text-align:center">'+L('О ПҒПҢПғОёОөПғОө ПҖПҒПҺП„Оұ ОјОөОҪОҝПҚ','Add menu items first')+'</div>';
  let totalC=0;
  const bySup={};
  ST._shopRows={};   // ОіО№Оұ ОҪОұ ОёП…ОјО¬П„ОұО№ П„О№ПӮ ОөПҖО№О»ОҝОіОӯПӮ ПҖПҒОҝОјО·ОёОөП…П„О®
  ids.forEach(pid=>{
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)return;
    // О ОҝО№ОҝПӮ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ; (ОөПҖО№О»ОҝОіО® ПҮПҒО®ПғП„О· О® Оҝ ПҶОёО·ОҪПҢП„ОөПҒОҝПӮ)
    const rows=(ST.prices||[]).filter(x=>x.product_id===pid&&(parseFloat(x.price)||0)>0)
      .map(x=>({sid:x.supplier_id,name:supName(x.supplier_id),price:parseFloat(x.price)||0}))
      .sort((a,b2)=>a.price-b2.price);
    const chosenSid=(ST.evSup&&ST.evSup[pid])||((rows[0]||{}).sid)||null;
    const chosen=rows.find(x=>x.sid===chosenSid)||rows[0]||{name:'вҖ”',price:0};
    const price=chosen.price||0;
    const n=need[pid];
    const mu=(p.measure_unit||'').toLowerCase();
    const size=parseFloat(p.size_ml)||0;
    const ru=(n.unit||'').toLowerCase();
    const isWeight=(ru==='gr'||ru==='g'||mu==='kg'||mu==='g');
    let buyQty, buyUnit, cost;

    if(mu==='kg'||mu==='l'){
      const inKgL=n.qty/1000;
      buyQty=Math.round(inKgL*100)/100; buyUnit=(mu==='kg'?L('ОәО№О»О¬','kg'):L('О»ОҜП„ПҒОұ','L'));
      cost=price*inKgL;
    } else if(mu==='g'||mu==='ml'){
      buyQty=Math.round(n.qty*10)/10; buyUnit=mu;
      cost=price*n.qty;

      cost=price*packs;
    } else {
      buyQty=Math.ceil(n.qty*10)/10; buyUnit=L('П„ОөОј','pcs');
      cost=price*n.qty;
    }
    totalC+=cost;
    const sup=chosen.name||'вҖ”';
    if(!bySup[sup])bySup[sup]=[];
    bySup[sup].push({pid,name:p.sku,qty:buyQty,unit:buyUnit,raw:n.qty,rawUnit:n.unit,cost,rows,chosenSid:chosen.sid});
  });
  Object.keys(bySup).sort().forEach(sup=>{
    h+='<div class="card"><h3 style="font-size:13px;color:var(--accent);margin-bottom:8px">рҹҸў '+esc(sup)+'</h3>';
    bySup[sup].forEach(x=>{
      h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div style="flex:1"><b>'+esc(x.name)+'</b>'+(x.rawUnit?('<div style="font-size:11px;color:var(--muted)">'+(function(){var u=(x.rawUnit||'').toLowerCase();if((u==='gr'||u==='g')&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' '+L('ОәО№О»О¬','kg');if(u==='ml'&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' L';return (Math.round(x.raw*10)/10)+' '+esc(x.rawUnit);})()+'</div>'):'')+'</div>'+
          '<div style="text-align:right"><b>'+x.qty+'</b> <span style="font-size:11px;color:var(--muted)">'+esc(x.unit)+'</span><div style="font-size:11px;color:var(--muted)">'+money(Math.round(x.cost*100)/100)+'</div></div>'+
        '</div>'+
        ((x.rows&&x.rows.length>1)?('<select onchange="evSetSup(\''+x.pid+'\',this.value)" style="width:100%;margin-top:5px;padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:var(--card)">'+
          x.rows.map(r=>'<option value="'+r.sid+'"'+(r.sid===x.chosenSid?' selected':'')+'>'+esc(r.name)+' В· '+money(r.price)+'</option>').join('')+
        '</select>'):'')+
      '</div>';
    });
    // в”Җв”Җ ОҡОҝП…ОјПҖО№О¬ ПҖОұПҒОұОіОіОөО»ОҜОұПӮ ОұОҪО¬ ПҖПҒОҝОјО·ОёОөП…П„О® в”Җв”Җ
    const sObj=(ST.suppliers||[]).find(s2=>String(s2.name)===String(sup));
    const lines=bySup[sup].map(x=>'вҖў '+x.name+': '+x.qty+' '+x.unit).join('\n');
    const body=L('О ОұПҒОұОіОіОөО»ОҜОұ','Order')+' - '+((ST.shopName||'').trim()||'')+'\n'+
      (e.name?(L('О•ОәОҙО®О»ПүПғО·','Event')+': '+e.name+(e.event_date?(' ('+dGRs(e.event_date)+')'):'')+'\n'):'')+
      '\n'+L('ОҡОұО»О·ПғПҖОӯПҒОұ, ПҖОұПҒОұОәО¬П„Пү О· ПҖОұПҒОұОіОіОөО»ОҜОұ ОјОұПӮ:','Hello, here is our order:')+'\n\n'+lines+'\n';
    const mailto='mailto:'+((sObj&&sObj.email)||'')+'?subject='+encodeURIComponent(L('О ОұПҒОұОіОіОөО»ОҜОұ','Order')+' - '+(e.name||''))+'&body='+encodeURIComponent(body);
    const wa='https://wa.me/'+String((sObj&&sObj.phone)||'').replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(body);
    const vb='viber://forward?text='+encodeURIComponent(body);
    h+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'+
      '<a class="btn" href="'+mailto+'" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;padding:8px;font-size:13px">рҹ“§ Email</a>'+
      '<a class="btn" href="'+wa+'" target="_blank" rel="noopener" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;background:#25d366;padding:8px;font-size:13px">рҹҹў WhatsApp</a>'+

function pcSet(k,v){ST.pc=ST.pc||{};ST.pc[k]=v;if(k==='category')ST.pc.sub='';renderStats();}
function resolveProductId(r){ if(r.product_id)return r.product_id; return matchProduct(r.raw_product||'')||null; }
function resolveSupName(r){ if(r.supplier_id)return supName(r.supplier_id); const sid=matchSupplier(r.supplier_name||''); if(sid)return supName(sid); return r.supplier_name||'вҖ”'; }
function unitDivisor(unit){
  // О•ПҖО№ПғП„ПҒОӯПҶОөО№ ПғОө ПҖПҢПғОұ П„ОөОјО¬ПҮО№Оұ ПғПҖО¬ОөО№ О· ОјОҝОҪО¬ОҙОұ. ОңОҹОқОҹ ОәО№ОІПҺП„О№Оҝ ОҙО№ОұО№ПҒОөОҜП„ОұО№.
  const u=normStr(unit); // NFD, ОәОөПҶОұО»ОұОҜОұ, ПҮПүПҒОҜПӮ П„ПҢОҪОҝП…ПӮ
  if(!u)return 1;
  // О’О‘ОЎО•ОӣОҷ О® ПҢОіОәОҝПӮ/ОІО¬ПҒОҝПӮ вҶ’ О”О•Оқ ОҙО№ОұО№ПҒОөОҜП„ОұО№ (ОјОҜОұ ОјОҝОҪО¬ОҙОұ ОұОіОҝПҒО¬ПӮ)
  if(/\bО’О‘ОЎ|BARREL|KEG\b/.test(u))return 1;
  // ОҡОҷО’О©ОӨОҷОҹ вҶ’ ОІПҒОөПӮ ОұПҒО№ОёОјПҢ ПҶО№ОұО»ПҺОҪ (ОҡОҷО’24, О ОӣО‘ОЈОӨ ОҡОҷО’ ОңО• 24ОҰ, ОҡОҷО’О©ОӨОҷОҹ 24, CASE 24)
  if(/ОҡОҷО’|CASE|CRATE/.test(u)){
    const m=u.match(/(\d+)/);           // ПҖПҒПҺП„ОҝПӮ ОұПҒО№ОёОјПҢПӮ = ПҶО№О¬О»ОөПӮ/ОәО№ОІПҺП„О№Оҝ
    const n=m?parseInt(m[1],10):0;

function lastPurchase(pid){
  const sid=(document.getElementById('ocr-sup')||{}).value||'';
  if(!sid||!pid)return null;
  const cutoff=new Date(Date.now()-45*86400000).toISOString().slice(0,10);
  const rows=(ST.history||[]).filter(r=>r.product_id===pid&&r.supplier_id===sid&&(parseFloat(r.price)||0)>0&&(r.date||'')>=cutoff)
    .sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(!rows.length)return null;
  const r=rows[0];
  const qty=parseFloat(r.quantity)||0, price=parseFloat(r.price)||0;
  return {id:r.id,date:r.date,qty,price,total:qty*price};
}

async function ocrGiftPrev(i){
  const ln=ST.ocr.lines[i];

  const prev=lastPurchase(ln.productId);
  if(!prev||freeQty<=0){toast('вқҢ '+L('О”ОөОҪ ОІПҒОӯОёО·ОәОө ПҖПҒОҝО·ОіОҝПҚОјОөОҪО· ОұОіОҝПҒО¬','No previous purchase found'));return;}

  if(!confirm(L('О”О№ПҢПҒОёПүПғО· П„О№ОјО®ПӮ ПҖПҒОҝО·ОіОҝПҚОјОөОҪО·ПӮ ОұОіОҝПҒО¬ПӮ:','Correct previous purchase price:')+'\n\n'+

    await sb.from('price_history').update({quantity:totalPcs,price:newPrice}).eq('id',prev.id);

    const sid=(document.getElementById('ocr-sup')||{}).value||'';

function detectPacks(raw){

function compressFile(f){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxD=2000;let w=img.width,h=img.height;
      if(Math.max(w,h)>maxD){const s=maxD/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      let dataUrl;
      try{const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);dataUrl=cv.toDataURL('image/jpeg',0.72);}
      catch(e){dataUrl=rd.result;}
      res({b64:String(dataUrl).split(',')[1],mediaType:'image/jpeg'});
    };
    img.onerror=()=>{const dataUrl=rd.result;res({b64:String(dataUrl).split(',')[1],mediaType:f.type||'image/jpeg'});};
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});}

      await sb.from('price_history').insert({tenant_id:tid,product_id:ln.productId,supplier_id:sid,supplier_name:supN,invoice_id:invId,date:date,raw_product:ln.raw,unit:ln.unit||null,quantity:qty,price:price,prev_price:prev,change_eur:chE,change_pct:chP,notes:(ln.vintage?('О§ПҒОҝОҪО№О¬ '+ln.vintage):'ОӨО№ОјОҝО»ПҢОіО№Оҝ')});
      ok++;
    }catch(e){console.error(e);}
  }
  await Promise.all([refreshPrices(),
    (async()=>{const _th=curTenant();let _hq=sb.from('price_history').select('*');if(_th)_hq=_hq.eq('tenant_id',_th);const {data:hist}=await _hq.order('date',{ascending:false}).limit(400);ST.history=hist||[];})(),

  ]);

  await markGmailDone();
  await checkDelivery(sid,date,good);   // вҡ пёҸ ОӯО»ОөОіПҮОҝПӮ ПҖОұПҒОұО»ОұОІО®ПӮ + ОөОҪО·ОјОӯПҒПүПғО· ОұПҖОҝОёОӯОјОұП„ОҝПӮ
  nextOcrOrReset();
}

function periodFrom(p){
  const d=new Date();
  if(p==='week')d.setDate(d.getDate()-7);
  else if(p==='month')d.setMonth(d.getMonth()-1);
  else if(p==='3m')d.setMonth(d.getMonth()-3);
  else if(p==='6m')d.setMonth(d.getMonth()-6);
  else if(p==='9m')d.setMonth(d.getMonth()-9);
  else if(p==='year')d.setFullYear(d.getFullYear()-1);
  else return '';
  return d.toISOString().slice(0,10);
}

function priceDbView(){
  ST.pd=ST.pd||{pid:'',period:'all'};
  const P=ST.pd;
  const prods=ST.products.slice().sort((a,b)=>String(a.sku).localeCompare(String(b.sku)));
  if(!P.pid&&prods.length)P.pid=prods[0].id;
  const periods=[['week',lbl('pWeek','О•ОІОҙОҝОјО¬ОҙОұ')],['month',lbl('pMonth','ОңО®ОҪОұПӮ')],['3m',lbl('p3m','3 ОңО®ОҪОөПӮ')],['6m',lbl('p6m','6 ОңО®ОҪОөПӮ')],['9m',lbl('p9m','9 ОңО®ОҪОөПӮ')],['year',lbl('pYear','ОҲП„ОҝПӮ')],['all',lbl('pAll','ОҢО»Оұ')]];
  const from=periodFrom(P.period);
  let rows=(ST.history||[]).filter(r=>resolveProductId(r)===P.pid);
  if(from)rows=rows.filter(r=>(r.date||'')>=from);
  rows=rows.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const units=rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  const spend=rows.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0)),0);
  const prices=rows.map(r=>parseFloat(r.price)).filter(x=>!isNaN(x));
  const avg=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:0;
  const latest=rows.length?parseFloat(rows[0].price):0;
  const oldest=rows.length?parseFloat(rows[rows.length-1].price):0;
  const chE=(rows.length>1)?(latest-oldest):0;
  const chP=(oldest>0)?(chE/oldest):0;
  const b=ST.best[P.pid]||{};
  // в”Җв”Җ ПҖПҒОұОіОјОұП„О№ОәО¬ ПҶОёО·ОҪПҢП„ОөПҒОҝПӮ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ (ОұПҖПҢ ПҢО»ОөПӮ П„О№ПӮ П„О№ОјОӯПӮ, ОұОіОҪОҝПҺОҪП„ОұПӮ П„Оҝ ПҮОөО№ПҒОҝОәОҜОҪО·П„Оҝ override) в”Җв”Җ
  const prForBest=ST.prices.filter(x=>x.product_id===P.pid);
  let realBest={sup:'',price:Infinity};

  const bestSup=realBest.sup||b.sup||'';const bestPrice=(realBest.price<Infinity)?realBest.price:(parseFloat(b.price)||0);
  const nInv=new Set(rows.map(r=>r.invoice_id).filter(Boolean)).size||rows.length;
  const tile=(lbl,val,col)=>'<div style="flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:'+(col||'var(--ink)')+'">'+val+'</div><div style="font-size:10px;color:var(--muted)">'+lbl+'</div></div>';
  let h='<div class="field" style="margin-top:12px"><label>'+lbl('wProduct','О ПҒОҝПҠПҢОҪ')+'</label><select onchange="pdSet(\'pid\',this.value)">'+prods.map(p=>'<option value="'+p.id+'"'+(p.id===P.pid?' selected':'')+'>'+esc(p.sku)+'</option>').join('')+'</select></div>'+
    '<div class="tabs" style="flex-wrap:wrap">'+periods.map(([k,l])=>'<div class="tab '+(P.period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="pdSet(\'period\',\''+k+'\')">'+l+'</div>').join('')+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'+
      tile(lbl('pdSumQty','ОЈП…ОҪ. О ОҝПғПҢП„О·П„Оұ'),units)+tile(lbl('pdSumSpend','ОЈП…ОҪ. О”ОұПҖО¬ОҪО·'),'вӮ¬'+Math.round(spend),'var(--accent)')+
      tile(lbl('pdAvgPrice','ОңОӯПғО· ОӨО№ОјО®'),avg>0?'вӮ¬'+avg.toFixed(2):'вҖ”')+tile(lbl('pdLast','ОӨОөО»ОөП…П„ОұОҜОұ'),latest>0?'вӮ¬'+latest.toFixed(2):'вҖ”')+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
      tile(lbl('pdChgE','ОңОөП„ОұОІОҝО»О® вӮ¬'),(chE>0?'+':'')+'вӮ¬'+chE.toFixed(2),chE>0?'var(--bad)':(chE<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('pdChgP','ОңОөП„ОұОІОҝО»О® %'),(chP>0?'+':'')+(chP*100).toFixed(1)+'%',chP>0?'var(--bad)':(chP<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('iInvoices','ОӨО№ОјОҝО»ПҢОіО№Оұ'),nInv)+
    '</div>'+
    '<div class="card" style="margin-top:10px"><div class="kv"><span class="k">рҹҸҶ Best Supplier</span><span class="v">'+esc(bestSup||'вҖ”')+' '+(bestPrice>0?('('+money(bestPrice)+')'):'')+'</span></div></div>';
  h+='<h3 style="font-size:13px;color:var(--muted);margin:16px 2px 6px">'+lbl('pdHistH','ОҷОЈОӨОҹОЎОҷОҡОҹ')+' ('+rows.length+')</h3>';
  if(!rows.length)h+='<div class="card muted" style="text-align:center;font-size:13px">'+lbl('pdNoRec','ОҡОұОјОҜОұ ОөОіОіПҒОұПҶО® ПғОө ОұП…П„О® П„О·ОҪ ПҖОөПҒОҜОҝОҙОҝ')+'</div>';
  rows.forEach(r=>{const cp=parseFloat(r.change_pct);const ch=(!isNaN(cp)&&cp!==0)?((cp>0?'в–І':'в–ј')+' '+(Math.abs(cp)*100).toFixed(1)+'%'):'';const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');let sup=resolveSupName(r);if(!sup||sup==='вҖ”'){const m=prForBest.find(x=>Math.abs((parseFloat(x.price)||0)-(parseFloat(r.price)||0))<0.001);sup=m?supName(m.supplier_id):'';}
    h+='<div class="card" style="padding:10px;margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+money(r.price)+(ch?(' <span style="color:'+col+';font-size:12px">'+ch+'</span>'):'')+'</span>'+(r.quantity?('<span style="font-size:12px;color:var(--muted)">'+fmtQty(r.quantity)+(r.unit?(' '+esc(normUnit(r.unit))):'')+'</span>'):'')+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">рҹ“… '+fmtDate(r.date)+(sup?(' В· рҹҸў '+esc(sup)):'')+'</div></div>';});
  return h;
}

function expPeriodRange(period){
  const now=ST.expRefDate?new Date(ST.expRefDate+'T12:00:00'):new Date();
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let from,to;
  if(period==='day'){from=new Date(y,m,d);to=new Date(y,m,d);}
  else if(period==='week'){const dow=(now.getDay()+6)%7;from=new Date(y,m,d-dow);to=new Date(y,m,d-dow+6);}
  else if(period==='month'){from=new Date(y,m,1);to=new Date(y,m+1,0);}
  else if(period==='quarter'){const q=Math.floor(m/3);from=new Date(y,q*3,1);to=new Date(y,q*3+3,0);}
  else if(period==='half'){const h=m<6?0:6;from=new Date(y,h,1);to=new Date(y,h+6,0);}
  else {from=new Date(y,0,1);to=new Date(y,11,31);}
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}

function computeSupplierBalances(){
  const sups=ST.suppliers||[]; const invs=ST.invoices||[]; const pays=ST.dailyPayments||[]; const credits=ST.supplierCredits||[];
  const n=v=>(v!=null&&v!==''?(+v):0);
  const bal=[];
  sups.forEach(s=>{
    const opening=n(s.opening_balance);
    const invoiced=invs.filter(i=>i.supplier_id===s.id).reduce((t,i)=>t+n(i.total_gross),0);
    const paid=pays.filter(p=>p.supplier_id===s.id).reduce((t,p)=>t+n(p.amount),0);
    const credited=credits.filter(cr=>cr.supplier_id===s.id).reduce((t,cr)=>t+n(cr.amount)+n(cr.vat),0);
    const owed=opening+invoiced-paid-credited;
    if(Math.abs(owed)>0.005||opening!==0)bal.push({id:s.id,name:s.name,owed:owed});
  });
  bal.sort((a,b)=>b.owed-a.owed);
  ST.supplierBalances=bal;
}

function dailyLive(){
  const g=id=>{const el=document.getElementById(id);return(el&&el.value!=='')?(+el.value):0;};
  // ОҶОёПҒОҝО№ПғОјОұ ОұПҖПҢ ПҢО»Оұ П„Оұ ПғО·ОјОөОҜОұ (pt-*-cash / pt-*-card)
  let cash=0,card=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{if(el.value!=='')cash+=(+el.value);});
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{if(el.value!=='')card+=(+el.value);});
  const off=g('dc-off'), cn=g('dc-cn');
  // О О»О·ПҒПүОјОӯПӮ ОјОөП„ПҒО·П„О¬: daily_expenses(cash, ОјО·-suppliers) + supplier_payments(cash) ПғО®ОјОөПҒОұ
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const cashExp=(ST.dailyExps||[]).filter(e=>e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+nn(e.amount),0);
  const cashPaySup=(ST.dailyPaymentsToday||[]).filter(p=>p.payment_method==='cash').reduce((s,p)=>s+nn(p.amount),0);
  const cashPay=cashExp+cashPaySup;
  const income = cash + off + card - cn;
  const envelope = cash - cashPay;
  const incEl=document.getElementById('daily-income'); if(incEl)incEl.textContent=money(Math.round(income*100)/100);
  const envEl=document.getElementById('dc-envelope'); if(envEl)envEl.textContent=money(Math.round(envelope*100)/100);
  recLive();
}
function recLive(){
  const money2=x=>money(Math.round(x*100)/100);
  let cash=0,card=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{if(el.value!=='')cash+=(+el.value);});
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{if(el.value!=='')card+=(+el.value);});
  const offEl=document.getElementById('dc-off'); const off=(offEl&&offEl.value!=='')?(+offEl.value):0;
  let delGross=0;
  if(ST.daySetup&&ST.daySetup.delInZ){
    document.querySelectorAll('[data-delname]').forEach((el,idx)=>{
      const net=el.value!==''?(+el.value):0; const vatEl=document.getElementById('del-vat-'+idx);
      const vat=(vatEl&&vatEl.value!=='')?(+vatEl.value):0; delGross+=net+vat;
    });
  }
  const till=cash+card+delGross; const official=till-off;
  // ОЈПҚОҪОҝО»Оҝ О– (ОұПҖПҢ П„Оұ z-net lines)
  let zTotal=0;
  document.querySelectorAll('[data-zrow]').forEach(r=>{const i=r.getAttribute('data-zrow');
    const rEl=document.getElementById('z-rate-'+i), nEl=document.getElementById('z-net-'+i);
    const rate=rEl&&rEl.value!==''?(+rEl.value):0; const net=nEl&&nEl.value!==''?(+nEl.value):0;
    zTotal+=net+net*rate/100;
  });
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('rec-till',money2(till)); set('rec-off','вҲ’ '+money2(off));
  set('rec-official',money2(official)); set('rec-z',money2(zTotal));
  const diff=official-zTotal;
  const box=document.getElementById('rec-result'), lab=document.getElementById('rec-label'), df=document.getElementById('rec-diff');
  if(box){
    if(zTotal===0){box.style.background='var(--bg)';if(lab)lab.textContent=L('О’О¬О»Оө П„Оҝ О–','Enter Z');if(lab)lab.style.color='var(--muted)';if(df){df.textContent='вҖ”';df.style.color='var(--muted)';}}
    else if(Math.abs(diff)<0.01){box.style.background='var(--ok-bg,#E6F7EC)';if(lab){lab.textContent='вң“ '+L('ОЈП…ОјПҶПүОҪОҝПҚОҪ','Match');lab.style.color='var(--ok)';}if(df){df.textContent=money2(0);df.style.color='var(--ok)';}}
    else{box.style.background='#FFF7E6';if(lab){lab.textContent='вҡ  '+L('О”О№ОұПҶОҝПҒО¬ вҖ” ОӯО»ОөОіОҫОө','Difference вҖ” check');lab.style.color='#B8860B';}if(df){df.textContent=money2(Math.abs(diff));df.style.color='#B8860B';}}
  }
}
async function saveDailyClose(){
  const g=id=>{const el=document.getElementById(id);return(el&&el.value!=='')?(+el.value):0;};
  const ptData={}; let totalCash=0,totalCard=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{
    const pkey=el.id.replace('pt-','').replace('-cash','');
    const v=el.value!==''?(+el.value):0;
    if(!ptData[pkey])ptData[pkey]={}; ptData[pkey].cash=v; totalCash+=v;
  });
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{
    const pkey=el.id.replace('pt-','').replace('-card','');
    const v=el.value!==''?(+el.value):0;
    if(!ptData[pkey])ptData[pkey]={}; ptData[pkey].card=v; totalCard+=v;
  });
  const row={tenant_id:curTenant(),close_date:dailyDate(),
    cash_income:totalCash,card_income:totalCard,
    off_envelope:g('dc-off'),credit_notes:g('dc-cn'),
    points_data:JSON.stringify(ptData),
    created_by:ST.userEmail||''};
  try{const {error}=await sb.from('daily_close').upsert(row,{onConflict:'tenant_id,close_date'});
    if(error)throw error; toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved')); renderDaily();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
function zCollectLines(){
  const rows=document.querySelectorAll('[data-zrow]'); const lines=[];
  rows.forEach(r=>{
    const i=r.getAttribute('data-zrow');
    const rEl=document.getElementById('z-rate-'+i), nEl=document.getElementById('z-net-'+i);
    const rate=rEl&&rEl.value!==''?(+rEl.value):0;
    const net=nEl&&nEl.value!==''?(+nEl.value):0;
    lines.push({idx:i,rate:rate,net:net});
  });
  return lines;
}
function zLive(){
  const money2=x=>money(Math.round(x*100)/100);
  const lines=zCollectLines(); let tnet=0,tvat=0;
  lines.forEach(ln=>{
    const vat=ln.net*ln.rate/100; tnet+=ln.net; tvat+=vat;
    const vEl=document.getElementById('z-vat-'+ln.idx); if(vEl)vEl.textContent=money2(vat);
  });
  const tgross=tnet+tvat;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=money2(v);};
  set('z-tnet',tnet); set('z-tvat',tvat); set('z-tgross',tgross);
  if(typeof recLive==='function')recLive();
}

  const file=input.files&&input.files[0]; if(!file)return;
  toast('рҹ“· '+L('О”О№ОұОІО¬О¶Пү П„Оҝ О–вҖҰ','Reading ZвҖҰ'));
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(OCR_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify({imageBase64:b64,mediaType:file.type,mode:'zreport'})});
    const data=await r.json();
    if(data.error){toast('вқҢ '+data.error);return;}
    // О“ОӯОјО№ПғОјОұ ПҖОөОҙОҜПүОҪ О– ОұПҖПҢ П„Оҝ ОұПҖОҝП„ОӯО»ОөПғОјОұ

    if(data.pay_cash!=null)ST.dailyZ.pay_cash=data.pay_cash;
    if(data.pay_card!=null)ST.dailyZ.pay_card=data.pay_card;
    if(data.voids!=null)ST.dailyZ.voids=data.voids;
    if(data.vat_lines&&data.vat_lines.length)ST.dailyZ.vat_lines=data.vat_lines;
    toast('вң… '+L('ОӨОҝ О– ОҙО№ОұОІО¬ПғП„О·ОәОө вҖ” ОӯО»ОөОіОҫОө П„Оұ ПҖОөОҙОҜОұ','Z read вҖ” check the fields'));

function delLive(){
  const money2=x=>money(Math.round(x*100)/100);
  let total=0;
  document.querySelectorAll('[data-delname]').forEach((el,idx)=>{
    const net=el.value!==''?(+el.value):0; const com=+el.getAttribute('data-delcom')||0;
    const vatEl=document.getElementById('del-vat-'+idx); const vat=(vatEl&&vatEl.value!=='')?(+vatEl.value):0;
    const gross=net+vat;
    const commission=gross*com/100; const netTake=gross-commission;
    total+=netTake;
    const info=document.getElementById('del-info-'+idx);
    if(info){
      if(gross>0)info.textContent=L('ОЈПҚОҪОҝО»Оҝ','Total')+': '+money2(gross)+' В· '+L('О ПҒОҝОјО®ОёОөО№Оұ','Commission')+': '+money2(commission)+' В· '+L('ОҡОұОёОұПҒО¬','Net')+': '+money2(netTake);
      else info.textContent='вҖ”';
    }
  });
  const tEl=document.getElementById('del-total'); if(tEl)tEl.textContent=money2(total);
}

function drawDailyArchive(){
  const c=document.getElementById('content'); const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0); const money2=x=>money(Math.round(x*100)/100);
  const closes=ST.archCloses||[]; const exps=ST.archExps||[]; const pays=ST.archPays||[];
  const months=monthNamesFull();
  document.getElementById('hTitle').textContent='рҹ“Ғ '+T('О‘ПҒПҮОөОҜОҝ О—ОјОөПҒПҺОҪ','Daily Archive');
  // ОҘПҖОҝО»ОҝОіО№ПғОјПҢПӮ ОұОҪО¬ ОјОӯПҒОұ
  const dayData=d=>{
    const cl=d;
    const income=n(cl.cash_income)+n(cl.off_envelope)+n(cl.card_income)-n(cl.credit_notes);
    const cashPay=pays.filter(p=>p.pay_date===cl.close_date&&p.payment_method==='cash').reduce((s,p)=>s+n(p.amount),0);
    const envelope=n(cl.cash_income)-cashPay;
    const dayExp=exps.filter(e=>e.exp_date===cl.close_date).reduce((s,e)=>s+n(e.amount),0);
    const net=income-dayExp;
    return {income,envelope,net};
  };
  // ОҹОјОұОҙОҝПҖОҝОҜО·ПғО· ПғОө ОјО®ОҪОөПӮ
  const groups={};
  closes.forEach(cl=>{
    const key=cl.close_date.slice(0,7); // YYYY-MM
    if(!groups[key])groups[key]=[];
    groups[key].push(cl);
  });
  const keys=Object.keys(groups).sort().reverse();
  if(ST.archOpen===undefined)ST.archOpen=keys[0]||null; // ПҖПҒПҺП„ОҝПӮ ОјО®ОҪОұПӮ ОұОҪОҝО№ПҮП„ПҢПӮ

  let h='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px);margin-top:10px"><div style="max-width:1400px;margin:0 auto">';
  if(!closes.length){
    h+='<div class="card muted" style="text-align:center;padding:20px">'+T('ОҡОұОјОҜОұ ОәО»ОөО№ПғОјОӯОҪО· ОјОӯПҒОұ ОұОәПҢОјОұ','No closed days yet')+'</div>';
  }
  keys.forEach(key=>{
    const y=key.slice(0,4), mo=parseInt(key.slice(5,7),10)-1;
    const monthName=months[mo]+' '+y;
    const days=groups[key];
    const monthTurnover=days.reduce((s,d)=>s+dayData(d).income,0);
    const open=ST.archOpen===key;
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
      '<div onclick="ST.archOpen=(ST.archOpen===\''+key+'\'?null:\''+key+'\');drawDailyArchive()" style="display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--accent-bg);cursor:pointer">'+
        '<div style="font-size:14px;font-weight:700">рҹ“Ӯ '+monthName+'</div>'+
        '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;color:var(--muted)">'+T('ОӨО¶ОҜПҒОҝПӮ','Turnover')+' <b style="color:var(--ok)">'+money2(monthTurnover)+'</b></span><span style="color:var(--muted)">'+(open?'в–ҫ':'в–ё')+'</span></div>'+
      '</div>';
    if(open){
      days.forEach(d=>{
        const dd=dayData(d);
        const dt=new Date(d.close_date+'T12:00:00');
        const dayNum=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
        const wdays=ST.lang==='en'?['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']:['ОҡП…ПҒО№ОұОәО®','О”ОөП…П„ОӯПҒОұ','ОӨПҒОҜП„О·','ОӨОөП„О¬ПҒП„О·','О ОӯОјПҖП„О·','О ОұПҒОұПғОәОөП…О®','ОЈО¬ОІОІОұП„Оҝ'];
        const wd=wdays[dt.getDay()];
        h+='<div onclick="openArchDay(\''+d.close_date+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-top:1px solid var(--line);cursor:pointer">'+
          '<div style="font-size:14px">'+dayNum+' В· '+wd+'</div>'+
          '<div style="display:flex;gap:10px;font-size:12px;flex-wrap:wrap;justify-content:flex-end">'+
            '<span class="muted">'+T('ОӨО¶ОҜПҒОҝПӮ','Turn')+' <b style="color:var(--fg)">'+money2(dd.income)+'</b></span>'+
            '<span class="muted">рҹ“Ҙ <b style="color:var(--fg)">'+money2(dd.envelope)+'</b></span>'+
            '<span class="muted">'+T('ОҡОұОёОұПҒПҢ','Net')+' <b style="color:'+(dd.net>=0?'var(--ok)':'var(--bad)')+'">'+money2(dd.net)+'</b></span>'+
          '</div>'+
        '</div>';
      });
    }
    h+='</div>';
  });
  h+='</div></div>';
  c.innerHTML=h;
}

function dsCollect(){
  const shifts=document.getElementById('ds-shifts')?document.getElementById('ds-shifts').checked:false;
  const curEl=document.getElementById('ds-currency'); const currency=curEl?curEl.value:'вӮ¬';
  const vatRates=[]; document.querySelectorAll('[data-vat]').forEach(v=>{const i=v.getAttribute('data-vat');const el=document.getElementById('ds-vat-'+i);if(el&&el.value!=='')vatRates.push(+el.value);});
  const rows=document.querySelectorAll('[data-pt]'); const points=[];
  rows.forEach(r=>{const i=r.getAttribute('data-pt');
    const em=document.getElementById('ds-emoji-'+i), nm=document.getElementById('ds-name-'+i);
    points.push({emoji:em?em.value:'рҹ’°', name:nm?nm.value:''});
  });
  const delivery=[]; document.querySelectorAll('[data-del]').forEach(d=>{const i=d.getAttribute('data-del');
    const nm=document.getElementById('ds-delname-'+i), cm=document.getElementById('ds-delcom-'+i);
    delivery.push({name:nm?nm.value:'', commission:cm&&cm.value!==''?(+cm.value):0});
  });
  return {shifts,currency,vatRates,points,delivery,delInZ:(ST.daySetup&&ST.daySetup.delInZ)||false};
}
function dsToggleDelZ(){ const s=dsCollect(); s.delInZ=!s.delInZ; ST.daySetup=s; daySetupScreen(); }
function dsAddDelivery(){ const s=dsCollect(); s.delivery=s.delivery||[]; s.delivery.push({name:'',commission:30}); ST.daySetup=s; daySetupScreen(); }
function dsRemoveDelivery(i){ const s=dsCollect(); s.delivery.splice(i,1); ST.daySetup=s; daySetupScreen(); }
function dsToggleShifts(){ const s=dsCollect(); s.shifts=!s.shifts; ST.daySetup=s; daySetupScreen(); }
function dsAddVat(){ const s=dsCollect(); s.vatRates.push(0); ST.daySetup=s; daySetupScreen(); }
function dsRemoveVat(i){ const s=dsCollect(); s.vatRates.splice(i,1); ST.daySetup=s; daySetupScreen(); }
function dsAddPoint(){ const s=dsCollect(); s.points.push({name:'',emoji:'рҹ’°'}); ST.daySetup=s; daySetupScreen(); }
function dsRemovePoint(i){ const s=dsCollect(); s.points.splice(i,1); ST.daySetup=s; daySetupScreen(); }

async function gmailPick(messageId,attachmentId,mime){
  toast(L('ОҡОұП„ОӯОІОұПғОјОұвҖҰ','DownloadingвҖҰ'));
  const res=await gmailApi({action:'attachment',refresh_token:gmailRT(),access_token:window._gmailAT,messageId,attachmentId});
  if(res.error){toast('вқҢ '+res.error);return;}
  if(!res.data){toast('вқҢ '+L('ОҶОҙОөО№Оҝ ОұПҒПҮОөОҜОҝ','Empty file'));return;}
  window._gmailCurrentMsg={id:messageId,subject:(window._gmailMsgs&&window._gmailMsgs[messageId])||''};
  const mt=(mime&&mime.indexOf('pdf')>=0)?'application/pdf':(mime||'image/jpeg');
  window._ocrQueue=[{b64:res.data,mediaType:mt}]; window._ocrIdx=0;
  ST.section='ocr'; ST.view='list'; ST.ocr=null; renderSection();
  setTimeout(()=>loadOcrFromQueue(0),50);
  toast('вң… '+L('ОҲП„ОҝО№ОјОҝ вҖ” ПҖО¬П„Оұ В«О”О№О¬ОІОұПғОө П„О№ОјОҝО»ПҢОіО№ОҝВ»','Ready вҖ” tap В«Read invoiceВ»'));
}

async function chooseShop(){

      const {data:os}=await sb.from('owner_shops').select('tenant_id');
      (os||[]).forEach(o=>{ST._userCount[o.tenant_id]=(ST._userCount[o.tenant_id]||0)+1;});
    }catch(e){}
  }
  // ОңО·ОҪО№ОұОҜОұ ОұОҫОҜОұ ОјОұОіОұО¶О№ОҝПҚ (ПҖОұОәОӯП„Оҝ + extra ПҮПҒО®ПғП„ОөПӮ вҲ’ ПҮОөО№ПҒОҝОәОҜОҪО·П„О· ОӯОәПҖП„ПүПғО·)
  const shopValue=t=>{
    const price=planPrice(t.plan||'advanced');
    const free=(t.plan==='basic')?2:3;
    const users=ST._userCount[t.id]||0;
    const extra=Math.max(0,users-free);
    const extraFee=extra*10;
    const gross=price+extraFee;
    const disc=ST._finMap[t.id];
    const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
    return {price,extra,extraFee,gross,disc:(disc!=null?disc:null),net:Math.round(net*100)/100};
  };

    return {emo:'рҹҹў',col:'var(--ok)',days,expired:false,txt:L('О»О®ОіОөО№','expires')+' '+dGRs(t.paid_until)+' ('+days+' '+L('ОјОӯПҒОөПӮ','days')+')'};
  };

    '<p class="muted" style="font-size:13px;margin:0 0 12px">'+L('О”О№О¬О»ОөОҫОө ОјОұОіОұО¶ОҜ ОіО№Оұ ОҪОұ ОјПҖОөО№ПӮ','Pick a shop to enter')+'</p>';
  // ОЈПҚОҪОҝО»Оҝ (ОјПҢОҪОҝ admin)
  if(ST.role==='admin'&&ST.tenants.length){
    let active=0,soon=0,exp=0,revenue=0;
    ST.tenants.forEach(t=>{const s=shopStatus(t);if(s.expired)exp++;else if(s.days!==null&&s.days<=7)soon++;else active++;revenue+=shopValue(t).net;});
    h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);text-align:center;font-size:13px;padding:12px">'+
      '<b>'+ST.tenants.length+'</b> '+L('ОңОұОіОұО¶О№О¬','Shops')+' В· рҹҹў <b>'+active+'</b> '+L('О•ОҪОөПҒОіО¬','Active')+' В· рҹҹЎ <b>'+soon+'</b> '+L('ОӣО®ОіОҝП…ОҪ','Expiring')+' В· рҹ”ҙ <b>'+exp+'</b> '+L('ОҲО»О·ОҫОұОҪ','Expired')+

    '</div>';
  }
  (ST.tenants||[]).forEach(t=>{
    const s=shopStatus(t);
    const plan=(t.plan||'advanced').toUpperCase();
    const isAdmin=ST.role==='admin';
    const val=isAdmin?shopValue(t):null;
    const valTxt=val?('<div style="font-size:12px;color:var(--accent);font-weight:600">рҹ’¶ '+(val.extra>0?(money(val.price)+'+'+money(val.extraFee)):money(val.price))+(val.disc?(' вҲ’ '+val.disc+'%'):'')+' = '+money(val.net)+'/'+L('ОјО®ОҪОұ','mo')+(val.extra>0?(' <span style="color:var(--muted);font-weight:400">('+val.extra+' extra)</span>'):'')+'</div>'):'';

      '<button class="pick" style="margin:0;white-space:nowrap" onclick="pickShop(\''+t.id+'\')">рҹҡӘ '+L('ОңПҖОөПӮ','Enter')+'</button></div>';

  else h+='</div></div>';
  c.innerHTML=h;

async function deleteShop(){

  const pass=prompt(L('Оҹ ОәПүОҙО№ОәПҢПӮ ПғОҝП… (ОіО№Оұ ОұПғПҶО¬О»ОөО№Оұ):','Your password (for security):'));
  if(pass===null||pass==='')return;
  try{const {error}=await sb.auth.signInWithPassword({email:ST.userEmail,password:pass}); if(error){toast('вқҢ '+L('ОӣО¬ОёОҝПӮ ОәПүОҙО№ОәПҢПӮ','Wrong password'));return;}}
  catch(e){toast('вқҢ '+L('ОӣО¬ОёОҝПӮ ОәПүОҙО№ОәПҢПӮ','Wrong password'));return;}
  toast('вҸі '+L('О”О№ОұОіПҒОұПҶО®вҖҰ','DeletingвҖҰ'));
  const tables=['order_lines','order_history','price_history','product_prices','recipe_ingredients','recipes','agreements','agreement_blocks','invoices','products','suppliers','settings'];
  for(const tb of tables){try{await sb.from(tb).delete().eq('tenant_id',tid);}catch(e){console.error(tb,e);}}

  toast('вң… '+L('ОӨОҝ ОјОұОіОұО¶ОҜ ОҙО№ОұОіПҒО¬ПҶО·ОәОө','Shop deleted')); chooseShop();
}

function updateFinValue(){
  const el=document.getElementById('fin-value'); if(!el)return;
  const price=planPrice(ST._adminShopPlan||'advanced');
  const free=(ST._adminShopPlan==='basic')?2:3;
  const users=ST._adminShopUsers||0;
  const extra=Math.max(0,users-free);
  const extraFee=extra*10;
  const gross=price+extraFee;
  const discEl=document.getElementById('fin-disc');
  const disc=(discEl&&discEl.value!=='')?parseFloat(discEl.value):null;
  const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
  el.innerHTML='рҹ’¶ '+(extra>0?(money(price)+'+'+money(extraFee)):money(price))+(disc?(' вҲ’ '+disc+'%'):'')+' = '+money(Math.round(net*100)/100)+'/'+L('ОјО®ОҪОұ','month')+(extra>0?(' ('+extra+' extra '+L('ПҮПҒО®ПғП„ОөПӮ','users')+')'):'');
}

async function addMonth(n){
  if(ST.role!=='admin')return;
  const base=(ST.paidUntil&&new Date(ST.paidUntil)>new Date())?new Date(ST.paidUntil):new Date();
  base.setMonth(base.getMonth()+(n||1));
  const until=base.toISOString().slice(0,10);
  const fee=planPrice(ST.plan);
  try{
    await sb.from('tenants').update({paid_until:until}).eq('id',curTenant());
    try{await sb.from('payments').insert({tenant_id:curTenant(),amount:fee,months:n||1,method:'ПҮОөО№ПҒОҝОәОҜОҪО·П„Оұ'});}catch(e){}
    ST.paidUntil=until;toast('вң… '+L('О О»О·ПҒПҺОёО·ОәОө вҖ” ОјОӯПҮПҒО№','Paid вҖ” until')+' '+dGRs(until));openMembers();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function toggleTab(uid,tab){
  const {data:pr}=await sb.from('profiles').select('tabs,role').eq('id',uid).single();
  const planAllow=(ST.plan==='basic')?BASIC_TABS:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history'];
  let cur=(pr&&pr.tabs&&pr.tabs.length)?pr.tabs.slice():((pr&&pr.role==='staff')?['ocr','orders']:planAllow.slice());
