}
function recLive(){
  const money2=x=>money(Math.round(x*100)/100);
  let cash=0,card=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{if(el.value!=='')cash+=(+el.value);});
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{if(el.value!=='')card+=(+el.value);});
  const offEl=document.getElementById('dc-off'); const off=(offEl&&offEl.value!=='')?(+offEl.value):0;
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const cashPay=(ST.dailyExps||[]).filter(e=>e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+nn(e.amount),0)
    + (ST.dailyPaymentsToday||[]).filter(p=>p.payment_method==='cash').reduce((s,p)=>s+nn(p.amount),0);
  let delGross=0;
  if(ST.daySetup&&ST.daySetup.delInZ){
    document.querySelectorAll('[data-delname]').forEach((el,idx)=>{
      const net=el.value!==''?(+el.value):0; const vatEl=document.getElementById('del-vat-'+idx);
      const vat=(vatEl&&vatEl.value!=='')?(+vatEl.value):0; delGross+=net+vat;
    });
  }
  // О•ПҖОҜПғО·ОјОұ (П„О№ ПҖПҒОӯПҖОөО№ ОҪОұ ОҙОөОҜПҮОҪОөО№ П„Оҝ О–) = ОңОөП„ПҒО·П„О¬ + ОҡО¬ПҒП„ОөПӮ вҲ’ ОҲОҫОҝОҙОұ cash
  const official=cash+card+delGross-cashPay;
  // ОЈПҚОҪОҝО»Оҝ О– (ОұПҖПҢ П„Оұ z-net lines)
  let zTotal=0;
  document.querySelectorAll('[data-zrow]').forEach(r=>{const i=r.getAttribute('data-zrow');
    const rEl=document.getElementById('z-rate-'+i), nEl=document.getElementById('z-net-'+i);
    const rate=rEl&&rEl.value!==''?(+rEl.value):0; const net=nEl&&nEl.value!==''?(+nEl.value):0;
    zTotal+=net+net*rate/100;
  });
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('rec-till',money2(cash+card)); set('rec-off','вҲ’ '+money2(cashPay));
  set('rec-official',money2(official)); set('rec-z',money2(zTotal));
  const diff=official-zTotal;
  const box=document.getElementById('rec-result'), lab=document.getElementById('rec-label'), df=document.getElementById('rec-diff');
  if(box){
    if(zTotal===0){box.style.background='var(--bg)';if(lab)lab.textContent=L('О’О¬О»Оө П„Оҝ О–','Enter Z');if(lab)lab.style.color='var(--muted)';if(df){df.textContent='вҖ”';df.style.color='var(--muted)';}}
    else if(Math.abs(diff)<0.01){box.style.background='var(--ok-bg,#E6F7EC)';if(lab){lab.textContent='вң“ '+L('ОЈП…ОјПҶПүОҪОҝПҚОҪ','Match');lab.style.color='var(--ok)';}if(df){df.textContent=money2(0);df.style.color='var(--ok)';}}
    else{box.style.background='#FFF7E6';if(lab){lab.textContent='вҡ  '+L('О”О№ОұПҶОҝПҒО¬ вҖ” ОӯО»ОөОіОҫОө','Difference вҖ” check');lab.style.color='#B8860B';}if(df){df.textContent=money2(Math.abs(diff));df.style.color='#B8860B';}}
  }
}

function drawDailyArchive(){
  const c=document.getElementById('content'); const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0); const money2=x=>money(Math.round(x*100)/100);
  const closes=ST.archCloses||[]; const exps=ST.archExps||[]; const pays=ST.archPays||[];
  const months=monthNamesFull();
  document.getElementById('hTitle').textContent='рҹ“Ғ '+T('О‘ПҒПҮОөОҜОҝ О—ОјОөПҒПҺОҪ','Daily Archive');
  // ОҘПҖОҝО»ОҝОіО№ПғОјПҢПӮ ОұОҪО¬ ОјОӯПҒОұ
  const dayData=d=>{
    const cl=d;
    // ОҠОҙО№Оұ О»ОҝОіО№ОәО® ОјОө П„Оҝ Day: ОҰО¬ОәОөО»ОҝПӮ = ОңОөП„ПҒО·П„О¬ вҲ’ ОҲОҫОҝОҙОұ cash В· ОӨО¶ОҜПҒОҝПӮ = ОҰО¬ОәОөО»ОҝПӮ + О•ОәП„ПҢПӮ + ОҡО¬ПҒП„ОөПӮ + Delivery(ОәОұОёОұПҒО®)
    const cashExpDay=exps.filter(e=>e.exp_date===cl.close_date&&e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+n(e.amount),0);
    const cashPay=cashExpDay+pays.filter(p=>p.pay_date===cl.close_date&&p.payment_method==='cash').reduce((s,p)=>s+n(p.amount),0);
    const envelope=n(cl.cash_income)-cashPay;
    let delNetDay=0;
    try{const ddArr=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);
      (ddArr||[]).forEach(d=>{delNetDay+=(n(d.net_val)||(n(d.gross)-n(d.vat)));});
    }catch(e){}
    const income=envelope+n(cl.off_envelope)+n(cl.card_income)-n(cl.credit_notes)+delNetDay;
    const net=income;
    return {income,envelope,net};
  };
  // ОҹОјОұОҙОҝПҖОҝОҜО·ПғО· ПғОө ОјО®ОҪОөПӮ
  const groups={};
  closes.forEach(cl=>{
    const key=cl.close_date.slice(0,7); // YYYY-MM
    if(!groups[key])groups[key]=[];
    groups[key].push(cl);
  });
  const keys=Object.keys(groups).sort().reverse();
  if(ST.archOpen===undefined)ST.archOpen=keys[0]||null; // ПҖПҒПҺП„ОҝПӮ ОјО®ОҪОұПӮ ОұОҪОҝО№ПҮП„ПҢПӮ

  let h='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px);margin-top:10px"><div style="max-width:1400px;margin:0 auto">';
  if(!closes.length){
    h+='<div class="card muted" style="text-align:center;padding:20px">'+T('ОҡОұОјОҜОұ ОәО»ОөО№ПғОјОӯОҪО· ОјОӯПҒОұ ОұОәПҢОјОұ','No closed days yet')+'</div>';
  }
  keys.forEach(key=>{
    const y=key.slice(0,4), mo=parseInt(key.slice(5,7),10)-1;

function dsCollect(){
  const shifts=document.getElementById('ds-shifts')?document.getElementById('ds-shifts').checked:false;
  const curEl=document.getElementById('ds-currency'); const currency=curEl?curEl.value:'вӮ¬';
  const vatRates=[]; document.querySelectorAll('[data-vat]').forEach(v=>{const i=v.getAttribute('data-vat');const el=document.getElementById('ds-vat-'+i);const rl=document.getElementById('ds-vrole-'+i);if(el&&el.value!=='')vatRates.push({rate:+el.value,role:(rl?rl.value:'')||''});});
  const rows=document.querySelectorAll('[data-pt]'); const points=[];
  rows.forEach(r=>{const i=r.getAttribute('data-pt');
    const em=document.getElementById('ds-emoji-'+i), nm=document.getElementById('ds-name-'+i);
    points.push({emoji:em?em.value:'рҹ’°', name:nm?nm.value:''});
  });
  const delivery=[]; document.querySelectorAll('[data-del]').forEach(d=>{const i=d.getAttribute('data-del');
    const nm=document.getElementById('ds-delname-'+i), cm=document.getElementById('ds-delcom-'+i);
    delivery.push({name:nm?nm.value:'', commission:cm&&cm.value!==''?(+cm.value):0});
  });
  return {shifts,currency,vatRates,points,delivery,delInZ:(ST.daySetup&&ST.daySetup.delInZ)||false,tipMode:(ST.daySetup&&ST.daySetup.tipMode)||'shift',salesBrk:(ST.daySetup&&ST.daySetup.salesBrk)||false};
}
function dsSetTipMode(m){ const s=dsCollect(); s.tipMode=m; ST.daySetup=s; daySetupScreen(); }
function dsToggleSalesBrk(){ const s=dsCollect(); s.salesBrk=!s.salesBrk; ST.daySetup=s; daySetupScreen(); }
function dsToggleDelZ(){ const s=dsCollect(); s.delInZ=!s.delInZ; ST.daySetup=s; daySetupScreen(); }
function dsAddDelivery(){ const s=dsCollect(); s.delivery=s.delivery||[]; s.delivery.push({name:'',commission:30}); ST.daySetup=s; daySetupScreen(); }
function dsRemoveDelivery(i){ const s=dsCollect(); s.delivery.splice(i,1); ST.daySetup=s; daySetupScreen(); }
function dsToggleShifts(){ const s=dsCollect(); s.shifts=!s.shifts; ST.daySetup=s; daySetupScreen(); }
function vatList(){
  const raw=(ST.daySetup&&ST.daySetup.vatRates)||[13,24];
  return raw.map(x=>(typeof x==='object'?{rate:+x.rate,role:x.role||''}:{rate:+x,role:''}));
}
function vatByRole(role,fallback){
  const l=vatList();
  const f=l.find(x=>x.role===role);
  if(f)return f.rate;
  // О§ПүПҒОҜПӮ ОөП„О№ОәОӯП„Оұ: Оҝ ОјОөОіОұО»ПҚП„ОөПҒОҝПӮ ОөОҜОҪОұО№ ОәОұОҪОҝОҪО№ОәПҢПӮ, Оҝ ОјО№ОәПҒПҢП„ОөПҒОҝПӮ ОјОөО№ПүОјОӯОҪОҝПӮ
  if(!l.length)return fallback;
  const sorted=l.slice().sort((a,b)=>b.rate-a.rate);
  if(role==='std')return sorted[0].rate;
  if(role==='red')return sorted[sorted.length-1].rate;
  return fallback;
}

function dsRemoveVat(i){ const s=dsCollect(); s.vatRates.splice(i,1); ST.daySetup=s; daySetupScreen(); }

}

//  2. ОҠОҙО№Оҝ domain (ПҖ.ПҮ. logistirio@acme.gr П„ОұО№ПҒО№О¬О¶ОөО№ ОјОө info@acme.gr)
//  3. ОҢОҪОҝОјОұ О® alias П„ОҝП… ПҖПҒОҝОјО·ОёОөП…П„О® ОјОӯПғОұ ПғП„ОҝОҪ ОұПҖОҝПғП„ОҝО»ОӯОұ О® ПғП„Оҝ ОёОӯОјОұ
function gmailMatchSupplier(m){
  const raw=String(m.from||'');
  const em=(raw.match(/<([^>]+)>/)||[null,raw])[1].toLowerCase().trim();
  const dom=(em.split('@')[1]||'').toLowerCase();
  const hay=normStr(raw+' '+(m.subject||''));
  // Domains ПҖОҝП… ОҙОөОҪ П„ОұП…П„ОҝПҖОҝО№ОҝПҚОҪ ПҖПҒОҝОјО·ОёОөП…П„О®
  const GEN=['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','yahoo.gr','hotmail.gr','otenet.gr','windowslive.com'];
  let best=null;
  (ST.suppliers||[]).forEach(s=>{
    const sem=String(s.email||'').toLowerCase().trim();
    if(sem&&em&&sem===em){best={s:s,how:'email'};return;}
    if(!best&&sem&&dom&&GEN.indexOf(dom)<0){
      const sdom=(sem.split('@')[1]||'').toLowerCase();
      if(sdom&&sdom===dom)best={s:s,how:'domain'};
    }
    if(!best){
      const names=[s.name].concat(s.aliases||[]).filter(Boolean);
      for(const n of names){
        const nn=normStr(n);
        if(nn.length>=4&&hay.indexOf(nn)>=0){best={s:s,how:'name'};break;}
      }
    }
  });
  return best;
}

async function gmailPick(messageId,attachmentId,mime){
  toast(L('ОҡОұП„ОӯОІОұПғОјОұвҖҰ','DownloadingвҖҰ'));
  const res=await gmailApi({action:'attachment',messageId,attachmentId});
  if(res.error){toast('вқҢ '+res.error);return;}
  if(!res.data){toast('вқҢ '+L('ОҶОҙОөО№Оҝ ОұПҒПҮОөОҜОҝ','Empty file'));return;}
  window._gmailCurrentMsg={id:messageId,subject:(window._gmailMsgs&&window._gmailMsgs[messageId])||''};
  const mt=(mime&&mime.indexOf('pdf')>=0)?'application/pdf':(mime||'image/jpeg');
  window._ocrQueue=[{b64:res.data,mediaType:mt}]; window._ocrIdx=0;
  ST.section='ocr'; ST.view='list'; ST.ocr=null; renderSection();
  setTimeout(()=>loadOcrFromQueue(0),50);
  toast('вң… '+L('ОҲП„ОҝО№ОјОҝ вҖ” ПҖО¬П„Оұ В«О”О№О¬ОІОұПғОө П„О№ОјОҝО»ПҢОіО№ОҝВ»','Ready вҖ” tap В«Read invoiceВ»'));
}

async function chooseShop(){
  // ОңПҢОҪОҝ Оҝ ОҙО№ОұПҮОөО№ПҒО№ПғП„О®ПӮ ОәОұО№ Оҝ О№ОҙО№ОҝОәП„О®П„О·ПӮ ОјОө ПҖОҝО»О»О¬ ОјОұОіОұО¶О№О¬ ОІО»ОӯПҖОҝП…ОҪ О»ОҜПғП„Оұ.
  // ОҢО»ОҝО№ ОҝО№ П…ПҖПҢО»ОҝО№ПҖОҝО№ ОјПҖОұОҜОҪОҝП…ОҪ ОәОұП„ОөП…ОёОөОҜОұОҪ ПғП„Оҝ ОјОұОіОұО¶ОҜ П„ОҝП…ПӮ.
  if(ST.role!=='admin'&&!ST.multiShop){
    ST.view='list'; persistNav();
    if(!ST.tenant)ST.tenant=ST.myTenant;
    return enterShop();
  }
  ST.view='shops';persistNav();
  const c=document.getElementById('content');
  document.getElementById('hTitle').textContent='CostIQ';
  const bb=document.getElementById('backBtn');if(bb)bb.style.display='none';
  c.innerHTML='<div class="card center" style="min-height:30vh"><span class="spin"></span></div>';
  const {data}=await sb.from('tenants').select('*').order('name');
  ST.tenants=data||[];
  // О•ОәПҖП„ПҺПғОөО№ПӮ + ПҮПҒО®ПғП„ОөПӮ ОұОҪО¬ ОјОұОіОұО¶ОҜ (admin only)
  ST._finMap={}; ST._userCount={};
  if(ST.role==='admin'){
    try{const {data:fins}=await sb.from('shop_finance').select('tenant_id,owner_discount_pct');(fins||[]).forEach(f=>{ST._finMap[f.tenant_id]=f.owner_discount_pct;});}catch(e){}
    // ПҖО»О®ОёОҝПӮ ПҮПҒО·ПғП„ПҺОҪ ОұОҪО¬ ОјОұОіОұО¶ОҜ: profiles.tenant_id + owner_shops
    try{
      const {data:profs}=await sb.from('profiles').select('tenant_id');
      (profs||[]).forEach(p=>{if(p.tenant_id)ST._userCount[p.tenant_id]=(ST._userCount[p.tenant_id]||0)+1;});
      const {data:os}=await sb.from('owner_shops').select('tenant_id');
      (os||[]).forEach(o=>{ST._userCount[o.tenant_id]=(ST._userCount[o.tenant_id]||0)+1;});
    }catch(e){}
  }
  // ОңО·ОҪО№ОұОҜОұ ОұОҫОҜОұ ОјОұОіОұО¶О№ОҝПҚ (ПҖОұОәОӯП„Оҝ + extra ПҮПҒО®ПғП„ОөПӮ вҲ’ ПҮОөО№ПҒОҝОәОҜОҪО·П„О· ОӯОәПҖП„ПүПғО·)
  const shopValue=t=>{
    const price=planPrice(t.plan||'advanced');
    const free=(t.plan==='basic')?2:3;
    const users=ST._userCount[t.id]||0;
    const extra=Math.max(0,users-free);
    const extraFee=extra*10;
    const gross=price+extraFee;
    const disc=ST._finMap[t.id];
    const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
    return {price,extra,extraFee,gross,disc:(disc!=null?disc:null),net:Math.round(net*100)/100};
  };
  // ОҡОұП„О¬ПғП„ОұПғО· ПғП…ОҪОҙПҒОҝОјО®ПӮ ОұОҪО¬ ОјОұОіОұО¶ОҜ
  const today=new Date(); today.setHours(0,0,0,0);
  const shopStatus=t=>{
    if(!t.paid_until)return {emo:'вҡӘ',col:'var(--muted)',days:null,expired:false,txt:L('ПҮПүПҒОҜПӮ О·ОјОөПҒОҝОјО·ОҪОҜОұ','no date')};
    const pu=new Date(t.paid_until); pu.setHours(0,0,0,0);
    const days=Math.round((pu-today)/86400000);
    if(days<0)return {emo:'рҹ”ҙ',col:'var(--bad)',days,expired:true,txt:L('ОӯО»О·ОҫОө','expired')+' '+dGRs(t.paid_until)};
    if(days<=7)return {emo:'рҹҹЎ',col:'#e0a800',days,expired:false,txt:L('О»О®ОіОөО№','expires')+' '+dGRs(t.paid_until)+' ('+days+' '+L('ОјОӯПҒОөПӮ','days')+')'};
    return {emo:'рҹҹў',col:'var(--ok)',days,expired:false,txt:L('О»О®ОіОөО№','expires')+' '+dGRs(t.paid_until)+' ('+days+' '+L('ОјОӯПҒОөПӮ','days')+')'};
  };
  let h='<div style="margin-top:14px;width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px)"><div style="max-width:1000px;margin:0 auto"><h2 style="font-size:18px;margin:0 0 4px">рҹҸӘ '+L('ОӨОұ ОңОұОіОұО¶О№О¬ ОјОҝП…','My Shops')+'</h2>'+
    '<p class="muted" style="font-size:13px;margin:0 0 12px">'+L('О”О№О¬О»ОөОҫОө ОјОұОіОұО¶ОҜ ОіО№Оұ ОҪОұ ОјПҖОөО№ПӮ','Pick a shop to enter')+'</p>';
  // ОЈПҚОҪОҝО»Оҝ (ОјПҢОҪОҝ admin)
  if(ST.role==='admin'&&ST.tenants.length){
    let active=0,soon=0,exp=0,revenue=0;
    const realCount=ST.tenants.filter(t=>!t.is_demo).length;
    ST.tenants.filter(t=>!t.is_demo).forEach(t=>{const s=shopStatus(t);if(s.expired)exp++;else if(s.days!==null&&s.days<=7)soon++;else active++;revenue+=shopValue(t).net;});
    h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);text-align:center;font-size:13px;padding:12px">'+
      '<b>'+realCount+'</b> '+L('ОңОұОіОұО¶О№О¬','Shops')+' В· рҹҹў <b>'+active+'</b> '+L('О•ОҪОөПҒОіО¬','Active')+' В· рҹҹЎ <b>'+soon+'</b> '+L('ОӣО®ОіОҝП…ОҪ','Expiring')+' В· рҹ”ҙ <b>'+exp+'</b> '+L('ОҲО»О·ОҫОұОҪ','Expired')+
      '<div style="margin-top:6px;font-size:15px;font-weight:800;color:var(--accent)">рҹ’¶ '+money(revenue)+'/'+L('ОјО®ОҪОұ','month')+'</div>'+
    '</div>';
  }
  (ST.tenants||[]).forEach(t=>{
    const s=shopStatus(t);
    const plan=(t.plan||'advanced').toUpperCase();
    const isAdmin=ST.role==='admin';
    const val=isAdmin?shopValue(t):null;
    const valTxt=val?('<div style="font-size:12px;color:var(--accent);font-weight:600">рҹ’¶ '+(val.extra>0?(money(val.price)+'+'+money(val.extraFee)):money(val.price))+(val.disc?(' вҲ’ '+val.disc+'%'):'')+' = '+money(val.net)+'/'+L('ОјО®ОҪОұ','mo')+(val.extra>0?(' <span style="color:var(--muted);font-weight:400">('+val.extra+' extra)</span>'):'')+'</div>'):'';
    h+='<div class="row" style="border-left:4px solid '+s.col+'">'+
      '<div style="flex:1;min-width:0'+(isAdmin?';cursor:pointer':'')+'" '+(isAdmin?'onclick="openShopAdmin(\''+t.id+'\')"':'onclick="pickShop(\''+t.id+'\')"')+'><div class="name">'+s.emo+' '+esc(t.name||'вҖ”')+(t.is_demo?' <span style="font-size:10px;font-weight:700;color:var(--warn);background:#FFF7E6;padding:2px 7px;border-radius:8px;vertical-align:middle">'+L('О”ОҹОҡОҷОңО‘ОЈОӨОҷОҡОҹ','DEMO')+'</span>':'')+'</div>'+
      '<div style="font-size:12px;color:var(--muted)"><b>'+plan+'</b> В· '+s.txt+'</div>'+valTxt+'</div>'+
      '<button class="pick" style="margin:0;white-space:nowrap" onclick="pickShop(\''+t.id+'\')">рҹҡӘ '+L('О•ОҜПғОҝОҙОҝПӮ','Enter')+'</button></div>';
  });
  if(!ST.tenants.length)h+='<div class="card muted" style="text-align:center">'+L('ОҡОұОҪОӯОҪОұ ОјОұОіОұО¶ОҜ ОұОәПҢОјОұ','No shops yet')+'</div>';
  if(ST.role==='admin')h+='<button class="btn" style="margin-top:14px" onclick="newShop()">вһ• '+L('ОқОӯОҝ ОјОұОіОұО¶ОҜ','New shop')+'</button></div></div>';
  else h+='</div></div>';
  c.innerHTML=h;
}

async function doCreateShop(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const name=g('ns-name').trim(); if(!name){toast('вқҢ '+L('О’О¬О»Оө ПҢОҪОҝОјОұ','Enter a name'));return;}
  const currency=g('ns-currency')||'вӮ¬';
  const vatRates=g('ns-vat').split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const daySetup={shifts:false,points:[{name:'ОӨОұОјОөОҜОҝ',emoji:'рҹ’°'}],currency:currency,vatRates:vatRates.length?vatRates:[13,24]};
  try{const {data,error}=await sb.from('tenants').insert({name:name,day_setup:daySetup}).select().single();
    if(error)throw error;
    closeModal();
    ST.tenants.push(data); ST.tenant=data.id; ST.shopName=data.name; ST.daySetup=daySetup; ST.view='list';
    try{await sb.from('settings').upsert({tenant_id:data.id,key:'shop_name',value:data.name},{onConflict:'tenant_id,key'});}catch(e){}
    try{
      const tt=(ST.tenants||[]).find(x=>/test/i.test(x.name||''));
      if(tt&&tt.id!==data.id){
        const {data:lab}=await sb.from('settings').select('value').eq('tenant_id',tt.id).eq('key','labels').maybeSingle();
        if(lab&&lab.value){await sb.from('settings').upsert({tenant_id:data.id,key:'labels',value:lab.value},{onConflict:'tenant_id,key'});}
      }
    }catch(e){console.error('template copy',e);}
    toast('вң… '+L('О”О·ОјО№ОҝП…ПҒОіО®ОёО·ОәОө','Created')); enterShop();
  }catch(e){toast('вқҢ '+(e.message||e));}
}

function updateFinValue(){
  const el=document.getElementById('fin-value'); if(!el)return;
  const price=planPrice(ST._adminShopPlan||'advanced');
  const free=(ST._adminShopPlan==='basic')?2:3;
  const users=ST._adminShopUsers||0;
  const extra=Math.max(0,users-free);
  const extraFee=extra*10;
  const gross=price+extraFee;
  const discEl=document.getElementById('fin-disc');
  const disc=(discEl&&discEl.value!=='')?parseFloat(discEl.value):null;
  const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
  const vEl2=document.getElementById('fin-vat');
  const vp=(vEl2&&vEl2.value!=='')?parseFloat(vEl2.value):(ST._adminShopVat!=null?ST._adminShopVat:24);
  const netR=Math.round(net*100)/100, vatR=Math.round(net*vp)/100;
  el.innerHTML='рҹ’¶ '+(extra>0?(money(price)+'+'+money(extraFee)):money(price))+(disc?(' вҲ’ '+disc+'%'):'')+' = '+money(netR)+'/'+L('ОјО®ОҪОұ','month')+(extra>0?(' ('+extra+' extra '+L('ПҮПҒО®ПғП„ОөПӮ','users')+')'):'')+
    '<div style="font-size:12px;font-weight:400;color:var(--muted);margin-top:3px">'+L('ОҰО О‘','VAT')+' '+vp+'% '+money(vatR)+' В· '+L('О О»О·ПҒПҺОҪОөО№','Pays')+' <b style="color:var(--accent)">'+money(Math.round((net+net*vp/100)*100)/100)+'</b></div>';
}

  const email=(document.getElementById('nm-email').value||'').trim();
  if(!email){toast('вқҢ '+L('О’О¬О»Оө email','Enter email'));return;}
  const password=(document.getElementById('nm-pass').value||'')||(role==='owner'?'placeholder-existing-owner-000':'');
  if(!password){toast('вқҢ '+L('О’О¬О»Оө ОәПүОҙО№ОәПҢ','Enter password'));return;}
  const btn=document.getElementById('nm-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const payload={email,password,role,full_name:(document.getElementById('nm-name')||{}).value||'',job_title:(document.getElementById('nm-job')||{}).value||'',tenant_id:curTenant()};
  try{
    const {data:{session}}=await sb.auth.getSession();
    const call=async(extra)=>{
      const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify(Object.assign({},payload,extra||{}))});
      return r.json();
    };
    let d=await call();
    // Оҹ owner П…ПҖО¬ПҒПҮОөО№ О®ОҙО· вҶ’ ПҒПҺП„Оұ ПҖПҒО№ОҪ ПҖПҒОҝПғОёОӯПғОөО№ПӮ П„Оҝ ОјОұОіОұО¶ОҜ
    if(d.needs_confirm){
      const ok=confirm(L('Оҹ owner ','Owner ')+d.owner_name+L(' ОӯПҮОөО№ О®ОҙО· ','  already has ')+d.shop_count+L(' ОјОұОіОұО¶ОҜ(Оұ). ОқОұ ПҖПҒОҝПғП„ОөОёОөОҜ ОәОұО№ ОұП…П„ПҢ;','  shop(s). Add this one too?'));
      if(!ok){btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');return;}
      d=await call({confirm_add:true});
    }
    btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');
    if(d.error){toast('вқҢ '+d.error);return;}
    if(d.added_shop){toast('вң… '+L('ОӨОҝ ОјОұОіОұО¶ОҜ ПҖПҒОҝПғП„ОӯОёО·ОәОө ПғП„ОҝОҪ owner','Shop added to owner')); keepScroll(openMembers); return;}
    toast('вң… '+L('ОӨОҝ ОјОӯО»ОҝПӮ ОҙО·ОјО№ОҝП…ПҒОіО®ОёО·ОәОө','Member created')); keepScroll(openMembers);
  }catch(e){btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');toast('вқҢ '+(e.message||e));}
}
async function editShop(){
  if(ST.role!=='admin'){toast(L('ОңПҢОҪОҝ Оҝ ОҙО№ОұПҮОөО№ПҒО№ПғП„О®ПӮ ОјПҖОҝПҒОөОҜ','Admin only'));return;}
  const name=prompt(L('ОҢОҪОҝОјОұ ОјОұОіОұО¶О№ОҝПҚ:','Shop name:'),ST.shopName||'');
  if(name===null)return;
  const tid=curTenant();
  try{await sb.from('settings').upsert({tenant_id:tid,key:'shop_name',value:name.trim()},{onConflict:'tenant_id,key'});
    ST.shopName=name.trim(); try{localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
    document.getElementById('hTitle').textContent=brandTitle();
    toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved'));
  }catch(e){toast('вқҢ '+(e.message||e));}
}
(async()=>{try{}catch(e){}

  try{localStorage.removeItem('ciq_gmail_rt');}catch(e){}

    if(idleExpired()){
      try{localStorage.removeItem('ciq_seen');}catch(e){}
      await sb.auth.signOut();
      const err=document.getElementById('loginErr');
      if(err)err.innerHTML='<div class="card" style="background:#FFF7E6;border:1px solid #e0a800;color:#B8860B;font-size:13px;padding:10px;border-radius:10px;margin-top:10px">рҹ”’ '+L('О“О№Оұ ОұПғПҶО¬О»ОөО№Оұ, О¶О·П„О¬ОјОө ОҫОұОҪО¬ ПғПҚОҪОҙОөПғО· ОјОөП„О¬ ОұПҖПҢ '+IDLE_DAYS+' О·ОјОӯПҒОөПӮ ПҮПүПҒОҜПӮ ПҮПҒО®ПғО·.','For security, we ask you to sign in again after '+IDLE_DAYS+' days of inactivity.')+'</div>';
    } else {
      await enterApp();
    }
  }})();
// ОұП…П„ПҢОјОұП„О· ОұОҪОұОҪОӯПүПғО· ОҙОөОҙОҝОјОӯОҪПүОҪ ПҢП„ОұОҪ ОөПҖО№ПғП„ПҒОӯПҶОөО№ПӮ ПғП„О·ОҪ ОөПҶОұПҒОјОҝОіО®

document.addEventListener('visibilitychange',async()=>{

  touchActivity();
  if(Date.now()-_lastRefresh>15000){ _lastRefresh=Date.now(); loadAll(); }
});
