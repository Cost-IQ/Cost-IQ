<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#f4f5f7;--card:#fff;--ink:#1a1a2e;--muted:#6b7280;--line:#e5e7eb;
    --accent:#1a5276;--accent-bg:#e6f1fb;--ok:#1e8449;--warn:#b9770e;--bad:#922b21;--chip:#eef1f6}
  html{overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:30px;overflow-x:hidden}
  .wrap{max-width:720px;margin:0 auto;padding:0 14px}
  .brandbar{background:#154766;color:#fff;text-align:center;padding:11px 0;font-size:30px;font-weight:800;letter-spacing:.5px;line-height:1;position:sticky;top:0;z-index:11;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Raleway',-apple-system,'Segoe UI',Roboto,sans-serif}
  .brandbar svg{width:30px;height:30px;flex:0 0 auto}
  .brandbar i{font-style:normal;color:#2ecc71}
  .header{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:10}
  .header .back{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:26px;cursor:pointer;padding:0;line-height:1;width:38px;height:38px;border-radius:12px;flex:0 0 auto;display:none;align-items:center;justify-content:center}
  .header h1{font-size:16px;font-weight:600;flex:1}
  .header .who{font-size:11px;opacity:.85}
  .header .out{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:16px;font-weight:600;padding:9px 14px;border-radius:16px;cursor:pointer;line-height:1}
  .header #logoutBtn{font-size:14px;padding:10px 15px}
  .header .hbtns{display:flex;align-items:center}
  @media(max-width:480px){
    .brandbar{padding:11px 0;font-size:30px}
    .brandbar svg{width:30px;height:30px}
    .header{padding:8px 12px 10px;gap:4px 6px;top:52px;flex-wrap:wrap}
    .header .htwrap{flex:1 1 auto}
    .header .hbtns{flex:1 1 100%;display:flex;align-items:center;justify-content:flex-end}
    .header h1{font-size:17px;font-weight:700}
    .header .who{font-size:10px}
    .header .out{padding:7px 10px;font-size:15px;border-radius:14px}
    .header #logoutBtn{font-size:13px;padding:8px 11px}
  }
  .nav-mobile{display:none}
  @media(max-width:600px){.nav-desktop{display:none}.nav-mobile{display:block}}
  button{font-family:inherit}
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.45}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn.ghost{background:var(--card);color:var(--accent);border:1.5px solid var(--accent)}
  .btn:disabled{opacity:.5}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:16px;outline:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
  .muted{color:var(--muted)}
  .tabs{display:flex;gap:8px;margin:14px 0 6px}
  .tab{flex:1;min-width:0;padding:9px 6px;display:flex;align-items:center;justify-content:center;text-align:center;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:13.5px;font-weight:600;box-sizing:border-box;line-height:1.2;min-height:42px}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;margin-bottom:8px}
  .cathead{font-weight:700;font-size:14px;padding:8px 4px 4px;margin-top:6px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px;cursor:pointer}
  .row .name{font-weight:600;font-size:14px}
  .row .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .price{font-weight:700;color:var(--ok);white-space:nowrap;text-align:right}
  .sup{font-size:11px;color:var(--muted)}
  .err{background:#3a1d1d;border:1px solid var(--bad);color:#ffb4b4;padding:10px 12px;border-radius:10px;font-size:13px;margin-top:10px}
  .spin{width:16px;height:16px;border:2px solid var(--muted);border-top-color:transparent;border-radius:50%;display:inline-block;animation:s .7s linear infinite;vertical-align:middle}
  @keyframes s{to{transform:rotate(360deg)}}
  .logo{font-size:34px;text-align:center;margin-bottom:6px}
  /* в”Җв”Җ ОҹОёПҢОҪО· ПғПҚОҪОҙОөПғО·ПӮ: navy ПҶПҢОҪП„Оҝ, О»ОөП…ОәПҢ/ПҖПҒО¬ПғО№ОҪОҝ О»ОҝОіПҢП„П…ПҖОҝ в”Җв”Җ */
  #loginView{background:#154766;max-width:none;margin:0;min-height:100vh}
  #loginView .lbrand{font-family:'Raleway',-apple-system,'Segoe UI',Roboto,sans-serif;font-weight:800;font-size:34px;color:#fff;letter-spacing:.5px}
  #loginView .field label{color:#b8d6ec}
  #loginView .field input{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff}
  #loginView input::placeholder{color:#b8d6ec;opacity:.55}
  #loginView .btn{background:#2ecc71;color:#0d3320}
  #loginView a{color:#ffffff!important}
  #loginView .muted,#loginView .small{color:#b8d6ec}
  #loginView #loginVer{color:#b8d6ec}
  #loginView #pwEye{border-color:rgba(255,255,255,.25)!important;color:#fff}
  .small{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
  .suprow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
  .suprow:last-child{border-bottom:none}
  .suprow .sn{flex:1;font-size:14px}
  .suprow.best .sn{color:var(--ok);font-weight:700}
  .suprow input{width:88px;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .pick{background:var(--accent-bg);color:var(--accent);border:none;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
  .del{background:none;border:none;color:var(--bad);font-size:15px;cursor:pointer}
  .kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted)}.kv .v{font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  /* в”Җв”Җ ОҡО¬ПҒП„ОөПӮ ПғПҚОҪОҝПҲО·ПӮ ОәОөПҒОҙОҝПҶОҝПҒОҜОұПӮ в”Җв”Җ */
  .pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 13px;text-align:center;position:relative;overflow:hidden}
  .pcstripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .pcard .t{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .pcard .n{font-size:21px;font-weight:800;margin-top:3px;letter-spacing:-.5px}
  .pcard .s{font-size:10.5px;color:var(--muted);margin-top:2px}
  .plegend{display:grid;grid-template-columns:1fr;gap:9px;font-size:13px;color:var(--muted)}
  .prow{display:flex;align-items:center;justify-content:space-between}
  @media(max-width:600px){
    .pcards{grid-template-columns:1fr;gap:8px}
    .pcard{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 12px 18px;text-align:left}
    .pcard .n{font-size:19px;margin:0}
    .pcard .s{margin:0}
    .pcard .r{text-align:right}
  }
  /* в”Җв”Җ О‘ОҪО¬О»П…ПғО· ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ (ПҖО»ОұОәОҜОҙО№Оұ) в”Җв”Җ */
  .achips{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .achip{border:1px solid var(--line);border-radius:12px;padding:13px 12px;position:relative;overflow:hidden;text-align:center}
  .achip .cstripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .achip .cn{font-size:12px;color:var(--muted);letter-spacing:.2px}
  .achip .amt{font-size:18px;font-weight:800;margin-top:6px;letter-spacing:-.3px}
  .achip .pc{font-size:11.5px;font-weight:700;margin-top:2px}
  .agp{margin-top:11px;border:1px solid var(--line);border-radius:12px;padding:13px 16px;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
  .agp .cstripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .agp .lab{font-size:13px;font-weight:700;color:var(--fg)}
  .agp .val{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .agp .vpc{font-size:12px;font-weight:700}
  .agp-stack{flex-direction:column;gap:2px;padding:15px 16px}
  .agp-stack .lab{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.2px}
  .agp-stack .val{font-size:23px;font-weight:800;letter-spacing:-.5px}
  .agp-stack .vpc{font-size:13px;font-weight:700}
  /* в”Җв”Җ Sub-tabs ОјОө emoji ПҖО¬ОҪПү ОұПҖПҢ П„О· О»ОӯОҫО· в”Җв”Җ */
  .subtabs{display:flex;gap:5px;margin-bottom:12px}
  .subtab{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px;border-radius:9px;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:var(--card);min-height:52px}
  .subtab .e{font-size:17px;line-height:1}
  .subtab .t{font-size:11px;font-weight:600;text-align:center;line-height:1.15;word-break:break-word}
  .subtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* в”Җв”Җ Tabs ПғП…ОҪП„ОұОіПҺОҪ: ОҜПғОұ ПҖО»О¬П„О·, ОҙПҚОҝ ПғОөО№ПҒОӯПӮ ОәОөО№ОјОӯОҪОҝП… в”Җв”Җ */
  .rkinds{display:flex;gap:8px;margin:14px 0 6px}
  .rkinds > .tab{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;
    padding:9px 6px;min-height:58px;border-radius:11px;
    border:1px solid var(--line);color:var(--muted);background:var(--card);cursor:pointer;transition:.15s}
  .rkinds > .tab .e{font-size:19px;line-height:1}
  .rkinds > .tab .t{font-size:13.5px;line-height:1.25;font-weight:600}
  .rkinds > .tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  @media(max-width:600px){
    .rkinds{gap:6px}
    .rkinds > .tab{padding:8px 4px;min-height:60px}
    .rkinds > .tab .e{font-size:17px}
    .rkinds > .tab .t{font-size:12px}
  }
  /* в”Җв”Җ ОңПҖО¬ПҒОұ ПҖОөПҒО№ПҢОҙПүОҪ: ПҮПүПҒОҜПӮ ОәПҚО»О№ПғО· в”Җв”Җ */
  .perbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:nowrap}
  .perbar > div{flex:1 1 0;min-width:0;padding:8px 5px;border-radius:20px;cursor:pointer;font-size:12.5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--line);color:var(--muted);background:var(--card)}
  .perbar > div.on{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
  @media(max-width:600px){
    .perbar{flex-wrap:wrap}
    .perbar > div{flex:1 1 calc(33.333% - 4px);font-size:12px;padding:8px 4px}
  }
  /* в”Җв”Җ Tabs ОҝО№ОәОҝОҪОҝОјО№ОәПҺОҪ О№ОҙО№ОҝОәП„О®П„О·: ПҮПүПҒОҜПӮ ОәПҚО»О№ПғО· в”Җв”Җ */
  .biztabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:nowrap;width:calc(100vw - 24px);position:relative;left:50%;margin-left:calc(-50vw + 12px)}
  .biztabs > div{flex:1 1 0;min-width:0;padding:10px 8px;border-radius:20px;cursor:pointer;font-size:13.5px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--line);color:var(--muted);background:var(--card)}
  .biztabs > div.on{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
  @media(max-width:600px){
    .biztabs{flex-wrap:wrap;width:auto;position:static;left:auto;margin-left:0}
    .biztabs > div{flex:1 1 calc(25% - 5px);font-size:11.5px;padding:9px 2px}
  }
  /* ОЈП„ОұП„О№ПғП„О№ОәО¬ tabs: ОҝО»ПҢОәО»О·ПҒОөПӮ О»ОӯОҫОөО№ПӮ, wrap ПғОө ОҙОөПҚП„ОөПҒО· ПғОөО№ПҒО¬ ОұОҪ ПҮПҒОөО№ОұПғП„ОөОҜ */
  @media(min-width:601px){
    .stat-tabs{flex-wrap:wrap!important;justify-content:center}
    .stat-tabs .tab{flex:0 0 auto!important;min-width:auto!important;padding:9px 14px}
    .lap-tabs{display:flex!important;gap:8px!important;flex-wrap:nowrap!important}
    .lap-tabs>.tab{flex:1 1 0!important;min-width:0!important}
  }
</style>

function greeklish(s){return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().split('').map(ch=>GRK2LAT[ch]!=null?GRK2LAT[ch]:ch).join('');}
function normStr(s){return greeklish(s).replace(/['вҖҷ`.,\/()%\-]/g,'').replace(/[^\p{L}\p{N} ]/gu,' ').replace(/C/g,'K').replace(/\b(FIA|FIALI|FIALH|FIALES|FIALON|FIALA|TEM|TEMAX|TEMAXIO|TEMAXIA|TMX|PKS|PCS|PC)\b/g,' ').replace(/\b(19[5-9]\d|20[0-3]\d)\b/g,' ').replace(/\s+/g,' ').trim();}
function keyWords(s){return normStr(s).split(' ').filter(w=>(/^\d+$/.test(w)&&w.length>=2)||(w.length>=3&&!STOP.has(w)));}
function _toks(s){const set={};normStr(s).split(' ').forEach(w=>{if(w.length>=2)set[w]=true;});return set;}
let _canon=null;
function buildCanon(){
  const out=[];
  (ST.products||[]).forEach(p=>{
    out.push({id:p.id,norm:normStr(p.sku),set:_toks(p.sku)});
    if(p.invoice_name&&normStr(p.invoice_name)!==normStr(p.sku))
      out.push({id:p.id,norm:normStr(p.invoice_name),set:_toks(p.invoice_name)});
  });
  return out;
}
function matchProduct(raw){
  if(!_canon)_canon=buildCanon();
  const pn=normStr(raw), pset=_toks(raw);
  const ps=Object.keys(pset).length; if(!ps)return null;
  for(let i=0;i<_canon.length;i++){ if(_canon[i].norm===pn) return _canon[i].id; }  // exact ПҖПҒПҺП„Оұ
  const size=o=>Object.keys(o).length;
  const subset=(a,b)=>{for(const k in a){if(!b[k])return false;}return true;};
  const inter=(a,b)=>{let n=0;for(const k in a){if(b[k])n++;}return n;};
  let best=null,bestScore=-1,tie=false;
  for(let i=0;i<_canon.length;i++){
    const c=_canon[i],cs=size(c.set); if(!cs)continue;
    if(!(subset(c.set,pset)||subset(pset,c.set)))continue;   // ОҜОҙО№ОҝПӮ ПҖП…ПҒО®ОҪОұПӮ О»ОӯОҫОөПүОҪ
    const score=inter(c.set,pset)*1000-Math.abs(cs-ps);
    if(score>bestScore){bestScore=score;best=c.id;tie=false;}
    else if(score===bestScore&&best!==c.id){tie=true;}
  }
  return tie?null:best;
}
function matchSupplier(name){
  const n=normStr(name);if(!n)return null;
  let hit=null;
  ST.suppliers.forEach(s=>{
    const cands=[s.name].concat(s.aliases||[]);
    cands.forEach(cn=>{const c=normStr(cn);if(c&&(n.includes(c)||c.includes(n)))hit=s.id;});
  });
  return hit;
}

function revRange(){
  const off=ST.revOffset||0; const now=new Date();
  let from,to;
  if(ST.revView==='year'){ from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31); }
  else { from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0); }
  const f=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:f(from),to:f(to)};
}

function shopMonthly(t){
  const price=planPrice(t.plan||'advanced');
  const free=(t.plan==='basic')?2:(t.plan==='pro')?4:3;
  const users=(ST.revUsers||{})[t.id]||0;
  const extra=Math.max(0,users-free);
  const extraFee=extra*10;
  const fin=(ST.revFinance||[]).find(f=>f.tenant_id===t.id);
  const disc=(fin&&fin.owner_discount_pct)||0;
  const gross=price+extraFee;
  const net=disc>0?gross*(1-disc/100):gross;
  return {price:price,extra:extra,extraFee:extraFee,disc:disc,discAmt:gross-net,gross:gross,net:Math.round(net*100)/100};
}
function revCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const range=revRange();
  const inR=d=>d&&String(d)>=range.from&&String(d)<=range.to;
  const onlyOff=!!ST.revOfficial;
  const spread=!!ST.revSpread;
  const keep=x=>!onlyOff||(x.official!==false);
  const allT=ST.revTenants||[];
  const tenants=allT.filter(t=>!t.is_demo);           // П„Оұ ОҙОҝОәО№ОјОұПғП„О№ОәО¬ ОҙОөОҪ ОјОөП„ПҒОҝПҚОҪ
  const demoIds={}; allT.forEach(t=>{if(t.is_demo)demoIds[t.id]=true;});
  const today=new Date(); today.setHours(0,0,0,0);
  const vatOf=tid=>{const t=allT.find(x=>x.id===tid);return t&&t.vat_pct!=null?n(t.vat_pct):24;};
  // ОҡОұОёОұПҒПҢ / ОҰО О‘ ОјО№ОұПӮ ОөОіОіПҒОұПҶО®ПӮ (ПҖОұО»О№ОӯПӮ: П„Оҝ amount ОөОҜОҪОұО№ ОәОұОёОұПҒПҢ)
  const split=x=>{
    const net=(x.amount_net!=null&&x.amount_net!=='')?n(x.amount_net):n(x.amount);
    const vat=(x.vat_amount!=null&&x.vat_amount!=='')?n(x.vat_amount):0;
    return {net:net,vat:vat};
  };
  // в”Җв”Җ О ПҒОҝОІО»ОөПҖПҢОјОөОҪОҝ: ОөОҪОөПҒОіО¬ ОјОұОіОұО¶О№О¬ Г— ОјО·ОҪО№ОұОҜОұ ОұОҫОҜОұ (ОәОұОёОұПҒО®) в”Җв”Җ
  let mrr=0,subTotal=0,extraUsers=0,discounts=0,mrrVat=0;
  const byPlan={basic:{n:0,sum:0},advanced:{n:0,sum:0},pro:{n:0,sum:0}};
  const owing=[];
  tenants.forEach(t=>{
    const m=shopMonthly(t);
    const pl=(t.plan||'advanced');
    const vp=t.vat_pct!=null?n(t.vat_pct):24;
    if(byPlan[pl]){byPlan[pl].n++;byPlan[pl].sum+=m.net;}
    mrr+=m.net; mrrVat+=m.net*vp/100;
    subTotal+=m.price; extraUsers+=m.extraFee; discounts+=m.discAmt;
    if(t.paid_until){
      const pu=new Date(t.paid_until); pu.setHours(0,0,0,0);
      const days=Math.round((pu-today)/86400000);
      if(days<0)owing.push({name:t.name,days:days,amt:m.net,vat:m.net*vp/100,expired:true,date:t.paid_until});
      else if(days<=7)owing.push({name:t.name,days:days,amt:m.net,vat:m.net*vp/100,expired:false,date:t.paid_until});
    }
  });
  const mult=(ST.revView==='year')?12:1;
  mrr*=mult; mrrVat*=mult;
  // в”Җв”Җ О•О№ПғПҖПҒОұПҮОёОӯОҪ в”Җв”Җ
  // ОӨОұОјОөОҜОҝ: ПҢО»О· О· ПҖО»О·ПҒПүОјО® ПғП„ОҝОҪ ОјО®ОҪОұ ПҖОҝП… ОӯОіО№ОҪОө.
  // ОҡОұП„ОұОҪОҝОјО®: ОјОҝО№ПҒО¬О¶ОөП„ОұО№ ПғП„ОҝП…ПӮ ОјО®ОҪОөПӮ ПҖОҝП… ОәОұО»ПҚПҖП„ОөО№.
  let colNet=0,colVat=0; const byMethod={}; const paysShown=[];
  (ST.revPayments||[]).forEach(p=>{
    if(!keep(p)||demoIds[p.tenant_id])return;
    const s=split(p);
    const months=Math.max(1,parseInt(p.months,10)||1);
    if(spread&&months>1){
      // О ПҢПғОҝО№ ОұПҖПҢ П„ОҝП…ПӮ ОәОұО»П…ПҖП„ПҢОјОөОҪОҝП…ПӮ ОјО®ОҪОөПӮ ПҖОӯПҶП„ОҝП…ОҪ ОјОӯПғОұ ПғП„О·ОҪ ПҖОөПҒОҜОҝОҙОҝ;
      const start=new Date((p.pay_date||range.from)+'T12:00:00');
      let hit=0;
      for(let i=0;i<months;i++){
        const d=new Date(start.getFullYear(),start.getMonth()+i,1);
        const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
        const last=new Date(d.getFullYear(),d.getMonth()+1,0);
        const isoEnd=last.getFullYear()+'-'+String(last.getMonth()+1).padStart(2,'0')+'-'+String(last.getDate()).padStart(2,'0');
        if(isoEnd>=range.from&&iso<=range.to)hit++;
      }
      if(!hit)return;
      const fNet=s.net/months*hit, fVat=s.vat/months*hit;
      colNet+=fNet; colVat+=fVat;
      const mth=p.method||'other'; byMethod[mth]=(byMethod[mth]||0)+fNet+fVat;
      paysShown.push(Object.assign({},p,{_net:fNet,_vat:fVat,_part:hit+'/'+months}));
    } else {
      if(!inR(p.pay_date))return;
      colNet+=s.net; colVat+=s.vat;
      const mth=p.method||'other'; byMethod[mth]=(byMethod[mth]||0)+s.net+s.vat;
      paysShown.push(Object.assign({},p,{_net:s.net,_vat:s.vat,_part:''}));
    }
  });
  // в”Җв”Җ ОҲОҫП„ПҒОұ ПҮПҒОөПҺПғОөО№ПӮ в”Җв”Җ
  const chs=(ST.revCharges||[]).filter(x=>inR(x.charge_date)&&keep(x)&&!demoIds[x.tenant_id]);
  let chNet=0,chVat=0;
  chs.forEach(x=>{const s=split(x);chNet+=s.net;chVat+=s.vat;});
  // Setup fees ОәОұП„ОұОіПҒО¬ПҶОҝОҪП„ОұО№ ПҖО»ОӯОҝОҪ ПүПӮ ОӯОҫП„ПҒОұ ПҮПҒОөПҺПғОөО№ПӮ (shop_charges)
  const setup=0, setupVat=0;
  const targetNet=mrr;                    // MRR: ОјПҢОҪОҝ ОөПҖОұОҪОұО»ОұОјОІОұОҪПҢОјОөОҪОұ
  const targetVat=mrrVat;
  const oneOffNet=chNet+setup;            // О•ПҶО¬ПҖОұОҫ: setup fees + ОӯОҫП„ПҒОұ ПҮПҒОөПҺПғОөО№ПӮ
  const oneOffVat=chVat+setupVat;
  // ОҰО О‘ ПҖПҒОҝПӮ ОұПҖПҢОҙОҝПғО·: ОјПҢОҪОҝ ОұПҖПҢ О”О—ОӣО©ОңО•ОқО•ОЈ ОөО№ПғПҖПҒО¬ОҫОөО№ПӮ
  let vatDue=0;
  (ST.revPayments||[]).forEach(p=>{
    if(p.official===false||demoIds[p.tenant_id])return;
    if(!inR(p.pay_date))return;
    const sp=split(p); vatDue+=sp.vat;
  });
  (ST.revCharges||[]).forEach(x=>{
    if(x.official===false||demoIds[x.tenant_id])return;
    if(!inR(x.charge_date))return;
    const sp=split(x); vatDue+=sp.vat;
  });
  return {range:range,mrr:mrr,mrrVat:mrrVat,subTotal:subTotal*mult,extraUsers:extraUsers*mult,discounts:discounts*mult,
    collected:colNet,collectedVat:colVat,collectedGross:colNet+colVat,
    charges:chNet,chargesVat:chVat,setup:setup,setupVat:setupVat,
    oneOff:oneOffNet,oneOffVat:oneOffVat,vatDue:vatDue,
    target:targetNet,targetVat:targetVat,targetGross:targetNet+targetVat,
    grandNet:targetNet+oneOffNet,grandVat:targetVat+oneOffVat,
    pending:Math.max(0,targetNet-colNet),byPlan:byPlan,byMethod:byMethod,
    owing:owing.sort((a,b)=>a.days-b.days),activeShops:tenants.length,pays:paysShown,chs:chs};
}

function bizRange(){
  const off=ST.bizOffset||0; const now=new Date();

  if(ST.bizPeriod==='year'){ from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31); }
  else { from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0); }
  const f=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:f(from),to:f(to)};

  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  const f2=new Date(f.getFullYear()-1,f.getMonth(),1);
  const t2=new Date(t.getFullYear()-1,t.getMonth()+1,0);

function bizRangeYTD(lastYear){

  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');

function bizCompareRow(label,now,prev,inverse){
  const T=(el,en)=>L(el,en);
  const m2=x=>money(Math.round((x||0)*100)/100);
  if(prev<=0&&now<=0)return '';
  let badge='';
  if(prev>0){
    const pct=(now-prev)/prev*100;
    const up=pct>=0;
    const good=inverse?!up:up;
    const col=Math.abs(pct)<0.05?'var(--muted)':(good?'var(--ok)':'var(--bad)');
    badge='<span style="color:'+col+';font-weight:700">'+(up?'в–І +':'в–ј ')+Math.abs(pct).toFixed(1)+'%</span>';
  } else {
    badge='<span class="muted">'+T('ОқОӯОҝ','New')+'</span>';
  }

function bizCompareBlock(what){

  // ОӨО№ОјО® ПҖОөПҒО№ПҢОҙОҝП… ОұОҪО¬О»ОҝОіОұ ОјОө П„Оҝ tab

    // profit

function bizExpCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const list=(ST.bizExpenses||[]).filter(x=>x.exp_date&&x.exp_date>=r.from&&x.exp_date<=r.to);
  const groups={};
  let net=0,vat=0,vatDed=0;
  list.forEach(x=>{
    const k=x.category||'other';
    if(!groups[k])groups[k]={net:0,vat:0,cnt:0,recurring:false};
    groups[k].net+=n(x.amount_net); groups[k].vat+=n(x.vat_amount); groups[k].cnt++;
    if(x.recurring)groups[k].recurring=true;
    net+=n(x.amount_net); vat+=n(x.vat_amount);
    if(x.vat_deductible!==false)vatDed+=n(x.vat_amount);
  });
  const arr=Object.keys(groups).map(k=>Object.assign({key:k},groups[k])).sort((a,b)=>(b.net+b.vat)-(a.net+a.vat));
  return {list:list,groups:arr,net:net,vat:vat,vatDeductible:vatDed,total:net+vat};
}

}

function bizCashCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  const isCash=m=>m==='cash';
  // в”Җв”Җ О•О№ПғПҒОҝОӯПӮ: ПғП…ОҪОҙПҒОҝОјОӯПӮ + ОӯОҫП„ПҒОұ ПҮПҒОөПҺПғОөО№ПӮ в”Җв”Җ
  const inflow=[]; let inBank=0,inTill=0,vatOut=0;
  let subNet=0,subVat=0,subCashN=0,subCashV=0;
  const demoC={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demoC[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(!inR(p.pay_date)||demoC[p.tenant_id])return;
    const net=(p.amount_net!=null?n(p.amount_net):n(p.amount)), vat=n(p.vat_amount);
    subNet+=net; subVat+=vat;
    if(isCash(p.method)){subCashN+=net;subCashV+=vat;inTill+=net+vat;} else inBank+=net+vat;
    if(p.official!==false)vatOut+=vat;
  });
  if(subNet+subVat>0)inflow.push({label:L('ОЈП…ОҪОҙПҒОҝОјОӯПӮ','Subscriptions'),amt:subNet+subVat,cash:subCashN+subCashV>0,mixed:(subCashN+subCashV>0)&&(subNet+subVat>subCashN+subCashV)});
  let chNet=0,chVat=0,chCash=0,setNet=0,setVat=0,setCash=0;
  (ST.revCharges||[]).forEach(x=>{
    if(!inR(x.charge_date)||demoC[x.tenant_id])return;
    const net=(x.amount_net!=null?n(x.amount_net):n(x.amount)), vat=n(x.vat_amount);
    const setup=(x.label||'').toLowerCase().indexOf('setup')>=0;
    if(setup){setNet+=net;setVat+=vat;} else {chNet+=net;chVat+=vat;}
    inBank+=net+vat;   // ОҝО№ ПҮПҒОөПҺПғОөО№ПӮ ОҙОөОҪ ОӯПҮОҝП…ОҪ П„ПҒПҢПҖОҝ ПҖО»О·ПҒПүОјО®ПӮ вҖ” ОёОөПүПҒОҝПҚОҪП„ОұО№ П„ПҒО¬ПҖОөО¶Оұ
    if(x.official!==false)vatOut+=vat;
  });
  if(setNet+setVat>0)inflow.push({label:'Setup Fees',amt:setNet+setVat,cash:false});
  if(chNet+chVat>0)inflow.push({label:L('ОҲОҫП„ПҒОұ О§ПҒОөПҺПғОөО№ПӮ','Extra Charges'),amt:chNet+chVat,cash:false});
  // в”Җв”Җ О•ОәПҒОҝОӯПӮ: ОӯОҫОҝОҙОұ ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ в”Җв”Җ
  const outMap={}; let outBank=0,outTill=0,vatIn=0;
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const tot=n(x.amount_net)+n(x.vat_amount);
    const k=x.category||'other';
    if(!outMap[k])outMap[k]={amt:0,cash:false};
    outMap[k].amt+=tot;
    if(isCash(x.payment_method)){outMap[k].cash=true;outTill+=tot;} else outBank+=tot;
    if(x.vat_deductible!==false)vatIn+=n(x.vat_amount);
  });
  // в”Җв”Җ ОңО№ПғОёОҝОҙОҝПғОҜОұ в”Җв”Җ
  let payBank=0,payTill=0;
  (ST.bizPayroll||[]).forEach(p=>{
    if(!inR(p.pay_date))return;
    payBank+=n(p.amount_bank); payTill+=n(p.amount_cash);
  });
  if(payBank+payTill>0){outMap['_payroll']={amt:payBank+payTill,cash:payTill>0};outBank+=payBank;outTill+=payTill;}
  const outflow=Object.keys(outMap).map(k=>({key:k,amt:outMap[k].amt,cash:outMap[k].cash})).sort((a,b)=>b.amt-a.amt);
  // в”Җв”Җ О‘ПҒПҮО№ОәО¬ П…ПҖПҢО»ОҝО№ПҖОұ в”Җв”Җ
  const bal=(ST.bizBalances||[]).filter(b=>b.as_of<=r.from).slice(-1)[0];
  const openBank=bal?n(bal.bank):0, openTill=bal?n(bal.till):0;
  const vatDue=Math.max(0,vatOut-vatIn);
  const bank=openBank+inBank-outBank, till=openTill+inTill-outTill;
  return {inflow:inflow,outflow:outflow,openBank:openBank,openTill:openTill,hasOpening:!!bal,
    bank:bank,till:till,vatDue:vatDue,vatOut:vatOut,vatIn:vatIn,
    flow:(inBank+inTill)-(outBank+outTill),liquidity:bank+till,available:bank+till-vatDue};
}

function bizEmpCalc(e){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const cls=(e.insured===false)?null:(ST.bizContrib||[]).find(x=>x.name===e.contrib_class);
  const empPct=cls?n(cls.emp_pct):0, emprPct=cls?n(cls.empr_pct):0;
  const isNet=(e.wage_basis==='net')&&empPct>0&&empPct<100;
  let base=0;
  if(e.pay_type==='monthly')base=n(e.monthly_wage);
  else if(e.pay_type==='daily')base=n(e.daily_wage)*22;      // ОөОҪОҙОөО№ОәП„О№ОәО¬ 22 ОөПҒОіО¬ПғО№ОјОөПӮ
  else base=n(e.hourly_rate)*160;                             // ОөОҪОҙОөО№ОәП„О№ОәО¬ 160 ПҺПҒОөПӮ
  const gross=isNet?(base/(1-empPct/100)):base;
  const empC=gross*empPct/100, emprC=gross*emprPct/100;
  return {gross:gross,empC:empC,emprC:emprC,net:gross-empC,cost:gross+emprC,isNet:isNet,cls:cls};
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ рҹ§ҫ ОҰО О‘ О•О ОҷО§О•ОҷОЎО—ОЈО—ОЈ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function bizVatRange(off){
  off=off||0; const now=new Date(); const p=ST.bizVatPeriod||'quarter';
  let from,to;
  if(p==='month'){ from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0); }
  else if(p==='year'){ from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31); }
  else { const q=Math.floor(now.getMonth()/3)+off; from=new Date(now.getFullYear(),q*3,1); to=new Date(now.getFullYear(),q*3+3,0); }
  const f=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:f(from),to:f(to)};
}
function bizVatLabel(off){
  const r=bizVatRange(off); const d=new Date(r.from+'T12:00:00'); const p=ST.bizVatPeriod||'quarter';
  if(p==='month')return monthNamesFull()[d.getMonth()]+' '+d.getFullYear();
  if(p==='year')return ''+d.getFullYear();
  return (Math.floor(d.getMonth()/3)+1)+'Оҝ '+L('ОӨПҒОҜОјО·ОҪОҝ','Quarter')+' '+d.getFullYear();
}
function bizVatCalc(off){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizVatRange(off||ST.bizVatOffset||0);
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  // О•ОәПҒОҝОӯПӮ
  let subNet=0,subVat=0,setNet=0,setVat=0,chNet=0,chVat=0;
  const demo={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demo[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(p.official===false||!inR(p.pay_date)||demo[p.tenant_id])return;
    subNet+=(p.amount_net!=null?n(p.amount_net):n(p.amount)); subVat+=n(p.vat_amount);
  });
  (ST.revCharges||[]).forEach(x=>{
    if(x.official===false||!inR(x.charge_date)||demo[x.tenant_id])return;
    const net=(x.amount_net!=null?n(x.amount_net):n(x.amount)), vat=n(x.vat_amount);
    if((x.label||'').toLowerCase().indexOf('setup')>=0){setNet+=net;setVat+=vat;} else {chNet+=net;chVat+=vat;}
  });
  const out=[];
  if(subVat>0)out.push({label:L('ОЈП…ОҪОҙПҒОҝОјОӯПӮ','Subscriptions'),net:subNet,vat:subVat});
  if(setVat>0)out.push({label:'Setup Fees',net:setNet,vat:setVat});
  if(chVat>0)out.push({label:L('ОҲОҫП„ПҒОұ О§ПҒОөПҺПғОөО№ПӮ','Extra Charges'),net:chNet,vat:chVat});
  const outVat=subVat+setVat+chVat;
  // О•О№ПғПҒОҝОӯПӮ
  const inMap={};
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const k=x.category||'other';
    if(!inMap[k])inMap[k]={vat:0,ded:0,hasNonDed:false};
    inMap[k].vat+=n(x.vat_amount);
    if(x.vat_deductible!==false)inMap[k].ded+=n(x.vat_amount); else inMap[k].hasNonDed=true;
  });
  const inArr=Object.keys(inMap).map(k=>Object.assign({key:k},inMap[k])).sort((a,b)=>b.ded-a.ded);
  const inVat=inArr.reduce((s,x)=>s+x.ded,0);
  return {range:r,out:out,outVat:outVat,in:inArr,inVat:inVat,due:outVat-inVat};
}

function bizProfitCalc(off){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const saved=ST.bizOffset; if(off!=null)ST.bizOffset=off;
  const r=bizRange(); if(off!=null)ST.bizOffset=saved;
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  // ОҲПғОҝОҙОұ (ОәОұОёОұПҒО¬, ПҮПүПҒОҜПӮ ОҰО О‘)
  let sub=0,oneOff=0;
  const demoP={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demoP[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(!inR(p.pay_date)||demoP[p.tenant_id])return;
    sub+=(p.amount_net!=null?n(p.amount_net):n(p.amount));
  });
  (ST.revCharges||[]).forEach(x=>{
    if(!inR(x.charge_date)||demoP[x.tenant_id])return;
    oneOff+=(x.amount_net!=null?n(x.amount_net):n(x.amount));
  });
  const revenue=sub+oneOff;
  // ОҲОҫОҝОҙОұ (ОәОұОёОұПҒО¬) ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ + ПҖО¬ОіО№Оұ
  const catMap={}; let opex=0,fixed=0;
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const net=n(x.amount_net);
    const k=x.category||'other';
    catMap[k]=(catMap[k]||0)+net;
    opex+=net;
    if(x.recurring)fixed+=net;
  });
  const cats=Object.keys(catMap).map(k=>({key:k,amt:catMap[k],pct:revenue>0?catMap[k]/revenue*100:0})).sort((a,b)=>b.amt-a.amt);
  // ОңО№ПғОёОҝОҙОҝПғОҜОұ (ОәПҢПғП„ОҝПӮ = ОјО№ОәП„О¬ + ОөПҒОіОҝОҙОҝП„О№ОәОӯПӮ)
  let payroll=0;
  (ST.bizPayroll||[]).forEach(p=>{
    if(!inR(p.pay_date)||p.kind==='efka')return;
    payroll+=n(p.gross)+n(p.empr_contrib);
  });
  const profit=revenue-opex-payroll;
  const taxPct=n((ST.costSettings||{}).tax_pct);
  const tax=(profit>0)?(profit*taxPct/100):0;
  const afterTax=profit-tax;
  const shops=(ST.revTenants||[]).filter(t=>!t.is_demo).length;
  const avgPerShop=shops?revenue/shops:0;
  const fixedTotal=fixed+payroll;
  const breakEven=avgPerShop>0?Math.ceil(fixedTotal/avgPerShop):0;
  return {revenue:revenue,sub:sub,oneOff:oneOff,opex:opex,payroll:payroll,profit:profit,
    taxPct:taxPct,tax:tax,afterTax:afterTax,afterMargin:revenue>0?afterTax/revenue*100:0,
    margin:revenue>0?profit/revenue*100:0,cats:cats,fixed:fixedTotal,shops:shops,
    costPerShop:shops?(opex+payroll)/shops:0,profitPerShop:shops?profit/shops:0,breakEven:breakEven};
}

function bizClientsCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const cs=ST.costSettings||{};
  const perOcr=n(cs.cost_per_ocr), fixedTotal=n(cs.monthly_fixed);
  const inR=d=>{const dd=String(d||'').slice(0,10);return dd>=r.from&&dd<=r.to;};
  // О§ПҒО®ПғО· ОұОҪО¬ ОјОұОіОұО¶ОҜ
  const use={}; let totalOcr=0;
  (ST.usageLog||[]).forEach(u=>{
    if(!inR(u.created_at))return;
    if(!use[u.tenant_id])use[u.tenant_id]={ocr:0,z:0};
    const units=n(u.units)||1;
    if(u.kind==='ocr_z'){use[u.tenant_id].z+=units;} else {use[u.tenant_id].ocr+=units;}
    totalOcr+=units;
  });
  const tenants=(ST.revTenants||[]).filter(t=>!t.is_demo);
  const shopCount=tenants.length||1;
  // ОӨОҝ ПҖО¬ОіО№Оҝ ОјОҝО№ПҒО¬О¶ОөП„ОұО№: ОјО№ПғПҢ О№ПғОҝОјОөПҒПҺПӮ (ОәО¬ОёОө ОјОұОіОұО¶ОҜ ОәПҒОұП„О¬ ПҮПҺПҒОҝ),
  // ОјО№ПғПҢ ОұОҪОұО»ОҝОіО№ОәО¬ ОјОө П„О· ПҮПҒО®ПғО· (ПҢПҖОҝО№ОҝПӮ ПғОәОұОҪО¬ПҒОөО№ ПҖОҝО»О»О¬, ОәОҝПғП„ОҜО¶ОөО№ ПҖО№Оҝ ПҖОҝО»ПҚ)
  const fixedEven=fixedTotal/2/shopCount;
  const fixedByUse=fixedTotal/2;
  const rows=tenants.map(function(t){
    const u=use[t.id]||{ocr:0,z:0};
    const scans=u.ocr+u.z;
    const m=shopMonthly(t);
    const revenue=(ST.bizPeriod==='year')?m.net*12:m.net;
    const varCost=scans*perOcr;
    const share=totalOcr>0?(scans/totalOcr):(1/shopCount);
    const fixCost=(fixedEven+fixedByUse*share)*((ST.bizPeriod==='year')?12:1);
    const cost=varCost+fixCost;
    const profit=revenue-cost;
    return {id:t.id,name:t.name,plan:t.plan||'advanced',scans:scans,ocr:u.ocr,z:u.z,
      revenue:revenue,varCost:varCost,fixCost:fixCost,cost:cost,profit:profit,
      margin:revenue>0?profit/revenue*100:0,users:(ST.revUsers||{})[t.id]||0};
  }).sort((a,b)=>b.cost-a.cost);
  const tRev=rows.reduce((s,x)=>s+x.revenue,0);
  const tCost=rows.reduce((s,x)=>s+x.cost,0);
  return {rows:rows,totalScans:totalOcr,revenue:tRev,cost:tCost,profit:tRev-tCost,
    margin:tRev>0?(tRev-tCost)/tRev*100:0,perOcr:perOcr,fixedTotal:fixedTotal};
}

function partnerCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const inR=d=>d&&String(d).slice(0,10)>=r.from&&String(d).slice(0,10)<=r.to;
  const tenants=ST.revTenants||[];
  const rows=(ST.partners||[]).filter(p=>p.active!==false).map(function(pt){
    const shops=tenants.filter(t=>t.partner_id===pt.id&&!t.is_demo);
    let base=0; const detail=[];
    shops.forEach(function(t){
      // ОңОӯПғОұ ПғП„О· ОҙО№О¬ПҒОәОөО№Оұ П„О·ПӮ ПғП…ОјПҶПүОҪОҜОұПӮ;
      let ok=true;
      if(pt.duration_months&&t.partner_since){
        const st=new Date(t.partner_since+'T12:00:00');
        const end=new Date(st.getFullYear(),st.getMonth()+parseInt(pt.duration_months,10),st.getDate());
        const per=new Date(r.from+'T12:00:00');
        ok=per<end;
      }
      if(!ok){detail.push({name:t.name,amt:0,expired:true});return;}
      let amt=0;
      // ОЈП…ОҪОҙПҒОҝОјОӯПӮ (ОјПҢОҪОҝ ПҢ,П„О№ ОөО№ПғПҖПҒО¬ПҮОёО·ОәОө)
      if(pt.on_subscriptions!==false){
        (ST.revPayments||[]).forEach(function(pay){
          if(pay.tenant_id!==t.id||!inR(pay.pay_date))return;
          amt+=(pay.amount_net!=null?n(pay.amount_net):n(pay.amount));
        });
      }
      // Setup fees ОәОұО№ ОӯОҫП„ПҒОұ ПҮПҒОөПҺПғОөО№ПӮ
      (ST.revCharges||[]).forEach(function(x){
        if(x.tenant_id!==t.id||!inR(x.charge_date))return;
        const isSetup=(x.label||'').toLowerCase().indexOf('setup')>=0;
        if(isSetup&&pt.on_setup!==true)return;
        if(!isSetup&&pt.on_extras!==true)return;
        amt+=(x.amount_net!=null?n(x.amount_net):n(x.amount));
      });
      base+=amt;
      detail.push({name:t.name,amt:amt,expired:false});
    });
    const pct=n(pt.pct);
    const commission=base*pct/100;
    // ОӨО№ ОӯПҮОөО№ О®ОҙО· ПҖО»О·ПҒПүОёОөОҜ
    const paid=(ST.partnerPayments||[]).filter(x=>x.partner_id===pt.id&&x.period_from===r.from&&x.period_to===r.to)
      .reduce((s2,x)=>s2+n(x.amount_net),0);
    // О‘ОҪ ОөОҜОҪОұО№ ОјО№ПғОёОҝОҙОҝПғОҜОұ, П…ПҖОҝО»ОҝОіОҜО¶ОҝП…ОјОө ОөО№ПғПҶОҝПҒОӯПӮ
    let empC=0,emprC=0;
    if(pt.kind==='payroll'){
      const cls=(ST.bizContrib||[]).find(x=>x.name===pt.contrib_class);
      if(cls){empC=commission*n(cls.emp_pct)/100;emprC=commission*n(cls.empr_pct)/100;}
    }
    return {p:pt,shops:shops.length,base:base,pct:pct,commission:commission,
      paid:paid,due:commission-paid,detail:detail,empC:empC,emprC:emprC,cost:commission+emprC};
  }).sort((a,b)=>b.commission-a.commission);
  const total=rows.reduce((s2,x)=>s2+x.commission,0);
  const totalCost=rows.reduce((s2,x)=>s2+x.cost,0);
  return {rows:rows,total:total,totalCost:totalCost};
}

async function partnerSave(){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const name=g('pt-name').trim();
  if(!name){toast('вқҢ '+L('О’О¬О»Оө ПҢОҪОҝОјОұ','Enter a name'));return;}
  const row={name:name,phone:g('pt-phone')||null,email:g('pt-email')||null,
    kind:g('pt-kind')||'invoice',vat_no:g('pt-vatno')||null,
    contrib_class:g('pt-contrib')||null,amka:g('pt-amka')||null,hire_date:g('pt-hire')||null,
    pct:parseFloat(g('pt-pct'))||0,
    duration_months:g('pt-dur')?parseInt(g('pt-dur'),10):null,
    on_subscriptions:g('pt-sub')==='1',on_setup:g('pt-setup')==='1',on_extras:g('pt-extras')==='1',
    active:true};
  const id=g('pt-id');
  try{
    if(id){const {error}=await sb.from('partners').update(row).eq('id',id); if(error)throw error;}
    else{const {error}=await sb.from('partners').insert(row); if(error)throw error;}
    closeModal(); toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved')); bizLoadPartners();
  }catch(e){toast('вқҢ '+(e.message||e));}
}

// в”Җв”Җ ОңОұО¶О№ОәО® ОөО№ПғОұОіПүОіО® ПҖПҒОҝПҠПҢОҪП„ПүОҪ ОұПҖПҢ CSV в”Җв”Җ
function parseCsv(text){
  text=text.replace(/\r\n?/g,'\n').replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===',' ){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
async function importCsv(inp){
  const f=inp.files&&inp.files[0]; if(!f)return; inp.value='';
  const text=await f.text();
  const rows=parseCsv(text);
  if(rows.length<2){toast('вқҢ ОҡОөОҪПҢ О® О»О¬ОёОҝПӮ CSV');return;}
  const head=rows[0].map(h=>String(h).trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const iSku=idx('sku'), iKind=idx('kind'), iCat=idx('category'), iSub=idx('sub_category'),
        iInv=idx('invoice_name'), iPack=idx('packaging'), iSize=idx('size_ml'), iUnits=idx('units'),
        iMu=idx('measure_unit'), iAlc=idx('alcohol_pct'), iRet=idx('retail_price');
  if(iSku<0){toast('вқҢ ОӣОөОҜПҖОөО№ О· ПғП„О®О»О· sku ПғП„Оҝ CSV');return;}
  const tid=curTenant();
  if(!tid){toast('вқҢ О”ОөОҪ ОІПҒОӯОёО·ОәОө ОјОұОіОұО¶ОҜ');return;}
  const num=v=>{const n=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(n)?null:n;};
  const recs=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const sku=(c[iSku]||'').trim(); if(!sku)continue;
    let kind=(iKind>=0?(c[iKind]||'').trim().toLowerCase():'beverage');
    if(['beverage','food','supplies'].indexOf(kind)<0)kind='beverage';
    const size=iSize>=0?num(c[iSize]):null;
    const alc=iAlc>=0?num(c[iAlc]):null;
    const cat=iCat>=0?(c[iCat]||'').trim():''; const sub=iSub>=0?(c[iSub]||'').trim():'';
    const rec={tenant_id:tid,kind:kind,sku:sku,
      category:cat||null,sub_category:sub||null,
      invoice_name:iInv>=0?((c[iInv]||'').trim()||null):null,
      packaging:iPack>=0?((c[iPack]||'').trim()||null):null,
      size_ml:size, units:iUnits>=0?num(c[iUnits]):null,
      measure_unit:iMu>=0?((c[iMu]||'').trim()||null):null,
      alcohol_pct:alc, retail_price:iRet>=0?num(c[iRet]):null};
    if(kind==='beverage'&&alc){const efk=computeEFK(cat,sub,sku,size,alc);if(efk!=null)rec.efk=efk;}
    recs.push(rec);
  }
  if(!recs.length){toast('вқҢ ОҡОұОјОҜОұ ОӯОіОәП…ПҒО· ОіПҒОұОјОјО®');return;}
  if(!confirm('О•О№ПғОұОіПүОіО® '+recs.length+' ПҖПҒОҝПҠПҢОҪП„ПүОҪ ПғП„Оҝ ОјОұОіОұО¶ОҜ;'))return;
  let ok=0,fail=0;
  for(let i=0;i<recs.length;i+=100){
    const batch=recs.slice(i,i+100);
    try{const {data,error}=await sb.from('products').insert(batch).select();
      if(error)throw error; ok+=(data?data.length:batch.length);
    }catch(e){fail+=batch.length;console.error(e);}
  }
  _canon=null; await loadAll();
  toast('вң… ОңПҖО®ОәОұОҪ '+ok+' ПҖПҒОҝПҠПҢОҪП„Оұ'+(fail?(' В· '+fail+' ОұПҖОӯП„П…ПҮОұОҪ'):''));
}

async function acceptTerms(){
  const btn=document.getElementById('tc-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user)throw new Error(L('О”ОөОҪ ОІПҒОӯОёО·ОәОө ПҮПҒО®ПғП„О·ПӮ','No user found'));
    // 1О· ПҖПҒОҝПғПҖО¬ОёОөО№Оұ: RPC (ПҖОұПҒОұОәО¬ОјПҖП„ОөО№ RLS ОјОө ОұПғПҶО¬О»ОөО№Оұ)
    let saved=false;
    try{const {error:rpcErr}=await sb.rpc('accept_terms'); if(!rpcErr)saved=true;}catch(e){}
    // 2О· ПҖПҒОҝПғПҖО¬ОёОөО№Оұ: ОәОұОҪОҝОҪО№ОәПҢ update (ОұОҪ П…ПҖО¬ПҒПҮОөО№ ОҙО№ОәОұОҜПүОјОұ)
    if(!saved){
      const {error}=await sb.from('profiles').update({terms_accepted_at:new Date().toISOString()}).eq('id',user.id);
      if(error)throw error;
    }
    // О•ПҖОұО»О®ОёОөП…ПғО· ПҢП„О№ ПҢОҪП„ПүПӮ ПғПҺОёО·ОәОө
    const {data:chk}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).maybeSingle();
    if(!chk||!chk.terms_accepted_at)throw new Error(L('О— ОұПҖОҝОҙОҝПҮО® ОҙОөОҪ ОұПҖОҝОёО·ОәОөПҚП„О·ОәОө (RLS). ОӨПҒОӯОҫОө П„Оҝ SQL: accept_terms().','Acceptance was not saved (RLS). Run the SQL: accept_terms().'));
    ST.termsOk=true;
    toast('вң… '+L('О•П…ПҮОұПҒО№ПғП„ОҝПҚОјОө!','Thank you!'));
    ST.view='list';
    await enterShop();
  }catch(e){
    ST.termsOk=false;
    if(btn){btn.disabled=false;btn.innerHTML='вң… '+L('О‘ПҖОҝОҙОӯПҮОҝОјОұО№ & ОЈП…ОҪОӯПҮОөО№Оұ','Accept & Continue');}
    alert('вқҢ '+(e.message||e));
  }
}
// в”Җв”Җ ОҰОЎОҹОҘОЎОҹОЈ: ОұОҪ ОіП…ПҒОҜПғОөО№ ПҖОҜПғПү ОұПҖПҢ П„ОҝП…ПӮ ОҢПҒОҝП…ПӮ ПҮПүПҒОҜПӮ ОұПҖОҝОҙОҝПҮО®, ОҫОұОҪОұОҙОөОҜОҫОө П„О·ОҪ ОҝОёПҢОҪО· в”Җв”Җ
async function guardTerms(){
  if(ST.termsOk)return;                       // О®ОҙО· ОұПҖОҝОҙОөОәП„ОҝОҜ ПғОө ОұП…П„О® П„О· ПғП…ОҪОөОҙПҒОҜОұ
  const app=document.getElementById('appView');
  if(!app||app.style.display==='none')return; // ОҙОөОҪ ОөОҜОҪОұО№ ОјОӯПғОұ ПғП„О·ОҪ ОөПҶОұПҒОјОҝОіО®
  try{
    const {data:{user}}=await sb.auth.getUser(); if(!user)return;
    const {data:pr}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).single();
    if(pr&&pr.terms_accepted_at){ST.termsOk=true;return;}
    if(ST.view!=='terms')termsGate();          // ОҙОөОҪ ОұПҖОҝОҙОӯПҮП„О·ОәОө вҶ’ ОҫОұОҪОұОҙОөОҜОҫ' П„Оҝ
  }catch(e){}
}

  }

    if(nav.section)ST.section=nav.section;

let _ksActive=null;
function keepScroll(fn){
  const y=window.scrollY||window.pageYOffset||0;
  if(!y)return fn();
  // О‘ОәП…ПҒПҺОҪОҝП…ОјОө ПҖПҒОҝО·ОіОҝПҚОјОөОҪОҝ keepScroll ОұОҪ П„ПҒОӯПҮОөО№
  if(_ksActive){_ksActive();_ksActive=null;}
  const c=document.getElementById('content');
  const hBefore=c?c.offsetHeight:0;
  if(c&&hBefore)c.style.minHeight=hBefore+'px';
  const restore=()=>{
    const cur=window.scrollY||window.pageYOffset||0;
    if(Math.abs(cur-y)>2){ window.scrollTo(0,y); }
  };
  let obs=null;
  if(c&&window.MutationObserver){
    obs=new MutationObserver(restore);
    obs.observe(c,{childList:true,subtree:true});
  }
  const timers=[];
  const stop=()=>{
    if(obs){obs.disconnect();obs=null;}
    timers.forEach(clearTimeout);
    if(c)c.style.minHeight='';
    if(_ksActive===stop)_ksActive=null;
  };
  _ksActive=stop;
  let r;
  try{ r=fn(); }catch(e){ stop(); throw e; }
  restore();
  requestAnimationFrame(restore);
  [10,40,80,150,250,400,600,900,1300].forEach(ms=>timers.push(setTimeout(restore,ms)));
  timers.push(setTimeout(stop,1600));
  return r;
}

function supportFmt(t){
  let x=esc(String(t||''));
  // ОӨОҜП„О»ОҝО№ ### ## #
  x=x.replace(/^#{1,4}\s*(.+)$/gm,function(m,t2){return '<b style="display:block;margin:10px 0 3px">'+t2.replace(/\*\*/g,'')+'</b>';});
  // ОҲОҪП„ОҝОҪОұ ОәОұО№ ПҖО»О¬ОіО№Оұ
  x=x.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  x=x.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<i>$2</i>');
  // ОҡПҺОҙО№ОәОұПӮ ПғОө backticks
  x=x.replace(/`([^`]+)`/g,'<code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
  // ОҹПҒО№О¶ПҢОҪП„О№ОөПӮ ОіПҒОұОјОјОӯПӮ
  x=x.replace(/^\s*---+\s*$/gm,'<hr style="border:none;border-top:1px solid var(--line);margin:9px 0">');
  // ОӣОҜПғП„ОөПӮ ОјОө ПҖОұПҚО»Оұ О® ОұПғП„ОөПҒОҜПғОәОҝ
  x=x.replace(/^\s*[-вҖў]\s+(.+)$/gm,'<span style="display:block;padding-left:14px;text-indent:-9px">вҖў $1</span>');
  // О‘ПҒО№ОёОјО·ОјОӯОҪОөПӮ О»ОҜПғП„ОөПӮ
  x=x.replace(/^\s*(\d+)\.\s+(.+)$/gm,'<span style="display:block;padding-left:18px;text-indent:-14px"><b>$1.</b> $2</span>');
  return x;
}

async function supportSend(){
  if(ST.supportBusy)return;
  const el=document.getElementById('sup-in');
  const q=(el?el.value:'').trim();
  if(!q)return;
  if(supportCount()>=SUPPORT_LIMIT){toast('вҡ  '+L('ОҢПҒО№Оҝ ОөПҒПүП„О®ПғОөПүОҪ','Question limit'));return;}
  ST.supportMsgs=ST.supportMsgs||[];
  ST.supportMsgs.push({role:'user',content:q});
  if(el)el.value='';
  ST.supportBusy=true; drawSupport();
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(SUPABASE_URL+'/functions/v1/support-chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:''),'apikey':SUPABASE_KEY},
      body:JSON.stringify({messages:ST.supportMsgs,context:supportContext(),lang:(ST.lang==='en'?'en':'el')})
    });
    const d=await r.json();
    ST.supportBusy=false;
    if(d.error){
      ST.supportMsgs.push({role:'assistant',content:'вҡ  '+d.error});
      // О‘ОҪ Оҝ server О»ОӯОөО№ ПҢП„О№ ОөОҫОұОҪП„О»О®ОёО·ОәОө П„Оҝ ПҢПҒО№Оҝ, ПғП…ОіПҮПҒПҢОҪО№ПғОө П„ОҝОҪ П„ОҝПҖО№ОәПҢ ОјОөП„ПҒО·П„О®
      if(r.status===429){try{localStorage.setItem('ciq_help_'+todayISO(),String(SUPPORT_LIMIT));}catch(e){}}
    }
    else{
      ST.supportMsgs.push({role:'assistant',content:d.reply||'вҖ”'});
      supportBump();
    }
    drawSupport();
    setTimeout(function(){window.scrollTo(0,document.body.scrollHeight);},80);
  }catch(e){
    ST.supportBusy=false;
    ST.supportMsgs.push({role:'assistant',content:'вҡ  '+L('О”ОөОҪ ОӯОіО№ОҪОө ПғПҚОҪОҙОөПғО·. О”ОҝОәОҜОјОұПғОө ОҫОұОҪО¬.','Connection failed. Try again.')});
    drawSupport();
  }
}

function recipeVat(rec){
  if(rec&&rec.vat_pct!=null&&rec.vat_pct!=='')return +rec.vat_pct;
  // О ПҒОҝП„ОөО№ОҪПҢОјОөОҪОҝ: ПҶОұОіО·П„ПҢ вҶ’ ОјОөО№ПүОјОӯОҪОҝПӮ В· ПҖОҝП„О¬/ПҒОҝПҶО®ОјОұП„Оұ вҶ’ ОәОұОҪОҝОҪО№ОәПҢПӮ
  return (rec&&rec.kind==='food')?vatByRole('red',13):vatByRole('std',24);
}
function productVat(p){
  if(p&&p.vat_pct!=null&&p.vat_pct!=='')return +p.vat_pct;
  return (p&&p.kind==='food')?vatByRole('red',13):vatByRole('std',24);
}
function bevCalc(p,bestPrice){
  const size=parseFloat(p.size_ml)||0, measure=parseFloat(p.measure)||0, retail=parseFloat(p.retail_price)||0;
  let waste=parseFloat(p.waste_pct)||0; if(waste>1)waste=waste/100;
  const costMl=size>0?bestPrice/size:0;
  const unitCost=costMl*measure;
  const realCost=(waste>0&&waste<1)?unitCost/(1-waste):unitCost;
  const vpct=productVat(p);
  const exVat=retail/(1+vpct/100);
  const gross=exVat-realCost;
  const bevCost=exVat>0?realCost/exVat:0;
  return {costMl,unitCost,realCost,exVat,gross,bevCost};
}

function computeEFK(category,sub,sku,sizeMl,alcohol){
  const c=normStr(category)+' '+normStr(sub)+' '+normStr(sku);
  let rate=null;
  if(/VERMOUTH|О’О•ОЎОңОҹОҘОӨ|MARTINI|CINZANO|CUCIELO|DANTE|LILLET|PUNT.?E.?MES/.test(c))rate=-1.06;
  else if(/ОҹОҘО–Оҹ|OUZO|ОӨОЈОҷО ОҹОҘОЎОҹ|TSIPOURO|ОӨОЈОҷОҡОҹОҘО”ОҷО‘|RAKI|ОЎО‘Оҡ/.test(c))rate=12.75;
  else if(/WINE|ОҡОЎО‘ОЈОҷ|SPARKLING|PROSECCO|CHAMPAGNE|О‘ОҰОЎО©О”/.test(c))rate=0;
  else if(/GIN|VODKA|RUM|TEQUILA|WHISK|LIQUEUR|LIQUER|ОӣОҷОҡО•ОЎ|BRANDY|COGNAC|MEZCAL|SPIRIT|О‘О ОҹОЈОӨО‘О“ОңО‘|APERITIF|APERITIVO|APERITIVE|О‘О О•ОЎОҷОӨОҷОҰ|BITTER|AMARO|METAXA|ОңО•ОӨО‘ОһО‘/.test(c))rate=25.50;
  else if(/SOFT|SODA|JUICE|WATER|ОқО•ОЎОҹ|О§ОҘОңОҹ|NON.?ALC|О‘ОқО‘ОЁОҘОҡОӨ/.test(c))rate=0;
  if(/BEER|ОңО ОҘОЎО‘|ОңО ОҷОЎО‘|LAGER|IPA|PILSNER|\bALE\b|STOUT|WEISS|RADLER|STELLA|HEINEKEN|AMSTEL|CORONA|О‘ОҳО—ОқО‘ОҷОҡО—|VERGINA|О’О•ОЎО“ОҷОқО‘|FIX|ОҰОҷОһ|VOREIA|О’ОҹОЎО•ОҷО‘/.test(c)){
    const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
    const a=parseFloat(alcohol)||0; if(a<=0)return null;
    const alcPct=a>1?a:a*100;
    const plato=2.5*alcPct;                    // ОІОұОёОјОҝОҜ Plato вүҲ 2.5 Г— ОұО»ОәОҝПҢО»%
    return Math.round(((sml/1000)/100)*plato*5*100)/100;  // (ОӣОҜП„ПҒОұГ·100)Г—PlatoГ—5вӮ¬/hL
  }
  if(rate===null)return null;
  const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
  const sizeL=sml/1000; const a=parseFloat(alcohol)||0;
  if(rate<0)return Math.round(sizeL*(-rate)*100)/100;
  const alcFrac=a>1?a/100:a;
  return Math.round(sizeL*alcFrac*rate*100)/100;
}
function historyForProduct(pid){
  const p=ST.products.find(x=>x.id===pid);if(!p)return [];
  const keys=keyWords(p.invoice_name||p.sku);
  return (ST.history||[]).filter(r=>{
    if(r.product_id===pid)return true;               // О¬ОјОөПғО· ПғПҚОҪОҙОөПғО·
    if(r.product_id)return false;                    // ОұОҪО®ОәОөО№ ПғОө О¬О»О»Оҝ ПҖПҒОҝПҠПҢОҪ
    if(!keys.length)return false;
    const rtok=normStr(r.raw_product||'').split(' ');  // П„ОұОҜПҒО№ОұПғОјОұ ОјОө П„Оҝ ПҢОҪОҝОјОұ П„О№ОјОҝО»ОҝОіОҜОҝП…
    return keys.every(k=>rtok.some(w=>w===k||w.startsWith(k)));
  });
}

function ingredientsFor(rid){return (ST.recipeIng||[]).filter(x=>x.recipe_id===rid);}
function homemadeByName(name){return (ST.recipes||[]).find(x=>x.is_homemade && String(x.name)===String(name));}
function homemadeUnitCost(hr,depth){
  if(depth>3)return 0;
  const inner=recipeCalc(hr,depth+1);
  const y=parseFloat(hr.yield_qty)||0;
  return y>0?inner.realCost/y:0;   // ОәПҢПғП„ОҝПӮ ОұОҪО¬ ОјОҝОҪО¬ОҙОұ ПҖОұПҒОұОіПүОіО®ПӮ
}
function recipeCalc(rec,depth){
  depth=depth||0;
  const ings=ingredientsFor(rec.id);
  let total=0; const lines=[];
  ings.forEach(ing=>{
    const qty=parseFloat(ing.quantity)||0;
    let serve=0,costMl=0,size=0,matched=false,isHome=false;
    const hr=homemadeByName(ing.ingredient);
    if(hr){                                   // П…О»О№ОәПҢ = П…ПҖОҝПғП…ОҪП„ОұОіО® Homemade
      costMl=homemadeUnitCost(hr,depth); size=parseFloat(hr.yield_qty)||0;
      serve=qty*costMl; matched=true; isHome=true;
    }else{
      let pid=ing.product_id, prod=pid?ST.products.find(x=>x.id===pid):null;
      if(!prod){pid=matchProduct(ing.ingredient); prod=pid?ST.products.find(x=>x.id===pid):null;}
      const bestPrice=prod?(parseFloat((ST.best[prod.id]||{}).price)||0):0;
      size=(parseFloat(ing.size)||0)>0?parseFloat(ing.size):(prod?(parseFloat(prod.size_ml)||0):0);
      costMl=size>0?bestPrice/size:0;
      serve=qty*costMl; matched=!!prod;
    }
    total+=serve;
    lines.push({name:ing.ingredient,qty,unit:ing.unit||'',size,costMl,serve,matched,isHome});
  });
  let waste=parseFloat(rec.waste_pct)||0; if(waste>1)waste=waste/100;
  const realCost=total*(1+waste);
  const retail=parseFloat(rec.retail_price)||0;
  const vpct=recipeVat(rec);
  const retailNet=retail/(1+vpct/100);
  const netProfit=retailNet-realCost;
  const costPct=retailNet>0?realCost/retailNet:0;
  return {lines,total,waste,realCost,retail,retailNet,netProfit,costPct};
}

// О•П„О№ОәОӯП„Оұ ОәОұП„О·ОіОҝПҒОҜОұПӮ ОұОҪО¬О»ОҝОіОұ ОјОө П„О· ОіО»ПҺПғПғОұ: ОұОіОіО»О№ОәО¬ вҶ’ П„Оҝ ОәО»ОөО№ОҙОҜ, ОөО»О»О·ОҪО№ОәО¬ вҶ’ ОјОөП„О¬ПҶПҒОұПғО·
function catGr(kind,key){
  if(ST.lang==='en')return key;
  const list=CATTAX[kind]||[]; const f=list.find(c=>c[0]===key);
  return f?f[1]:key;
}
function subGr(kind,cat,key){
  if(ST.lang==='en')return key;
  const list=CATTAX[kind]||[]; const c=list.find(x=>x[0]===cat);
  if(!c)return key; const f=c[2].find(s=>s[0]===key); return f?f[1]:key;
}
// ОӣОҜПғП„Оұ ОәОұП„О·ОіОҝПҒО№ПҺОҪ ОіО№Оұ dropdown: ПҖПҒОҝОәОұОёОҝПҒО№ПғОјОӯОҪОөПӮ + ПҢПғОөПӮ П…ПҖО¬ПҒПҮОҝП…ОҪ О®ОҙО· ПғП„Оұ ПҖПҒОҝПҠПҢОҪП„Оұ
function catsForKind(kind){
  const preset=(CATTAX[kind]||[]).map(c=>c[0]);
  const used=[...new Set((ST.products||[]).filter(p=>p.kind===kind&&p.category).map(p=>p.category))];
  const extra=used.filter(c=>!preset.includes(c));
  return preset.concat(extra.sort());
}
function subsForCat(kind,cat){
  const list=CATTAX[kind]||[]; const c=list.find(x=>x[0]===cat);
  const preset=c?c[2].map(s=>s[0]):[];
  const used=[...new Set((ST.products||[]).filter(p=>p.kind===kind&&p.category===cat&&p.sub_category).map(p=>p.sub_category))];
  const extra=used.filter(s=>!preset.includes(s));
  return preset.concat(extra.sort());
}
const SELCSS='width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--card)';
function catSelectHtml(id,kind,current){
  const cats=catsForKind(kind);

  // О‘ОҪ О· П„ПҒОӯПҮОҝП…ПғОұ П„О№ОјО® ОҙОөОҪ ОөОҜОҪОұО№ ПғП„О· О»ОҜПғП„Оұ (ПҖ.ПҮ. ПҖОұО»О№О¬ ПҮОөО№ПҒОҝОәОҜОҪО·П„О·), ОІО¬О»' П„О·
  if(cur&&!cats.includes(cur))cats.push(cur);
  let o='<option value="">'+lbl('phPick','вҖ” ОөПҖОҜО»ОөОҫОө вҖ”')+'</option>';

function subSelectHtml(id,kind,cat,current){

  subs.forEach(s=>{o+='<option value="'+esc(s)+'"'+(s===cur?' selected':'')+'>'+esc(subGr(kind,cat,s))+'</option>';});
  o+='<option value="__new__">'+lbl('phAddNew','вһ• ОқОӯОұвҖҰ')+'</option>';
  return '<select id="'+id+'" style="'+SELCSS+'" onchange="onSubChange(this)"'+(cat?'':' disabled')+'>'+o+'</select>';
}
// ОҢП„ОұОҪ ОұО»О»О¬О¶ОөО№ О· ОәОұП„О·ОіОҝПҒОҜОұ: ОҫОұОҪОұПҮП„ОҜО¶ОөО№ П„О№ПӮ П…ПҖОҝОәОұП„О·ОіОҝПҒОҜОөПӮ
function onCatChange(sel){
  if(sel.value==='__new__'){
    const v=(prompt(L('ОқОӯОұ ОәОұП„О·ОіОҝПҒОҜОұ:','New category:'))||'').trim();
    if(v){addOptionBefore(sel,v,v);sel.value=v;}
    else{sel.value='';}
  }
  const kind=document.getElementById('pi-kind').value;
  const subWrap=document.getElementById('pi-sub');
  if(subWrap){
    const parent=subWrap.parentElement;
    parent.innerHTML='<label>'+lbl('wSubcat','ОҘПҖОҝОәОұП„О·ОіОҝПҒОҜОұ')+'</label>'+subSelectHtml('pi-sub',kind,sel.value,'');
  }
}
function onSubChange(sel){
  if(sel.value==='__new__'){
    const v=(prompt(L('ОқОӯОұ П…ПҖОҝОәОұП„О·ОіОҝПҒОҜОұ:','New sub-category:'))||'').trim();
    if(v){addOptionBefore(sel,v,v);sel.value=v;}
    else{sel.value='';}
  }
}

function addOptionBefore(sel,val,label){
  const newOpt=sel.querySelector('option[value="__new__"]');
  const op=document.createElement('option');
  op.value=val; op.textContent=label;
  sel.insertBefore(op,newOpt);
}

function matchIngredientProduct(name){
  const exact=(ST.products||[]).find(p=>String(p.sku)===String(name));
  const prod=exact||(function(){const pid=matchProduct(name);return pid?ST.products.find(x=>x.id===pid):null;})();
  return prod?{product_id:prod.id,size:(parseFloat(prod.size_ml)||null)}:{product_id:null,size:null};
}

    const ing=ST.recipeIng.find(x=>x.id===ingId);if(ing){ing.ingredient=name;ing.product_id=m.product_id;ing.size=m.size;}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ОЈОҘОңОҰО©ОқОҷО•ОЈ (Agreements) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function agreementAchieved(sku){
  const keys=keyWords(sku); if(!keys.length)return 0;
  let total=0;
  (ST.history||[]).forEach(r=>{
    const rt=normStr(r.raw_product||'').split(' ');
    if(keys.every(k=>rt.some(w=>w===k||w.startsWith(k)))) total+=parseFloat(r.quantity)||0;
  });
  return total;
}
function efkForSku(sku){
  const pid=matchProduct(sku); const p=pid?ST.products.find(x=>x.id===pid):null;
  return (p&&parseFloat(p.efk)>0)?parseFloat(p.efk):0;
}
// в”Җв”Җ ОҘПҖОҝО»ОҝОіО№ПғОјОҝОҜ block О‘ОҡОЎОҷО’О©ОЈ ПҢПҖПүПӮ waAgreementsBlocks в”Җв”Җ
function blockCalc(block){
  const prods=(ST.agreements||[]).filter(a=>a.block_id===block.id);
  let tgtEfk=0,tgtNo=0,actEfk=0,actNo=0,rebTgt=0,rebAct=0,mktVar=0,mktAct=0,sumT=0,sumA=0;
  const rows=prods.map(a=>{
    const agp=(parseFloat(a.agreement_price)||0)>0?parseFloat(a.agreement_price):(parseFloat(a.price_incl_excise)||0);
    let efk=efkForSku(a.sku); if(!efk)efk=parseFloat(a.excise_duty)||0;
    const priceNo=agp-efk;
    const target=parseFloat(a.target)||0;
    let rebate=parseFloat(a.rebate)||0; if(rebate>1)rebate=rebate/100;
    const mkt=parseFloat(a.marketing)||0;
    const achieved=agreementAchieved(a.sku);
    const ratio=target>0?Math.min(1,achieved/target):0;
    const rt=priceNo*target*rebate;
    tgtEfk+=agp*target; tgtNo+=priceNo*target; actEfk+=agp*achieved; actNo+=priceNo*achieved;
    rebTgt+=rt; rebAct+=rt*ratio; mktVar+=mkt; mktAct+=mkt*ratio; sumT+=target; sumA+=achieved;
    return {a,agp,efk,priceNo,target,rebate,mkt,achieved,ratio,rebActual:rt*ratio};
  });
  const fixed=parseFloat(block.fixed_marketing)||0;
  const mktTotal=mktVar+fixed, mktActual=mktAct+fixed;
  const proposed=tgtNo>0?(rebTgt+mktTotal)/tgtNo:0;
  return {rows,target:sumT,achieved:sumA,purchaseTarget:tgtNo,purchaseTargetEfk:tgtEfk,
    purchaseActual:actNo,purchaseActualEfk:actEfk,fixed,mktVariable:mktVar,mkt:mktTotal,
    mktCredited:mktActual,rebateTotal:rebTgt,rebateActual:rebAct,proposed};
}

async function backfillSupplier(sid,sname){
  if(!confirm('ОқОұ ОіОөОјОҜПғПү П„О№ПӮ П„О№ОјОӯПӮ П„ОҝП… "'+sname+'" ОұПҖПҢ П„Оҝ О№ПғП„ОҝПҒО№ОәПҢ ОұОіОҝПҒПҺОҪ;'))return;
  const tid=curTenant();
  const supN=normStr(sname);
  // 1) О’ПҒОөПӮ ОіПҒОұОјОјОӯПӮ О№ПғП„ОҝПҒО№ОәОҝПҚ ОұП…П„ОҝПҚ П„ОҝП… ПҖПҒОҝОјО·ОёОөП…П„О® (ПҢПҖОҝП… П…ПҖО¬ПҒПҮОөО№ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ)
  //    + ОіПҒОұОјОјОӯПӮ ПҮПүПҒОҜПӮ ПҖПҒОҝОјО·ОёОөП…П„О® ОҙОөОҪ ОұПҖОҝОҙОҜОҙОҝОҪП„ОұО№ ПғОө ОұП…П„ПҢОҪ (ОҙОөОҪ ОҫОӯПҒОҝП…ОјОө ПҖОҝО№ОұОҪОҝПҚ ОөОҜОҪОұО№)
  const latest={};  // productId -> {price, date}
  (ST.history||[]).forEach(r=>{
    const rSup=resolveSupName(r);
    if(!rSup||rSup==='вҖ”')return;                 // ПҮПүПҒОҜПӮ ПҖПҒОҝОјО·ОёОөП…П„О® вҶ’ ОұОіОҪПҢО·ПғОӯ П„Оҝ
    if(normStr(rSup)!==supN && !normStr(rSup).includes(supN) && !supN.includes(normStr(rSup)))return;
    const pid=resolveProductId(r);if(!pid)return;
    const price=parseFloat(r.price)||0;if(price<=0)return;
    const d=r.date||'';
    if(!latest[pid]||d>=latest[pid].date)latest[pid]={price:price,date:d};
  });
  const pids=Object.keys(latest);
  if(!pids.length){toast('в„№пёҸ ОҡОұОјОҜОұ П„О№ОјО® ПғП„Оҝ О№ПғП„ОҝПҒО№ОәПҢ ОіО№Оұ '+sname);return;}
  let n=0;
  for(const pid of pids){

function stockTotalValue(){
  const isBev=ST.okind==='beverage';let t=0;
  ST.products.filter(p=>p.kind===ST.okind).forEach(p=>{
    const b=ST.best[p.id]||{};const ol=ST.orders[p.id]||{};
    const gg=k=>{const el=document.getElementById('o-'+p.id+'-'+k);return el?(parseFloat(el.value)||0):(parseFloat(ol[k])||0);};
    const stk=isBev?(gg('cellar_count')+gg('bar_count')+gg('floor_count')):(gg('cellar_count')+gg('kitchen_count'));
    t+=stk*(parseFloat(b.price)||0);
  });
  return t;
}
function updateStockTotal(){const el=document.getElementById('stockTotal');if(el)el.textContent=money(stockTotalValue());}

function kindLabel(k){return k==='beverage'?('рҹҚә '+lbl('kindBeverage','О ОҝП„О¬ & ОЎОҝПҶО®ОјОұП„Оұ')):(k==='food'?('рҹҚҪпёҸ '+lbl('kindFood','ОӨПҒПҢПҶО№ОјОұ')):('рҹ“Ұ '+lbl('kindSupplies','О‘ОҪОұО»ПҺПғО№ОјОұ')));}
// ОңОұО¶ОөПҚОөО№ П„О№ПӮ П„ПҒОӯПҮОҝП…ПғОөПӮ ОіПҒОұОјОјОӯПӮ ОұПҖОҝОёОӯОјОұП„ОҝПӮ П„ОҝП… ОөОҪОөПҒОіОҝПҚ П„ОјО®ОјОұП„ОҝПӮ (ОұПҖПҢ П„Оұ ПҖОөОҙОҜОұ О® П„О· ОІО¬ПғО·)
function currentStockLines(){
  const isBev=ST.okind==='beverage';const lines=[];let total=0;
  ST.products.filter(p=>p.kind===ST.okind).forEach(p=>{
    const b=ST.best[p.id]||{};const ol=ST.orders[p.id]||{};
    const gg=k=>{const el=document.getElementById('o-'+p.id+'-'+k);return el?(parseFloat(el.value)||0):(parseFloat(ol[k])||0);};
    const stk=isBev?(gg('cellar_count')+gg('bar_count')+gg('floor_count')):(gg('cellar_count')+gg('kitchen_count'));
    if(stk<=0)return;                       // ОјПҢОҪОҝ ПҖПҒОҝПҠПҢОҪП„Оұ ОјОө ПҖОҝПғПҢП„О·П„Оұ
    const price=parseFloat(b.price)||0;const val=stk*price;total+=val;
    lines.push({product_id:p.id,sku:p.sku,category:p.category||'',qty:stk,unit_price:price,line_value:Math.round(val*100)/100});
  });
  return {lines,total:Math.round(total*100)/100};
}
async function saveStockTake(){
  if(ST.plan==='basic'){toast('рҹ”’ '+L('ОӨОҝ ОұПҒПҮОөОҜОҝ ОұПҖОҝОіПҒОұПҶПҺОҪ ОөОҜОҪОұО№ ПғП„Оҝ ПҖОұОәОӯП„Оҝ ADVANCED','Stock-take archive is an ADVANCED feature'));return;}
  const {lines,total}=currentStockLines();
  if(!lines.length){toast('вқҢ '+L('О”ОөОҪ П…ПҖО¬ПҒПҮОөО№ ОұПҖПҢОёОөОјОұ ПғОө ОұП…П„ПҢ П„Оҝ П„ОјО®ОјОұ (ОІО¬О»Оө ПҖОҝПғПҢП„О·П„ОөПӮ ПҖПҒПҺП„Оұ)','No stock in this section (enter quantities first)'));return;}
  const today=new Date().toISOString().slice(0,10);
  const d=prompt(L('О—ОјОөПҒОҝОјО·ОҪОҜОұ ОұПҖОҝОіПҒОұПҶО®ПӮ (YYYY-MM-DD):','Stock-take date (YYYY-MM-DD):'),today);
  if(d===null)return;
  const take_date=(String(d).trim()||today);
  if(!/^\d{4}-\d{2}-\d{2}$/.test(take_date)){toast('вқҢ '+L('ОӣО¬ОёОҝПӮ О·ОјОөПҒОҝОјО·ОҪОҜОұ (ПҖПҮ 2026-01-31)','Bad date (e.g. 2026-01-31)'));return;}
  if(!confirm(kindLabel(ST.okind)+' В· '+money(total)+' В· '+dGRs(take_date)+'\n\n'+L('ОқОұ ОәО»ОөО№ОҙПүОёОөОҜ ОұП…П„О® О· ОұПҖОҝОіПҒОұПҶО®;','Save this stock-take?')))return;
  const tid=curTenant();
  try{
    const {data:head,error:hErr}=await sb.from('stock_takes').insert({tenant_id:tid,kind:ST.okind,take_date:take_date,total_value:total,item_count:lines.length,created_by:ST.userEmail||null}).select().single();
    if(hErr)throw hErr;
    const rows=lines.map(l=>({take_id:head.id,tenant_id:tid,product_id:l.product_id,sku:l.sku,category:l.category,qty:l.qty,unit_price:l.unit_price,line_value:l.line_value}));
    const {error:lErr}=await sb.from('stock_take_lines').insert(rows);
    if(lErr)throw lErr;
    toast('вң… '+L('О‘ПҖОҝОіПҒОұПҶО® ОұПҖОҝОёО·ОәОөПҚП„О·ОәОө','Stock-take saved')+' В· '+money(total));
  }catch(e){toast('вқҢ '+(e.message||e)+' вҖ” '+L('ОӯП„ПҒОөОҫОөПӮ П„Оҝ SQL ОұПҖОҝОіПҒОұПҶПҺОҪ;','did you run the stock-takes SQL?'));}
}

function calcOrd(pid){
  const isBev=ST.okind==='beverage';
  const g=k=>parseFloat((document.getElementById('o-'+pid+'-'+k)||{}).value)||0;
  const stk=isBev?(g('cellar_count')+g('bar_count')+g('floor_count')):(g('cellar_count')+g('kitchen_count'));
  const par=g('par');
  const b=ST.best[pid]||{};
  const stkEl=document.getElementById('ostk-'+pid);if(stkEl)stkEl.textContent=L('О‘ПҖПҢОёОөОјОұ','Stock')+': '+stk+' В· '+L('О‘ОҫОҜОұ','Value')+': '+money(stk*(parseFloat(b.price)||0));
  const ordEl=document.getElementById('o-'+pid+'-ord');if(ordEl&&document.activeElement!==ordEl)ordEl.value=Math.max(0,par-stk)||'';
  updateStockTotal();
}
async function saveOrder(pid){
  const p=ST.products.find(x=>x.id===pid);const isBev=ST.okind==='beverage';
  const g=k=>{const el=document.getElementById('o-'+pid+'-'+k);const v=el?parseFloat(el.value):0;return isNaN(v)?0:v;};
  const row={tenant_id:p.tenant_id,product_id:pid,
    cellar_count:g('cellar_count'),bar_count:isBev?g('bar_count'):0,floor_count:isBev?g('floor_count'):0,kitchen_count:isBev?0:g('kitchen_count'),
    par_level:g('par'),order_qty:g('ord'),updated_at:new Date().toISOString()};
  try{await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;toast('вң… О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө');}
  catch(e){toast('вқҢ '+(e.message||e));}
}

async function logOrder(supName){
  const s=ST.suppliers.find(x=>x.name===supName)||{};
  const today=new Date().toISOString().slice(0,10);
  const rows=[];const pids=[];
  ST.products.forEach(p=>{
    const ol=ST.orders[p.id];if(!ol)return;const oq=parseFloat(ol.order_qty)||0;if(oq<=0)return;
    const b=ST.best[p.id]||{};if((b.sup||'вҖ”')!==supName)return;
    const prev=stockOf(ol,p.kind==='beverage');
    rows.push({tenant_id:p.tenant_id,product_id:p.id,supplier_id:s.id||null,date:today,sku:p.sku,qty:oq,value:Math.round(oq*(parseFloat(b.price)||0)*100)/100,status:'Pending',prev_stock:prev});
    pids.push(p.id);
  });
  if(!rows.length)return;   // О®ОҙО· ОәОұП„ОұПҮПүПҒО·ОјОӯОҪО· / ОәОұОјОҜОұ ПҖОҝПғПҢП„О·П„Оұ
  try{const {data,error}=await sb.from('order_history').insert(rows).select();
    if(error)throw error;(data||[]).forEach(r=>ST.orderHistory.unshift(r));
    // ОәОұОёО¬ПҒО№ПғОө П„Оҝ Order ОұПҖПҢ П„О·ОҪ ОөПҖО№ПғОәПҢПҖО·ПғО· (ОјО·ОҙОөОҪОҜО¶ОөО№ order_qty)
    for(const pid of pids){
      const ol=ST.orders[pid]||{};const p=ST.products.find(x=>x.id===pid);
      const row={tenant_id:(p&&p.tenant_id),product_id:pid,cellar_count:parseFloat(ol.cellar_count)||0,bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};
      await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;
    }
    toast('вң… '+L('ОЈП„О¬О»ОёО·ОәОө вҖ” ОјПҖО®ОәОө ПғП„Оҝ О№ПғП„ОҝПҒО№ОәПҢ','Sent вҖ” logged')+' ('+rows.length+')');orderSummary();
  }catch(e){toast('вқҢ '+(e.message||e));}
}

      const got=parseFloat(r.qty_received)||0;
      const ord=parseFloat(r.qty)||0;
      const miss=Math.round((ord-got)*10)/10;
      const col=isPartial?'var(--bad)':'#e0a800';
      const lblTxt=isPartial?('вҡ пёҸ '+L('ОӣОөОҜПҖОҝП…ОҪ','Missing')+' '+miss):('рҹҹЎ '+L('О‘ОҪОұОјОҝОҪО®','Pending'));
      h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:14px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<span style="flex:1"><b>'+esc(r.sku)+'</b> <span style="color:var(--muted)">Г—'+fmtQty(ord)+'</span>'+
            (isPartial?('<div style="font-size:11px;color:var(--bad)">'+L('ПҖОұПҒО®ОіОіОөО№О»ОөПӮ','ordered')+' '+fmtQty(ord)+' В· '+L('О®ПҒОёОұОҪ','received')+' '+fmtQty(got)+'</div>'):'')+
          '</span>'+

            '<span style="font-size:11px;color:'+col+';font-weight:700;white-space:nowrap">'+lblTxt+'</span>'+
            (isPartial?('<button class="pick" style="margin:0;padding:4px 8px;font-size:11px;border-color:var(--ok);color:var(--ok)" onclick="ordAllArrived(\''+r.id+'\')">вң… '+L('ОүПҒОёОұОҪ ПҢО»Оұ','All arrived')+'</button>'):'')+

async function ordAllArrived(id){
  const r=(ST.orderHistory||[]).find(x=>x.id===id); if(!r)return;
  try{await sb.from('order_history').update({status:'Delivered',qty_received:r.qty}).eq('id',id);
    r.status='Delivered'; r.qty_received=r.qty;
    toast('вң… '+L('ОҹО»ОҝОәО»О·ПҒПҺОёО·ОәОө','Completed')); keepScroll(renderOrderHistory);
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function delOrderHistory(id){
  const r=(ST.orderHistory||[]).find(x=>x.id===id);
  try{await sb.from('order_history').delete().eq('id',id);
    ST.orderHistory=ST.orderHistory.filter(x=>x.id!==id);
    if(r&&r.product_id){const ol=ST.orders[r.product_id];if(ol&&(parseFloat(ol.order_qty)||0)>0){const row=Object.assign({},ol,{order_qty:0,updated_at:new Date().toISOString()});await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[r.product_id]=row;}}
    toast('рҹ—‘ О”О№ОұОіПҒО¬ПҶО·ОәОө');renderOrderHistory();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function checkDeliveries(){
  // Delivered ОұОҪ П„Оҝ sku ОөОјПҶОұОҪО№ПғП„ОөОҜ ПғП„Оҝ Price History ОјОө О·Ој. >= О·Ој. ПҖОұПҒОұОіОіОөО»ОҜОұПӮВ· ОұПҖПҢОёОөОјОұ += ПҖОұПҒОұО»ОұОІО®
  let n=0;const done=[];
  for(const r of (ST.orderHistory||[])){
    if(r.status==='Delivered')continue;
    const keys=keyWords(r.sku);if(!keys.length)continue;
    const found=(ST.history||[]).some(ph=>{
      if(!ph.date||ph.date<r.date)return false;
      const rt=normStr(ph.raw_product||'').split(' ');
      return keys.every(k=>rt.some(w=>w===k||w.startsWith(k)));
    });
    if(!found)continue;
    try{
      await sb.from('order_history').update({status:'Delivered'}).eq('id',r.id);
      r.status='Delivered';n++;
      // ОұПҖПҢОёОөОјОұ += ПҖОұПҒОұО»ОұОІО® (ПғП„Оҝ cellar_count)
      if(r.product_id){
        const p=ST.products.find(x=>x.id===r.product_id);
        const ol=ST.orders[r.product_id]||{};
        const newCellar=(parseFloat(ol.cellar_count)||0)+(parseFloat(r.qty)||0);
        const row={tenant_id:(p&&p.tenant_id)||r.tenant_id,product_id:r.product_id,
          cellar_count:newCellar,bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,kitchen_count:parseFloat(ol.kitchen_count)||0,
          par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};
        await sb.from('order_lines').upsert(row,{onConflict:'product_id'});
        ST.orders[r.product_id]=row;
      }
    }catch(e){toast('вқҢ '+(e.message||e));return;}
  }
  if(!n){toast('ОҡОұОјОҜОұ ОҪОӯОұ ПҖОұПҒОұО»ОұОІО®');return;}
  toast('вң… '+n+' Delivered В· ОөОҪО·ОјОөПҒПҺОёО·ОәОө ОұПҖПҢОёОөОјОұ');keepScroll(renderOrderHistory);
}

function dashHtml(){
  const inv=ST.invoices||[],hist=ST.history||[];
  const totalSpend=inv.reduce((s,v)=>s+(parseFloat(v.total_gross)||0),0);
  const changes=hist.map(r=>parseFloat(r.change_pct)).filter(x=>!isNaN(x));
  const avgCh=changes.length?changes.reduce((a,b)=>a+b,0)/changes.length:0;
  const incr=hist.filter(r=>parseFloat(r.change_pct)>0.10).length;
  const bySup={};inv.forEach(v=>{const k=v.supplier_name||supName(v.supplier_id)||'вҖ”';bySup[k]=(bySup[k]||0)+(parseFloat(v.total_gross)||0);});
  const topSup=Object.entries(bySup).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const tile=(ic,lbl,val,col)=>'<div style="flex:1;min-width:80px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:'+(col||'var(--ink)')+'">'+val+'</div><div style="font-size:10px;color:var(--muted)">'+ic+' '+lbl+'</div></div>';
  let h='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">'+
    tile('рҹ’°',lbl('sTotalSpend','ОЈПҚОҪОҝО»Оҝ ОұОіОҝПҒПҺОҪ'),'вӮ¬'+Math.round(totalSpend),'var(--accent)')+
    tile('рҹ§ҫ',lbl('iInvoices','ОӨО№ОјОҝО»ПҢОіО№Оұ'),inv.length)+
    tile('рҹ“Ҳ','ОңОӯПғО· ОјОөП„ОұОІ.',(avgCh>=0?'+':'')+(avgCh*100).toFixed(1)+'%',avgCh>0?'var(--bad)':'var(--ok)')+
    tile('рҹ”ә','О‘П…Оҫ. >10%',incr,incr>0?'var(--bad)':'var(--muted)')+
  '</div>';
  if(topSup.length){
    h+='<div class="card" style="margin-top:10px"><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">рҹҸҶ TOP О ОЎОҹОңО—ОҳО•ОҘОӨО•ОЈ (П„О¶ОҜПҒОҝПӮ)</h3>';
    const max=topSup[0][1]||1;
    topSup.forEach(([n,v])=>{h+='<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(n)+'</span><span style="font-weight:700">вӮ¬'+Math.round(v)+'</span></div><div style="height:5px;background:var(--line);border-radius:3px;margin-top:3px"><div style="height:5px;width:'+Math.round(v/max*100)+'%;background:var(--accent);border-radius:3px"></div></div></div>';});
    h+='</div>';
  }
  // Top ПҖПҒОҝПҠПҢОҪП„Оұ (ОҙОұПҖО¬ОҪО· = П„О№ОјО® Г— ПҖОҝПғПҢП„О·П„Оұ)
  const byProd={};hist.forEach(r=>{const p=ST.products.find(x=>x.id===r.product_id);const nm=p?p.sku:(r.raw_product||'вҖ”');const sp=(parseFloat(r.price)||0)*(parseFloat(r.quantity)||0);if(sp>0)byProd[nm]=(byProd[nm]||0)+sp;});
  const topProd=Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(topProd.length){
    const pmax=topProd[0][1]||1;
    h+='<div class="card" style="margin-top:10px"><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">рҹ“Ұ TOP О ОЎОҹОӘОҹОқОӨО‘ (ОҙОұПҖО¬ОҪО·)</h3>';
    topProd.forEach(([n,v])=>{h+='<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(n)+'</span><span style="font-weight:700">вӮ¬'+Math.round(v)+'</span></div><div style="height:5px;background:var(--line);border-radius:3px;margin-top:3px"><div style="height:5px;width:'+Math.round(v/pmax*100)+'%;background:var(--ok);border-radius:3px"></div></div></div>';});
    h+='</div>';
  }
  return h;
}

function parseGRDate(s){
  s=String(s||'').trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);   // 15/07/2026
  if(m)return m[3]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;           // О®ОҙО· ISO
  return null;
}

// ОҡОұП„О·ОіОҝПҒОҜОұ & ПҮПҒПҺОјОұ ОұПҖПҢ ПғОәОҝПҒ
function scoreClass(score,cmHigh,sellHigh){
  // 4 П„ОөП„ПҒО¬ОіПүОҪОұ: ОәОӯПҒОҙОҝПӮ(CM) Г— ОҙО·ОјОҝП„О№ОәПҢП„О·П„Оұ(ПҖПүО»О®ПғОөО№ПӮ)

  if(sellHigh&&!cmHigh)return {k:'fix',emo:'рҹҹЎ',col:'#e0a800',el:'ОҳОӯО»ОөО№ О”О№ПҢПҒОёПүПғО·',en:'Needs Fixing',tipEl:'О‘ОҪОӯОІОұПғОө ОӨО№ОјО® О® ОЎОҜОҫОө ОҡПҢПғП„ОҝПӮ',tipEn:'Raise Price or Cut Cost'};
  if(!sellHigh&&cmHigh)return {k:'hidden',emo:'рҹ”ө',col:'var(--accent)',el:'ОҡПҒП…ОјОјОӯОҪОҝПӮ ОҳО·ПғОұП…ПҒПҢПӮ',en:'Hidden Gem',tipEl:'О”О№ОұПҶО®ОјО№ПғОӯ П„Оҝ В· ОҡОұО»ПҚП„ОөПҒО· ОҳОӯПғО· ПғП„Оҝ ОңОөОҪОҝПҚ',tipEn:'Promote it В· Better Menu Spot'};
  return {k:'cut',emo:'рҹ”ҙ',col:'var(--bad)',el:'ОҘПҖОҝПҲО®ПҶО№Оҝ ОіО№Оұ ОҡПҢПҲО№ОјОҝ',en:'Consider Cutting',tipEl:'ОЈОәОӯПҲОҝП… ОҪОұ П„Оҝ О’ОіО¬О»ОөО№ПӮ ОұПҖПҢ П„Оҝ ОңОөОҪОҝПҚ',tipEn:'Consider Removing from Menu'};
}
// ОҘПҖОҝО»ОҝОіОҜО¶ОөО№ П„О·ОҪ ОұОҪО¬О»П…ПғО· ОұПҖПҢ П„Оұ recipes П„О·ПӮ ОәОұП„О·ОіОҝПҒОҜОұПӮ + П„О№ПӮ ПҖПүО»О®ПғОөО№ПӮ (ST.meSold) + on/off (ST.meOff)
function menuEngCalc(){
  const kind=ST.meKind||'cocktail';
  const sub=ST.meSub||'';
  const recs=(ST.recipes||[]).filter(r=>r.kind===kind && !r.is_homemade && r.is_active!==false && (!sub || r.sub_category===sub));
  const sold=ST.meSold||(ST.meSold={});
  const off=ST.meOff||(ST.meOff={});
  const rows=[];
  let totalSold=0,totalRev=0,totalCM=0,totalCost=0,activeCount=0,sumCM=0;
  recs.forEach(r=>{
    if(off[r.id])return;                                // ОөОҫОұО№ПҒОӯОёО·ОәОө (on/off)
    const cc=recipeCalc(r);
    const n=parseFloat(sold[r.id])||0;
    const price=parseFloat(r.retail_price)||0;
    const cm=cc.netProfit;                              // ПғП…ОҪОөО№ПғПҶОҝПҒО¬ ОұОҪО¬ П„ОөОјО¬ПҮО№Оҝ (ОәОұОёОұПҒПҢ - ОәПҢПғП„ОҝПӮ)
    rows.push({id:r.id,name:r.name,n,price,cost:cc.realCost,cm,netRev:cc.retailNet});
    totalSold+=n; totalRev+=cc.retailNet*n; totalCM+=cm*n; totalCost=(totalCost||0)+cc.realCost*n; sumCM+=cm; activeCount++;
  });
  const avgCM=activeCount?sumCM/activeCount:0;          // ОјОӯПғО· ПғП…ОҪОөО№ПғПҶОҝПҒО¬ (ПҢПҒО№Оҝ High/Low ОәОӯПҒОҙОҝП…ПӮ)
  // ОҢПҒО№Оҝ ОҙО·ОјОҝП„О№ОәПҢП„О·П„ОұПӮ: 70% Г— ОјОӯПғОҝ ОјОөПҒОҜОҙО№Оҝ (ОәО»ОұПғО№ОәПҢПӮ ОәОұОҪПҢОҪОұПӮ menu engineering)
  const fairShare=activeCount?(totalSold/activeCount):0;
  const popThreshold=fairShare*0.70;
  rows.forEach(r=>{
    r.mix=totalSold>0?(r.n/totalSold*100):0;
    const cmHigh=r.cm>=avgCM;
    const sellHigh=r.n>=popThreshold;
    r.cls=scoreClass(0,cmHigh,sellHigh);
    // ОЈОәОҝПҒ 0-100: 50 ОұПҖПҢ ОәОӯПҒОҙОҝПӮ (ПғПҮОөП„О№ОәПҢ ОјОө max CM) + 50 ОұПҖПҢ ПҖПүО»О®ПғОөО№ПӮ (ПғПҮОөП„О№ОәПҢ ОјОө max ПҖПүО»О®ПғОөО№ПӮ)
    const maxCM=Math.max.apply(null,rows.map(x=>x.cm).concat([0.0001]));
    const maxN=Math.max.apply(null,rows.map(x=>x.n).concat([0.0001]));
    r.score=Math.round((r.cm/maxCM)*50 + (r.n/maxN)*50);
  });
  rows.sort((a,b)=>b.score-a.score);
  return {rows,totalSold,totalRev,totalCM,totalCost,avgCM,activeCount};
}

// О”О№ОұОІО¬О¶ОөО№ CSV ОјОө ОұП…П„ПҢОјОұП„О· ОұОҪОҜПҮОҪОөП…ПғО· ОҙО№ОұПҮПүПҒО№ПғП„О№ОәОҝПҚ
function meParseCsv(text){
  text=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=text.split('\n').filter(l=>l.trim()!=='');
  if(!lines.length)return null;
  // О”О№ОұПҮПүПҒО№ПғП„О№ОәПҢ: ПҢ,П„О№ ОөОјПҶОұОҪОҜО¶ОөП„ОұО№ ПҖО№Оҝ ПғП…ПҮОҪО¬ ПғП„О·ОҪ ПҖПҒПҺП„О· ОіПҒОұОјОјО®
  const cands=[';','\t',','];
  let sep=',',best=0;
  cands.forEach(function(c){const n=(lines[0].split(c).length-1);if(n>best){best=n;sep=c;}});
  const split=function(line){
    const out=[]; let cur='',q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
      else if(ch===sep&&!q){ out.push(cur); cur=''; }
      else cur+=ch;
    }
    out.push(cur);
    return out.map(x=>x.trim().replace(/^"|"$/g,''));
  };
  const rows=lines.map(split);
  return {head:rows[0],rows:rows.slice(1)};
}
// ОҡОұОёОұПҒОҜО¶ОөО№ ПҢОҪОҝОјОұ ОіО№Оұ ПғПҚОіОәПҒО№ПғО·: ПҖОөО¶О¬, ПҮПүПҒОҜПӮ П„ПҢОҪОҝП…ПӮ, ПҮПүПҒОҜПӮ ПғО·ОјОөОҜОұ ПғП„ОҜОҫО·ПӮ
function meNorm(s){
  return String(s||'').toLowerCase()
    .replace(/[О¬Г ГЎ]/g,'Оұ').replace(/[ОӯГЁГ©]/g,'Оө').replace(/[О®ГЁГ©]/g,'О·')
    .replace(/[ОҜГ¬ГӯПҠОҗ]/g,'О№').replace(/[ПҢГІГі]/g,'Оҝ').replace(/[ПҚГ№ГәПӢО°]/g,'П…').replace(/[ПҺГІГі]/g,'Пү')
    .replace(/[^a-zОұ-Пү0-9]/g,'');
}
// О‘ПҖПҢПғП„ОұПғО· ОөПҖОөОҫОөПҒОіОұПғОҜОұПӮ: ПҖПҢПғОҝО№ ПҮОұПҒОұОәП„О®ПҒОөПӮ ОҙО№ОұПҶОӯПҒОҝП…ОҪ
function meDist(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  let prev=new Array(n+1),cur=new Array(n+1);
  for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    const t=prev; prev=cur; cur=t;
  }
  return prev[n];
}
function meNum(v){
  if(v==null)return 0;
  let s=String(v).replace(/[^\d,.\-]/g,'');
  // 1.234,56 вҶ’ 1234.56 В· 1,234.56 вҶ’ 1234.56
  if(s.indexOf(',')>-1&&s.indexOf('.')>-1){
    s=(s.lastIndexOf(',')>s.lastIndexOf('.'))?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');
  } else if(s.indexOf(',')>-1){
    s=(s.split(',')[1]||'').length<=2?s.replace(',','.'):s.replace(/,/g,'');
  }
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
