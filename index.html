<style>

  :root{--bg:#f4f5f7;--card:#fff;--ink:#1a1a2e;--muted:#6b7280;--line:#e5e7eb;
    --accent:#1a5276;--accent-bg:#e6f1fb;--ok:#1e8449;--warn:#b9770e;--bad:#922b21;--chip:#eef1f6}
  html{overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:30px;overflow-x:hidden}
  .wrap{max-width:720px;margin:0 auto;padding:0 14px}
  .header{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .header .back{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0;line-height:1;display:none}
  .header h1{font-size:16px;font-weight:600;flex:1}
  .header .who{font-size:11px;opacity:.85}
  .header .out{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:14px;cursor:pointer}
  @media(max-width:480px){
    .header{padding:10px 12px;gap:5px}
    .header h1{font-size:15px}
    .header .who{font-size:10px}
    .header .out{padding:5px 8px;font-size:11px;border-radius:12px}
  }
  .nav-mobile{display:none}
  @media(max-width:600px){.nav-desktop{display:none}.nav-mobile{display:block}}
  button{font-family:inherit}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn.ghost{background:var(--card);color:var(--accent);border:1.5px solid var(--accent)}
  .btn:disabled{opacity:.5}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:16px;outline:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
  .muted{color:var(--muted)}
  .tabs{display:flex;gap:8px;margin:14px 0 6px}
  .tab{flex:1;padding:10px;text-align:center;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:14px;font-weight:600}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;margin-bottom:8px}
  .cathead{font-weight:700;font-size:14px;padding:8px 4px 4px;margin-top:6px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px;cursor:pointer}
  .row .name{font-weight:600;font-size:14px}
  .row .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .price{font-weight:700;color:var(--ok);white-space:nowrap;text-align:right}
  .sup{font-size:11px;color:var(--muted)}
  .err{background:#3a1d1d;border:1px solid var(--bad);color:#ffb4b4;padding:10px 12px;border-radius:10px;font-size:13px;margin-top:10px}
  .spin{width:16px;height:16px;border:2px solid var(--muted);border-top-color:transparent;border-radius:50%;display:inline-block;animation:s .7s linear infinite;vertical-align:middle}
  @keyframes s{to{transform:rotate(360deg)}}
  .logo{font-size:34px;text-align:center;margin-bottom:6px}
  .small{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
  .suprow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
  .suprow:last-child{border-bottom:none}
  .suprow .sn{flex:1;font-size:14px}
  .suprow.best .sn{color:var(--ok);font-weight:700}
  .suprow input{width:88px;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .pick{background:var(--accent-bg);color:var(--accent);border:none;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
  .del{background:none;border:none;color:var(--bad);font-size:15px;cursor:pointer}
  .kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted)}.kv .v{font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s;max-width:90%;text-align:center}
  .toast.show{opacity:1}
</style>
</head>

const GRK2LAT={'Α':'A','Β':'V','Γ':'G','Δ':'D','Ε':'E','Ζ':'Z','Η':'I','Θ':'TH','Ι':'I','Κ':'K','Λ':'L','Μ':'M','Ν':'N','Ξ':'X','Ο':'O','Π':'P','Ρ':'R','Σ':'S','Τ':'T','Υ':'Y','Φ':'F','Χ':'X','Ψ':'PS','Ω':'O','Ϊ':'I','Ϋ':'Y'};
function greeklish(s){return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().split('').map(ch=>GRK2LAT[ch]!=null?GRK2LAT[ch]:ch).join('');}
function normStr(s){return greeklish(s).replace(/['’`.,\/()%\-]/g,'').replace(/[^\p{L}\p{N} ]/gu,' ').replace(/C/g,'K').replace(/\b(FIA|FIALI|FIALH|FIALES|FIALON|FIALA|TEM|TEMAX|TEMAXIO|TEMAXIA|TMX|PKS|PCS|PC)\b/g,' ').replace(/\b(19[5-9]\d|20[0-3]\d)\b/g,' ').replace(/\s+/g,' ').trim();}
function keyWords(s){return normStr(s).split(' ').filter(w=>(/^\d+$/.test(w)&&w.length>=2)||(w.length>=3&&!STOP.has(w)));}
function _toks(s){const set={};normStr(s).split(' ').forEach(w=>{if(w.length>=2)set[w]=true;});return set;}
let _canon=null;
function buildCanon(){
  const out=[];
  (ST.products||[]).forEach(p=>{
    out.push({id:p.id,norm:normStr(p.sku),set:_toks(p.sku)});
    if(p.invoice_name&&normStr(p.invoice_name)!==normStr(p.sku))
      out.push({id:p.id,norm:normStr(p.invoice_name),set:_toks(p.invoice_name)});
  });
  return out;
}
function matchProduct(raw){
  if(!_canon)_canon=buildCanon();
  const pn=normStr(raw), pset=_toks(raw);
  const ps=Object.keys(pset).length; if(!ps)return null;
  for(let i=0;i<_canon.length;i++){ if(_canon[i].norm===pn) return _canon[i].id; }  // exact πρώτα
  const size=o=>Object.keys(o).length;
  const subset=(a,b)=>{for(const k in a){if(!b[k])return false;}return true;};
  const inter=(a,b)=>{let n=0;for(const k in a){if(b[k])n++;}return n;};
  let best=null,bestScore=-1,tie=false;
  for(let i=0;i<_canon.length;i++){
    const c=_canon[i],cs=size(c.set); if(!cs)continue;
    if(!(subset(c.set,pset)||subset(pset,c.set)))continue;   // ίδιος πυρήνας λέξεων
    const score=inter(c.set,pset)*1000-Math.abs(cs-ps);
    if(score>bestScore){bestScore=score;best=c.id;tie=false;}
    else if(score===bestScore&&best!==c.id){tie=true;}
  }
  return tie?null:best;
}
function matchSupplier(name){

    cands.forEach(cn=>{const c=normStr(cn);if(c&&(n.includes(c)||c.includes(n)))hit=s.id;});
  });
  return hit;
}

  // Ενοποίηση εμφάνισης: 0.7L/0.7LT→700ml, 0.2L→200ml, 1L→1000ml (μόνο για λίτρα<10)
  let s=String(u==null?'':u).trim();if(!s)return '';
  const m=s.match(/^(\d+(?:[.,]\d+)?)\s*(L|LT|LITRE|ΛΙΤ|Λ)\.?$/i);
  if(m){const v=parseFloat(m[1].replace(',','.'));if(!isNaN(v)&&v>0&&v<10){return Math.round(v*1000)+'ml';}}
  // κανονικοποίηση ML γραφής: "200ML"/"200 ml"→"200ml"
  const m2=s.match(/^(\d+)\s*(ML|ΜΛ)\.?$/i);if(m2){return m2[1]+'ml';}
  return s;
}
function sz(m){return m?(m>=1000?(m/1000)+'L':m+'ml'):'';}

// ── Μαζική εισαγωγή προϊόντων από CSV ──
function parseCsv(text){
  text=text.replace(/\r\n?/g,'\n').replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===',' ){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
async function importCsv(inp){
  const f=inp.files&&inp.files[0]; if(!f)return; inp.value='';
  const text=await f.text();
  const rows=parseCsv(text);
  if(rows.length<2){toast('❌ Κενό ή λάθος CSV');return;}
  const head=rows[0].map(h=>String(h).trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const iSku=idx('sku'), iKind=idx('kind'), iCat=idx('category'), iSub=idx('sub_category'),
        iInv=idx('invoice_name'), iPack=idx('packaging'), iSize=idx('size_ml'), iUnits=idx('units'),
        iMu=idx('measure_unit'), iAlc=idx('alcohol_pct'), iRet=idx('retail_price');
  if(iSku<0){toast('❌ Λείπει η στήλη sku στο CSV');return;}
  const tid=curTenant();
  if(!tid){toast('❌ Δεν βρέθηκε μαγαζί');return;}
  const num=v=>{const n=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(n)?null:n;};
  const recs=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const sku=(c[iSku]||'').trim(); if(!sku)continue;
    let kind=(iKind>=0?(c[iKind]||'').trim().toLowerCase():'beverage');
    if(['beverage','food','supplies'].indexOf(kind)<0)kind='beverage';
    const size=iSize>=0?num(c[iSize]):null;
    const alc=iAlc>=0?num(c[iAlc]):null;
    const cat=iCat>=0?(c[iCat]||'').trim():''; const sub=iSub>=0?(c[iSub]||'').trim():'';
    const rec={tenant_id:tid,kind:kind,sku:sku,
      category:cat||null,sub_category:sub||null,
      invoice_name:iInv>=0?((c[iInv]||'').trim()||null):null,
      packaging:iPack>=0?((c[iPack]||'').trim()||null):null,
      size_ml:size, units:iUnits>=0?num(c[iUnits]):null,
      measure_unit:iMu>=0?((c[iMu]||'').trim()||null):null,
      alcohol_pct:alc, retail_price:iRet>=0?num(c[iRet]):null};
    if(kind==='beverage'&&alc){const efk=computeEFK(cat,sub,sku,size,alc);if(efk!=null)rec.efk=efk;}
    recs.push(rec);
  }
  if(!recs.length){toast('❌ Καμία έγκυρη γραμμή');return;}
  if(!confirm('Εισαγωγή '+recs.length+' προϊόντων στο μαγαζί;'))return;
  let ok=0,fail=0;
  for(let i=0;i<recs.length;i+=100){
    const batch=recs.slice(i,i+100);
    try{const {data,error}=await sb.from('products').insert(batch).select();
      if(error)throw error; ok+=(data?data.length:batch.length);
    }catch(e){fail+=batch.length;console.error(e);}
  }
  _canon=null; await loadAll();
  toast('✅ Μπήκαν '+ok+' προϊόντα'+(fail?(' · '+fail+' απέτυχαν'):''));
}

async function saveLabels(){
  const cur=ST.lang;
  const map=Object.assign({},(ST.labels&&ST.labels[cur])||{});
  LABEL_KEYS.forEach(([k])=>{const v=(document.getElementById('lbl-'+k).value||'').trim();if(v)map[k]=v;else delete map[k];});
  ST.labels=ST.labels||{el:{},en:{}};ST.labels[cur]=map;
  const tid=curTenant();
  const btn=document.getElementById('lbl-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{await sb.from('settings').upsert({tenant_id:tid,key:'labels',value:JSON.stringify(ST.labels)},{onConflict:'tenant_id,key'});
    btn.disabled=false;toast('✅ Αποθηκεύτηκε');goHome();
  }catch(e){btn.disabled=false;btn.textContent='Αποθήκευση';toast('❌ '+(e.message||e));}
}
const BASIC_TABS=['products','suppliers','orders','recipes'];
function allowedTabs(){
  let items=['products','suppliers','orders','ocr','invoices','recipes','events','agree','history'];
  // 1) Πακέτο μαγαζιού
  if(ST.plan==='basic')items=items.filter(t=>BASIC_TABS.indexOf(t)>=0);
  // 2) Δικαιώματα ανά χρήστη (αν έχουν οριστεί on/off)
  if(ST.tabs&&ST.tabs.length)items=items.filter(t=>ST.tabs.indexOf(t)>=0);
  else if(ST.role==='staff')items=items.filter(t=>t==='ocr'||t==='orders');   // προεπιλογή staff
  return items;
}
function sectionNav(){
  const allow=allowedTabs();
  let items=[['products','📦',lbl('products','Προϊόντα')],['suppliers','🏢',lbl('suppliers','Προμηθευτές')],['orders','🛒',lbl('orders','Παραγγελίες')],['ocr','📷',lbl('ocr','Σκάναρε')],['invoices','📋',lbl('invoices','Τιμολόγια')],['recipes','🍸',lbl('recipes','Συνταγές')],['events','🎉',lbl('events','Εκδηλώσεις')],['agree','🤝',lbl('agree','Συμφωνίες')],['history','📊',lbl('history','Στατιστικά')]];
  items=items.filter(i=>allow.indexOf(i[0])>=0);
  // ── Desktop: οριζόντια tabs ──
  const tab=(sec,emo,txt)=>'<div class="tab '+(ST.section===sec?'active':'')+'" onclick="goSection(\''+sec+'\')" style="flex:1 1 auto;min-width:104px;white-space:nowrap;padding:10px 12px">'+emo+' '+txt+'</div>';
  let desk='<div class="nav-desktop" style="width:calc(100vw - 24px);position:relative;left:50%;margin-left:calc(-50vw + 12px);margin-top:12px"><div class="tabs" style="flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;gap:8px;margin:0;padding-bottom:4px">'+
    items.map(i=>tab(i[0],i[1],i[2])).join('')+
    '<div class="tab" onclick="loadAll()" style="flex:0 0 auto;min-width:44px" title="Ανανέωση">🔄</div></div></div>';
  // ── Mobile: κάθετο αναπτυσσόμενο μενού ──
  const cur=items.find(i=>i[0]===ST.section)||items[0];
  let mob='<div class="nav-mobile" style="margin-top:12px;position:relative;z-index:20">'+
    '<button onclick="toggleNav()" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer"><span>'+cur[1]+' '+cur[2]+'</span><span style="font-size:16px">'+(ST.navOpen?'▲':'☰')+'</span></button>';
  if(ST.navOpen){
    mob+='<div style="background:var(--card);border:1px solid var(--line);border-radius:12px;margin-top:6px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.12)">';
    items.forEach(it=>{const on=it[0]===ST.section;mob+='<div onclick="goSection(\''+it[0]+'\')" style="padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-weight:600;font-size:15px;'+(on?'background:var(--accent-bg);color:var(--accent)':'')+'">'+it[1]+' '+it[2]+'</div>';});

  }
  mob+='</div>';
  return desk+mob+setupBanner();
}

function bevCalc(p,bestPrice){
  const size=parseFloat(p.size_ml)||0, measure=parseFloat(p.measure)||0, retail=parseFloat(p.retail_price)||0;
  let waste=parseFloat(p.waste_pct)||0; if(waste>1)waste=waste/100;
  const costMl=size>0?bestPrice/size:0;
  const unitCost=costMl*measure;
  const realCost=(waste>0&&waste<1)?unitCost/(1-waste):unitCost;
  const exVat=retail*(1-0.24);
  const gross=exVat-realCost;
  const bevCost=exVat>0?realCost/exVat:0;
  return {costMl,unitCost,realCost,exVat,gross,bevCost};
}
function cmColor(bc){return bc<=0?'#888':(bc<0.25?'var(--ok)':(bc<=0.30?'var(--warn)':'var(--bad)'));}
// ── ΕΦΚ αυτόματος υπολογισμός (ίδιος με το app updateEFK) ──
function computeEFK(category,sub,sku,sizeMl,alcohol){
  const c=normStr(category)+' '+normStr(sub)+' '+normStr(sku);
  let rate=null;
  if(/VERMOUTH|ΒΕΡΜΟΥΤ|MARTINI|CINZANO|CUCIELO|DANTE|LILLET|PUNT.?E.?MES/.test(c))rate=-1.06;
  else if(/ΟΥΖΟ|OUZO|ΤΣΙΠΟΥΡΟ|TSIPOURO|ΤΣΙΚΟΥΔΙΑ|RAKI|ΡΑΚ/.test(c))rate=12.75;
  else if(/WINE|ΚΡΑΣΙ|SPARKLING|PROSECCO|CHAMPAGNE|ΑΦΡΩΔ/.test(c))rate=0;
  else if(/GIN|VODKA|RUM|TEQUILA|WHISK|LIQUEUR|LIQUER|ΛΙΚΕΡ|BRANDY|COGNAC|MEZCAL|SPIRIT|ΑΠΟΣΤΑΓΜΑ|APERITIF|APERITIVO|APERITIVE|ΑΠΕΡΙΤΙΦ|BITTER|AMARO|METAXA|ΜΕΤΑΞΑ/.test(c))rate=25.50;
  else if(/SOFT|SODA|JUICE|WATER|ΝΕΡΟ|ΧΥΜΟ|NON.?ALC|ΑΝΑΨΥΚΤ/.test(c))rate=0;
  if(/BEER|ΜΠΥΡΑ|ΜΠΙΡΑ|LAGER|IPA|PILSNER|\bALE\b|STOUT|WEISS|RADLER|STELLA|HEINEKEN|AMSTEL|CORONA|ΑΘΗΝΑΙΚΗ|VERGINA|ΒΕΡΓΙΝΑ|FIX|ΦΙΞ|VOREIA|ΒΟΡΕΙΑ/.test(c)){
    const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
    const a=parseFloat(alcohol)||0; if(a<=0)return null;
    const alcPct=a>1?a:a*100;
    const plato=2.5*alcPct;                    // βαθμοί Plato ≈ 2.5 × αλκοόλ%
    return Math.round(((sml/1000)/100)*plato*5*100)/100;  // (Λίτρα÷100)×Plato×5€/hL
  }
  if(rate===null)return null;
  const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
  const sizeL=sml/1000; const a=parseFloat(alcohol)||0;
  if(rate<0)return Math.round(sizeL*(-rate)*100)/100;
  const alcFrac=a>1?a/100:a;
  return Math.round(sizeL*alcFrac*rate*100)/100;
}
function historyForProduct(pid){
  const p=ST.products.find(x=>x.id===pid);if(!p)return [];
  const keys=keyWords(p.invoice_name||p.sku);
  return (ST.history||[]).filter(r=>{
    if(r.product_id===pid)return true;               // άμεση σύνδεση
    if(r.product_id)return false;                    // ανήκει σε άλλο προϊόν
    if(!keys.length)return false;
    const rtok=normStr(r.raw_product||'').split(' ');  // ταίριασμα με το όνομα τιμολογίου
    return keys.every(k=>rtok.some(w=>w===k||w.startsWith(k)));
  });
}

function ingredientsFor(rid){return (ST.recipeIng||[]).filter(x=>x.recipe_id===rid);}
function homemadeByName(name){return (ST.recipes||[]).find(x=>x.is_homemade && String(x.name)===String(name));}
function homemadeUnitCost(hr,depth){
  if(depth>3)return 0;
  const inner=recipeCalc(hr,depth+1);
  const y=parseFloat(hr.yield_qty)||0;
  return y>0?inner.realCost/y:0;   // κόστος ανά μονάδα παραγωγής
}
function recipeCalc(rec,depth){
  depth=depth||0;
  const ings=ingredientsFor(rec.id);
  let total=0; const lines=[];
  ings.forEach(ing=>{
    const qty=parseFloat(ing.quantity)||0;
    let serve=0,costMl=0,size=0,matched=false,isHome=false;
    const hr=homemadeByName(ing.ingredient);
    if(hr){                                   // υλικό = υποσυνταγή Homemade
      costMl=homemadeUnitCost(hr,depth); size=parseFloat(hr.yield_qty)||0;
      serve=qty*costMl; matched=true; isHome=true;
    }else{
      let pid=ing.product_id, prod=pid?ST.products.find(x=>x.id===pid):null;
      if(!prod){pid=matchProduct(ing.ingredient); prod=pid?ST.products.find(x=>x.id===pid):null;}
      const bestPrice=prod?(parseFloat((ST.best[prod.id]||{}).price)||0):0;
      size=(parseFloat(ing.size)||0)>0?parseFloat(ing.size):(prod?(parseFloat(prod.size_ml)||0):0);
      costMl=size>0?bestPrice/size:0;
      serve=qty*costMl; matched=!!prod;
    }
    total+=serve;
    lines.push({name:ing.ingredient,qty,unit:ing.unit||'',size,costMl,serve,matched,isHome});
  });
  let waste=parseFloat(rec.waste_pct)||0; if(waste>1)waste=waste/100;
  const realCost=total*(1+waste);
  const retail=parseFloat(rec.retail_price)||0;
  const retailNet=retail*(1-0.24);
  const netProfit=retailNet-realCost;
  const costPct=retailNet>0?realCost/retailNet:0;
  return {lines,total,waste,realCost,retail,retailNet,netProfit,costPct};
}

// ═══════════════ ΣΥΜΦΩΝΙΕΣ (Agreements) ═══════════════
function agreementAchieved(sku){
  const keys=keyWords(sku); if(!keys.length)return 0;
  let total=0;
  (ST.history||[]).forEach(r=>{
    const rt=normStr(r.raw_product||'').split(' ');
    if(keys.every(k=>rt.some(w=>w===k||w.startsWith(k)))) total+=parseFloat(r.quantity)||0;
  });
  return total;
}
function efkForSku(sku){
  const pid=matchProduct(sku); const p=pid?ST.products.find(x=>x.id===pid):null;
  return (p&&parseFloat(p.efk)>0)?parseFloat(p.efk):0;
}
// ── Υπολογισμοί block ΑΚΡΙΒΩΣ όπως waAgreementsBlocks ──
function blockCalc(block){
  const prods=(ST.agreements||[]).filter(a=>a.block_id===block.id);
  let tgtEfk=0,tgtNo=0,actEfk=0,actNo=0,rebTgt=0,rebAct=0,mktVar=0,mktAct=0,sumT=0,sumA=0;
  const rows=prods.map(a=>{
    const agp=(parseFloat(a.agreement_price)||0)>0?parseFloat(a.agreement_price):(parseFloat(a.price_incl_excise)||0);
    let efk=efkForSku(a.sku); if(!efk)efk=parseFloat(a.excise_duty)||0;
    const priceNo=agp-efk;
    const target=parseFloat(a.target)||0;
    let rebate=parseFloat(a.rebate)||0; if(rebate>1)rebate=rebate/100;
    const mkt=parseFloat(a.marketing)||0;
    const achieved=agreementAchieved(a.sku);
    const ratio=target>0?Math.min(1,achieved/target):0;
    const rt=priceNo*target*rebate;
    tgtEfk+=agp*target; tgtNo+=priceNo*target; actEfk+=agp*achieved; actNo+=priceNo*achieved;
    rebTgt+=rt; rebAct+=rt*ratio; mktVar+=mkt; mktAct+=mkt*ratio; sumT+=target; sumA+=achieved;
    return {a,agp,efk,priceNo,target,rebate,mkt,achieved,ratio,rebActual:rt*ratio};
  });
  const fixed=parseFloat(block.fixed_marketing)||0;
  const mktTotal=mktVar+fixed, mktActual=mktAct+fixed;
  const proposed=tgtNo>0?(rebTgt+mktTotal)/tgtNo:0;
  return {rows,target:sumT,achieved:sumA,purchaseTarget:tgtNo,purchaseTargetEfk:tgtEfk,
    purchaseActual:actNo,purchaseActualEfk:actEfk,fixed,mktVariable:mktVar,mkt:mktTotal,
    mktCredited:mktActual,rebateTotal:rebTgt,rebateActual:rebAct,proposed};
}

// Backfill: γεμίζει τιμές προμηθευτή από το ιστορικό (smart-match), όπως waBackfillSupplier_ του app
async function backfillSupplier(sid,sname){
  if(!confirm('Να γεμίσω τις τιμές του "'+sname+'" από το ιστορικό αγορών;'))return;
  const tid=curTenant();
  const supN=normStr(sname);
  // 1) Βρες γραμμές ιστορικού αυτού του προμηθευτή (όπου υπάρχει προμηθευτής)
  //    + γραμμές χωρίς προμηθευτή δεν αποδίδονται σε αυτόν (δεν ξέρουμε ποιανού είναι)
  const latest={};  // productId -> {price, date}
  (ST.history||[]).forEach(r=>{
    const rSup=resolveSupName(r);
    if(!rSup||rSup==='—')return;                 // χωρίς προμηθευτή → αγνόησέ το
    if(normStr(rSup)!==supN && !normStr(rSup).includes(supN) && !supN.includes(normStr(rSup)))return;
    const pid=resolveProductId(r);if(!pid)return;
    const price=parseFloat(r.price)||0;if(price<=0)return;
    const d=r.date||'';
    if(!latest[pid]||d>=latest[pid].date)latest[pid]={price:price,date:d};
  });
  const pids=Object.keys(latest);
  if(!pids.length){toast('ℹ️ Καμία τιμή στο ιστορικό για '+sname);return;}
  let n=0;
  for(const pid of pids){
    try{
      await sb.from('product_prices').upsert({tenant_id:tid,product_id:pid,supplier_id:sid,price:latest[pid].price,is_override:false},{onConflict:'product_id,supplier_id'});
      n++;
    }catch(e){console.error(e);}
  }
  await refreshPrices();
  toast('✅ Γέμισαν '+n+' τιμές για '+sname);
  renderSuppliers();
}

async function logOrder(supName){
  const s=ST.suppliers.find(x=>x.name===supName)||{};
  const today=new Date().toISOString().slice(0,10);
  const rows=[];const pids=[];
  ST.products.forEach(p=>{
    const ol=ST.orders[p.id];if(!ol)return;const oq=parseFloat(ol.order_qty)||0;if(oq<=0)return;
    const b=ST.best[p.id]||{};if((b.sup||'—')!==supName)return;
    const prev=stockOf(ol,p.kind==='beverage');
    rows.push({tenant_id:p.tenant_id,product_id:p.id,supplier_id:s.id||null,date:today,sku:p.sku,qty:oq,value:Math.round(oq*(parseFloat(b.price)||0)*100)/100,status:'Pending',prev_stock:prev});
    pids.push(p.id);
  });
  if(!rows.length)return;   // ήδη καταχωρημένη / καμία ποσότητα
  try{const {data,error}=await sb.from('order_history').insert(rows).select();
    if(error)throw error;(data||[]).forEach(r=>ST.orderHistory.unshift(r));
    // καθάρισε το Order από την επισκόπηση (μηδενίζει order_qty)
    for(const pid of pids){
      const ol=ST.orders[pid]||{};const p=ST.products.find(x=>x.id===pid);
      const row={tenant_id:(p&&p.tenant_id),product_id:pid,cellar_count:parseFloat(ol.cellar_count)||0,bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};
      await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;
    }
    toast('✅ '+L('Στάλθηκε — μπήκε στο ιστορικό','Sent — logged')+' ('+rows.length+')');orderSummary();
  }catch(e){toast('❌ '+(e.message||e));}
}

async function checkDeliveries(){
  // Delivered αν το sku εμφανιστεί στο Price History με ημ. >= ημ. παραγγελίας· απόθεμα += παραλαβή
  let n=0;const done=[];
  for(const r of (ST.orderHistory||[])){
    if(r.status==='Delivered')continue;
    const keys=keyWords(r.sku);if(!keys.length)continue;
    const found=(ST.history||[]).some(ph=>{
      if(!ph.date||ph.date<r.date)return false;
      const rt=normStr(ph.raw_product||'').split(' ');
      return keys.every(k=>rt.some(w=>w===k||w.startsWith(k)));
    });
    if(!found)continue;
    try{
      await sb.from('order_history').update({status:'Delivered'}).eq('id',r.id);
      r.status='Delivered';n++;
      // απόθεμα += παραλαβή (στο cellar_count)
      if(r.product_id){
        const p=ST.products.find(x=>x.id===r.product_id);
        const ol=ST.orders[r.product_id]||{};

        const row={tenant_id:(p&&p.tenant_id)||r.tenant_id,product_id:r.product_id,

function profitView(){ return '<div id="profitBox" class="card center" style="min-height:30vh"><span class="spin"></span></div>'; }
function pPeriodDates(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  let s,e;
  if(t==='month'){ s=new Date(d.getFullYear(),d.getMonth(),1); e=new Date(d.getFullYear(),d.getMonth()+1,0); }
  else if(t==='quarter'){ const q=Math.floor(d.getMonth()/3); s=new Date(d.getFullYear(),q*3,1); e=new Date(d.getFullYear(),q*3+3,0); }
  else if(t==='half'){ const hh=d.getMonth()<6?0:6; s=new Date(d.getFullYear(),hh,1); e=new Date(d.getFullYear(),hh+6,0); }
  else { s=new Date(d.getFullYear(),0,1); e=new Date(d.getFullYear(),11,31); }
  const f=x=>x.toISOString().slice(0,10);
  return {start:f(s),end:f(e)};
}
function pLabel(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  const M=ST.lang==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']:['Ιαν','Φεβ','Μαρ','Απρ','Μάι','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
  if(t==='month')return M[d.getMonth()]+' '+d.getFullYear();
  if(t==='quarter')return 'Q'+(Math.floor(d.getMonth()/3)+1)+' '+d.getFullYear();
  if(t==='half')return (d.getMonth()<6?'H1':'H2')+' '+d.getFullYear();
  return ''+d.getFullYear();
}
// Αγορές από τα τιμολόγια (αυτόματα, ανά τμήμα)
function autoPurchases(start,end){
  const out={food:0,bev:0,sup:0};
  (ST.history||[]).forEach(r=>{
    const d=(r.date||'').slice(0,10); if(d<start||d>end)return;
    const p=(ST.products||[]).find(x=>x.id===r.product_id);
    const kind=p?p.kind:'beverage';
    const val=(parseFloat(r.price)||0)*(parseFloat(r.quantity)||0);
    if(kind==='food')out.food+=val; else if(kind==='supplies')out.sup+=val; else out.bev+=val;
  });
  return out;
}

function pfNum(id){const el=document.getElementById(id);return el?(parseFloat(el.value)||0):0;}
function calcProfit(p){
  const inclVat=!!p.sales_incl_vat;
  const vf=(parseFloat(p.vat_food)||13)/100, vb=(parseFloat(p.vat_bev)||24)/100;
  const sfRaw=parseFloat(p.sales_food)||0, sbRaw=parseFloat(p.sales_bev)||0, cashRaw=parseFloat(p.sales_cash_unrec)||0;
  // Καθαρές πωλήσεις (χωρίς ΦΠΑ)
  const sf=inclVat?sfRaw/(1+vf):sfRaw;
  const sb=inclVat?sbRaw/(1+vb):sbRaw;
  const cash=inclVat?cashRaw/(1+vb):cashRaw;   // μετρητά: υποθέτουμε συντελεστή ποτών
  const salesDecl=sf+sb;              // δηλωμένες (καθαρές)
  const salesReal=salesDecl+cash;     // πραγματικές (καθαρές)
  // Αγορές
  const auto=autoPurchases(p.period_start,p.period_end);
  const pFood=(p.purch_food_manual!=null&&p.purch_food_manual!=='')?parseFloat(p.purch_food_manual):auto.food;
  const pBev=(p.purch_bev_manual!=null&&p.purch_bev_manual!=='')?parseFloat(p.purch_bev_manual):auto.bev;
  const pSup=(p.purch_sup_manual!=null&&p.purch_sup_manual!=='')?parseFloat(p.purch_sup_manual):auto.sup;
  const purchases=pFood+pBev+pSup;
  // Προσωπικό & λειτουργικά
  const labour=(parseFloat(p.wages)||0)+(parseFloat(p.social)||0);
  const opex=(parseFloat(p.rent)||0)+(parseFloat(p.utilities)||0)+(parseFloat(p.other_expenses)||0);
  const mk=(sales)=>{
    const gp=sales-purchases;
    const np=gp-labour-opex;
    const pc=purchases+labour;
    const taxPct=parseFloat(p.tax_pct)||0;
    const tax=(np>0)?(np*taxPct/100):0;      // φόρος μόνο σε κέρδος
    const after=np-tax;
    return {
      sales, purchases, gp, gpPct:sales?gp/sales*100:0,
      labour, labourPct:sales?labour/sales*100:0,
      opex, np, npPct:sales?np/sales*100:0,
      taxPct, tax, after, afterPct:sales?after/sales*100:0,
      prime:pc, primePct:sales?pc/sales*100:0,
      foodPct:sf?pFood/(inclVat?sf:sf)*100:0,
      bevPct:sb?pBev/(inclVat?sb:sb)*100:0
    };
  };
  return {decl:mk(salesDecl), real:mk(salesReal), sf, sb, cash, pFood, pBev, pSup, auto, hasCash:cash>0};
}

// Κόστος ενός item ανά ΑΤΟΜΟ (λαμβάνει υπόψη το «ανά πόσα άτομα»)
function evItemCost(it){
  const qty=parseFloat(it.qty_per_guest)||0;
  const per=parseFloat(it.per_guests)||1;      // π.χ. 1 σαλάτα ανά 4 άτομα → per=4
  const effective=per>0?(qty/per):0;           // πραγματική ποσότητα ανά άτομο
  if(it.recipe_id){
    const r=(ST.recipes||[]).find(x=>x.id===it.recipe_id);
    if(!r)return 0;
    const cc=recipeCalc(r);
    return (cc.realCost||0)*effective;
  }
  if(it.product_id){
    const p=(ST.products||[]).find(x=>x.id===it.product_id);
    if(!p)return 0;
    const b=ST.best[p.id]||{};
    return (parseFloat(b.price)||0)*effective;
  }
  return 0;
}
function evCalc(){
  const e=ST.event||{}; const items=ST.eventItems||[];
  const guests=parseFloat(e.guests)||0;
  let perGuest=0; items.forEach(it=>{perGuest+=evItemCost(it);});
  const foodCost=perGuest*guests;
  const extra=parseFloat(e.extra_costs)||0;
  const totalCost=foodCost+extra;
  const price=parseFloat(e.price_per_guest)||0;
  const revenue=price*guests;
  const profit=revenue-totalCost;
  const marginPct=revenue>0?(profit/revenue*100):0;
  const costPct=revenue>0?(totalCost/revenue*100):0;
  const costPerGuest=guests>0?(totalCost/guests):0;
  return {guests,perGuest,foodCost,extra,totalCost,price,revenue,profit,marginPct,costPct,costPerGuest};
}

// ── 🛒 ΛΙΣΤΑ ΑΓΟΡΩΝ (τι να παραγγείλω για την εκδήλωση) ──
function evShopList(){
  const e=ST.event, R=evCalc(), g=R.guests;
  if(!g){toast('❌ '+L('Βάλε αριθμό ατόμων','Enter number of guests'));return;}
  // Μάζεψε ΟΛΑ τα υλικά (αναλύοντας τις συνταγές σε προϊόντα)
  const need={};   // product_id -> {qty, unit}
  const addProd=(pid,qty,unit)=>{
    if(!pid)return;
    if(!need[pid])need[pid]={qty:0,unit:unit||''};
    need[pid].qty+=qty;
  };
  const expand=(recId,mult,depth)=>{
    if((depth||0)>4)return;
    const ings=(ST.recipeIng||[]).filter(x=>x.recipe_id===recId);
    ings.forEach(ing=>{
      const nm=(ing.ingredient||'').trim();
      const sub=(ST.recipes||[]).find(r=>r.is_homemade&&(r.name||'').trim().toLowerCase()===nm.toLowerCase());
      const q=(parseFloat(ing.quantity)||0)*mult;
      if(sub){ const y=parseFloat(sub.yield_qty)||1; expand(sub.id,q/y,(depth||0)+1); }
      else { const p=(ST.products||[]).find(x=>(x.sku||'').trim().toLowerCase()===nm.toLowerCase());
             if(p)addProd(p.id,q,ing.unit||''); }
    });
  };
  (ST.eventItems||[]).forEach(it=>{
    const qty=parseFloat(it.qty_per_guest)||0;
    const pg=parseFloat(it.per_guests)||1;
    const total=(qty/pg)*g;                    // συνολικές μερίδες/ποτά για όλη την εκδήλωση
    if(it.recipe_id)expand(it.recipe_id,total,0);
    else if(it.product_id)addProd(it.product_id,total,'');
  });
  let h='<div style="margin-top:10px"><div class="card" style="background:var(--accent-bg);border-color:var(--accent)"><b style="color:var(--accent)">🛒 '+L('Λίστα Αγορών','Shopping List')+'</b><div style="font-size:12px;color:var(--muted)">'+esc(e.name)+' · '+g+' '+L('άτομα','guests')+'</div></div>';
  const ids=Object.keys(need);
  if(!ids.length)h+='<div class="card muted" style="text-align:center">'+L('Πρόσθεσε πρώτα μενού','Add menu items first')+'</div>';
  let totalC=0;
  const bySup={};
  ids.forEach(pid=>{
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)return;
    const b=ST.best[pid]||{};
    const size=parseFloat(p.size_ml)||0;
    const n=need[pid];
    // πόσες φιάλες/τεμάχια χρειάζομαι
    let units=n.qty, unitTxt=n.unit||'';
    if(size>0&&(n.unit==='ml'||n.unit==='gr'||!n.unit)){ units=n.qty/size; unitTxt=L('φιάλες/τεμ','bottles/pcs'); }
    const buy=Math.ceil(units*10)/10;
    const cost=(parseFloat(b.price)||0)*units;
    totalC+=cost;
    const sup=b.sup||L('—','—');
    if(!bySup[sup])bySup[sup]=[];
    bySup[sup].push({name:p.sku,qty:buy,unit:unitTxt,raw:n.qty,rawUnit:n.unit,cost});
  });
  Object.keys(bySup).sort().forEach(sup=>{
    h+='<div class="card"><h3 style="font-size:13px;color:var(--accent);margin-bottom:8px">🏢 '+esc(sup)+'</h3>';
    bySup[sup].forEach(x=>{
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px">'+
        '<div style="flex:1"><b>'+esc(x.name)+'</b>'+(x.rawUnit?('<div style="font-size:11px;color:var(--muted)">'+(Math.round(x.raw*10)/10)+' '+esc(x.rawUnit)+'</div>'):'')+'</div>'+
        '<div style="text-align:right"><b>'+x.qty+'</b> <span style="font-size:11px;color:var(--muted)">'+esc(x.unit)+'</span><div style="font-size:11px;color:var(--muted)">'+money(Math.round(x.cost*100)/100)+'</div></div>'+
      '</div>';
    });
    h+='</div>';
  });
  if(ids.length)h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);display:flex;justify-content:space-between"><b>'+L('Συνολικό Κόστος Υλικών','Total Items Cost')+'</b><b style="color:var(--accent)">'+money(Math.round(totalC*100)/100)+'</b></div>';
  h+='<button class="btn ghost" style="margin-top:10px" onclick="drawEvent()">← '+L('Πίσω στην εκδήλωση','Back to event')+'</button></div>';
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

async function evDuplicate(){
  const e=ST.event;
  const name=prompt(L('Όνομα νέας εκδήλωσης:','New event name:'),(e.name||'')+' ('+L('αντίγραφο','copy')+')');
  if(!name||!name.trim())return;
  try{
    const {data:ne,error}=await sb.from('events').insert({tenant_id:curTenant(),name:name.trim(),event_date:e.event_date,guests:e.guests,price_per_guest:e.price_per_guest,extra_costs:e.extra_costs,extra_notes:e.extra_notes,status:'draft'}).select().single();
    if(error)throw error;
    const rows=(ST.eventItems||[]).map(it=>({tenant_id:curTenant(),event_id:ne.id,recipe_id:it.recipe_id||null,product_id:it.product_id||null,qty_per_guest:it.qty_per_guest,per_guests:it.per_guests||1,unit:it.unit||null}));

}

function evResultsHtml(R){
  const m2=v=>money(Math.round((v||0)*100)/100);
  // CM% = κόστος ÷ έσοδα (όπως στα cocktails). 20-25% πράσινο, 25.1-30% κίτρινο, 30%+ κόκκινο
  const cm=R.costPct;
  const col=(cm>0&&cm<=25)?'var(--ok)':((cm<=30)?'#e0a800':'var(--bad)');
  const bg=(cm>0&&cm<=25)?'#e7f6ec':((cm<=30)?'#FFF7E6':'#FFF0F0');
  return '<div class="card" style="text-align:center;background:'+bg+';border:1.5px solid '+col+'">'+

function pcSet(k,v){ST.pc=ST.pc||{};ST.pc[k]=v;if(k==='category')ST.pc.sub='';renderStats();}
function resolveProductId(r){ if(r.product_id)return r.product_id; return matchProduct(r.raw_product||'')||null; }
function resolveSupName(r){ if(r.supplier_id)return supName(r.supplier_id); const sid=matchSupplier(r.supplier_name||''); if(sid)return supName(sid); return r.supplier_name||'—'; }
function unitDivisor(unit){
  // Επιστρέφει σε πόσα τεμάχια σπάει η μονάδα. ΜΟΝΟ κιβώτιο διαιρείται.
  const u=normStr(unit); // NFD, κεφαλαία, χωρίς τόνους
  if(!u)return 1;
  // ΒΑΡΕΛΙ ή όγκος/βάρος → ΔΕΝ διαιρείται (μία μονάδα αγοράς)
  if(/\bΒΑΡ|BARREL|KEG\b/.test(u))return 1;
  // ΚΙΒΩΤΙΟ → βρες αριθμό φιαλών (ΚΙΒ24, ΠΛΑΣΤ ΚΙΒ ΜΕ 24Φ, ΚΙΒΩΤΙΟ 24, CASE 24)
  if(/ΚΙΒ|CASE|CRATE/.test(u)){
    const m=u.match(/(\d+)/);           // πρώτος αριθμός = φιάλες/κιβώτιο
    const n=m?parseInt(m[1],10):0;
    return (n>1)?n:1;
  }
  return 1;  // ml, L, gr, φιάλη, βαρέλι → ως έχει
}
function purchasedView(){
  ST.pc=ST.pc||{category:'',sub:'',supplier:'',period:'Month',from:'',to:''};
  const C=ST.pc;
  let from=null,to=new Date();
  if(C.period==='Custom'){ if(C.from){const p=C.from.split('-');from=new Date(+p[0],+p[1]-1,+p[2]);} if(C.to){const p=C.to.split('-');to=new Date(+p[0],+p[1]-1,+p[2],23,59,59);} }
  else { const days={Week:7,Month:30,Quarter:90,'6 Months':180,'9 Months':270,Year:365}; from=new Date(Date.now()-(days[C.period]||30)*86400000); }
  const inRange=ds=>{ if(!ds)return true; const p=String(ds).split('-'); if(p.length!==3)return true; const d=new Date(+p[0],+p[1]-1,+p[2]); if(from&&d<from)return false; if(to&&d>to)return false; return true; };
  const agg={};let totalSpend=0;const orderSet={};
  (ST.history||[]).forEach(r=>{
    if(!inRange(r.date))return;
    const pid=resolveProductId(r);const p=pid&&ST.products.find(x=>x.id===pid);
    const name=p?p.sku:(r.raw_product||'—');
    const cat=p?(p.category||''):'';const sub=p?(p.sub_category||''):'';
    if(C.category&&cat!==C.category)return;
    if(C.sub&&sub!==C.sub)return;
    const sup=resolveSupName(r);
    if(C.supplier&&sup!==C.supplier)return;
    const rawQty=parseFloat(r.quantity)||0,rawPrice=parseFloat(r.price)||0;
    const div=unitDivisor(r.unit);          // ΚΙΒ24 → 24, βαρέλι/άλλο → 1
    const qty=rawQty*div;                     // 1 κιβώτιο × 24 = 24 τεμάχια
    const price=div>1?(rawPrice/div):rawPrice; // τιμή κιβωτίου ÷ 24 = ανά φιάλη
    const spend=qty*price;                    // ίδιο σύνολο δαπάνης, σωστή μοναδιαία τιμή

    a.qty+=qty;a.spend+=spend;a.orders[ok]=true;
    if(!a.pid&&pid)a.pid=pid;
    if(!a.cat&&cat)a.cat=cat;if(!a.sub&&sub)a.sub=sub;
    // Best Supplier από ιστορικό ΜΟΝΟ αν υπάρχει πραγματικός προμηθευτής (όχι '—')
    if(price>0&&price<a.bestPrice&&sup&&sup!=='—'){a.bestPrice=price;a.bestSup=sup;}
    if((r.date||'')>=a.lastDate){a.lastDate=r.date||'';a.lastPrice=price;a.unit=dispUnit;}
  });
  // Fallback: όπου το ιστορικό δεν έχει προμηθευτή, πάρε τον φθηνότερο από product_prices (product_best_price)
  Object.keys(agg).forEach(k=>{const a=agg[k];

  const selCss='width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--card)';

function detectPacks(raw){
  const s=String(raw||''); const out=[]; const seen={}; let m;
  const reMul=/(\d{1,3})\s*[*x×X]\s*(\d{1,3})/g;
  while(m=reMul.exec(s)){const a=+m[1],b=+m[2],pc=a*b;if(pc>1&&pc<10000&&!seen['k'+pc]){seen['k'+pc]=1;out.push({label:a+'×'+b,perCase:pc});}}
  const reAdd=/(\d{1,3})\s*\+\s*(\d{1,3})/g;
  while(m=reAdd.exec(s)){const a=+m[1],b=+m[2],pc=a+b;if(pc>1&&pc<10000&&!seen['k'+pc]){seen['k'+pc]=1;out.push({label:a+'+'+b,perCase:pc});}}
  return out;
}
function ocrApplyPack(i,perCase,label){
  const ln=ST.ocr.lines[i]; perCase=parseFloat(perCase);
  const q=parseFloat(ln.qty)||0;
  if(!perCase||perCase<=0||q<=0){toast('❌ '+L('Δώσε έγκυρο τεμ/κιβώτιο','Enter valid pieces/case'));return;}
  const total=parseFloat(ln.lineTotal)|| ((parseFloat(ln.price)||0)*q);
  if(ln._preQty==null){ln._preQty=ln.qty;ln._prePrice=ln.price;ln._preTotal=ln.lineTotal;}
  const pieces=q*perCase;
  ln.qty=pieces;
  ln.price=Math.round((total/pieces)*100)/100;
  ln.lineTotal=Math.round(total*100)/100;
  ln.packApplied=true; ln.packPerCase=perCase; ln.packNote=(label||('×'+perCase))+' ('+q+'×'+perCase+')';
  renderOcr();
}
function ocrUndoPack(i){

}

function compressFile(f){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxD=2000;let w=img.width,h=img.height;
      if(Math.max(w,h)>maxD){const s=maxD/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      let dataUrl;
      try{const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);dataUrl=cv.toDataURL('image/jpeg',0.72);}
      catch(e){dataUrl=rd.result;}
      res({b64:String(dataUrl).split(',')[1],mediaType:'image/jpeg'});
    };
    img.onerror=()=>{const dataUrl=rd.result;res({b64:String(dataUrl).split(',')[1],mediaType:f.type||'image/jpeg'});};
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});}
async function onOcrFile(inp){
  const files=Array.from(inp.files||[]); if(!files.length)return; inp.value='';
  const st=document.getElementById('ocr-status'); if(st)st.innerHTML='<div class="card" style="text-align:center"><span class="spin"></span> '+L('Ετοιμάζω','Preparing')+' '+files.length+' '+L('φωτο','photos')+'…</div>';
  const q=[]; for(const f of files){ try{q.push(await compressFile(f));}catch(e){} }

  loadOcrFromQueue(0);
}

function onOcrFileOLD(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();

      // ── Συμπίεση: max 2000px + JPEG q0.72 (μειώνει 3–5× τον χώρο, μένει ευανάγνωστο) ──
      const maxD=2000;let w=img.width,h=img.height;
      if(Math.max(w,h)>maxD){const s=maxD/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      let dataUrl;
      try{const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);dataUrl=cv.toDataURL('image/jpeg',0.72);}
      catch(e){dataUrl=rd.result;}   // fallback: αν αποτύχει, κράτα την αρχική
      const b64=String(dataUrl).split(',')[1];
      window._ocrImg={b64,mediaType:'image/jpeg'};
      document.getElementById('ocr-preview').innerHTML='<img src="'+dataUrl+'" style="max-width:100%;border-radius:10px;border:1px solid var(--line)">'+
        '<button class="btn" style="margin-top:10px" onclick="doOcr()">🔍 '+lbl('oRead','Διάβασε τιμολόγιο')+'</button>';
    };
    img.onerror=()=>{ // αν δεν φορτώσει ως εικόνα, χρησιμοποίησε τα raw δεδομένα
      const dataUrl=rd.result;const b64=String(dataUrl).split(',')[1];
      window._ocrImg={b64,mediaType:f.type||'image/jpeg'};

        '<button class="btn" style="margin-top:10px" onclick="doOcr()">🔍 '+lbl('oRead','Διάβασε τιμολόγιο')+'</button>';
    };
    img.src=rd.result;
  };

    const data=await r.json();

async function ocrApprove(){
  if(window._ocrBusy)return;   // κλείδωμα: να μη περαστεί 2η/3η φορά
  const o=ST.ocr;const sid=document.getElementById('ocr-sup').value;const date=document.getElementById('ocr-date').value;
  if(!sid){toast('❌ '+L('Διάλεξε προμηθευτή','Choose a supplier'));return;}
  const good=o.lines.filter(l=>l.productId&&(parseFloat(l.price)||0)>0);
  if(!good.length){toast('❌ '+L('Καμία έτοιμη γραμμή','No ready line'));return;}
  const tid=curTenant();
  const supN=supName(sid);
  let gross=0;good.forEach(l=>{gross+=(parseFloat(l.price)||0)*(parseFloat(l.qty)||0);});
  const grossR=Math.round(gross*100)/100;
  const dup=(ST.invoices||[]).find(v=>v.supplier_id===sid&&v.date===date&&Math.abs((parseFloat(v.total_gross)||0)-grossR)<0.5);
  if(dup&&!confirm('Υπάρχει ήδη τιμολόγιο ίδιου προμηθευτή/ημερομηνίας/ποσού ('+supName(sid)+' · '+date+' · '+money(grossR)+').\n\nΣίγουρα να το ξαναπεράσεις;'))return;
  window._ocrBusy=true;   // από εδώ και κάτω κλειδωμένο
  const _ab=document.getElementById('ocr-approve-btn');if(_ab){_ab.disabled=true;_ab.style.opacity='.6';_ab.innerHTML='<span class="spin"></span> '+L('Καταχώρηση…','Saving…');}
  const anyBev=good.some(l=>{const p=ST.products.find(x=>x.id===l.productId);return p&&p.kind==='beverage';});
  let invId=null;
  // ανέβασμα φωτό τιμολογίου στο Storage (bucket 'invoices')
  let fileUrl=null;
  if(window._ocrImg&&window._ocrImg.b64){
    try{
      const bin=atob(window._ocrImg.b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      const ext=(window._ocrImg.mediaType||'').includes('png')?'png':'jpg';
      const path=tid+'/'+date+'-'+Date.now()+'.'+ext;
      const {error:upErr}=await sb.storage.from('invoices').upload(path,arr,{contentType:window._ocrImg.mediaType||'image/jpeg',upsert:true});
      if(!upErr){const {data:pub}=sb.storage.from('invoices').getPublicUrl(path);fileUrl=(pub&&pub.publicUrl)||null;}
      else console.error(upErr);
    }catch(e){console.error(e);}
  }
  try{
    const {data:invRow}=await sb.from('invoices').insert({tenant_id:tid,supplier_id:sid,supplier_name:supN,date:date,invoice_number:o.invoiceNo||null,category:anyBev?'Beverage':'Food',total_net:(o.netTotal!=null?o.netTotal:grossR),vat_pct:(o.vatTotal!=null?o.vatTotal:null),total_gross:(o.grandTotal!=null?o.grandTotal:grossR),new_balance:(o.newBalance!=null?o.newBalance:null),file_url:fileUrl,status:'approved'}).select().single();
    if(invRow)invId=invRow.id;
  }catch(e){console.error(e);}
  let ok=0;
  for(const ln of good){
    const price=Math.round((parseFloat(ln.price)||0)*100)/100;const qty=parseFloat(ln.qty)||null;
    const b=ST.best[ln.productId]||{};const prev=parseFloat(b.price)||null;
    let chE=null,chP=null;if(prev&&prev>0){const d=Math.round((price-prev)*100)/100;if(d!==0){chE=d;chP=Math.round((d/prev)*10000)/10000;}}
    try{
      await sb.from('product_prices').upsert({tenant_id:tid,product_id:ln.productId,supplier_id:sid,price:price},{onConflict:'product_id,supplier_id'});
      await sb.from('price_history').insert({tenant_id:tid,product_id:ln.productId,supplier_id:sid,supplier_name:supN,invoice_id:invId,date:date,raw_product:ln.raw,unit:ln.unit||null,quantity:qty,price:price,prev_price:prev,change_eur:chE,change_pct:chP,notes:(ln.vintage?('Χρονιά '+ln.vintage):'Τιμολόγιο')});
      ok++;
    }catch(e){console.error(e);}
  }
  await Promise.all([refreshPrices(),
    (async()=>{const _th=curTenant();let _hq=sb.from('price_history').select('*');if(_th)_hq=_hq.eq('tenant_id',_th);const {data:hist}=await _hq.order('date',{ascending:false}).limit(400);ST.history=hist||[];})(),
    (async()=>{const _ti=curTenant();let _iq=sb.from('invoices').select('*');if(_ti)_iq=_iq.eq('tenant_id',_ti);const {data:inv}=await _iq.order('date',{ascending:false}).limit(300);ST.invoices=inv||[];})()
  ]);
  toast('✅ Καταχωρήθηκαν '+ok+' γραμμές + τιμολόγιο');
  await markGmailDone();
  nextOcrOrReset();
}

function periodFrom(p){
  const d=new Date();
  if(p==='week')d.setDate(d.getDate()-7);
  else if(p==='month')d.setMonth(d.getMonth()-1);
  else if(p==='3m')d.setMonth(d.getMonth()-3);
  else if(p==='6m')d.setMonth(d.getMonth()-6);
  else if(p==='9m')d.setMonth(d.getMonth()-9);
  else if(p==='year')d.setFullYear(d.getFullYear()-1);
  else return '';
  return d.toISOString().slice(0,10);
}

function priceHistoryView(){
  ST.phF=ST.phF||{q:'',period:'all',onlyCh:false};

  const periods=[['week',lbl('pWeek','Εβδομάδα')],['month',lbl('pMonth','Μήνας')],['3m',lbl('p3m','3 Μήνες')],['6m',lbl('p6m','6 Μήνες')],['year',lbl('pYear','Έτος')],['all',lbl('pAll','Όλα')]];
  let h='<input class="search" id="phq" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="'+lbl('phSearch','🔍 Προϊόν ή προμηθευτής…')+'" oninput="phSet(\'q\',this.value)" value="'+esc(F.q)+'" style="margin-top:10px">'+

  if(!rows.length){h+='<div class="card muted" style="text-align:center">'+lbl('pdNoRec','Καμία εγγραφή σε αυτή την περίοδο')+'</div>';return h;}
  // Ομαδοποίηση ανά (ημερομηνία + προμηθευτής) = ένα τιμολόγιο/παραλαβή, όπως στο app
  const groups={};
  rows.forEach(r=>{
    const sup=resolveSupName(r)||'—';
    const key=(r.date||'—')+'||'+sup;
    (groups[key]||(groups[key]={date:r.date||'',sup:sup,items:[],total:0})).items.push(r);
  });
  const gk=Object.keys(groups).sort((a,b)=>{const da=groups[a].date,db=groups[b].date;return db.localeCompare(da);});
  h+='<div class="muted" style="font-size:12px;margin:2px 2px 6px">'+gk.length+' '+lbl('phDeliv','παραλαβές')+' · '+rows.length+' '+lbl('phLines','γραμμές')+'</div>';
  h+='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px)"><div style="max-width:1400px;margin:0 auto">';
  gk.slice(0,60).forEach(k=>{
    const g=groups[k];let gtot=0;
    // Αν ο προμηθευτής είναι '—', προσπάθησε να βρεις από Best Supplier των προϊόντων
    let gSup=g.sup;
    if(!gSup||gSup==='—'){
      const cnt={};
      g.items.forEach(r=>{const pid=resolveProductId(r);const b=pid?ST.best[pid]:null;if(b&&b.sup&&b.sup!=='—')cnt[b.sup]=(cnt[b.sup]||0)+1;});
      const top=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
      if(top)gSup=top;
    }
    let body='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;min-width:620px;border-collapse:collapse;font-size:12px;margin-top:6px;white-space:nowrap">'+
      '<thead><tr style="color:var(--muted);font-size:11px;border-bottom:1px solid var(--line)">'+
      [lbl('wProduct','Προϊόν'),lbl('wCategory','Κατηγορία'),lbl('phhQty','Ποσότητα'),lbl('phhUnit','Μ/Μ'),lbl('phhPrev','Προηγούμενη Τιμή'),lbl('phhPrice','Τιμή'),lbl('phhChgEur','Μεταβολή €'),lbl('phhChgPct','Μεταβολή %'),lbl('thNotes','Σημειώσεις'),lbl('phhBest','Best')].map(c=>'<th style="padding:4px 6px;text-align:center;font-weight:600">'+c+'</th>').join('')+
      '</tr></thead><tbody>';
    g.items.forEach(r=>{
      const pid=resolveProductId(r);
      const p=ST.products.find(x=>x.id===pid);const nm=p?p.sku:(r.raw_product||'—');
      const cat=p?(p.category||''):'';
      const qty=parseFloat(r.quantity)||0;const price=parseFloat(r.price)||0;gtot+=qty*price;
      const cp=parseFloat(r.change_pct);const ce=parseFloat(r.change_eur);
      const chP=(!isNaN(cp)&&cp!==0)?((cp>0?'▲':'▼')+(Math.abs(cp)*100).toFixed(0)+'%'):'';
      const chE=(!isNaN(ce)&&ce!==0)?((ce>0?'+':'')+money(ce)):'';
      const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');
      const b=pid?ST.best[pid]:null;
      const isBest=b&&b.price&&Math.abs(price-parseFloat(b.price))<0.001;
      let noteTxt=(r.notes||'').replace(/^(Τιμολόγιο|Χωρίς τιμολόγιο)$/,'').replace(/^Χρονιά\s*/,'').trim();
      if(!noteTxt){
        const yr=(r.raw_product||'').match(/\b(19[5-9]\d|20[0-3]\d)\b/);           // χρονιά
        const orig=(r.raw_product||'').match(/\b(ΑΡΓΕΝΤΙΝ\S*|ΒΡΑΖΙΛ\S*|ΕΛΛΑΔ\S*|ΕΛΛΗΝ\S*|ΙΣΠΑΝ\S*|ΙΤΑΛ\S*|ΓΑΛΛ\S*|ΧΙΛΗ\S*|ΠΕΡΟΥ\S*|ΜΕΞΙΚ\S*|ΟΛΛΑΝΔ\S*|ΜΑΡΟΚ\S*|ΑΙΓΥΠΤ\S*|ΤΟΥΡΚ\S*|ΚΥΠΡ\S*|ΝΑΞ\S*|ΚΡΗΤ\S*|ΦΛΩΡΙΝ\S*|ΘΕΣΣΑΛ\S*)\b/i);  // προέλευση
        noteTxt=(yr?yr[0]:'')+(yr&&orig?' · ':'')+(orig?orig[0]:'');
      }
      body+='<tr style="border-bottom:1px solid var(--line)">'+
        '<td style="padding:5px 6px;text-align:left;font-weight:600">'+esc(nm)+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:var(--muted)">'+esc(cat||'—')+'</td>'+

        '<td style="padding:5px 6px;text-align:center;font-weight:700">'+money(price)+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:'+col+'">'+(chE||'—')+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:'+col+';font-weight:600">'+(chP||'—')+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:var(--accent);font-size:11px">'+(noteTxt?esc(noteTxt):'—')+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:var(--ok);font-weight:700">'+(isBest?'✓':'')+'</td>'+
      '</tr>';
    });
    body+='</tbody></table></div>';
    h+='<div class="card" style="padding:10px;margin-top:8px">'+
      '<div style="font-weight:700;font-size:14px">🧾 '+esc(gSup||'—')+'</div>'+

      body+

  });
  h+='</div></div>';
  return h;

function pdSet(k,v){ST.pd=ST.pd||{};ST.pd[k]=v;renderStats();}
function priceDbView(){
  ST.pd=ST.pd||{pid:'',period:'all'};
  const P=ST.pd;
  const prods=ST.products.slice().sort((a,b)=>String(a.sku).localeCompare(String(b.sku)));
  if(!P.pid&&prods.length)P.pid=prods[0].id;
  const periods=[['week',lbl('pWeek','Εβδομάδα')],['month',lbl('pMonth','Μήνας')],['3m',lbl('p3m','3 Μήνες')],['6m',lbl('p6m','6 Μήνες')],['9m',lbl('p9m','9 Μήνες')],['year',lbl('pYear','Έτος')],['all',lbl('pAll','Όλα')]];
  const from=periodFrom(P.period);
  let rows=(ST.history||[]).filter(r=>resolveProductId(r)===P.pid);
  if(from)rows=rows.filter(r=>(r.date||'')>=from);
  rows=rows.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const units=rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  const spend=rows.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0)),0);
  const prices=rows.map(r=>parseFloat(r.price)).filter(x=>!isNaN(x));
  const avg=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:0;
  const latest=rows.length?parseFloat(rows[0].price):0;
  const oldest=rows.length?parseFloat(rows[rows.length-1].price):0;
  const chE=(rows.length>1)?(latest-oldest):0;
  const chP=(oldest>0)?(chE/oldest):0;
  const b=ST.best[P.pid]||{};
  // ── πραγματικά φθηνότερος προμηθευτής (από όλες τις τιμές, αγνοώντας το χειροκίνητο override) ──
  const prForBest=ST.prices.filter(x=>x.product_id===P.pid);
  let realBest={sup:'',price:Infinity};
  prForBest.forEach(x=>{const pv=parseFloat(x.price)||0;if(pv>0&&pv<realBest.price)realBest={sup:supName(x.supplier_id),price:pv};});
  const bestSup=realBest.sup||b.sup||'';const bestPrice=(realBest.price<Infinity)?realBest.price:(parseFloat(b.price)||0);
  const nInv=new Set(rows.map(r=>r.invoice_id).filter(Boolean)).size||rows.length;
  const tile=(lbl,val,col)=>'<div style="flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:'+(col||'var(--ink)')+'">'+val+'</div><div style="font-size:10px;color:var(--muted)">'+lbl+'</div></div>';
  let h='<div class="field" style="margin-top:12px"><label>'+lbl('wProduct','Προϊόν')+'</label><select onchange="pdSet(\'pid\',this.value)">'+prods.map(p=>'<option value="'+p.id+'"'+(p.id===P.pid?' selected':'')+'>'+esc(p.sku)+'</option>').join('')+'</select></div>'+
    '<div class="tabs" style="flex-wrap:wrap">'+periods.map(([k,l])=>'<div class="tab '+(P.period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="pdSet(\'period\',\''+k+'\')">'+l+'</div>').join('')+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'+
      tile(lbl('pdSumQty','Συν. Ποσότητα'),units)+tile(lbl('pdSumSpend','Συν. Δαπάνη'),'€'+Math.round(spend),'var(--accent)')+
      tile(lbl('pdAvgPrice','Μέση Τιμή'),avg>0?'€'+avg.toFixed(2):'—')+tile(lbl('pdLast','Τελευταία'),latest>0?'€'+latest.toFixed(2):'—')+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
      tile(lbl('pdChgE','Μεταβολή €'),(chE>0?'+':'')+'€'+chE.toFixed(2),chE>0?'var(--bad)':(chE<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('pdChgP','Μεταβολή %'),(chP>0?'+':'')+(chP*100).toFixed(1)+'%',chP>0?'var(--bad)':(chP<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('iInvoices','Τιμολόγια'),nInv)+
    '</div>'+
    '<div class="card" style="margin-top:10px"><div class="kv"><span class="k">🏆 Best Supplier</span><span class="v">'+esc(bestSup||'—')+' '+(bestPrice>0?('('+money(bestPrice)+')'):'')+'</span></div></div>';
  h+='<h3 style="font-size:13px;color:var(--muted);margin:16px 2px 6px">'+lbl('pdHistH','ΙΣΤΟΡΙΚΟ')+' ('+rows.length+')</h3>';
  if(!rows.length)h+='<div class="card muted" style="text-align:center;font-size:13px">'+lbl('pdNoRec','Καμία εγγραφή σε αυτή την περίοδο')+'</div>';
  rows.forEach(r=>{const cp=parseFloat(r.change_pct);const ch=(!isNaN(cp)&&cp!==0)?((cp>0?'▲':'▼')+' '+(Math.abs(cp)*100).toFixed(1)+'%'):'';const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');let sup=resolveSupName(r);if(!sup||sup==='—'){const m=prForBest.find(x=>Math.abs((parseFloat(x.price)||0)-(parseFloat(r.price)||0))<0.001);sup=m?supName(m.supplier_id):'';}
    h+='<div class="card" style="padding:10px;margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+money(r.price)+(ch?(' <span style="color:'+col+';font-size:12px">'+ch+'</span>'):'')+'</span>'+(r.quantity?('<span style="font-size:12px;color:var(--muted)">'+fmtQty(r.quantity)+(r.unit?(' '+esc(normUnit(r.unit))):'')+'</span>'):'')+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">📅 '+fmtDate(r.date)+(sup?(' · 🏢 '+esc(sup)):'')+'</div></div>';});
  return h;
}

async function delInvoice(id){
  if(!confirm('Διαγραφή τιμολογίου; (θα φύγουν και οι γραμμές τιμών του από το Price History)'))return;
  try{
    await sb.from('price_history').delete().eq('invoice_id',id);
    await sb.from('invoices').delete().eq('id',id);
    ST.invoices=ST.invoices.filter(x=>x.id!==id);
    ST.history=(ST.history||[]).filter(x=>x.invoice_id!==id);
    toast('🗑 Διαγράφηκε');renderInvoices();
  }catch(e){toast('❌ '+(e.message||e));}
}
async function refreshPrices(){
  const _T=curTenant();
  let _pq=sb.from('product_prices').select('id,product_id,supplier_id,price,is_override,tenant_id'); if(_T)_pq=_pq.eq('tenant_id',_T);
  const [{data:prices},{data:best}]=await Promise.all([
    _pq,
    sb.from('product_best_price').select('product_id,best_price,best_supplier')
  ]);
  ST.prices=prices||[];ST.best={};(best||[]).forEach(x=>ST.best[x.product_id]={price:x.best_price,sup:x.best_supplier});
}
async function editPrice(id,val){
  let price=parseFloat(val);if(isNaN(price)){toast('❌ Μη έγκυρη τιμή');return;}price=Math.round(price*100)/100;
  try{await sb.from('product_prices').update({price,updated_at:new Date().toISOString()}).eq('id',id);await refreshPrices();toast('✅ Αποθηκεύτηκε');drawProd();}
  catch(e){toast('❌ '+(e.message||e));}
}
async function addPrice(pid){
  const sid=document.getElementById('np-sup').value;
  let price=parseFloat(document.getElementById('np-price').value);
  if(!sid){toast('❌ Διάλεξε προμηθευτή');return;}
  if(isNaN(price)||price<=0){toast('❌ Βάλε τιμή');return;}
  price=Math.round(price*100)/100;
  const p=ST.products.find(x=>x.id===pid);
  try{await sb.from('product_prices').upsert({tenant_id:p.tenant_id,product_id:pid,supplier_id:sid,price,is_override:false},{onConflict:'product_id,supplier_id'});await refreshPrices();toast('✅ Προστέθηκε');drawProd();}
  catch(e){toast('❌ '+(e.message||e));}
}
async function delPrice(id){
  try{await sb.from('product_prices').delete().eq('id',id);await refreshPrices();toast('✅ Διαγράφηκε');drawProd();}
  catch(e){toast('❌ '+(e.message||e));}
}

}

async function gmailPick(messageId,attachmentId,mime){

async function addMonth(n){

  const until=base.toISOString().slice(0,10);
  const fee=(ST.plan==='basic')?50:80;
  try{
    await sb.from('tenants').update({paid_until:until}).eq('id',curTenant());
    try{await sb.from('payments').insert({tenant_id:curTenant(),amount:fee,months:n||1,method:'χειροκίνητα'});}catch(e){}
    ST.paidUntil=until;toast('✅ '+L('Πληρώθηκε — μέχρι','Paid — until')+' '+until);openMembers();

  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify({email,password,role,tenant_id:curTenant()})});
    const d=await r.json();
    btn.disabled=false;btn.innerHTML='➕ '+L('Δημιουργία μέλους','Create member');
    if(d.error){toast('❌ '+d.error);return;}
    toast('✅ '+L('Το μέλος δημιουργήθηκε','Member created')); openMembers();
  }catch(e){btn.disabled=false;btn.innerHTML='➕ '+L('Δημιουργία μέλους','Create member');toast('❌ '+(e.message||e));}
}
async function editShop(){
  if(ST.role!=='admin'){toast(L('Μόνο ο διαχειριστής μπορεί','Admin only'));return;}
  const name=prompt(L('Όνομα μαγαζιού:','Shop name:'),ST.shopName||'');
  if(name===null)return;
  const tid=curTenant();
  try{await sb.from('settings').upsert({tenant_id:tid,key:'shop_name',value:name.trim()},{onConflict:'tenant_id,key'});
    ST.shopName=name.trim(); try{localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
    document.getElementById('hTitle').textContent=brandTitle();
    const le=document.getElementById('loginShop'); if(le)le.textContent=ST.shopName;
    toast('✅ '+L('Αποθηκεύτηκε','Saved'));
  }catch(e){toast('❌ '+(e.message||e));}
}
(async()=>{try{const nav=JSON.parse(localStorage.getItem('ciq_nav')||'{}');if(nav.lang)ST.lang=nav.lang;}catch(e){}
  try{const st=id=>document.getElementById(id);
    if(st('loginSubtitle'))st('loginSubtitle').textContent=L('Σύνδεση στο cloud','Sign in to the cloud');
    if(st('loginBtn'))st('loginBtn').textContent=L('Σύνδεση','Sign In');
    if(st('loginForgot'))st('loginForgot').textContent=L('Ξέχασα τον κωδικό','Forgot password');
    if(st('loginLock'))st('loginLock').textContent=L('🔒 Τα δεδομένα προστατεύονται ανά μαγαζί','🔒 Data is protected per shop');
    if(st('logoutBtn'))st('logoutBtn').textContent=L('Έξοδος','Logout');
  }catch(e){}
  try{const s=localStorage.getItem('ciq_shop');const el=document.getElementById('loginShop');if(s&&el)el.textContent=s;}catch(e){}
  try{const lv=document.getElementById('loginVer');if(lv)lv.textContent=BUILD;}catch(e){}
  try{const tt=localStorage.getItem('ciq_tenant');if(tt)ST.tenant=tt;}catch(e){}
  const {data:{session}}=await sb.auth.getSession();if(session)await enterApp();})();

let _lastRefresh=Date.now();
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && document.getElementById('appView').style.display==='block' && (Date.now()-_lastRefresh>15000)){
    _lastRefresh=Date.now(); loadAll();
  }
});
