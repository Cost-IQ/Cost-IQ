  rd.readAsText(f,'utf-8');
}
function meImportProcess(parsed,fname){
  const T=(el,en)=>L(el,en);
  const box=document.getElementById('me-imp-status');
  if(!parsed||!parsed.head||parsed.rows.length===0){
    if(box)box.innerHTML='<div class="card" style="background:#FFF0F0;color:var(--bad);font-size:12.5px;padding:12px">вқҢ '+T('ОӨОҝ ОұПҒПҮОөОҜОҝ ОөОҜОҪОұО№ О¬ОҙОөО№Оҝ','The file is empty')+'</div>';
    return;
  }
  const head=parsed.head, rows=parsed.rows;
  // в”Җв”Җ О‘ОҪОұОіОҪПҺПҒО№ПғО· ПғП„О·О»ПҺОҪ в”Җв”Җ
  const hn=head.map(meNorm);
  const findCol=function(keys){
    for(let i=0;i<hn.length;i++)for(const k of keys)if(hn[i].indexOf(k)>-1)return i;
    return -1;
  };
  let cName=findCol(['itemname','item','product','ПҖПҒОҝО№ОҝОҪ','ОҝОҪОҝОјОұ','ПҖОөПҒО№ОіПҒОұПҶО·','description','name','ОөО№ОҙОҝПӮ']);
  let cQty =findCol(['itemssold','quantity','qty','ПҖОҝПғОҝП„О·П„Оұ','П„ОөОјОұПҮО№Оұ','П„ОөОј','sold','ПҖПүО»О·ПғОөО№ПӮ','count']);
  const cDate=findCol(['date','О·ОјОөПҒОҝОјО·ОҪО№Оұ','О·ОјОөПҒОҝОј','day','О·ОјОөПҒОұ']);
  // О‘ОҪ ОҙОөОҪ ОІПҒОӯОёО·ОәОұОҪ, ОјО¬ОҪП„ОөПҲОө: 1О· ПғП„О®О»О· ОәОөОҜОјОөОҪОҝ = ПҢОҪОҝОјОұ, 1О· ОұПҒО№ОёОјО·П„О№ОәО® = ПҖОҝПғПҢП„О·П„Оұ
  if(cName<0)cName=0;
  if(cQty<0){
    for(let i=0;i<head.length;i++){
      if(i===cName||i===cDate)continue;
      let ok=0;
      rows.slice(0,8).forEach(function(r){ if(r[i]!=null&&r[i]!==''&&meNum(r[i])>0)ok++; });
      if(ok>=Math.min(3,rows.length)){cQty=i;break;}
    }
  }
  if(cQty<0){
    if(box)box.innerHTML='<div class="card" style="background:#FFF7E6;color:var(--warn);font-size:12.5px;padding:12px">вҡ  '+T('О”ОөОҪ ОІПҒО®ОәОұ ПғП„О®О»О· ОјОө ПҖОҝПғПҢП„О·П„ОөПӮ. О•О»ОӯОіОҫП„Оө П„Оҝ ОұПҒПҮОөОҜОҝ.','No quantity column found. Check the file.')+'</div>';
    return;
  }
  // в”Җв”Җ ОЈП…ОіОәОӯОҪП„ПҒПүПғО· ОұОҪО¬ ПҢОҪОҝОјОұ в”Җв”Җ
  const agg={}; let minD='',maxD='';
  rows.forEach(function(r){
    const nm=(r[cName]||'').trim(); if(!nm)return;
    const q=meNum(r[cQty]); if(q<=0)return;
    const k=meNorm(nm);
    if(!agg[k])agg[k]={name:nm,qty:0};
    agg[k].qty+=q;
    if(cDate>-1&&r[cDate]){
      const iso=meDateIso(r[cDate]);
      if(iso){ if(!minD||iso<minD)minD=iso; if(!maxD||iso>maxD)maxD=iso; }
    }
  });
  // в”Җв”Җ ОӨОұОҜПҒО№ОұПғОјОұ ОјОө ОөОҪОөПҒОіОӯПӮ ПғП…ОҪП„ОұОіОӯПӮ в”Җв”Җ
  const recs=(ST.recipes||[]).filter(r=>!r.is_homemade&&r.is_active!==false);
  const byNorm={}; recs.forEach(function(r){ byNorm[meNorm(r.name)]=r; });
  const matched=[], unmatched=[];
  Object.keys(agg).forEach(function(k){
    const a=agg[k];
    let rec=byNorm[k];
    if(!rec){ // ОјОөПҒО№ОәПҢ П„ОұОҜПҒО№ОұПғОјОұ
      const cands=recs.filter(function(r){const rn=meNorm(r.name);return rn.indexOf(k)>-1||k.indexOf(rn)>-1;});
      if(cands.length===1)rec=cands[0];
    }
    if(!rec&&k.length>=5){ // ОұОҪОҝПҮО® ПғОө ОјО№ОәПҒОӯПӮ ОҙО№ОұПҶОҝПҒОӯПӮ ОіПҒОұПҶО®ПӮ
      let bestR=null,bestD=99;
      recs.forEach(function(r){
        const rn=meNorm(r.name);
        if(Math.abs(rn.length-k.length)>2)return;
        const d=meDist(k,rn);
        if(d<bestD){bestD=d;bestR=r;}
      });
      if(bestR&&bestD<=Math.max(1,Math.floor(k.length*0.12)))rec=bestR;
    }
    if(rec)matched.push({rec:rec,qty:a.qty,src:a.name});
    else unmatched.push(a);
  });
  ST._meImport={matched:matched,unmatched:unmatched,from:minD,to:maxD};
  // в”Җв”Җ О‘ПҖОҝП„ОӯО»ОөПғОјОұ в”Җв”Җ
  let h='<div class="card" style="padding:0;overflow:hidden">'+
    '<div style="padding:12px 14px;border-bottom:1px solid var(--line)">'+
      '<div style="font-size:13px;font-weight:600">'+esc(fname)+'</div>'+
      '<div class="muted" style="font-size:11.5px;margin-top:2px">'+rows.length+' '+T('ОіПҒОұОјОјОӯПӮ','rows')+' В· '+T('ОЈП„О®О»ОөПӮ','Columns')+': '+esc(head[cName])+' + '+esc(head[cQty])+(cDate>-1?(' + '+esc(head[cDate])):'')+'</div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--ok)">вң“ '+T('ОӨОұОҜПҒО№ОұОҫОұОҪ','Matched')+'</span><b>'+matched.length+'</b></div>';
  if(unmatched.length){
    h+='<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--muted)">'+T('О§ПүПҒОҜПӮ ОЈП…ОҪП„ОұОіО®','No Recipe')+'</span><b>'+unmatched.length+'</b></div>';
  }
  if(minD&&maxD){
    h+='<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--muted)">'+T('О ОөПҒОҜОҝОҙОҝПӮ','Period')+'</span><b>'+dGRs(minD)+' вҖ“ '+dGRs(maxD)+'</b></div>';
  }
  h+='</div>';
  if(matched.length){
    h+='<div class="card" style="padding:0;overflow:hidden;margin-top:10px;max-height:220px;overflow-y:auto">';
    matched.slice(0,40).forEach(function(m){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px">'+
        '<div style="min-width:0;flex:1"><div>'+esc(m.rec.name)+'</div>'+
        (meNorm(m.src)!==meNorm(m.rec.name)?('<div class="muted" style="font-size:10.5px">вҶҗ '+esc(m.src)+'</div>'):'')+'</div>'+
        '<b>'+Math.round(m.qty)+'</b></div>';
    });
    if(matched.length>40)h+='<div class="muted" style="text-align:center;padding:9px;font-size:11.5px">вҖҰ'+T('ОәОұО№ О¬О»О»Оұ','and')+' '+(matched.length-40)+'</div>';
    h+='</div>';
  }
  if(unmatched.length){
    h+='<div class="muted" style="font-size:11.5px;margin-top:10px;line-height:1.6">'+T('О”ОөОҪ ОІПҒОӯОёО·ОәОө ПғП…ОҪП„ОұОіО® ОіО№Оұ','No recipe found for')+': '+
      unmatched.slice(0,8).map(x=>esc(x.name)).join(', ')+(unmatched.length>8?('вҖҰ +'+(unmatched.length-8)):'')+'</div>';
  }
  if(matched.length){
    h+='<button class="btn" style="margin-top:12px" onclick="meImportApply()">вң“ '+T('О•О№ПғОұОіПүОіО®','Import')+' '+matched.length+' '+T('О ПҒОҝПҠПҢОҪП„ПүОҪ','Products')+'</button>';
  }
  if(box)box.innerHTML=h;
}
function meDateIso(v){
  const s=String(v||'').trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})/);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  return null;
}
function meImportApply(){
  const D=ST._meImport; if(!D||!D.matched.length)return;
  ST.meSold=ST.meSold||{};
  D.matched.forEach(function(m){ ST.meSold[m.rec.id]=Math.round(m.qty); });
  if(D.from&&D.to){ ST._meImpFrom=D.from; ST._meImpTo=D.to; }
  closeModal();
  toast('вң… '+D.matched.length+' '+L('ПҖПҒОҝПҠПҢОҪП„Оұ ОөОҪО·ОјОөПҒПҺОёО·ОәОұОҪ','products updated'));
  renderStats();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ вҡ пёҸ О•ОӣО•О“О§ОҹОЈ О О‘ОЎО‘ОӣО‘О’О—ОЈ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function checkDelivery(sid,invDate,lines){
  if(!sid||!lines||!lines.length)return;
  const cutoff=new Date(Date.now()-21*86400000).toISOString().slice(0,10);   // ПҖОұПҒОұОіОіОөО»ОҜОөПӮ П„ОөО»ОөП…П„ОұОҜПүОҪ 21 О·ОјОөПҒПҺОҪ
  // О•ОәОәПҒОөОјОөОҜПӮ ПҖОұПҒОұОіОіОөО»ОҜОөПӮ ОұП…П„ОҝПҚ П„ОҝП… ПҖПҒОҝОјО·ОёОөП…П„О®
  const pend=(ST.orderHistory||[]).filter(r=>r.supplier_id===sid&&(r.status||'')==='Pending'&&(r.date||'')>=cutoff);
  if(!pend.length)return;

  const missing=[], received=[];
  const byProd={};
  lines.forEach(l=>{ if(l.productId)byProd[l.productId]=(byProd[l.productId]||0)+(parseFloat(l.qty)||0); });

  for(const po of pend){
    const got=byProd[po.product_id]||0;
    const ord=parseFloat(po.qty)||0;
    if(got>0){
      received.push({po,ord,got});
      const st=(got>=ord)?'Delivered':'Partial';
      try{await sb.from('order_history').update({status:st,qty_received:got}).eq('id',po.id);}catch(e){}
      po.status=st; po.qty_received=got;
      if(got<ord)missing.push({name:po.sku,ord,got,miss:Math.round((ord-got)*10)/10});
    }
  }
  if(!received.length)return;

  // в”Җв”Җ О•ОҪО·ОјОӯПҒПүПғО· ОұПҖОҝОёОӯОјОұП„ОҝПӮ (ОңОҹОқОҹ ОұОҪ П…ПҖО¬ПҒПҮОөО№ ОұПҖОҝОёО·ОәОөП…ОјОӯОҪОҝ ОұПҖПҢОёОөОјОұ) в”Җв”Җ
  let stockMsg=[];
  for(const r of received){
    const pid=r.po.product_id;
    const ol=ST.orders[pid]; if(!ol)continue;
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)continue;
    const isBev=p.kind==='beverage';
    const cur=stockOf(ol,isBev);
    if(cur<=0)continue;                       // ОҙОөОҪ ОӯПҮОөО№ ПғПҺПғОөО№ ОұПҖПҢОёОөОјОұ вҶ’ ОјО· ПҖОөО№ПҒО¬ОҫОөО№ПӮ
    const field=isBev?'cellar_count':'cellar_count';
    const newVal=(parseFloat(ol[field])||0)+r.got;
    const row={tenant_id:p.tenant_id,product_id:pid,
      cellar_count:isBev?newVal:(parseFloat(ol.cellar_count)||0)+r.got,
      bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,
      kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,
      order_qty:parseFloat(ol.order_qty)||0,
      last_delivery:invDate||null,last_delivery_qty:r.got,
      updated_at:new Date().toISOString()};
    try{await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;}catch(e){}
    stockMsg.push(p.sku+': '+cur+' + '+r.got+' = '+(cur+r.got));
  }

  // в”Җв”Җ ОңО®ОҪП…ОјОұ в”Җв”Җ
  let msg='';
  if(missing.length){
    msg='вҡ пёҸ '+L('О”О•Оқ О—ОЎОҳО‘Оқ ОҹОӣО‘','NOT ALL DELIVERED')+'\n\n';
    missing.forEach(m=>{msg+='вҖў '+m.name+': '+L('ПҖОұПҒО®ОіОіОөО№О»ОөПӮ','ordered')+' '+m.ord+' В· '+L('О®ПҒОёОұОҪ','received')+' '+m.got+' вҶ’ '+L('О»ОөОҜПҖОҝП…ОҪ','missing')+' '+m.miss+'\n';});
  } else {
    msg='вң… '+L('ОҢО»Оұ ПҖОұПҒОұО»О®ПҶОёО·ОәОұОҪ ПғПүПғП„О¬','All delivered correctly')+'\n';
  }
  if(stockMsg.length){
    msg+='\nрҹ“Ұ '+L('О‘ПҖПҢОёОөОјОұ ОөОҪО·ОјОөПҒПҺОёО·ОәОө','Stock updated')+' ('+dGRs(invDate)+'):\n';
    stockMsg.forEach(x=>{msg+='вҖў '+x+'\n';});
  }
  alert(msg);
}

function profitView(){ return '<div id="profitBox" style="min-height:30vh;display:flex;align-items:center;justify-content:center"><span class="spin"></span></div>'; }
function pPeriodDates(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  let s,e;
  if(t==='month'){ s=new Date(d.getFullYear(),d.getMonth(),1); e=new Date(d.getFullYear(),d.getMonth()+1,0); }
  else if(t==='quarter'){ const q=Math.floor(d.getMonth()/3); s=new Date(d.getFullYear(),q*3,1); e=new Date(d.getFullYear(),q*3+3,0); }
  else if(t==='half'){ const hh=d.getMonth()<6?0:6; s=new Date(d.getFullYear(),hh,1); e=new Date(d.getFullYear(),hh+6,0); }
  else { s=new Date(d.getFullYear(),0,1); e=new Date(d.getFullYear(),11,31); }
  const f=x=>{const y=x.getFullYear(),m=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;};
  return {start:f(s),end:f(e)};
}
function monthNamesFull(){

    :['ОҷОұОҪОҝП…О¬ПҒО№ОҝПӮ','ОҰОөОІПҒОҝП…О¬ПҒО№ОҝПӮ','ОңО¬ПҒП„О№ОҝПӮ','О‘ПҖПҒОҜО»О№ОҝПӮ','ОңО¬О№ОҝПӮ','ОҷОҝПҚОҪО№ОҝПӮ','ОҷОҝПҚО»О№ОҝПӮ','О‘ПҚОіОҝП…ПғП„ОҝПӮ','ОЈОөПҖП„ОӯОјОІПҒО№ОҝПӮ','ОҹОәП„ПҺОІПҒО№ОҝПӮ','ОқОҝОӯОјОІПҒО№ОҝПӮ','О”ОөОәОӯОјОІПҒО№ОҝПӮ'];

function pLabel(){

function autoPurchases(start,end){

// в”Җв”Җ О‘П…П„ПҢОјОұП„О· О¬ОҪП„О»О·ПғО· ОҙОөОҙОҝОјОӯОҪПүОҪ ПҖОөПҒО№ПҢОҙОҝП… ОіО№Оұ П„О·ОҪ ОҡОөПҒОҙОҝПҶОҝПҒОҜОұ в”Җв”Җ
async function loadProfitSources(start,end){
  const out={sales:null,wages:0,social:0,opexList:[],opex:0,rent:0,utilities:0,cashUnrec:0,delNet:0,tillTotal:0,tillDecl:0,salesBrk:null,hasData:false};
  const n=v=>(v!=null&&v!==''?(+v):0);
  const T=(el,en)=>L(el,en);
  // О‘П…П„ПҢОјОұП„О· О¬ОҪП„О»О·ПғО· ОңОҹОқОҹ ПғП„Оҝ Pro. Advanced/Basic: ПҢО»Оұ ПҮОөО№ПҒОҝОәОҜОҪО·П„Оұ.
  if(!isPro())return out;
  try{
    // О–: ПҖПүО»О®ПғОөО№ПӮ ОұОҪО¬ ПғП…ОҪП„ОөО»ОөПғП„О® ОҰО О‘
    const {data:zs}=await sb.from('z_closing').select('*').eq('tenant_id',curTenant()).gte('z_date',start).lte('z_date',end);
    if(zs&&zs.length){
      let byRate={};
      zs.forEach(z=>{
        let lines=[]; try{lines=(typeof z.vat_lines==='string')?JSON.parse(z.vat_lines):(z.vat_lines||[]);}catch(e){}
        lines.forEach(ln=>{const r=n(ln.rate); byRate[r]=(byRate[r]||0)+n(ln.net);});
      });
      if(Object.keys(byRate).length){ out.sales=byRate; out.hasData=true; }
    }
    // ОҡО»ОөОҜПғО№ОјОҝ О·ОјОӯПҒОұПӮ: ОөОәП„ПҢПӮ ПҶОұОәОӯО»ОҝП… + delivery
    const {data:cls}=await sb.from('daily_close').select('*').eq('tenant_id',curTenant()).gte('close_date',start).lte('close_date',end);
    (cls||[]).forEach(cl=>{
      out.cashUnrec+=n(cl.off_envelope);
      out.tillTotal+=n(cl.cash_income)+n(cl.card_income)+n(cl.off_envelope);
      out.tillDecl +=n(cl.cash_income)+n(cl.card_income);   // ОҙО·О»ПүОјОӯОҪОҝ П„ОұОјОөОҜОҝ (ПҮПүПҒОҜПӮ ОөОәП„ПҢПӮ ПҶОұОәОӯО»ОҝП…)
      let dd=[]; try{dd=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);}catch(e){}
      dd.forEach(d=>{const g=n(d.gross)||(n(d.net_val)+n(d.vat));out.delNet+=(n(d.net_val)||(g-n(d.vat)));out.tillTotal+=g;out.tillDecl+=g;});
      // О‘ОҪО¬О»П…ПғО· ПҖПүО»О®ПғОөПүОҪ ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ (Pro): О¬ОёПҒОҝО№ПғОјОұ ПҖОөПҒО№ПҢОҙОҝП…
      if(isPro()&&cl.sales_breakdown){
        let sb2={}; try{sb2=(typeof cl.sales_breakdown==='string')?JSON.parse(cl.sales_breakdown):(cl.sales_breakdown||{});}catch(e){sb2={};}
        if(!out.salesBrk)out.salesBrk={bev:0,food:0,hot:0,hotlow:0};
        out.salesBrk.bev+=n(sb2.bev); out.salesBrk.food+=n(sb2.food);
        out.salesBrk.hot+=n(sb2.hot); out.salesBrk.hotlow+=n(sb2.hotlow);
      }
    });
    if(cls&&cls.length)out.hasData=true;
    // ОңО№ПғОёОҝОҙОҝПғОҜОұ: ОјО№ОәП„О¬ + ОөПҒОіОҝОҙОҝП„О№ОәОӯПӮ ОөО№ПғПҶОҝПҒОӯПӮ
    const {data:sh}=await sb.from('work_shifts').select('*').eq('tenant_id',curTenant()).gte('work_date',start).lte('work_date',end);
    (sh||[]).forEach(s=>{ out.wages+=n(s.total_amount); out.social+=n(s.empr_contrib); });
    if(sh&&sh.length)out.hasData=true;
    // ОҲОҫОҝОҙОұ: ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ. О•ОҪОҝОҜОәО№Оҝ & О”О•О—/ОәОҝО№ОҪПҢПҮПҒО·ПғП„Оұ ОҫОөПҮПүПҒО№ПғП„О¬, П…ПҖПҢО»ОҝО№ПҖОұ вҶ’ ОӣОҝО№ПҖО¬.
    // О•ОҫОұО№ПҒОҝПҚОҪП„ОұО№: suppliers (=ОұОіОҝПҒОӯПӮ) ОәОұО№ staff (=ОјО№ПғОёОҝОҜ, ОӯПҒПҮОҝОҪП„ОұО№ ОұПҖПҢ ОңО№ПғОёОҝОҙОҝПғОҜОұ).
    const {data:ex}=await sb.from('daily_expenses').select('*').eq('tenant_id',curTenant()).gte('exp_date',start).lte('exp_date',end);
    const map={};
    (ex||[]).forEach(e=>{
      const cat=e.category||'other';
      if(cat==='suppliers'||cat==='staff')return;      // ОұОіОҝПҒОӯПӮ & ОјО№ПғОёОҝОҜ: ОұО»О»ОҝПҚ
      if(cat==='rent'){ out.rent+=n(e.amount); return; }
      if(cat==='utilities'){ out.utilities+=n(e.amount); return; }
      const nm=(e.label&&e.label.trim())?e.label.trim():T('ОҲОҫОҝОҙОҝ','Expense');
      map[nm]=(map[nm]||0)+n(e.amount);
    });
    out.opexList=Object.keys(map).map(k=>({name:k,amt:map[k]})).sort((a,b)=>b.amt-a.amt);
    out.opex=out.opexList.reduce((t,x)=>t+x.amt,0);
    if(ex&&ex.length)out.hasData=true;
  }catch(e){}
  return out;
}

function pfAutoSales(A,which,p){
  if(!A||!A.sales)return 0;
  const n=v=>(v!=null&&v!==''?(+v):0);
  const vf=n(p.vat_food)||13, vb=n(p.vat_bev)||24;
  const inclVat=(p.sales_incl_vat!==false);
  let net=0;
  Object.keys(A.sales).forEach(r=>{
    const rate=+r;
    const isFood=Math.abs(rate-vf)<Math.abs(rate-vb);
    if((which==='food')===isFood)net+=A.sales[r];
  });
  // ОӨОҝ О– ОәПҒОұП„О¬ ОәОұОёОұПҒО® ОұОҫОҜОұ. О‘ОҪ О· ПҶПҢПҒОјОұ ОҙОҝП…О»ОөПҚОөО№ ОјОө ОҰО О‘, П„Оҝ ОұОҪОөОІО¬О¶ОҝП…ОјОө.
  if(inclVat){ const rate=(which==='food')?vf:vb; net=net*(1+rate/100); }
  return net;
}
function profitCrossCheck(R,A,p){
  const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0);
  const money2=x=>money(Math.round(x*100)/100);
  const inclVat=(p.sales_incl_vat!==false);

  let typed=n(p.sales_bev)+n(p.sales_hot)+n(p.sales_hot_low)+n(p.sales_food);

  if(typed<=0)return '';
  // ОӨО№ ОҫОӯПҒОөО№ П„Оҝ ПғПҚПғП„О·ОјОұ: О– (ОәОұОёОұПҒПҢ + ОҰО О‘) О® ОӨОұОјОөОҜОҝ.
  // ОҡОӣО•ОҷО”О©ОңО•ОқОҹ: ПғПҚОіОәПҒО№ПғО· ОҙО·О»ПүОјОӯОҪОұ-ОјОө-ОҙО·О»ПүОјОӯОҪОұ (О– О® ОҙО·О»ПүОјОӯОҪОҝ П„ОұОјОөОҜОҝ) вҖ” ПҖОҝП„Оӯ ОҙОөОҪ ПҖПҒОҝОҙОҜОҙОҝП…ОјОө П„Оұ ОөОәП„ПҢПӮ ПҶОұОәОӯО»ОҝП….
  // ОһО•ОҡОӣО•ОҷО”О©ОӨОҹ: ПғПҚОіОәПҒО№ПғО· ОјОө П„Оҝ ПҖО»О®ПҒОөПӮ П„ОұОјОөОҜОҝ (П„Оҝ О– ОҙОөОҪ ПҖОөПҒО№ОӯПҮОөО№ ОөОәП„ПҢПӮ ПҶОұОәОӯО»ОҝП…, ОҝПҖПҢП„Оө ОұОіОҪОҝОөОҜП„ОұО№).
  let zGross=0;
  if(A&&A.sales){ Object.keys(A.sales).forEach(r=>{ zGross+=A.sales[r]*(1+(+r)/100); }); }
  let ref, src;
  if(unlocked){
    ref=n(A&&A.tillTotal); src=T('ОӨОұОјОөОҜОҝ','Till');
  }else{
    ref=zGross>0?zGross:n(A&&A.tillDecl); src=zGross>0?T('О–','Z'):T('ОӨОұОјОөОҜОҝ','Till');
  }
  if(ref<=0)return '';
  const diff=typed-ref;
  const ok=Math.abs(diff)<Math.max(1,ref*0.005);   // ОұОҪОҝПҮО® 0,5%
  const col=ok?'var(--ok)':'#B8860B';
  const bg=ok?'var(--ok-bg,#E6F7EC)':'#FFF7E6';
  return '<div style="background:'+bg+';border-radius:8px;padding:10px 12px;margin-top:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:12px;color:'+col+'">'+(ok?('вң“ '+T('ОЈП…ОјПҶПүОҪОөОҜ ОјОө П„Оҝ','Matches')+' '+src):('вҡ  '+T('О”О№ОұПҶОҝПҒО¬ ОұПҖПҢ П„Оҝ','Differs from')+' '+src))+'</span>'+
      '<span style="font-size:14px;font-weight:700;color:'+col+'">'+(ok?money2(0):((diff>0?'+':'вҲ’')+money2(Math.abs(diff))))+'</span>'+
    '</div>'+
    '<div style="display:flex;gap:14px;margin-top:5px;font-size:11px;color:var(--muted)">'+
      '<span>'+T('ОҲОіПҒОұПҲОөПӮ','Entered')+' '+money2(typed)+'</span>'+
      '<span>'+src+' '+money2(ref)+'</span>'+
    '</div>'+
  '</div>';
}
function calcProfit(p){
  const inclVat=!!p.sales_incl_vat;
  const dStd=vatByRole('std',24), dRed=vatByRole('red',13);
  const vf=(parseFloat(p.vat_food)||dRed)/100, vb=(parseFloat(p.vat_bev)||dStd)/100;
  const vh=(p.vat_hot!=null&&p.vat_hot!=='')?(parseFloat(p.vat_hot)/100):vb;
  const vhl=(p.vat_hot_low!=null&&p.vat_hot_low!=='')?(parseFloat(p.vat_hot_low)/100):vf;
  const A=ST.pfAuto||{};
  const use=(manual,auto)=>((manual!=null&&manual!=='')?(parseFloat(manual)||0):(auto||0));
  const SB=A.salesBrk||{};
  const sfRaw=use(p.sales_food,SB.food);      // ОҰОұОіО·П„ПҢ 13%
  const sbRaw=use(p.sales_bev,SB.bev);        // О ОҝП„О¬ 24%
  const shRaw=use(p.sales_hot,SB.hot);        // ОЎОҝПҶО®ОјОұП„Оұ 24% (ПғОөПҒОІО№ПҒО№О¶ПҢОјОөОҪОұ)
  const shlRaw=use(p.sales_hot_low,SB.hotlow);// ОЎОҝПҶО®ОјОұП„Оұ 13% (ПҖОұОәОӯП„Оҝ)
  const cashRaw=use(p.sales_cash_unrec,A.cashUnrec);
  // ОҡОұОёОұПҒОӯПӮ ПҖПүО»О®ПғОөО№ПӮ (ПҮПүПҒОҜПӮ ОҰО О‘)
  const sf=inclVat?sfRaw/(1+vf):sfRaw;
  const sb=inclVat?sbRaw/(1+vb):sbRaw;
  const shSrv=inclVat?shRaw/(1+vh):shRaw;
  const shPkg=inclVat?shlRaw/(1+vhl):shlRaw;
  const sh=shSrv+shPkg;               // ОЎОҝПҶО®ОјОұП„Оұ: ОәОұО№ ОҝО№ ОҙПҚОҝ ПғП…ОҪП„ОөО»ОөПғП„ОӯПӮ ОјОұО¶ОҜ
  const cash=inclVat?cashRaw/(1+vb):cashRaw;   // ОјОөП„ПҒО·П„О¬: П…ПҖОҝОёОӯП„ОҝП…ОјОө ПғП…ОҪП„ОөО»ОөПғП„О® ПҖОҝП„ПҺОҪ
  const salesDecl=sf+sb+sh;           // ОҙО·О»ПүОјОӯОҪОөПӮ (ОәОұОёОұПҒОӯПӮ)
  const salesReal=salesDecl+cash;     // ПҖПҒОұОіОјОұП„О№ОәОӯПӮ (ОәОұОёОұПҒОӯПӮ)
  // О‘ОіОҝПҒОӯПӮ
  const auto=autoPurchases(p.period_start,p.period_end);
  const pFood=(p.purch_food_manual!=null&&p.purch_food_manual!=='')?parseFloat(p.purch_food_manual):auto.food;
  const pBev=(p.purch_bev_manual!=null&&p.purch_bev_manual!=='')?parseFloat(p.purch_bev_manual):auto.bev;
  const pSup=(p.purch_sup_manual!=null&&p.purch_sup_manual!=='')?parseFloat(p.purch_sup_manual):auto.sup;
  const purchases=pFood+pBev+pSup;
  // О ПҒОҝПғПүПҖО№ОәПҢ & О»ОөО№П„ОҝП…ПҒОіО№ОәО¬
  const labour=use(p.wages,A.wages)+use(p.social,A.social);
  const opex=use(p.rent,A.rent)+use(p.utilities,A.utilities)+use(p.other_expenses,A.opex);
  const mk=(sales)=>{
    const gp=sales-purchases;
    const np=gp-labour-opex;
    const pc=purchases+labour;
    const taxPct=parseFloat(p.tax_pct)||0;
    const tax=(np>0)?(np*taxPct/100):0;      // ПҶПҢПҒОҝПӮ ОјПҢОҪОҝ ПғОө ОәОӯПҒОҙОҝПӮ
    const after=np-tax;
    return {
      sales, purchases, gp, gpPct:sales?gp/sales*100:0,
      labour, labourPct:sales?labour/sales*100:0,
      opex, np, npPct:sales?np/sales*100:0,
      taxPct, tax, after, afterPct:sales?after/sales*100:0,
      prime:pc, primePct:sales?pc/sales*100:0,
      foodPct:sf?pFood/sf*100:0,
      bevPct:(sb+sh)?pBev/(sb+sh)*100:0
    };
  };
  return {decl:mk(salesDecl), real:mk(salesReal), sf, sb, sh, shSrv, shPkg, cash, pFood, pBev, pSup, auto, hasCash:cash>0};
}
// ОЈПҚОіОәПҒО№ПғО· ОјОө ПҖОӯПҒП…ПғО№ ОіО№Оұ П„О·ОҪ ОҡОөПҒОҙОҝПҶОҝПҒОҜОұ ПҖОөО»ОұП„ПҺОҪ
function pfCompareHtml(){
  const T=(el,en)=>L(el,en);
  const m2=x=>money(Math.round((x||0)*100)/100);
  const all=ST.pfAll||[]; if(!all.length)return '';
  const {start,end}=pPeriodDates();
  const d=new Date(start+'T12:00:00');
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  // ОҠОҙО№Оұ ПҖОөПҒОҜОҝОҙОҝПӮ ПҖОӯПҒП…ПғО№
  const ly=new Date(d.getFullYear()-1,d.getMonth(),1);
  const lyEnd=new Date(d.getFullYear()-1,new Date(end+'T12:00:00').getMonth()+1,0);
  const prevRow=all.find(r=>r.period_start===fmt(ly)&&r.period_end===fmt(lyEnd));
  // О‘ПҖПҢ ОұПҒПҮО® ОӯП„ОҝП…ПӮ
  const yNow=d.getFullYear(), yPrev=yNow-1;
  const sumYTD=function(year){
    let rev=0,prof=0;
    all.forEach(function(r){
      if(!r.period_start)return;
      const ps=new Date(r.period_start+'T12:00:00');
      if(ps.getFullYear()!==year||ps.getMonth()>d.getMonth())return;
      const C=profitCalcFromRow(r); if(!C)return;
      const M=(ST.pfUseReal!==false&&C.hasCash&&privacyUnlocked())?C.real:C.decl;
      rev+=M.sales; prof+=M.np;
    });
    return {rev:rev,prof:prof};
  };
  const ytdNow=sumYTD(yNow), ytdPrev=sumYTD(yPrev);
  const row=function(label,now,prev){
    if(prev<=0&&now<=0)return '';
    let badge='<span class="muted">'+T('ОқОӯОҝ','New')+'</span>';
    if(prev>0){
      const pct=(now-prev)/prev*100, up=pct>=0;
      const col=Math.abs(pct)<0.05?'var(--muted)':(up?'var(--ok)':'var(--bad)');
      badge='<span style="color:'+col+';font-weight:700">'+(up?'в–І +':'в–ј ')+Math.abs(pct).toFixed(1)+'%</span>';
    }
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px">'+
      '<div style="min-width:0;flex:1"><div>'+label+'</div><div class="muted" style="font-size:11px">'+T('О ОӯПҒП…ПғО№','Last Year')+' '+m2(prev)+'</div></div>'+
      '<div style="text-align:right"><div style="font-weight:700">'+m2(now)+'</div><div style="font-size:11px">'+badge+'</div></div></div>';
  };
  let inner='';
  if(prevRow){
    const P=profitCalcFromRow(prevRow);
    const cur=calcProfit(ST.pf||{});
    const useReal=(ST.pfUseReal!==false)&&privacyUnlocked();
    const Mc=(useReal&&cur.hasCash)?cur.real:cur.decl;
    const Mp=(useReal&&P.hasCash)?P.real:P.decl;
    inner+=row(T('ОӨО¶ОҜПҒОҝПӮ вҖ” ОҠОҙО№Оұ О ОөПҒОҜОҝОҙОҝПӮ О ОӯПҒП…ПғО№','Sales вҖ” Same Period Last Year'),Mc.sales,Mp.sales);
    inner+=row(T('ОҡОұОёОұПҒПҢ ОҡОӯПҒОҙОҝПӮ вҖ” ОҠОҙО№Оұ О ОөПҒОҜОҝОҙОҝПӮ О ОӯПҒП…ПғО№','Net Profit вҖ” Same Period Last Year'),Mc.np,Mp.np);
  }
  if(ytdPrev.rev>0||ytdNow.rev>0){
    inner+=row(T('ОӨО¶ОҜПҒОҝПӮ вҖ” О‘ПҖПҢ О‘ПҒПҮО® ОҲП„ОҝП…ПӮ','Sales вҖ” Year To Date'),ytdNow.rev,ytdPrev.rev);
    inner+=row(T('ОҡОұОёОұПҒПҢ ОҡОӯПҒОҙОҝПӮ вҖ” О‘ПҖПҢ О‘ПҒПҮО® ОҲП„ОҝП…ПӮ','Net Profit вҖ” Year To Date'),ytdNow.prof,ytdPrev.prof);
  }
  if(!inner)return '';
  return '<div class="card"><h3 style="font-size:13px;color:var(--muted);margin-bottom:6px">рҹ“Ҳ '+T('ОЈПҚОіОәПҒО№ПғО·','Comparison')+'</h3>'+inner+'</div>';
}
// ОҡО¬ПҒП„ОөПӮ ПғПҚОҪОҝПҲО·ПӮ ОәОұО№ ОјПҖО¬ПҒОұ ОәОұП„ОұОҪОҝОјО®ПӮ
function profitTopHtml(M,T,money2,pct,badge){
  const sales=M.sales||0;
  const nn=v=>(v!=null&&isFinite(v)?v:0);
  const pu=nn(M.purchases), la=nn(M.labour), op=nn(M.opex), np=nn(M.np);
  // О§ПүПҒОҜПӮ ПҖПүО»О®ПғОөО№ПӮ: ОәПҒОұП„О¬ОјОө П„О№ПӮ ОәО¬ПҒП„ОөПӮ ОҝПҒОұП„ОӯПӮ ОјОө ПҖОұПҚО»ОөПӮ, ПҺПғП„Оө ОҪОұ ОјО·ОҪ
  // ОұОҪОұОІОҝПғОІО®ОҪОөО№ О· ОҝОёПҢОҪО· ОәО¬ОёОө ПҶОҝПҒО¬ ПҖОҝП… Оҝ ПҮПҒО®ПғП„О·ПӮ ПғОІО®ОҪОөО№ ОӯОҪОұ ПҲО·ПҶОҜОҝ.
  // Hex П„О№ОјОӯПӮ П„ПүОҪ ОёОөОјОұП„О№ОәПҺОҪ ПҮПҒПүОјО¬П„ПүОҪ вҖ” ПҮПҒОөО№О¬О¶ОҝОҪП„ОұО№ ОіО№Оұ ОҪОұ ПҶП„О№О¬ОҫОҝП…ОјОө tint (ПҮПҒПҺОјОұ+alpha)
  const OK_HEX='#1e8449', BAD_HEX='#922b21', ACCENT_HEX='#1a5276', WARN_HEX='#e0a800';
  // ОҡО¬ПҒП„Оұ KPI ОјОө ОӯОіПҮПҒПүОјО· О»ПүПҒОҜОҙОұ ОұПҒО№ПғП„ОөПҒО¬ + ОҙО№ОұОәПҒО№П„О№ОәПҢ tint ПҶПҢОҪП„Оҝ
  const mc=(t,val,sub,valCol,stripeHex,tintBg)=>

      '<div><div class="t">'+t+'</div></div>'+
      '<div class="r"><div class="n" style="color:'+valCol+'">'+val+'</div><div class="s">'+sub+'</div></div>'+
    '</div>';

  // О§ПүПҒОҜПӮ ПҖПүО»О®ПғОөО№ПӮ: ОәПҒОұП„О¬ОјОө П„О№ПӮ ОәО¬ПҒП„ОөПӮ ОҝПҒОұП„ОӯПӮ ОјОө ПҖОұПҚО»ОөПӮ, ПҺПғП„Оө ОҪОұ ОјО·ОҪ
  // ОұОҪОұОІОҝПғОІО®ОҪОөО№ О· ОҝОёПҢОҪО· ОәО¬ОёОө ПҶОҝПҒО¬ ПҖОҝП… Оҝ ПҮПҒО®ПғП„О·ПӮ ПғОІО®ОҪОөО№ ОӯОҪОұ ПҲО·ПҶОҜОҝ.
  if(sales<=0){
    const empty=(t,sub)=>'<div class="pcard"><span class="pcstripe" style="background:var(--line)"></span>'+
      '<div><div class="t">'+t+'</div></div>'+
      '<div class="r"><div class="n" style="color:var(--muted)">вҖ”</div><div class="s">'+sub+'</div></div></div>';
    return '<div class="pcards">'+
      empty(T('ОӨО¶ОҜПҒОҝПӮ','Sales'),T('ОҡОұОёОұПҒОӯПӮ О ПүО»О®ПғОөО№ПӮ','Net Sales'))+
      empty('Prime Cost',T('О‘ОіОҝПҒОӯПӮ + О ПҒОҝПғПүПҖО№ОәПҢ','Purchases + Labour'))+
      empty(T('ОңО№ОәП„ПҢ ОҡОӯПҒОҙОҝПӮ','Gross Profit'),T('О ОөПҒО№ОёПҺПҒО№Оҝ','Margin'))+

      '<h3 style="font-size:13px;color:var(--muted);margin-bottom:14px">рҹ“Ҡ '+T('ОҡОұП„ОұОҪОҝОјО® ОӨО¶ОҜПҒОҝП…','Revenue Breakdown')+'</h3>'+
      '<div style="display:flex;align-items:center;justify-content:center;height:140px">'+
        '<svg viewBox="0 0 140 140" width="140" height="140" style="transform:rotate(-90deg)">'+
          '<circle cx="70" cy="70" r="52" fill="none" stroke="var(--line)" stroke-width="26"></circle></svg>'+
      '</div>'+
      '<div class="muted" style="font-size:12px;text-align:center;margin-top:6px">'+T('ОЈП…ОјПҖО»О®ПҒПүПғОө ПҖПүО»О®ПғОөО№ПӮ ОіО№Оұ ОҪОұ ОҙОөО№ПӮ П„О·ОҪ ОәОұП„ОұОҪОҝОјО®','Enter sales to see the breakdown')+'</div>'+
    '</div>';
  }

  const primeHex=(M.primePct<=65)?OK_HEX:(M.primePct<=70?WARN_HEX:BAD_HEX);
  const gpHex=(M.gp>=0)?OK_HEX:BAD_HEX;
  const cards='<div class="pcards">'+
      mc(T('ОӨО¶ОҜПҒОҝПӮ','Sales'),money2(sales),T('ОҡОұОёОұПҒОӯПӮ О ПүО»О®ПғОөО№ПӮ','Net Sales'),'var(--accent)',ACCENT_HEX,'var(--accent-bg)')+
      mc('Prime Cost',pct(M.primePct),T('О‘ОіОҝПҒОӯПӮ + О ПҒОҝПғПүПҖО№ОәПҢ','Purchases + Labour'),primeHex,primeHex,primeHex+'14')+
      mc(T('ОңО№ОәП„ПҢ ОҡОӯПҒОҙОҝПӮ','Gross Profit'),money2(M.gp),T('О ОөПҒО№ОёПҺПҒО№Оҝ','Margin')+' '+pct(M.gpPct),gpHex,gpHex,gpHex+'14')+
    '</div>';

  // в”Җв”Җ Donut В«ОҡОұП„ОұОҪОҝОјО® ОӨО¶ОҜПҒОҝП…В» в”Җв”Җ
  const Rr=52, Cc=2*Math.PI*Rr;
  const GREY='#c9ced4';
  const parts=[
    {name:T('О‘ОіОҝПҒОӯПӮ','Purchases'),val:pu,col:'#154766'},
    {name:T('ОңО№ПғОёОҝОҙОҝПғОҜОұ','Payroll'),val:la,col:'#1a5276'},
    {name:T('ОӣОөО№П„ОҝП…ПҒОіО№ОәО¬','Operating'),val:op,col:'#7d919f'},
  ];
  // ОӨОҝ ОҡОұОёОұПҒПҢ ОјПҖОұОҜОҪОөО№ О“ОҡОЎОҷ (ОҝП…ОҙОӯП„ОөПҒОҝ) ПҺПғП„Оө ОҪОұ ОәО»ОөОҜОҪОөО№ Оҝ ОәПҚОәО»ОҝПӮ (100% П„О¶ОҜПҒОҝП…),
  // ОұО»О»О¬ Оҝ ПҮПҒО®ПғП„О·ПӮ ОІО»ОӯПҖОөО№ П„Оҝ ПҮПҒПүОјОұП„О№ПғП„ПҢ ОҡОұОёОұПҒПҢ ОұПҖПҢ П„О·ОҪ ОәО¬П„Пү О»ПүПҒОҜОҙОұ.
  if(np>=0) parts.push({name:T('ОҡОұОёОұПҒПҢ','Net'),val:np,col:GREY,neutral:true});
  else       parts.push({name:T('О–О·ОјО№О¬','Loss'),val:np,col:GREY,neutral:true});
  const denom=sales;
  let off=0, ring='';
  parts.forEach(function(p){
    if(p.val<=0)return; // О¶О·ОјО№О¬ О® ОјО·ОҙОӯОҪ: ПҮПүПҒОҜПӮ segment
    const frac=denom>0?Math.max(0,p.val)/denom:0;
    const len=frac*Cc;
    if(len<=0)return;
    ring+='<circle cx="70" cy="70" r="'+Rr+'" fill="none" stroke="'+p.col+'" stroke-width="26" '+
      'stroke-dasharray="'+len.toFixed(2)+' '+(Cc-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'"></circle>';
    off+=len;
  });
  const donut='<svg viewBox="0 0 140 140" width="140" height="140" style="transform:rotate(-90deg)">'+
    '<circle cx="70" cy="70" r="'+Rr+'" fill="none" stroke="var(--line)" stroke-width="26"></circle>'+ring+'</svg>';
  const center='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">'+
    '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">'+T('ОӨО¶ОҜПҒОҝПӮ','Sales')+'</div>'+
    '<div style="font-size:16px;font-weight:800;color:var(--ink)">'+money2(sales)+'</div></div>';
  const row=p=>'<div class="prow">'+
    '<span style="display:flex;align-items:center;gap:9px">'+
      '<i style="width:11px;height:11px;border-radius:50%;background:'+p.col+';display:inline-block;flex:0 0 auto"></i>'+p.name+'</span>'+
    '<b style="color:var(--ink)">'+money2(p.val)+'</b></div>';

  return cards+
    '<div class="card" style="padding:15px">'+
      '<h3 style="font-size:13px;color:var(--muted);margin-bottom:14px">рҹ“Ҡ '+T('ОҡОұП„ОұОҪОҝОјО® ОӨО¶ОҜПҒОҝП…','Revenue Breakdown')+'</h3>'+
      '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">'+
        '<div style="position:relative;width:140px;height:140px;flex:0 0 auto;margin:0 auto">'+donut+center+'</div>'+
        '<div class="plegend" style="flex:1 1 150px;min-width:150px">'+parts.map(row).join('')+'</div>'+
      '</div>'+
    '</div>';
}
function profitResultsHtml(R){
  const D=R.decl, RE=R.real;
  const money2=v=>money(Math.round((v||0)*100)/100);
  const pct=v=>(isFinite(v)?v.toFixed(1):'0.0')+'%';
  const badge=(val,good,warn,inv)=>{const ok=inv?(val>=good):(val<=good);const mid=inv?(val>=warn):(val<=warn);return ok?'var(--ok)':(mid?'#e0a800':'var(--bad)');};
  const T=(el,en)=>L(el,en);
  const OK_HEX='#1e8449', BAD_HEX='#922b21';

  // О‘ОҪО¬О»П…ПғО· ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ (ПҖО»ОұОәОҜОҙО№Оұ) вҖ” ОҙОөОҜПҮОҪОөО№ П„Оұ ОңОҹОқО‘О”ОҷОҡО‘ ПғП„ОҝО№ПҮОөОҜОұ,
  // ПҮПүПҒОҜПӮ ОҪОұ ОөПҖОұОҪОұО»ОұОјОІО¬ОҪОөО№ ОӨО¶ОҜПҒОҝ/Prime/ОҡОұОёОұПҒПҢ (ОөОҜОҪОұО№ О®ОҙО· ПғП„О№ПӮ ОәО¬ПҒП„ОөПӮ ПҖО¬ОҪПү)
  // ОҝПҚП„Оө О‘ОіОҝПҒОӯПӮ/ОңО№ПғОёОҝОҙОҝПғОҜОұ/ОӣОөО№П„ОҝП…ПҒОіО№ОәО¬ (ОөОҜОҪОұО№ О®ОҙО· ПғП„Оҝ donut).
  const chip=(name,amt,pcTxt,pcCol,stripe)=>
    '<div class="achip">'+
      '<span class="cstripe" style="background:'+stripe+'"></span>'+
      '<div class="cn">'+name+'</div>'+
      '<div class="amt">'+money2(amt)+'</div>'+
      '<div class="pc" style="color:'+pcCol+'">'+pcTxt+'</div>'+
    '</div>';
  // ОӣПүПҒОҜОҙОұ ОұПҖОҝП„ОөО»ОӯПғОјОұП„ОҝПӮ (ОңО№ОәП„ПҢ О® ОҡОұОёОұПҒПҢ) вҖ” ОҜОҙО№Оҝ ПғП„П…О», ОјПҖОұОҜОҪОөО№ ПғОө ОҙПҚОҝ ПғО·ОјОөОҜОұ
  const band=(label,val,pcVal,pos,stacked)=>{
    const col=(val>=0)?'var(--ok)':'var(--bad)';
    const bg=(val>=0)?'#f2faf5':'#fdf3f2';
    const mt=(pos==='top'?'margin-top:12px':'margin-top:11px');
    if(stacked){
      return '<div class="agp agp-stack" style="background:'+bg+';'+mt+'">'+
        '<span class="cstripe" style="background:'+col+'"></span>'+
        '<div class="lab">'+label+'</div>'+
        '<div class="val" style="color:'+col+'">'+money2(val)+'</div>'+
        '<div class="vpc" style="color:'+col+'">'+pct(pcVal)+'</div>'+
      '</div>';
    }
    return '<div class="agp" style="background:'+bg+';'+mt+'">'+
      '<span class="cstripe" style="background:'+col+'"></span>'+
      '<span class="lab">'+label+'</span>'+
      '<span class="val" style="color:'+col+'">'+money2(val)+'</span>'+
      '<span class="vpc" style="color:'+col+'">('+pct(pcVal)+')</span>'+
    '</div>';
  };
  const analysisCard=(M)=>{
    const bevCol=badge(M.bevPct,25,30), foodCol=badge(M.foodPct,30,35), labCol=badge(M.labourPct,30,35);
    const supPct=M.sales?(R.pSup||0)/M.sales*100:0;
    let h='<div class="card">'+
      '<h3 style="font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center">рҹ“Ҳ '+T('О‘ОҪО¬О»П…ПғО· ОұОҪО¬ ОәОұП„О·ОіОҝПҒОҜОұ','Category Breakdown')+'</h3>'+
      '<div class="achips">'+
        chip(T('О ОҝП„О¬ & ОЎОҝПҶО®ОјОұП„Оұ','Beverages'),R.pBev,pct(M.bevPct),bevCol,'#154766')+
        chip(T('ОҰОұОіО·П„ПҢ','Food'),R.pFood,pct(M.foodPct),foodCol,'#7d919f')+
        chip(T('О ПҒОҝПғПүПҖО№ОәПҢ','Labour'),M.labour,pct(M.labourPct),labCol,'#1a5276')+
        chip(T('О‘ОҪОұО»ПҺПғО№ОјОұ','Supplies'),R.pSup,pct(supPct),'var(--muted)','#95a1ab')+
      '</div>';
    // ОҰПҢПҒОҝПӮ / ОңОөП„О¬ ОҰПҢПҒПүОҪ вҖ” ОјПҢОҪОҝ ПҢП„ОұОҪ П…ПҖО¬ПҒПҮОөО№ ПҶПҢПҒОҝПӮ
    if(M.taxPct>0){
      h+='<div class="kv" style="margin-top:11px"><span class="k">'+T('ОҰПҢПҒОҝПӮ','Tax')+' ('+M.taxPct+'%)</span><span class="v">вҲ’'+money2(M.tax)+'</span></div>'+
        '<div class="kv" style="border-top:1px solid var(--line);padding-top:6px;font-size:15px"><span class="k"><b>рҹ’° '+T('ОңОөП„О¬ ОҰПҢПҒПүОҪ','After Tax')+'</b></span><span class="v" style="color:'+(M.after>=0?'var(--ok)':'var(--bad)')+'"><b>'+money2(M.after)+'</b> ('+pct(M.afterPct)+')</span></div>';
    }
    // ОӨОөО»О№ОәПҢ ОұПҖОҝП„ОӯО»ОөПғОјОұ: ОҡОұОёОұПҒПҢ ОҡОӯПҒОҙОҝПӮ (ОұОҫОҜОұ, ПҖОҝПғОҝПғП„ПҢ ОұПҖПҢ ОәО¬П„Пү)
    h+=band(T('ОҡОұОёОұПҒПҢ ОҡОӯПҒОҙОҝПӮ','Net Profit'),M.np,M.npPct,'bottom',true);
    h+='</div>';
    return h;
  };

  // О‘ОәОҝО»ОҝП…ОёОөОҜ П„ОҝОҪ ОҙО№ОұОәПҢПҖП„О· В«ОңОөП„ПҒО·П„О¬ ПғП„ОҝОҪ ОӨО¶ОҜПҒОҝВ».
  // ОҢП„ОұОҪ ОөОҜОҪОұО№ ОәО»ОөО№ОҙПүОјОӯОҪОҝ (О№ОҙО№ПүП„О№ОәПҢП„О·П„Оұ), ОҙОөОҜПҮОҪОөО№ ПҖО¬ОҪП„Оұ П„О· О”О·О»ПүОјОӯОҪО· вҖ” ПҖОҝП„Оӯ П„О·ОҪ О ПҒОұОіОјОұП„О№ОәО®.
  const useReal=(ST.pfUseReal!==false)&&R.hasCash&&privacyUnlocked();
  const M=useReal?RE:D;
  return profitTopHtml(M,T,money2,pct,badge)+analysisCard(M);
}

// ОҡПҢПғП„ОҝПӮ ОөОҪПҢПӮ item ОұОҪО¬ О‘ОӨОҹОңОҹ (О»ОұОјОІО¬ОҪОөО№ П…ПҖПҢПҲО· П„Оҝ В«ОұОҪО¬ ПҖПҢПғОұ О¬П„ОҝОјОұВ»)
function evItemCost(it){
  const qty=parseFloat(it.qty_per_guest)||0;
  const per=parseFloat(it.per_guests)||1;      // ПҖ.ПҮ. 1 ПғОұО»О¬П„Оұ ОұОҪО¬ 4 О¬П„ОҝОјОұ вҶ’ per=4
  const effective=per>0?(qty/per):0;           // ПҖПҒОұОіОјОұП„О№ОәО® ПҖОҝПғПҢП„О·П„Оұ ОұОҪО¬ О¬П„ОҝОјОҝ
  if(it.recipe_id){
    const r=(ST.recipes||[]).find(x=>x.id===it.recipe_id);
    if(!r)return 0;
    const cc=recipeCalc(r);
    return (cc.realCost||0)*effective;
  }
  if(it.product_id){
    const p=(ST.products||[]).find(x=>x.id===it.product_id);
    if(!p)return 0;
    const b=ST.best[p.id]||{};
    return (parseFloat(b.price)||0)*effective;
  }
  return 0;
}
function evCalc(){
  const e=ST.event||{}; const items=ST.eventItems||[];
  const guests=parseFloat(e.guests)||0;
  let perGuest=0; items.forEach(it=>{perGuest+=evItemCost(it);});
  const foodCost=perGuest*guests;
  const extra=parseFloat(e.extra_costs)||0;
  const totalCost=foodCost+extra;
  const price=parseFloat(e.price_per_guest)||0;
  const revenue=price*guests;
  const profit=revenue-totalCost;
  const marginPct=revenue>0?(profit/revenue*100):0;
  const costPct=revenue>0?(totalCost/revenue*100):0;
  const costPerGuest=guests>0?(totalCost/guests):0;
  return {guests,perGuest,foodCost,extra,totalCost,price,revenue,profit,marginPct,costPct,costPerGuest};
}

// в”Җв”Җ рҹӣ’ ОӣОҷОЈОӨО‘ О‘О“ОҹОЎО©Оқ (П„О№ ОҪОұ ПҖОұПҒОұОіОіОөОҜО»Пү ОіО№Оұ П„О·ОҪ ОөОәОҙО®О»ПүПғО·) в”Җв”Җ
function evShopList(){
  const e=ST.event, R=evCalc(), g=R.guests;
  if(!g){toast('вқҢ '+L('О’О¬О»Оө ОұПҒО№ОёОјПҢ ОұП„ПҢОјПүОҪ','Enter number of guests'));return;}
  // ОңО¬О¶ОөПҲОө ОҹОӣО‘ П„Оұ П…О»О№ОәО¬ (ОұОҪОұО»ПҚОҝОҪП„ОұПӮ П„О№ПӮ ПғП…ОҪП„ОұОіОӯПӮ ПғОө ПҖПҒОҝПҠПҢОҪП„Оұ)
  const need={};   // product_id -> {qty, unit}
  const addProd=(pid,qty,unit)=>{
    if(!pid)return;
    if(!need[pid])need[pid]={qty:0,unit:unit||''};
    need[pid].qty+=qty;
  };
  const expand=(recId,mult,depth)=>{
    if((depth||0)>4)return;
    const ings=(ST.recipeIng||[]).filter(x=>x.recipe_id===recId);
    ings.forEach(ing=>{
      const nm=(ing.ingredient||'').trim();
      const sub=(ST.recipes||[]).find(r=>r.is_homemade&&(r.name||'').trim().toLowerCase()===nm.toLowerCase());
      const q=(parseFloat(ing.quantity)||0)*mult;
      if(sub){ const y=parseFloat(sub.yield_qty)||1; expand(sub.id,q/y,(depth||0)+1); }
      else { const p=(ST.products||[]).find(x=>(x.sku||'').trim().toLowerCase()===nm.toLowerCase());
             if(p)addProd(p.id,q,ing.unit||''); }
    });
  };
  (ST.eventItems||[]).forEach(it=>{
    const qty=parseFloat(it.qty_per_guest)||0;
    const pg=parseFloat(it.per_guests)||1;
    const total=(qty/pg)*g;                    // ПғП…ОҪОҝО»О№ОәОӯПӮ ОјОөПҒОҜОҙОөПӮ/ПҖОҝП„О¬ ОіО№Оұ ПҢО»О· П„О·ОҪ ОөОәОҙО®О»ПүПғО·
    if(it.recipe_id)expand(it.recipe_id,total,0);
    else if(it.product_id)addProd(it.product_id,total,'');
  });
  let h='<div style="margin-top:10px"><div class="card" style="background:var(--accent-bg);border-color:var(--accent)"><b style="color:var(--accent)">рҹӣ’ '+L('ОӣОҜПғП„Оұ О‘ОіОҝПҒПҺОҪ','Shopping List')+'</b><div style="font-size:12px;color:var(--muted)">'+esc(e.name)+' В· '+g+' '+L('О¬П„ОҝОјОұ','guests')+'</div></div>';
  const ids=Object.keys(need);
  if(!ids.length)h+='<div class="card muted" style="text-align:center">'+L('О ПҒПҢПғОёОөПғОө ПҖПҒПҺП„Оұ ОјОөОҪОҝПҚ','Add menu items first')+'</div>';
  let totalC=0;
  const bySup={};
  ST._shopRows={};   // ОіО№Оұ ОҪОұ ОёП…ОјО¬П„ОұО№ П„О№ПӮ ОөПҖО№О»ОҝОіОӯПӮ ПҖПҒОҝОјО·ОёОөП…П„О®
  ids.forEach(pid=>{
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)return;
    // О ОҝО№ОҝПӮ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ; (ОөПҖО№О»ОҝОіО® ПҮПҒО®ПғП„О· О® Оҝ ПҶОёО·ОҪПҢП„ОөПҒОҝПӮ)
    const rows=(ST.prices||[]).filter(x=>x.product_id===pid&&(parseFloat(x.price)||0)>0)
      .map(x=>({sid:x.supplier_id,name:supName(x.supplier_id),price:parseFloat(x.price)||0}))
      .sort((a,b2)=>a.price-b2.price);
    const chosenSid=(ST.evSup&&ST.evSup[pid])||((rows[0]||{}).sid)||null;
    const chosen=rows.find(x=>x.sid===chosenSid)||rows[0]||{name:'вҖ”',price:0};
    const price=chosen.price||0;
    const n=need[pid];
    const mu=(p.measure_unit||'').toLowerCase();
    const size=parseFloat(p.size_ml)||0;
    const ru=(n.unit||'').toLowerCase();
    const isWeight=(ru==='gr'||ru==='g'||mu==='kg'||mu==='g');
    let buyQty, buyUnit, cost;

    if(mu==='kg'||mu==='l'){
      const inKgL=n.qty/1000;
      buyQty=Math.round(inKgL*100)/100; buyUnit=(mu==='kg'?L('ОәО№О»О¬','kg'):L('О»ОҜП„ПҒОұ','L'));
      cost=price*inKgL;
    } else if(mu==='g'||mu==='ml'){
      buyQty=Math.round(n.qty*10)/10; buyUnit=mu;
      cost=price*n.qty;
    } else if(size>0){
      const packs=n.qty/size;
      buyQty=Math.ceil(packs*10)/10;
      buyUnit=isWeight?L('ПғП…ПғОә. (ОәО№О»О¬)','packs (kg)'):L('ПҶО№О¬О»ОөПӮ/П„ОөОј','bottles/pcs');
      cost=price*packs;
    } else {
      buyQty=Math.ceil(n.qty*10)/10; buyUnit=L('П„ОөОј','pcs');
      cost=price*n.qty;
    }
    totalC+=cost;
    const sup=chosen.name||'вҖ”';
    if(!bySup[sup])bySup[sup]=[];
    bySup[sup].push({pid,name:p.sku,qty:buyQty,unit:buyUnit,raw:n.qty,rawUnit:n.unit,cost,rows,chosenSid:chosen.sid});
  });
  Object.keys(bySup).sort().forEach(sup=>{
    h+='<div class="card"><h3 style="font-size:13px;color:var(--accent);margin-bottom:8px">рҹҸў '+esc(sup)+'</h3>';
    bySup[sup].forEach(x=>{
      h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div style="flex:1"><b>'+esc(x.name)+'</b>'+(x.rawUnit?('<div style="font-size:11px;color:var(--muted)">'+(function(){var u=(x.rawUnit||'').toLowerCase();if((u==='gr'||u==='g')&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' '+L('ОәО№О»О¬','kg');if(u==='ml'&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' L';return (Math.round(x.raw*10)/10)+' '+esc(x.rawUnit);})()+'</div>'):'')+'</div>'+
          '<div style="text-align:right"><b>'+x.qty+'</b> <span style="font-size:11px;color:var(--muted)">'+esc(x.unit)+'</span><div style="font-size:11px;color:var(--muted)">'+money(Math.round(x.cost*100)/100)+'</div></div>'+
        '</div>'+
        ((x.rows&&x.rows.length>1)?('<select onchange="evSetSup(\''+x.pid+'\',this.value)" style="width:100%;margin-top:5px;padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:var(--card)">'+
          x.rows.map(r=>'<option value="'+r.sid+'"'+(r.sid===x.chosenSid?' selected':'')+'>'+esc(r.name)+' В· '+money(r.price)+'</option>').join('')+
        '</select>'):'')+
      '</div>';
    });
    // в”Җв”Җ ОҡОҝП…ОјПҖО№О¬ ПҖОұПҒОұОіОіОөО»ОҜОұПӮ ОұОҪО¬ ПҖПҒОҝОјО·ОёОөП…П„О® в”Җв”Җ
    const sObj=(ST.suppliers||[]).find(s2=>String(s2.name)===String(sup));
    const lines=bySup[sup].map(x=>'вҖў '+x.name+': '+x.qty+' '+x.unit).join('\n');
    const body=L('О ОұПҒОұОіОіОөО»ОҜОұ','Order')+' - '+((ST.shopName||'').trim()||'')+'\n'+
      (e.name?(L('О•ОәОҙО®О»ПүПғО·','Event')+': '+e.name+(e.event_date?(' ('+dGRs(e.event_date)+')'):'')+'\n'):'')+
      '\n'+L('ОҡОұО»О·ПғПҖОӯПҒОұ, ПҖОұПҒОұОәО¬П„Пү О· ПҖОұПҒОұОіОіОөО»ОҜОұ ОјОұПӮ:','Hello, here is our order:')+'\n\n'+lines+'\n';
    const mailto='mailto:'+((sObj&&sObj.email)||'')+'?subject='+encodeURIComponent(L('О ОұПҒОұОіОіОөО»ОҜОұ','Order')+' - '+(e.name||''))+'&body='+encodeURIComponent(body);
    const wa='https://wa.me/'+String((sObj&&sObj.phone)||'').replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(body);
    const vb='viber://forward?text='+encodeURIComponent(body);
    h+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'+
      '<a class="btn" href="'+mailto+'" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;padding:8px;font-size:13px">рҹ“§ Email</a>'+
      '<a class="btn" href="'+wa+'" target="_blank" rel="noopener" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;background:#25d366;padding:8px;font-size:13px">рҹҹў WhatsApp</a>'+
      '<a class="btn" href="'+vb+'" style="flex:1 1 100%;text-align:center;text-decoration:none;display:block;background:#7360f2;padding:8px;font-size:13px">рҹҹЈ Viber</a>'+
    '</div>';
    h+='</div>';
  });
  if(ids.length)h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);display:flex;justify-content:space-between"><b>'+L('ОЈП…ОҪОҝО»О№ОәПҢ ОҡПҢПғП„ОҝПӮ ОҘО»О№ОәПҺОҪ','Total Items Cost')+'</b><b style="color:var(--accent)">'+money(Math.round(totalC*100)/100)+'</b></div>';
  h+='<button class="btn ghost" style="margin-top:10px" onclick="drawEvent()">вҶҗ '+L('О ОҜПғПү ПғП„О·ОҪ ОөОәОҙО®О»ПүПғО·','Back to event')+'</button></div>';
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}
function evSetSup(pid,sid){
  if(!ST.evSup)ST.evSup={};
  ST.evSup[pid]=sid;
  evShopList();   // ОҫОұОҪОұПӢПҖОҝО»ПҢОіО№ПғОө ОјОө П„ОҝОҪ ОҪОӯОҝ ПҖПҒОҝОјО·ОёОөП…П„О®
}
// в”Җв”Җ рҹ“„ О ОЎОҹОЈОҰОҹОЎО‘ О О•ОӣО‘ОӨО— (ПҮПүПҒОҜПӮ ОәПҢПғП„О·!) в”Җв”Җ
function evOffer(){
  evLive();
  const e=ST.event, R=evCalc();
  const m2=v=>money(Math.round((v||0)*100)/100);
  const dGR=d=>{if(!d)return '';const q=String(d).split('-');return q.length===3?(q[2]+'/'+q[1]+'/'+q[0]):d;};
  let shop=(ST.shopName||'').trim();
  if(!shop){try{shop=localStorage.getItem('ciq_shop')||'';}catch(x){}}
  const items=(ST.eventItems||[]).map(it=>{
    const nm=it.recipe_id?((ST.recipes||[]).find(x=>x.id===it.recipe_id)||{}).name:((ST.products||[]).find(x=>x.id===it.product_id)||{}).sku;
    const q=parseFloat(it.qty_per_guest)||1, pg=parseFloat(it.per_guests)||1;
    let sfx='';
    if(pg>1)sfx=' ('+q+' '+L('ОұОҪО¬','per')+' '+pg+' '+L('О¬П„ОҝОјОұ','guests')+')';
    else if(q!==1)sfx=' ('+q+'/'+L('О¬П„ОҝОјОҝ','guest')+')';
    return 'вҖў '+(nm||'вҖ”')+sfx;
  }).join('\n');

// ---- Purchased DB (П„О№ ОұОіПҢПҒОұПғОөПӮ, ОұОҪО¬ ПҖПҒОҝПҠПҢОҪ, ОјОө ПҶОҜО»П„ПҒОұ) ----
function pcSet(k,v){ST.pc=ST.pc||{};ST.pc[k]=v;if(k==='category')ST.pc.sub='';renderStats();}
function resolveProductId(r){ if(r.product_id)return r.product_id; return matchProduct(r.raw_product||'')||null; }
function resolveSupName(r){ if(r.supplier_id)return supName(r.supplier_id); const sid=matchSupplier(r.supplier_name||''); if(sid)return supName(sid); return r.supplier_name||'вҖ”'; }
function unitDivisor(unit){
  // О•ПҖО№ПғП„ПҒОӯПҶОөО№ ПғОө ПҖПҢПғОұ П„ОөОјО¬ПҮО№Оұ ПғПҖО¬ОөО№ О· ОјОҝОҪО¬ОҙОұ. ОңОҹОқОҹ ОәО№ОІПҺП„О№Оҝ ОҙО№ОұО№ПҒОөОҜП„ОұО№.
  const u=normStr(unit); // NFD, ОәОөПҶОұО»ОұОҜОұ, ПҮПүПҒОҜПӮ П„ПҢОҪОҝП…ПӮ
  if(!u)return 1;
  // О’О‘ОЎО•ОӣОҷ О® ПҢОіОәОҝПӮ/ОІО¬ПҒОҝПӮ вҶ’ О”О•Оқ ОҙО№ОұО№ПҒОөОҜП„ОұО№ (ОјОҜОұ ОјОҝОҪО¬ОҙОұ ОұОіОҝПҒО¬ПӮ)
  if(/\bО’О‘ОЎ|BARREL|KEG\b/.test(u))return 1;
  // ОҡОҷО’О©ОӨОҷОҹ вҶ’ ОІПҒОөПӮ ОұПҒО№ОёОјПҢ ПҶО№ОұО»ПҺОҪ (ОҡОҷО’24, О ОӣО‘ОЈОӨ ОҡОҷО’ ОңО• 24ОҰ, ОҡОҷО’О©ОӨОҷОҹ 24, CASE 24)
  if(/ОҡОҷО’|CASE|CRATE/.test(u)){
    const m=u.match(/(\d+)/);           // ПҖПҒПҺП„ОҝПӮ ОұПҒО№ОёОјПҢПӮ = ПҶО№О¬О»ОөПӮ/ОәО№ОІПҺП„О№Оҝ
    const n=m?parseInt(m[1],10):0;
    return (n>1)?n:1;
  }
  return 1;  // ml, L, gr, ПҶО№О¬О»О·, ОІОұПҒОӯО»О№ вҶ’ ПүПӮ ОӯПҮОөО№
}
function purchasedView(){
  ST.pc=ST.pc||{category:'',sub:'',supplier:'',period:'Month',from:'',to:''};
  const C=ST.pc;
  let from=null,to=new Date();
  if(C.period==='Custom'){ if(C.from){const p=C.from.split('-');from=new Date(+p[0],+p[1]-1,+p[2]);} if(C.to){const p=C.to.split('-');to=new Date(+p[0],+p[1]-1,+p[2],23,59,59);} }
  else { const days={Week:7,Month:30,Quarter:90,'6 Months':180,'9 Months':270,Year:365}; from=new Date(Date.now()-(days[C.period]||30)*86400000); }
  const inRange=ds=>{ if(!ds)return true; const p=String(ds).split('-'); if(p.length!==3)return true; const d=new Date(+p[0],+p[1]-1,+p[2]); if(from&&d<from)return false; if(to&&d>to)return false; return true; };
  const agg={};let totalSpend=0;const orderSet={};
  (ST.history||[]).forEach(r=>{
    if(!inRange(r.date))return;
    const pid=resolveProductId(r);const p=pid&&ST.products.find(x=>x.id===pid);
    const name=p?p.sku:(r.raw_product||'вҖ”');
    const cat=p?(p.category||''):'';const sub=p?(p.sub_category||''):'';
    if(C.category&&cat!==C.category)return;
    if(C.sub&&sub!==C.sub)return;
    const sup=resolveSupName(r);
    if(C.supplier&&sup!==C.supplier)return;
    const rawQty=parseFloat(r.quantity)||0,rawPrice=parseFloat(r.price)||0;
    const div=unitDivisor(r.unit);          // ОҡОҷО’24 вҶ’ 24, ОІОұПҒОӯО»О№/О¬О»О»Оҝ вҶ’ 1

async function saveManual(){
  const pid=document.getElementById('mp-prod').value;
  const sid=document.getElementById('mp-sup').value;
  const supname=(document.getElementById('mp-supname').value||'').trim();
  const qty=parseFloat(document.getElementById('mp-qty').value)||0;
  const price=Math.round((parseFloat(document.getElementById('mp-price').value)||0)*100)/100;
  const unit=(document.getElementById('mp-unit').value||'').trim();
  const date=document.getElementById('mp-date').value;
  const upd=document.getElementById('mp-upd').checked;
  if(!pid){toast('вқҢ О”О№О¬О»ОөОҫОө ПҖПҒОҝПҠПҢОҪ');return;}
  if(price<=0){toast('вқҢ О’О¬О»Оө П„О№ОјО®');return;}
  const p=ST.products.find(x=>x.id===pid);
  const b=ST.best[pid]||{};
  const prev=parseFloat(b.price)||null;
  let chE=null,chP=null;
  if(prev&&prev>0){const d=Math.round((price-prev)*100)/100;if(d!==0){chE=d;chP=Math.round((d/prev)*10000)/10000;}}
  const name=supname||(sid?supName(sid):'О§ПүПҒОҜПӮ П„О№ОјОҝО»ПҢОіО№Оҝ');
  const btn=document.getElementById('mp-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    await sb.from('price_history').insert({tenant_id:p.tenant_id,product_id:pid,supplier_id:sid||null,supplier_name:name,date:date,raw_product:p.sku,unit:unit||null,quantity:qty,price:price,prev_price:prev,change_eur:chE,change_pct:chP,notes:'О§ПүПҒОҜПӮ П„О№ОјОҝО»ПҢОіО№Оҝ'});
    if(upd&&sid){
      await sb.from('product_prices').upsert({tenant_id:p.tenant_id,product_id:pid,supplier_id:sid,price:price,is_override:true},{onConflict:'product_id,supplier_id'});
      await sb.from('product_prices').update({is_override:false}).eq('product_id',pid).neq('supplier_id',sid);
      await refreshPrices();
    }
    const _th=curTenant();let _hq=sb.from('price_history').select('*');if(_th)_hq=_hq.eq('tenant_id',_th);const {data:hist}=await _hq.order('date',{ascending:false}).limit(400);
    ST.history=hist||[];
    btn.disabled=false;toast('вң… ОҡОұП„ОұОіПҒО¬ПҶО·ОәОө');keepScroll(renderInvoices);
  }catch(e){btn.disabled=false;toast('вқҢ '+(e.message||e));}
}
// ОӨОөО»ОөП…П„ОұОҜОұ О§ОЎО•О©ОңО•ОқО— ОұОіОҝПҒО¬ ПҖПҒОҝПҠПҢОҪП„ОҝПӮ ОұПҖПҢ П„ОҝОҪ ОҷО”ОҷОҹ ПҖПҒОҝОјО·ОёОөП…П„О® (П„ОөО»ОөП…П„ОұОҜОөПӮ 45 ОјОӯПҒОөПӮ)
function lastPurchase(pid){
  const sid=(document.getElementById('ocr-sup')||{}).value||'';
  if(!sid||!pid)return null;
  const cutoff=new Date(Date.now()-45*86400000).toISOString().slice(0,10);
  const rows=(ST.history||[]).filter(r=>r.product_id===pid&&r.supplier_id===sid&&(parseFloat(r.price)||0)>0&&(r.date||'')>=cutoff)
    .sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(!rows.length)return null;
  const r=rows[0];
  const qty=parseFloat(r.quantity)||0, price=parseFloat(r.price)||0;
  return {id:r.id,date:r.date,qty,price,total:qty*price};
}
// рҹҺҒ О”ПүПҒОөО¬ОҪ ОіПҒОұОјОјО® = ОҙПҺПҒОҝ ОұПҖПҢ О ОЎОҹО—О“ОҹОҘОңО•ОқОҹ П„О№ОјОҝО»ПҢОіО№Оҝ (ОҜОҙО№ОҝПӮ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ)
async function ocrGiftPrev(i){
  const ln=ST.ocr.lines[i];
  const freeQty=parseFloat(ln.qty)||0;
  const prev=lastPurchase(ln.productId);
  if(!prev||freeQty<=0){toast('вқҢ '+L('О”ОөОҪ ОІПҒОӯОёО·ОәОө ПҖПҒОҝО·ОіОҝПҚОјОөОҪО· ОұОіОҝПҒО¬','No previous purchase found'));return;}
  const totalPcs=prev.qty+freeQty;
  const newPrice=Math.round((prev.total/totalPcs)*100)/100;
  if(!confirm(L('О”О№ПҢПҒОёПүПғО· П„О№ОјО®ПӮ ПҖПҒОҝО·ОіОҝПҚОјОөОҪО·ПӮ ОұОіОҝПҒО¬ПӮ:','Correct previous purchase price:')+'\n\n'+
    prev.qty+' + '+freeQty+' '+L('ОҙПҺПҒОҝ','free')+' = '+totalPcs+'\n'+
    money(prev.price)+' вҶ’ '+money(newPrice)+'/'+L('П„ОөОј','pc')))return;
  try{
    // О”О№ПҢПҒОёПүПғОө П„Оҝ О№ПғП„ОҝПҒО№ОәПҢ
    await sb.from('price_history').update({quantity:totalPcs,price:newPrice}).eq('id',prev.id);
    const hr=(ST.history||[]).find(x=>x.id===prev.id); if(hr){hr.quantity=totalPcs;hr.price=newPrice;}
    // О”О№ПҢПҒОёПүПғОө ОәОұО№ П„О·ОҪ П„ПҒОӯПҮОҝП…ПғОұ П„О№ОјО® ПҖПҒОҝОјО·ОёОөП…П„О®
    const sid=(document.getElementById('ocr-sup')||{}).value||'';
    if(sid)await sb.from('product_prices').upsert({tenant_id:curTenant(),product_id:ln.productId,supplier_id:sid,price:newPrice,is_override:false},{onConflict:'product_id,supplier_id'});
    await refreshPrices();
    ln.skip=true; ln.productId=null;   // О· ОҙПүПҒОөО¬ОҪ ОіПҒОұОјОјО® ОҙОөОҪ ОәОұП„ОұПҮПүПҒОөОҜП„ОұО№ ОҫОөПҮПүПҒО№ПғП„О¬
    ln.giftApplied=true; ln.giftNote=L('ОҙПҺПҒОҝ ПғОө ПҖПҒОҝО·ОіОҝПҚОјОөОҪО· ОұОіОҝПҒО¬','gift on previous purchase');
    renderOcr();
    toast('рҹҺҒ '+L('О”О№ОҝПҒОёПҺОёО·ОәОө','Corrected')+' вҶ’ '+money(newPrice)+'/'+L('П„ОөОј','pc'));
  }catch(e){toast('вқҢ '+(e.message||e));}
}
// в”Җв”Җ рҹҺҒ О”О©ОЎО‘ (ОҜОҙО№Оҝ П„О№ОјОҝО»ПҢОіО№Оҝ) в”Җв”Җ
function ocrMergeGift(i,freeIdx){
  const o=ST.ocr; const ln=o.lines[i]; const fl=o.lines[freeIdx];
  const q=parseFloat(ln.qty)||0, fq=parseFloat(fl.qty)||0;
  const tot=parseFloat(ln.lineTotal)||((parseFloat(ln.price)||0)*q);
  const totalPcs=q+fq;
  if(totalPcs<=0){toast('вқҢ '+L('ОңО· ОӯОіОәП…ПҒОөПӮ ПҖОҝПғПҢП„О·П„ОөПӮ','Invalid quantities'));return;}
  if(ln._preGiftQty==null){ln._preGiftQty=ln.qty;ln._preGiftPrice=ln.price;}
  ln.qty=totalPcs;
  ln.price=Math.round((tot/totalPcs)*100)/100;
  ln.lineTotal=Math.round(tot*100)/100;
  ln.giftApplied=true; ln.giftNote=q+' + '+fq+' '+L('ОҙПҺПҒОҝ','free');
  fl._mergedInto=i; fl.skip=true;   // О· ОҙПүПҒОөО¬ОҪ ОіПҒОұОјОјО® ОҙОөОҪ ОәОұП„ОұПҮПүПҒОөОҜП„ОұО№ ОҫОөПҮПүПҒО№ПғП„О¬
  fl.productId=null;
  renderOcr();
  toast('рҹҺҒ '+L('О•ОҪПҺОёО·ОәОө','Merged')+' вҖ” '+money(ln.price)+'/'+L('П„ОөОј','pc'));
}
function ocrApplyGift(i,freeQty){

  const tot=parseFloat(ln.lineTotal)||((parseFloat(ln.price)||0)*q);
  const totalPcs=q+freeQty;

function detectPacks(raw){

  while(m=reAdd.exec(s)){const a=+m[1],b=+m[2],pc=a+b;if(pc>1&&pc<10000&&!seen['k'+pc]){seen['k'+pc]=1;out.push({label:a+'+'+b,perCase:pc});}}

function compressFile(f){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxD=2000;let w=img.width,h=img.height;
      if(Math.max(w,h)>maxD){const s=maxD/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      let dataUrl;
      try{const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);dataUrl=cv.toDataURL('image/jpeg',0.72);}
      catch(e){dataUrl=rd.result;}
      res({b64:String(dataUrl).split(',')[1],mediaType:'image/jpeg'});
    };
    img.onerror=()=>{const dataUrl=rd.result;res({b64:String(dataUrl).split(',')[1],mediaType:f.type||'image/jpeg'});};
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});}

function periodFrom(p){
  const d=new Date();
  if(p==='week')d.setDate(d.getDate()-7);
  else if(p==='month')d.setMonth(d.getMonth()-1);
  else if(p==='3m')d.setMonth(d.getMonth()-3);
  else if(p==='6m')d.setMonth(d.getMonth()-6);
  else if(p==='9m')d.setMonth(d.getMonth()-9);
  else if(p==='year')d.setFullYear(d.getFullYear()-1);
  else return '';
  return d.toISOString().slice(0,10);
}

  let h='<input class="search" id="phq" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="'+lbl('phSearch','рҹ”Қ О ПҒОҝПҠПҢОҪ О® ПҖПҒОҝОјО·ОёОөП…П„О®ПӮвҖҰ')+'" oninput="phSet(\'q\',this.value)" value="'+esc(F.q)+'" style="margin-top:10px">'+
    '<div class="tabs" style="flex-wrap:wrap">'+periods.map(([k,l])=>'<div class="tab '+(F.period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="phSet(\'period\',\''+k+'\')">'+l+'</div>').join('')+'</div>'+
    '<label style="display:flex;align-items:center;gap:8px;font-size:13px;margin:8px 2px;cursor:pointer"><input type="checkbox" '+(F.onlyCh?'checked':'')+' onchange="phSet(\'onlyCh\',this.checked)"> '+lbl('phOnlyCh','ОңПҢОҪОҝ ОјОө ОјОөП„ОұОІОҝО»О® П„О№ОјО®ПӮ')+'</label>';
  if(!rows.length){h+='<div class="card muted" style="text-align:center">'+lbl('pdNoRec','ОҡОұОјОҜОұ ОөОіОіПҒОұПҶО® ПғОө ОұП…П„О® П„О·ОҪ ПҖОөПҒОҜОҝОҙОҝ')+'</div>';return h;}
  // ОҹОјОұОҙОҝПҖОҝОҜО·ПғО· ОұОҪО¬ (О·ОјОөПҒОҝОјО·ОҪОҜОұ + ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ) = ОӯОҪОұ П„О№ОјОҝО»ПҢОіО№Оҝ/ПҖОұПҒОұО»ОұОІО®, ПҢПҖПүПӮ ПғП„Оҝ app
  const groups={};

  h+='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px)"><div style="max-width:1400px;margin:0 auto">';
  gk.slice(0,60).forEach(k=>{

    let gSup=g.sup;

      const cnt={};
      g.items.forEach(r=>{const pid=resolveProductId(r);const b=pid?ST.best[pid]:null;if(b&&b.sup&&b.sup!=='вҖ”')cnt[b.sup]=(cnt[b.sup]||0)+1;});
      const top=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
      if(top)gSup=top;
    }
    let body='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;min-width:620px;border-collapse:collapse;font-size:12px;margin-top:6px;white-space:nowrap">'+

      [lbl('wProduct','О ПҒОҝПҠПҢОҪ'),lbl('wCategory','ОҡОұП„О·ОіОҝПҒОҜОұ'),lbl('phhQty','О ОҝПғПҢП„О·П„Оұ'),lbl('phhUnit','Оң/Оң'),lbl('phhPrev','О ПҒОҝО·ОіОҝПҚОјОөОҪО· ОӨО№ОјО®'),lbl('phhPrice','ОӨО№ОјО®'),lbl('phhChgEur','ОңОөП„ОұОІОҝО»О® вӮ¬'),lbl('phhChgPct','ОңОөП„ОұОІОҝО»О® %'),lbl('thNotes','ОЈО·ОјОөО№ПҺПғОөО№ПӮ'),lbl('phhBest','Best')].map(c=>'<th style="padding:4px 6px;text-align:center;font-weight:600">'+c+'</th>').join('')+
      '</tr></thead><tbody>';
    g.items.forEach(r=>{
      const pid=resolveProductId(r);
      const p=ST.products.find(x=>x.id===pid);const nm=p?p.sku:(r.raw_product||'вҖ”');
      const cat=p?(p.category||''):'';
      const qty=parseFloat(r.quantity)||0;const price=parseFloat(r.price)||0;gtot+=qty*price;
      const cp=parseFloat(r.change_pct);const ce=parseFloat(r.change_eur);
      const chP=(!isNaN(cp)&&cp!==0)?((cp>0?'в–І':'в–ј')+(Math.abs(cp)*100).toFixed(0)+'%'):'';
      const chE=(!isNaN(ce)&&ce!==0)?((ce>0?'+':'')+money(ce)):'';
      const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');
      const b=pid?ST.best[pid]:null;
      const isBest=b&&b.price&&Math.abs(price-parseFloat(b.price))<0.001;
      let noteTxt=(r.notes||'').replace(/^(ОӨО№ОјОҝО»ПҢОіО№Оҝ|О§ПүПҒОҜПӮ П„О№ОјОҝО»ПҢОіО№Оҝ)$/,'').replace(/^О§ПҒОҝОҪО№О¬\s*/,'').trim();
      if(!noteTxt){
        const yr=(r.raw_product||'').match(/\b(19[5-9]\d|20[0-3]\d)\b/);           // ПҮПҒОҝОҪО№О¬
        const orig=(r.raw_product||'').match(/\b(О‘ОЎО“О•ОқОӨОҷОқ\S*|О’ОЎО‘О–ОҷОӣ\S*|О•ОӣОӣО‘О”\S*|О•ОӣОӣО—Оқ\S*|ОҷОЈО О‘Оқ\S*|ОҷОӨО‘Оӣ\S*|О“О‘ОӣОӣ\S*|О§ОҷОӣО—\S*|О О•ОЎОҹОҘ\S*|ОңО•ОһОҷОҡ\S*|ОҹОӣОӣО‘ОқО”\S*|ОңО‘ОЎОҹОҡ\S*|О‘ОҷО“ОҘО ОӨ\S*|ОӨОҹОҘОЎОҡ\S*|ОҡОҘО ОЎ\S*|ОқО‘Оһ\S*|ОҡОЎО—ОӨ\S*|ОҰОӣО©ОЎОҷОқ\S*|ОҳО•ОЈОЈО‘Оӣ\S*)\b/i);  // ПҖПҒОҝОӯО»ОөП…ПғО·
        noteTxt=(yr?yr[0]:'')+(yr&&orig?' В· ':'')+(orig?orig[0]:'');
      }
      body+='<tr style="border-bottom:1px solid var(--line)">'+
        '<td style="padding:5px 6px;text-align:left;font-weight:600">'+esc(nm)+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:var(--muted)">'+esc(cat||'вҖ”')+'</td>'+
        '<td style="padding:5px 6px;text-align:center">'+(qty?fmtQty(qty):'вҖ”')+'</td>'+

}

function priceDbView(){
  ST.pd=ST.pd||{pid:'',period:'all'};
  const P=ST.pd;
  const prods=ST.products.slice().sort((a,b)=>String(a.sku).localeCompare(String(b.sku)));
  if(!P.pid&&prods.length)P.pid=prods[0].id;
  const periods=[['week',lbl('pWeek','О•ОІОҙОҝОјО¬ОҙОұ')],['month',lbl('pMonth','ОңО®ОҪОұПӮ')],['3m',lbl('p3m','3 ОңО®ОҪОөПӮ')],['6m',lbl('p6m','6 ОңО®ОҪОөПӮ')],['9m',lbl('p9m','9 ОңО®ОҪОөПӮ')],['year',lbl('pYear','ОҲП„ОҝПӮ')],['all',lbl('pAll','ОҢО»Оұ')]];
  const from=periodFrom(P.period);
  let rows=(ST.history||[]).filter(r=>resolveProductId(r)===P.pid);
  if(from)rows=rows.filter(r=>(r.date||'')>=from);
  rows=rows.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const units=rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  const spend=rows.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0)),0);
  const prices=rows.map(r=>parseFloat(r.price)).filter(x=>!isNaN(x));
  const avg=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:0;
  const latest=rows.length?parseFloat(rows[0].price):0;
  const oldest=rows.length?parseFloat(rows[rows.length-1].price):0;
  const chE=(rows.length>1)?(latest-oldest):0;
  const chP=(oldest>0)?(chE/oldest):0;
  const b=ST.best[P.pid]||{};
  // в”Җв”Җ ПҖПҒОұОіОјОұП„О№ОәО¬ ПҶОёО·ОҪПҢП„ОөПҒОҝПӮ ПҖПҒОҝОјО·ОёОөП…П„О®ПӮ (ОұПҖПҢ ПҢО»ОөПӮ П„О№ПӮ П„О№ОјОӯПӮ, ОұОіОҪОҝПҺОҪП„ОұПӮ П„Оҝ ПҮОөО№ПҒОҝОәОҜОҪО·П„Оҝ override) в”Җв”Җ
  const prForBest=ST.prices.filter(x=>x.product_id===P.pid);
  let realBest={sup:'',price:Infinity};

  const bestSup=realBest.sup||b.sup||'';const bestPrice=(realBest.price<Infinity)?realBest.price:(parseFloat(b.price)||0);
  const nInv=new Set(rows.map(r=>r.invoice_id).filter(Boolean)).size||rows.length;
  const tile=(lbl,val,col)=>'<div style="flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:'+(col||'var(--ink)')+'">'+val+'</div><div style="font-size:10px;color:var(--muted)">'+lbl+'</div></div>';
  let h='<div class="field" style="margin-top:12px"><label>'+lbl('wProduct','О ПҒОҝПҠПҢОҪ')+'</label><select onchange="pdSet(\'pid\',this.value)">'+prods.map(p=>'<option value="'+p.id+'"'+(p.id===P.pid?' selected':'')+'>'+esc(p.sku)+'</option>').join('')+'</select></div>'+
    '<div class="tabs" style="flex-wrap:wrap">'+periods.map(([k,l])=>'<div class="tab '+(P.period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="pdSet(\'period\',\''+k+'\')">'+l+'</div>').join('')+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'+
      tile(lbl('pdSumQty','ОЈП…ОҪ. О ОҝПғПҢП„О·П„Оұ'),units)+tile(lbl('pdSumSpend','ОЈП…ОҪ. О”ОұПҖО¬ОҪО·'),'вӮ¬'+Math.round(spend),'var(--accent)')+
      tile(lbl('pdAvgPrice','ОңОӯПғО· ОӨО№ОјО®'),avg>0?'вӮ¬'+avg.toFixed(2):'вҖ”')+tile(lbl('pdLast','ОӨОөО»ОөП…П„ОұОҜОұ'),latest>0?'вӮ¬'+latest.toFixed(2):'вҖ”')+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
      tile(lbl('pdChgE','ОңОөП„ОұОІОҝО»О® вӮ¬'),(chE>0?'+':'')+'вӮ¬'+chE.toFixed(2),chE>0?'var(--bad)':(chE<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('pdChgP','ОңОөП„ОұОІОҝО»О® %'),(chP>0?'+':'')+(chP*100).toFixed(1)+'%',chP>0?'var(--bad)':(chP<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('iInvoices','ОӨО№ОјОҝО»ПҢОіО№Оұ'),nInv)+
    '</div>'+
    '<div class="card" style="margin-top:10px"><div class="kv"><span class="k">рҹҸҶ Best Supplier</span><span class="v">'+esc(bestSup||'вҖ”')+' '+(bestPrice>0?('('+money(bestPrice)+')'):'')+'</span></div></div>';
  h+='<h3 style="font-size:13px;color:var(--muted);margin:16px 2px 6px">'+lbl('pdHistH','ОҷОЈОӨОҹОЎОҷОҡОҹ')+' ('+rows.length+')</h3>';
  if(!rows.length)h+='<div class="card muted" style="text-align:center;font-size:13px">'+lbl('pdNoRec','ОҡОұОјОҜОұ ОөОіОіПҒОұПҶО® ПғОө ОұП…П„О® П„О·ОҪ ПҖОөПҒОҜОҝОҙОҝ')+'</div>';
  rows.forEach(r=>{const cp=parseFloat(r.change_pct);const ch=(!isNaN(cp)&&cp!==0)?((cp>0?'в–І':'в–ј')+' '+(Math.abs(cp)*100).toFixed(1)+'%'):'';const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');let sup=resolveSupName(r);if(!sup||sup==='вҖ”'){const m=prForBest.find(x=>Math.abs((parseFloat(x.price)||0)-(parseFloat(r.price)||0))<0.001);sup=m?supName(m.supplier_id):'';}
    h+='<div class="card" style="padding:10px;margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+money(r.price)+(ch?(' <span style="color:'+col+';font-size:12px">'+ch+'</span>'):'')+'</span>'+(r.quantity?('<span style="font-size:12px;color:var(--muted)">'+fmtQty(r.quantity)+(r.unit?(' '+esc(normUnit(r.unit))):'')+'</span>'):'')+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">рҹ“… '+fmtDate(r.date)+(sup?(' В· рҹҸў '+esc(sup)):'')+'</div></div>';});
  return h;
}

function expPeriodRange(period){
  const now=ST.expRefDate?new Date(ST.expRefDate+'T12:00:00'):new Date();
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let from,to;
  if(period==='day'){from=new Date(y,m,d);to=new Date(y,m,d);}
  else if(period==='week'){const dow=(now.getDay()+6)%7;from=new Date(y,m,d-dow);to=new Date(y,m,d-dow+6);}
  else if(period==='month'){from=new Date(y,m,1);to=new Date(y,m+1,0);}
  else if(period==='quarter'){const q=Math.floor(m/3);from=new Date(y,q*3,1);to=new Date(y,q*3+3,0);}
  else if(period==='half'){const h=m<6?0:6;from=new Date(y,h,1);to=new Date(y,h+6,0);}
  else {from=new Date(y,0,1);to=new Date(y,11,31);}
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}

function payPeriodRange(period){
  const off=ST.payOffset||0;
  const now=new Date(); let y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let from,to;
  if(period==='day'){ const x=new Date(y,m,d+off); from=new Date(x); to=new Date(x); }
  else if(period==='week'){ const dow=(now.getDay()+6)%7; from=new Date(y,m,d-dow+off*7); to=new Date(y,m,d-dow+6+off*7); }
  else if(period==='half'){
    let base=(d<=15)?0:1; let idx=base+off;
    let mm=m+Math.floor(idx/2); let half=((idx%2)+2)%2;
    if(half===0){from=new Date(y,mm,1);to=new Date(y,mm,15);}
    else {from=new Date(y,mm,16);to=new Date(y,mm+1,0);}
  }
  else { from=new Date(y,m+off,1); to=new Date(y,m+off+1,0); }
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}

function periodLabel(period,range){
  const M=[L('ОҷОұОҪОҝП…О¬ПҒО№ОҝПӮ','January'),L('ОҰОөОІПҒОҝП…О¬ПҒО№ОҝПӮ','February'),L('ОңО¬ПҒП„О№ОҝПӮ','March'),L('О‘ПҖПҒОҜО»О№ОҝПӮ','April'),L('ОңО¬О№ОҝПӮ','May'),L('ОҷОҝПҚОҪО№ОҝПӮ','June'),L('ОҷОҝПҚО»О№ОҝПӮ','July'),L('О‘ПҚОіОҝП…ПғП„ОҝПӮ','August'),L('ОЈОөПҖП„ОӯОјОІПҒО№ОҝПӮ','September'),L('ОҹОәП„ПҺОІПҒО№ОҝПӮ','October'),L('ОқОҝОӯОјОІПҒО№ОҝПӮ','November'),L('О”ОөОәОӯОјОІПҒО№ОҝПӮ','December')];
  const f=new Date(range.from+'T12:00:00'), t=new Date(range.to+'T12:00:00');
  if(period==='month')return M[f.getMonth()]+' '+f.getFullYear();
  if(period==='day')return fmtDate(range.from);
  return fmtDate(range.from)+' вҖ“ '+fmtDate(range.to);
}

}

function empSetWageBasis(mode){
  const hid=document.getElementById('emp-wagebasis'); if(hid)hid.value=mode;

function empSetEmpType(k){

function empToggleInsured(){

async function saveEmployee(id){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const name=g('emp-name').trim();
  if(!name){toast('вқҢ '+L('О’О¬О»Оө ПҢОҪОҝОјОұ','Enter a name'));return;}
  const row={tenant_id:curTenant(),name:name,position:g('emp-pos').trim()||null,
    daily_wage:parseFloat(g('emp-wage'))||0,ot_mode:g('emp-otmode')||'amount',
    ot_value:parseFloat(g('emp-otval'))||0,tip_units:parseFloat(g('emp-units'))||1,
    contrib_class:g('emp-contrib')||null,
    pay_type:g('emp-paytype')||'shift', hourly_rate:parseFloat(g('emp-hourly'))||0,
    wage_basis:g('emp-wagebasis')||'gross', active:true,
    efka_no:g('emp-efka')||null, amka:g('emp-amka')||null,
    hire_date:g('emp-hire')||null, leave_date:g('emp-leave')||null,
    employment_type:g('emp-emptype')||'full', insured:g('emp-insured')==='1'};
  try{
    if(id){const {error}=await sb.from('employees').update(row).eq('id',id); if(error)throw error;}
    else{row.created_by=ST.userEmail||''; const {error}=await sb.from('employees').insert(row); if(error)throw error;}
    closeModal(); toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved')); keepScroll(renderPayroll);
  }catch(e){toast('вқҢ '+(e.message||e));}
}

}
function payrollDetail(empId){

function shiftCalc(){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const empId=g('sh-emp'); const e=(ST.employees||[]).find(x=>x.id===empId);
  if(!e)return null;
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const hrs=parseFloat(g('sh-hours'))||0; const otH=parseFloat(g('sh-ot'))||0;
  const isHourly=e.pay_type==='hourly';
  const cls=(e.insured===false)?null:(ST.contribSetup||[]).find(x=>x.name===e.contrib_class);
  const empPct=cls?nn(cls.emp_pct):0;
  const isNet=(e.wage_basis==='net')&&empPct>0&&empPct<100;
  const up=v=>isNet?(v/(1-empPct/100)):v;   // ОәОұОёОұПҒПҢ вҶ’ ОјО№ОәП„ПҢ
  const wage=up(isHourly?(hrs*nn(e.hourly_rate)):nn(e.daily_wage));
  const baseHourly=up(isHourly?nn(e.hourly_rate):(nn(e.daily_wage)/8));
  let otAmt=0;
  if(e.ot_mode==='percent'){ otAmt=otH*baseHourly*(1+nn(e.ot_value)/100); }
  else { otAmt=otH*up(nn(e.ot_value)); }
  const gross=wage+otAmt;
  // О•О№ПғПҶОҝПҒОӯПӮ ОұПҖПҢ П„О·ОҪ ОәОұП„О·ОіОҝПҒОҜОұ
  const empC=cls?gross*nn(cls.emp_pct)/100:0;
  const emprC=cls?gross*nn(cls.empr_pct)/100:0;
  return {wage:wage,otAmt:otAmt,total:gross,gross:gross,empC:empC,emprC:emprC,netPay:gross-empC,cost:gross+emprC,emp:e,cls:cls,isNet:isNet};
}

function computeTips(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const emps=ST.employees||[]; const shifts=ST.workShifts||[]; const closes=ST.payCloses||[];
  const T=(el,en)=>L(el,en);
  // ОӨПҒПҢПҖОҝПӮ ОҙО№ОұОјОҝО№ПҒОұПғОјОҝПҚ: 'day' = ПҢО»О· О· ОјОӯПҒОұ ПғОө ОӯОҪОұ pot, 'shift' = ОҫОөПҮПүПҒО№ПғП„О¬ ОұОҪО¬ ОІО¬ПҒОҙО№Оұ.
  // ОӨОҝ view ОјПҖОҝПҒОөОҜ ОҪОұ ОәО¬ОҪОөО№ ПҖПҒОҝПғПүПҒО№ОҪПҢ override ОјОӯПғПү ST.tipViewMode.
  const mode=ST.tipViewMode||(ST.daySetup&&ST.daySetup.tipMode)||'shift';
  // О‘ОҪО¬ О·ОјОӯПҒОұ: pot ОұОҪО¬ ОІО¬ПҒОҙО№Оұ + ПғПҚОҪОҝО»Оҝ ПүПҒПҺОҪ ОұОҪО¬ ОІО¬ПҒОҙО№Оұ
  const days={};
  closes.forEach(cl=>{
    const d=cl.close_date; if(!d||d<range.from||d>range.to)return;
    let tp={}; try{tp=(typeof cl.tips_data==='string')?JSON.parse(cl.tips_data):(cl.tips_data||{});}catch(e){tp={};}
    if(!Object.keys(tp).length)return;
    days[d]={pots:tp,hours:{}};
  });
  // ОҸПҒОөПӮ ОұОҪО¬ О·ОјОӯПҒОұ/ОІО¬ПҒОҙО№Оұ
  shifts.forEach(s=>{
    const d=s.work_date; if(!days[d])return;
    const st=s.shift_type||'all';
    const add=(k,hh)=>{if(hh>0)days[d].hours[k]=(days[d].hours[k]||0)+hh;};
    if(st==='both'){ add('morning',n(s.hours_morning)); add('night',n(s.hours_night)); }
    else if(st==='morning'||st==='night'){ add(st,n(s.hours)); }
    else { add('all',n(s.hours)); }
  });
  // ОЈОө mode 'day': ОӯОҪПүПғОө П„Оұ pots П„О·ПӮ ОәО¬ОёОө ОјОӯПҒОұПӮ ПғОө ОӯОҪОұ ('all') ОәОұО№ ОјОӯП„ПҒОұ ПҢО»ОөПӮ П„О№ПӮ ПҺПҒОөПӮ ОјОұО¶ОҜ
  if(mode==='day'){
    Object.keys(days).forEach(d=>{
      const day=days[d]; let card=0,cash=0;
      Object.keys(day.pots).forEach(k=>{card+=n(day.pots[k].card);cash+=n(day.pots[k].cash);});
      day.pots={all:{card:card,cash:cash}};
    });
  }
  // Rate ОұОҪО¬ О·ОјОӯПҒОұ/ОІО¬ПҒОҙО№Оұ, ОәОұО№ ОјОҝОҜПҒОұПғОјОұ
  const perEmp={}; let grandTips=0;
  const rateSum={}, rateCount={};
  Object.keys(days).forEach(d=>{
    const day=days[d];
    Object.keys(day.pots).forEach(k=>{
      const pot=day.pots[k]||{}; const potTotal=n(pot.card)+n(pot.cash);
      if(potTotal<=0)return;
      grandTips+=potTotal;
      // ОЈП„ОұОёОјО№ПғОјОӯОҪОөПӮ ОјОҝОҪО¬ОҙОөПӮ: ПҺПҒОөПӮ Г— ОјОҝОҪО¬ОҙОұ
      let weighted=0; const parts=[];
      shifts.forEach(s=>{
        if(s.work_date!==d)return;
        const e=emps.find(x=>x.id===s.employee_id); if(!e)return;
        const unit=n(e.tip_units)||1; const st=s.shift_type||'all';
        let hh=0;
        if(mode==='day'){
          // ОҢО»ОөПӮ ОҝО№ ПҺПҒОөПӮ П„О·ПӮ ОјОӯПҒОұПӮ П„ОҝП… ОөПҒОіОұО¶ПҢОјОөОҪОҝП…, ОұОҪОөОҫОұПҒП„О®П„ПүПӮ ОІО¬ПҒОҙО№ОұПӮ
          hh=(st==='both')?(n(s.hours_morning)+n(s.hours_night)):n(s.hours);
        } else {
          if(st==='both')hh=(k==='morning')?n(s.hours_morning):(k==='night'?n(s.hours_night):0);
          else if(st===k)hh=n(s.hours);
          else if(st==='all'&&k==='all')hh=n(s.hours);
        }
        if(hh<=0)return;
        const w=hh*unit; weighted+=w; parts.push({id:e.id,name:e.name,unit:unit,hh:hh,w:w,k:(mode==='day'?'all':k)});
      });
      if(weighted<=0)return;
      const rate=potTotal/weighted;
      const rk=(mode==='day')?'all':k;
      rateSum[rk]=(rateSum[rk]||0)+rate; rateCount[rk]=(rateCount[rk]||0)+1;
      const cardShare=potTotal>0?(n(pot.card)/potTotal):0;
      parts.forEach(p=>{
        const amt=p.w*rate;
        if(!perEmp[p.id])perEmp[p.id]={name:p.name,unit:p.unit,total:0,card:0,cash:0,hM:0,hN:0,hA:0};
        perEmp[p.id].total+=amt;
        perEmp[p.id].card+=amt*cardShare;
        perEmp[p.id].cash+=amt*(1-cardShare);
        if(p.k==='morning')perEmp[p.id].hM+=p.hh; else if(p.k==='night')perEmp[p.id].hN+=p.hh; else perEmp[p.id].hA+=p.hh;
      });
    });
  });
  const rates={}; Object.keys(rateSum).forEach(k=>{rates[k]=rateSum[k]/rateCount[k];});
  const rows=Object.keys(perEmp).map(id=>{
    const x=perEmp[id];

async function recalcContributions(){
  const T=(el,en)=>L(el,en);
  const range=payPeriodRange(ST.payPeriod||'month');
  const n=v=>(v!=null&&v!==''?(+v):0);
  const emps=ST.employees||[];
  const list=(ST.workShifts||[]).filter(s=>s.work_date>=range.from&&s.work_date<=range.to);
  if(!list.length){toast('в„№пёҸ '+L('ОҡОұОјОҜОұ ОІО¬ПҒОҙО№Оұ ПғОө ОұП…П„О® П„О·ОҪ ПҖОөПҒОҜОҝОҙОҝ','No shifts in this period'));return;}
  if(!confirm(L('О•ПҖОұОҪП…ПҖОҝО»ОҝОіО№ПғОјПҢПӮ ОөО№ПғПҶОҝПҒПҺОҪ ОіО№Оұ '+list.length+' ОІО¬ПҒОҙО№ОөПӮ;','Recalculate contributions for '+list.length+' shifts?')))return;
  let changed=0, skipped=0;
  for(const s of list){
    const e=emps.find(x=>x.id===s.employee_id);
    if(!e){skipped++;continue;}
    const cls=(ST.contribSetup||[]).find(x=>x.name===e.contrib_class);
    const gross=n(s.total_amount);
    const empC=cls?gross*n(cls.emp_pct)/100:0;
    const emprC=cls?gross*n(cls.empr_pct)/100:0;
    if(Math.abs(empC-n(s.emp_contrib))<0.005&&Math.abs(emprC-n(s.empr_contrib))<0.005)continue;
    try{await sb.from('work_shifts').update({emp_contrib:empC,empr_contrib:emprC}).eq('id',s.id);changed++;}
    catch(err){skipped++;}
  }
  toast('вң… '+changed+' '+L('ОІО¬ПҒОҙО№ОөПӮ ОөОҪО·ОјОөПҒПҺОёО·ОәОұОҪ','shifts updated')+(skipped?' В· '+skipped+' '+L('ПҖОұПҒОұО»ОөОҜПҶОёО·ОәОұОҪ','skipped'):''));
  keepScroll(renderPayroll);
}

function cfRange(){
  const off=ST.cfOffset||0; const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()+off,1);
  const to=new Date(now.getFullYear(),now.getMonth()+off+1,0);
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}
function computeCashflow(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const inR=d=>d&&d>=range.from&&d<=range.to;
  const closes=(ST.cfCloses||[]).filter(x=>inR(x.close_date));
  const exps=(ST.cfExps||[]).filter(x=>inR(x.exp_date));
  const pays=(ST.cfPays||[]).filter(x=>inR(x.pay_date));
  const pr=(ST.cfPayroll||[]).filter(x=>inR(x.pay_date));
  const st=(ST.cfSettle||[]).filter(x=>inR(x.settle_date));
  const T=(el,en)=>L(el,en);
  // в”Җв”Җ О•ОҷОЈОЎОҹО•ОЈ в”Җв”Җ
  let cards=0, tillCash=0, tipsCard=0, tipsCash=0, delNet=0;
  closes.forEach(cl=>{
    cards+=n(cl.card_income);
    tillCash+=n(cl.cash_income)+n(cl.off_envelope);
    let tp={}; try{tp=(typeof cl.tips_data==='string')?JSON.parse(cl.tips_data):(cl.tips_data||{});}catch(e){}
    Object.keys(tp).forEach(k=>{tipsCard+=n(tp[k].card);tipsCash+=n(tp[k].cash);});
    let dd=[]; try{dd=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);}catch(e){}
    dd.forEach(d=>{delNet+=(n(d.net_val)||(n(d.gross)-n(d.vat)));});
  });
  const settled=st.reduce((t,x)=>t+n(x.amount),0);
  const inflow=[];
  if(cards>0)inflow.push({label:T('ОҡО¬ПҒП„ОөПӮ','Cards'),amt:cards,where:'bank'});
  if(tillCash>0)inflow.push({label:T('ОӨОұОјОөОҜОҝ О—ОјОӯПҒОұПӮ','Daily Till'),amt:tillCash,where:'till'});
  if(settled>0)inflow.push({label:T('О•О№ПғПҖПҒО¬ОҫОөО№ПӮ Delivery','Delivery Settlements'),amt:settled,where:'bank'});
  // в”Җв”Җ О•ОҡОЎОҹО•ОЈ (ОұОҪО¬ ПҢОҪОҝОјОұ) в”Җв”Җ
  const outMap={};
  const addOut=(label,amt,where)=>{const k=label+'|'+where;if(!outMap[k])outMap[k]={label,amt:0,where};outMap[k].amt+=amt;};
  exps.forEach(e=>{
    if(e.category==='suppliers')return;
    const nm=(e.label&&e.label.trim())?e.label.trim():T('ОҲОҫОҝОҙОҝ','Expense');
    addOut(nm,n(e.amount),e.payment_method==='cash'?'till':'bank');
  });
  pays.forEach(p=>addOut(p.supplier_name||T('О ПҒОҝОјО·ОёОөП…П„О®ПӮ','Supplier'),n(p.amount),p.payment_method==='cash'?'till':'bank'));
  pr.forEach(p=>{
    const lbl=(p.kind==='efka')?T('О•О№ПғПҶОҝПҒОӯПӮ','Contributions'):((p.kind==='tips')?T('ОҰО№О»ОҝОҙПүПҒО®ОјОұП„Оұ','Tips'):T('ОңО№ПғОёОҝОҜ','Wages'));
    if(n(p.amount_bank)>0)addOut(lbl,n(p.amount_bank),'bank');
    if(n(p.amount_cash)>0)addOut(lbl,n(p.amount_cash),'till');
  });
  const outflow=Object.values(outMap).sort((a,b)=>b.amt-a.amt);
  // в”Җв”Җ ОҘО ОҹОӣОҹОҷО О‘ в”Җв”Җ
  // ОҰО№О»ОҝОҙПүПҒО®ОјОұП„Оұ ПҖОҝП… ОӯПҮОҝП…ОҪ О®ОҙО· ОҙОҝОёОөОҜ (ОҙОөОҪ ОөОҜОҪОұО№ ПҖО№Оұ П…ПҖОҝПҮПҒОӯПүПғО·)
  const tipsPaidBank=pr.filter(p=>p.kind==='tips').reduce((t,p)=>t+n(p.amount_bank),0);
  const tipsPaidCash=pr.filter(p=>p.kind==='tips').reduce((t,p)=>t+n(p.amount_cash),0);
  const bal=(ST.cfBalances||[]).filter(b=>b.as_of<=range.from).slice(-1)[0];
  const openBank=bal?n(bal.bank):0, openTill=bal?n(bal.till):0;
  const inBank=inflow.filter(x=>x.where==='bank').reduce((t,x)=>t+x.amt,0);
  const inTill=inflow.filter(x=>x.where==='till').reduce((t,x)=>t+x.amt,0);
  const outBank=outflow.filter(x=>x.where==='bank').reduce((t,x)=>t+x.amt,0);
  const outTill=outflow.filter(x=>x.where==='till').reduce((t,x)=>t+x.amt,0);
  return {inflow,outflow,openBank,openTill,
    bank:openBank+inBank-outBank, till:openTill+inTill-outTill,
    tipsCard:Math.max(0,tipsCard-tipsPaidBank), tipsCash:tipsCash, hasOpening:!!bal};
}

function vatRange(period,offset){
  const off=offset||0; const now=new Date();
  let from,to;
  if(period==='quarter'){
    const q=Math.floor(now.getMonth()/3)+off;
    from=new Date(now.getFullYear(),q*3,1); to=new Date(now.getFullYear(),q*3+3,0);
  } else if(period==='half'){
    const hh=Math.floor(now.getMonth()/6)+off;
    from=new Date(now.getFullYear(),hh*6,1); to=new Date(now.getFullYear(),hh*6+6,0);
  } else if(period==='year'){
    from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31);
  } else {
    from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0);
  }
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}
function vatLabel(period,range){
  const M=[L('ОҷОұОҪОҝП…О¬ПҒО№ОҝПӮ','January'),L('ОҰОөОІПҒОҝП…О¬ПҒО№ОҝПӮ','February'),L('ОңО¬ПҒП„О№ОҝПӮ','March'),L('О‘ПҖПҒОҜО»О№ОҝПӮ','April'),L('ОңО¬О№ОҝПӮ','May'),L('ОҷОҝПҚОҪО№ОҝПӮ','June'),L('ОҷОҝПҚО»О№ОҝПӮ','July'),L('О‘ПҚОіОҝП…ПғП„ОҝПӮ','August'),L('ОЈОөПҖП„ОӯОјОІПҒО№ОҝПӮ','September'),L('ОҹОәП„ПҺОІПҒО№ОҝПӮ','October'),L('ОқОҝОӯОјОІПҒО№ОҝПӮ','November'),L('О”ОөОәОӯОјОІПҒО№ОҝПӮ','December')];
  const f=new Date(range.from+'T12:00:00');
  if(period==='year')return ''+f.getFullYear();
  if(period==='quarter')return (Math.floor(f.getMonth()/3)+1)+'Оҝ '+L('ОӨПҒОҜОјО·ОҪОҝ','Quarter')+' '+f.getFullYear();
  if(period==='half')return (Math.floor(f.getMonth()/6)+1)+'Оҝ '+L('О•ОҫО¬ОјО·ОҪОҝ','Half')+' '+f.getFullYear();
  return M[f.getMonth()]+' '+f.getFullYear();
}
function computeVat(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const inR=d=>d&&d>=range.from&&d<=range.to;
  // О•ОәПҒОҝОӯПӮ: ОұПҖПҢ П„Оҝ О–, ОұОҪО¬ ПғП…ОҪП„ОөО»ОөПғП„О®
  const byRate={};
  (ST.vatZ||[]).forEach(z=>{
    if(!inR(z.z_date))return;
    let lines=[]; try{lines=(typeof z.vat_lines==='string')?JSON.parse(z.vat_lines):(z.vat_lines||[]);}catch(e){}
    lines.forEach(ln=>{
      const r=n(ln.rate), net=n(ln.net);
      if(net<=0)return;
      if(!byRate[r])byRate[r]={net:0,vat:0};
      byRate[r].net+=net; byRate[r].vat+=net*r/100;
    });
  });
  const outRows=Object.keys(byRate).map(r=>({rate:+r,net:byRate[r].net,vat:byRate[r].vat})).sort((a,b)=>b.rate-a.rate);
  const outVat=outRows.reduce((t,x)=>t+x.vat,0);
  // О•О№ПғПҒОҝОӯПӮ: ОұПҖПҢ П„Оұ П„О№ОјОҝО»ПҢОіО№Оұ
  const invs=(ST.vatInv||[]).filter(i=>inR((i.date||'').slice(0,10)));
  const inVat=invs.reduce((t,i)=>t+n(i.vat_pct),0);
  return {outRows,outVat,invs,inVat,due:outVat-inVat};
}

function computeSupplierBalances(){
  const sups=ST.suppliers||[]; const invs=ST.invoices||[]; const pays=ST.dailyPayments||[]; const credits=ST.supplierCredits||[];
  const n=v=>(v!=null&&v!==''?(+v):0);
  const bal=[];
  sups.forEach(s=>{
    const opening=n(s.opening_balance);
    const invoiced=invs.filter(i=>i.supplier_id===s.id).reduce((t,i)=>t+n(i.total_gross),0);
    const paid=pays.filter(p=>p.supplier_id===s.id).reduce((t,p)=>t+n(p.amount),0);
    const credited=credits.filter(cr=>cr.supplier_id===s.id).reduce((t,cr)=>t+n(cr.amount)+n(cr.vat),0);
    const owed=opening+invoiced-paid-credited;
    if(Math.abs(owed)>0.005||opening!==0)bal.push({id:s.id,name:s.name,owed:owed});
  });
  bal.sort((a,b)=>b.owed-a.owed);
  ST.supplierBalances=bal;
}

  const nn=v=>(v!=null&&v!==''?(+v):0);

  const zOfficial = cash + card - cashPay;
  // ОҰО¬ОәОөО»ОҝПӮ = ОјОөП„ПҒО·П„О¬ ПҖОҝП… ОјОӯОҪОҝП…ОҪ (ПҖО¬ОҪОө П„ПҒО¬ПҖОөО¶Оұ)
  const envelope = cash - cashPay;
  // О ПҒОұОіОјОұП„О№ОәПҢПӮ ОӨО¶ОҜПҒОҝПӮ = ОҰО¬ОәОөО»ОҝПӮ + О•ОәП„ПҢПӮ ОҰОұОәОӯО»ОҝП… + ОҡО¬ПҒП„ОөПӮ

  let delNet=0;

    const g2=el.value!==''?(+el.value):0;

    delNet+=(g2-v2);
  });
  const income = envelope + off + card - cn + delNet;

  const envEl=document.getElementById('dc-envelope'); if(envEl)envEl.textContent=money(Math.round(envelope*100)/100);
