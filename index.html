function profitCrossCheck(R,A,p){
  const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0);
  const money2=x=>money(Math.round(x*100)/100);
  const inclVat=(p.sales_incl_vat!==false);
  // Τι έγραψε ο χρήστης (μικτά, όπως τα βάζει)
  const typed=n(p.sales_bev)+n(p.sales_hot)+n(p.sales_hot_low)+n(p.sales_food);
  if(typed<=0)return '';
  // Τι ξέρει το σύστημα: Ζ (καθαρό + ΦΠΑ) ή Ταμείο
  let zGross=0;
  if(A&&A.sales){ Object.keys(A.sales).forEach(r=>{ zGross+=A.sales[r]*(1+(+r)/100); }); }
  const tillGross=n(A&&A.tillTotal);
  const ref=zGross>0?zGross:tillGross;
  const src=zGross>0?T('Ζ','Z'):T('Ταμείο','Till');
  if(ref<=0)return '';
  const diff=typed-ref;
  const ok=Math.abs(diff)<Math.max(1,ref*0.005);   // ανοχή 0,5%
  const col=ok?'var(--ok)':'#B8860B';
  const bg=ok?'var(--ok-bg,#E6F7EC)':'#FFF7E6';
  return '<div style="background:'+bg+';border-radius:8px;padding:10px 12px;margin-top:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:12px;color:'+col+'">'+(ok?('✓ '+T('Συμφωνεί με το','Matches')+' '+src):('⚠ '+T('Διαφορά από το','Differs from')+' '+src))+'</span>'+
      '<span style="font-size:14px;font-weight:700;color:'+col+'">'+(ok?money2(0):((diff>0?'+':'−')+money2(Math.abs(diff))))+'</span>'+
    '</div>'+
    '<div style="display:flex;gap:14px;margin-top:5px;font-size:11px;color:var(--muted)">'+
      '<span>'+T('Έγραψες','Entered')+' '+money2(typed)+'</span>'+
      '<span>'+src+' '+money2(ref)+'</span>'+
    '</div>'+
  '</div>';
}
function calcProfit(p){
  const inclVat=!!p.sales_incl_vat;
  const dStd=vatByRole('std',24), dRed=vatByRole('red',13);
  const vf=(parseFloat(p.vat_food)||dRed)/100, vb=(parseFloat(p.vat_bev)||dStd)/100;
  const vh=(p.vat_hot!=null&&p.vat_hot!=='')?(parseFloat(p.vat_hot)/100):vb;
  const vhl=(p.vat_hot_low!=null&&p.vat_hot_low!=='')?(parseFloat(p.vat_hot_low)/100):vf;
  const A=ST.pfAuto||{};
  const use=(manual,auto)=>((manual!=null&&manual!=='')?(parseFloat(manual)||0):(auto||0));
  const sfRaw=parseFloat(p.sales_food)||0;      // Φαγητό 13%
  const sbRaw=parseFloat(p.sales_bev)||0;       // Ποτά 24%
  const shRaw=parseFloat(p.sales_hot)||0;       // Ροφήματα 24% (σερβιριζόμενα)
  const shlRaw=parseFloat(p.sales_hot_low)||0;  // Ροφήματα 13% (πακέτο)
  const cashRaw=use(p.sales_cash_unrec,A.cashUnrec);
  // Καθαρές πωλήσεις (χωρίς ΦΠΑ)
  const sf=inclVat?sfRaw/(1+vf):sfRaw;
  const sb=inclVat?sbRaw/(1+vb):sbRaw;
  const shSrv=inclVat?shRaw/(1+vh):shRaw;
  const shPkg=inclVat?shlRaw/(1+vhl):shlRaw;
  const sh=shSrv+shPkg;               // Ροφήματα: και οι δύο συντελεστές μαζί
  const cash=inclVat?cashRaw/(1+vb):cashRaw;   // μετρητά: υποθέτουμε συντελεστή ποτών
  const salesDecl=sf+sb+sh;           // δηλωμένες (καθαρές)
  const salesReal=salesDecl+cash;     // πραγματικές (καθαρές)
  // Αγορές
  const auto=autoPurchases(p.period_start,p.period_end);
  const pFood=(p.purch_food_manual!=null&&p.purch_food_manual!=='')?parseFloat(p.purch_food_manual):auto.food;
  const pBev=(p.purch_bev_manual!=null&&p.purch_bev_manual!=='')?parseFloat(p.purch_bev_manual):auto.bev;
  const pSup=(p.purch_sup_manual!=null&&p.purch_sup_manual!=='')?parseFloat(p.purch_sup_manual):auto.sup;
  const purchases=pFood+pBev+pSup;
  // Προσωπικό & λειτουργικά
  const labour=use(p.wages,A.wages)+use(p.social,A.social);
  const opex=(parseFloat(p.rent)||0)+(parseFloat(p.utilities)||0)+use(p.other_expenses,A.opex);
  const mk=(sales)=>{
    const gp=sales-purchases;
    const np=gp-labour-opex;
    const pc=purchases+labour;
    const taxPct=parseFloat(p.tax_pct)||0;
    const tax=(np>0)?(np*taxPct/100):0;      // φόρος μόνο σε κέρδος
    const after=np-tax;
    return {
      sales, purchases, gp, gpPct:sales?gp/sales*100:0,
      labour, labourPct:sales?labour/sales*100:0,
      opex, np, npPct:sales?np/sales*100:0,
      taxPct, tax, after, afterPct:sales?after/sales*100:0,
      prime:pc, primePct:sales?pc/sales*100:0,
      foodPct:sf?pFood/sf*100:0,
      bevPct:(sb+sh)?pBev/(sb+sh)*100:0
    };
  };
  return {decl:mk(salesDecl), real:mk(salesReal), sf, sb, sh, shSrv, shPkg, cash, pFood, pBev, pSup, auto, hasCash:cash>0};
}
// Σύγκριση με πέρυσι για την Κερδοφορία πελατών
function pfCompareHtml(){
  const T=(el,en)=>L(el,en);
  const m2=x=>money(Math.round((x||0)*100)/100);
  const all=ST.pfAll||[]; if(!all.length)return '';
  const {start,end}=pPeriodDates();
  const d=new Date(start+'T12:00:00');
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  // Ίδια περίοδος πέρυσι
  const ly=new Date(d.getFullYear()-1,d.getMonth(),1);
  const lyEnd=new Date(d.getFullYear()-1,new Date(end+'T12:00:00').getMonth()+1,0);
  const prevRow=all.find(r=>r.period_start===fmt(ly)&&r.period_end===fmt(lyEnd));
  // Από αρχή έτους
  const yNow=d.getFullYear(), yPrev=yNow-1;
  const sumYTD=function(year){
    let rev=0,prof=0;
    all.forEach(function(r){
      if(!r.period_start)return;
      const ps=new Date(r.period_start+'T12:00:00');
      if(ps.getFullYear()!==year||ps.getMonth()>d.getMonth())return;
      const C=profitCalcFromRow(r); if(!C)return;
      const M=(ST.pfUseReal!==false&&C.hasCash)?C.real:C.decl;
      rev+=M.sales; prof+=M.np;
    });
    return {rev:rev,prof:prof};
  };
  const ytdNow=sumYTD(yNow), ytdPrev=sumYTD(yPrev);
  const row=function(label,now,prev){
    if(prev<=0&&now<=0)return '';
    let badge='<span class="muted">'+T('Νέο','New')+'</span>';
    if(prev>0){
      const pct=(now-prev)/prev*100, up=pct>=0;
      const col=Math.abs(pct)<0.05?'var(--muted)':(up?'var(--ok)':'var(--bad)');
      badge='<span style="color:'+col+';font-weight:700">'+(up?'▲ +':'▼ ')+Math.abs(pct).toFixed(1)+'%</span>';
    }
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px">'+
      '<div style="min-width:0;flex:1"><div>'+label+'</div><div class="muted" style="font-size:11px">'+T('Πέρυσι','Last Year')+' '+m2(prev)+'</div></div>'+
      '<div style="text-align:right"><div style="font-weight:700">'+m2(now)+'</div><div style="font-size:11px">'+badge+'</div></div></div>';
  };
  let inner='';
  if(prevRow){
    const P=profitCalcFromRow(prevRow);
    const cur=calcProfit(ST.pf||{});
    const useReal=(ST.pfUseReal!==false);
    const Mc=(useReal&&cur.hasCash)?cur.real:cur.decl;
    const Mp=(useReal&&P.hasCash)?P.real:P.decl;
    inner+=row(T('Τζίρος — Ίδια Περίοδος Πέρυσι','Sales — Same Period Last Year'),Mc.sales,Mp.sales);
    inner+=row(T('Καθαρό Κέρδος — Ίδια Περίοδος Πέρυσι','Net Profit — Same Period Last Year'),Mc.np,Mp.np);
  }
  if(ytdPrev.rev>0||ytdNow.rev>0){
    inner+=row(T('Τζίρος — Από Αρχή Έτους','Sales — Year To Date'),ytdNow.rev,ytdPrev.rev);
    inner+=row(T('Καθαρό Κέρδος — Από Αρχή Έτους','Net Profit — Year To Date'),ytdNow.prof,ytdPrev.prof);
  }
  if(!inner)return '';
  return '<div class="card"><h3 style="font-size:13px;color:var(--muted);margin-bottom:6px">📈 '+T('Σύγκριση','Comparison')+'</h3>'+inner+'</div>';
}

  const sales=M.sales||0;

  const primeCol=badge(M.primePct,65,70);

  const seg=[];

  if(pNp>0.4)seg.push({w:pNp,c:'#1e8449',t:pNp.toFixed(0)+'%'});
  const tot=seg.reduce((a,b)=>a+b.w,0)||100;
  let bar='';
  seg.forEach(function(x,i){
    const r=(i===0?'border-radius:6px 0 0 6px;':'')+(i===seg.length-1?'border-radius:0 6px 6px 0;':'');
    bar+='<div style="width:'+(x.w/tot*100).toFixed(2)+'%;background:'+x.c+';'+r+
      'display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap">'+x.t+'</div>';
  });
  const lg=(c,t,v,col)=>'<span style="display:flex;align-items:center;gap:7px'+(col?';color:'+col+';font-weight:600':'')+'">'+
    '<i style="width:9px;height:9px;border-radius:2px;background:'+c+';display:inline-block;flex:0 0 auto"></i>'+
    t+' <b style="color:'+(col||'var(--fg)')+'">'+money2(v)+'</b></span>';
  const mc=(t,val,sub,col,bcol)=>'<div class="pcard"'+(bcol?' style="border:1.5px solid '+bcol+'"':'')+'>'+
    '<div><div class="t">'+t+'</div></div>'+
    '<div class="r"><div class="n" style="color:'+col+'">'+val+'</div><div class="s">'+sub+'</div></div></div>';
  return '<div class="pcards">'+
      mc(T('Τζίρος','Sales'),money2(sales),T('Καθαρές Πωλήσεις','Net Sales'),'var(--accent)',null)+
      mc('Prime Cost',pct(M.primePct),T('Αγορές + Προσωπικό','Purchases + Labour'),primeCol,primeCol)+
      mc(T('Καθαρό Κέρδος','Net Profit'),money2(np),T('Περιθώριο','Margin')+' '+pct(M.npPct),npCol,npCol)+
    '</div>'+
    '<div class="card" style="padding:15px">'+
      '<h3 style="font-size:13px;color:var(--muted);margin-bottom:11px">📊 '+T('Πού Πάνε Τα Λεφτά','Where The Money Goes')+'</h3>'+
      '<div style="display:flex;height:34px;border-radius:6px;overflow:hidden;margin-bottom:13px">'+bar+'</div>'+
      '<div class="plegend">'+
        lg('#154766',T('Αγορές','Purchases'),pu)+
        lg('#1a5276',T('Μισθοδοσία','Payroll'),la)+
        lg('#7d919f',T('Λειτουργικά','Operating'),op)+
        lg(np>=0?'#1e8449':'#922b21',np>=0?T('Καθαρό','Net'):T('Ζημιά','Loss'),np,npCol)+
      '</div>'+
    '</div>';
}

// Κόστος ενός item ανά ΑΤΟΜΟ (λαμβάνει υπόψη το «ανά πόσα άτομα»)
function evItemCost(it){
  const qty=parseFloat(it.qty_per_guest)||0;
  const per=parseFloat(it.per_guests)||1;      // π.χ. 1 σαλάτα ανά 4 άτομα → per=4
  const effective=per>0?(qty/per):0;           // πραγματική ποσότητα ανά άτομο
  if(it.recipe_id){
    const r=(ST.recipes||[]).find(x=>x.id===it.recipe_id);
    if(!r)return 0;
    const cc=recipeCalc(r);
    return (cc.realCost||0)*effective;
  }
  if(it.product_id){
    const p=(ST.products||[]).find(x=>x.id===it.product_id);
    if(!p)return 0;
    const b=ST.best[p.id]||{};
    return (parseFloat(b.price)||0)*effective;
  }
  return 0;
}
function evCalc(){
  const e=ST.event||{}; const items=ST.eventItems||[];
  const guests=parseFloat(e.guests)||0;
  let perGuest=0; items.forEach(it=>{perGuest+=evItemCost(it);});
  const foodCost=perGuest*guests;
  const extra=parseFloat(e.extra_costs)||0;
  const totalCost=foodCost+extra;
  const price=parseFloat(e.price_per_guest)||0;
  const revenue=price*guests;
  const profit=revenue-totalCost;
  const marginPct=revenue>0?(profit/revenue*100):0;
  const costPct=revenue>0?(totalCost/revenue*100):0;
  const costPerGuest=guests>0?(totalCost/guests):0;
  return {guests,perGuest,foodCost,extra,totalCost,price,revenue,profit,marginPct,costPct,costPerGuest};
}

function evShopList(){
  const e=ST.event, R=evCalc(), g=R.guests;
  if(!g){toast('❌ '+L('Βάλε αριθμό ατόμων','Enter number of guests'));return;}
  // Μάζεψε ΟΛΑ τα υλικά (αναλύοντας τις συνταγές σε προϊόντα)
  const need={};   // product_id -> {qty, unit}
  const addProd=(pid,qty,unit)=>{
    if(!pid)return;
    if(!need[pid])need[pid]={qty:0,unit:unit||''};
    need[pid].qty+=qty;
  };
  const expand=(recId,mult,depth)=>{
    if((depth||0)>4)return;
    const ings=(ST.recipeIng||[]).filter(x=>x.recipe_id===recId);
    ings.forEach(ing=>{
      const nm=(ing.ingredient||'').trim();
      const sub=(ST.recipes||[]).find(r=>r.is_homemade&&(r.name||'').trim().toLowerCase()===nm.toLowerCase());
      const q=(parseFloat(ing.quantity)||0)*mult;
      if(sub){ const y=parseFloat(sub.yield_qty)||1; expand(sub.id,q/y,(depth||0)+1); }
      else { const p=(ST.products||[]).find(x=>(x.sku||'').trim().toLowerCase()===nm.toLowerCase());
             if(p)addProd(p.id,q,ing.unit||''); }
    });
  };
  (ST.eventItems||[]).forEach(it=>{
    const qty=parseFloat(it.qty_per_guest)||0;
    const pg=parseFloat(it.per_guests)||1;
    const total=(qty/pg)*g;                    // συνολικές μερίδες/ποτά για όλη την εκδήλωση
    if(it.recipe_id)expand(it.recipe_id,total,0);
    else if(it.product_id)addProd(it.product_id,total,'');
  });
  let h='<div style="margin-top:10px"><div class="card" style="background:var(--accent-bg);border-color:var(--accent)"><b style="color:var(--accent)">🛒 '+L('Λίστα Αγορών','Shopping List')+'</b><div style="font-size:12px;color:var(--muted)">'+esc(e.name)+' · '+g+' '+L('άτομα','guests')+'</div></div>';
  const ids=Object.keys(need);
  if(!ids.length)h+='<div class="card muted" style="text-align:center">'+L('Πρόσθεσε πρώτα μενού','Add menu items first')+'</div>';
  let totalC=0;
  const bySup={};
  ST._shopRows={};   // για να θυμάται τις επιλογές προμηθευτή
  ids.forEach(pid=>{
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)return;
    // Ποιος προμηθευτής; (επιλογή χρήστη ή ο φθηνότερος)
    const rows=(ST.prices||[]).filter(x=>x.product_id===pid&&(parseFloat(x.price)||0)>0)
      .map(x=>({sid:x.supplier_id,name:supName(x.supplier_id),price:parseFloat(x.price)||0}))
      .sort((a,b2)=>a.price-b2.price);
    const chosenSid=(ST.evSup&&ST.evSup[pid])||((rows[0]||{}).sid)||null;
    const chosen=rows.find(x=>x.sid===chosenSid)||rows[0]||{name:'—',price:0};
    const price=chosen.price||0;
    const n=need[pid];
    const mu=(p.measure_unit||'').toLowerCase();
    const size=parseFloat(p.size_ml)||0;
    const ru=(n.unit||'').toLowerCase();
    const isWeight=(ru==='gr'||ru==='g'||mu==='kg'||mu==='g');
    let buyQty, buyUnit, cost;

    if(mu==='kg'||mu==='l'){
      const inKgL=n.qty/1000;
      buyQty=Math.round(inKgL*100)/100; buyUnit=(mu==='kg'?L('κιλά','kg'):L('λίτρα','L'));
      cost=price*inKgL;
    } else if(mu==='g'||mu==='ml'){
      buyQty=Math.round(n.qty*10)/10; buyUnit=mu;
      cost=price*n.qty;
    } else if(size>0){
      const packs=n.qty/size;
      buyQty=Math.ceil(packs*10)/10;
      buyUnit=isWeight?L('συσκ. (κιλά)','packs (kg)'):L('φιάλες/τεμ','bottles/pcs');
      cost=price*packs;
    } else {
      buyQty=Math.ceil(n.qty*10)/10; buyUnit=L('τεμ','pcs');
      cost=price*n.qty;
    }
    totalC+=cost;
    const sup=chosen.name||'—';
    if(!bySup[sup])bySup[sup]=[];
    bySup[sup].push({pid,name:p.sku,qty:buyQty,unit:buyUnit,raw:n.qty,rawUnit:n.unit,cost,rows,chosenSid:chosen.sid});
  });
  Object.keys(bySup).sort().forEach(sup=>{
    h+='<div class="card"><h3 style="font-size:13px;color:var(--accent);margin-bottom:8px">🏢 '+esc(sup)+'</h3>';
    bySup[sup].forEach(x=>{
      h+='<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div style="flex:1"><b>'+esc(x.name)+'</b>'+(x.rawUnit?('<div style="font-size:11px;color:var(--muted)">'+(function(){var u=(x.rawUnit||'').toLowerCase();if((u==='gr'||u==='g')&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' '+L('κιλά','kg');if(u==='ml'&&x.raw>=1000)return (Math.round(x.raw/1000*100)/100)+' L';return (Math.round(x.raw*10)/10)+' '+esc(x.rawUnit);})()+'</div>'):'')+'</div>'+
          '<div style="text-align:right"><b>'+x.qty+'</b> <span style="font-size:11px;color:var(--muted)">'+esc(x.unit)+'</span><div style="font-size:11px;color:var(--muted)">'+money(Math.round(x.cost*100)/100)+'</div></div>'+
        '</div>'+
        ((x.rows&&x.rows.length>1)?('<select onchange="evSetSup(\''+x.pid+'\',this.value)" style="width:100%;margin-top:5px;padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:var(--card)">'+
          x.rows.map(r=>'<option value="'+r.sid+'"'+(r.sid===x.chosenSid?' selected':'')+'>'+esc(r.name)+' · '+money(r.price)+'</option>').join('')+
        '</select>'):'')+
      '</div>';
    });
    // ── Κουμπιά παραγγελίας ανά προμηθευτή ──
    const sObj=(ST.suppliers||[]).find(s2=>String(s2.name)===String(sup));
    const lines=bySup[sup].map(x=>'• '+x.name+': '+x.qty+' '+x.unit).join('\n');
    const body=L('Παραγγελία','Order')+' - '+((ST.shopName||'').trim()||'')+'\n'+
      (e.name?(L('Εκδήλωση','Event')+': '+e.name+(e.event_date?(' ('+dGRs(e.event_date)+')'):'')+'\n'):'')+
      '\n'+L('Καλησπέρα, παρακάτω η παραγγελία μας:','Hello, here is our order:')+'\n\n'+lines+'\n';
    const mailto='mailto:'+((sObj&&sObj.email)||'')+'?subject='+encodeURIComponent(L('Παραγγελία','Order')+' - '+(e.name||''))+'&body='+encodeURIComponent(body);
    const wa='https://wa.me/'+String((sObj&&sObj.phone)||'').replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(body);
    const vb='viber://forward?text='+encodeURIComponent(body);
    h+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'+
      '<a class="btn" href="'+mailto+'" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;padding:8px;font-size:13px">📧 Email</a>'+
      '<a class="btn" href="'+wa+'" target="_blank" rel="noopener" style="flex:1 1 45%;text-align:center;text-decoration:none;display:block;background:#25d366;padding:8px;font-size:13px">🟢 WhatsApp</a>'+
      '<a class="btn" href="'+vb+'" style="flex:1 1 100%;text-align:center;text-decoration:none;display:block;background:#7360f2;padding:8px;font-size:13px">🟣 Viber</a>'+
    '</div>';
    h+='</div>';
  });
  if(ids.length)h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);display:flex;justify-content:space-between"><b>'+L('Συνολικό Κόστος Υλικών','Total Items Cost')+'</b><b style="color:var(--accent)">'+money(Math.round(totalC*100)/100)+'</b></div>';
  h+='<button class="btn ghost" style="margin-top:10px" onclick="drawEvent()">← '+L('Πίσω στην εκδήλωση','Back to event')+'</button></div>';
  document.getElementById('content').innerHTML=h;
  window.scrollTo(0,0);
}

async function evDuplicate(){
  const e=ST.event;
  const name=prompt(L('Όνομα νέας εκδήλωσης:','New event name:'),(e.name||'')+' ('+L('αντίγραφο','copy')+')');
  if(!name||!name.trim())return;
  try{
    const {data:ne,error}=await sb.from('events').insert({tenant_id:curTenant(),name:name.trim(),location:e.location||null,event_date:e.event_date,guests:e.guests,price_per_guest:e.price_per_guest,extra_costs:e.extra_costs,extra_notes:e.extra_notes,status:'draft'}).select().single();
    if(error)throw error;
    const rows=(ST.eventItems||[]).map(it=>({tenant_id:curTenant(),event_id:ne.id,recipe_id:it.recipe_id||null,product_id:it.product_id||null,qty_per_guest:it.qty_per_guest,per_guests:it.per_guests||1,unit:it.unit||null}));

function overviewHtml(){
  const period=ST.ovP||'all';const from=periodFrom(period);
  let inv=ST.invoices.slice();if(from)inv=inv.filter(v=>(v.date||'')>=from);
  let hist=ST.history.slice();if(from)hist=hist.filter(r=>(r.date||'')>=from);
  const totalInv=inv.reduce((s,v)=>s+(parseFloat(v.total_gross)||0),0);
  const totalLines=hist.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0)),0);
  const usingInv=inv.length>0;
  const total=usingInv?totalInv:totalLines;
  const periods=[['week',lbl('pWeek','Εβδομάδα')],['month',lbl('pMonth','Μήνας')],['3m',lbl('p3m','3 Μήνες')],['6m',lbl('p6m','6 Μήνες')],['year',lbl('pYear','Έτος')],['all',lbl('pAll','Όλα')]];
  let h='<div class="tabs" style="flex-wrap:wrap;margin-top:12px">'+periods.map(([k,l])=>'<div class="tab '+(period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="ovSet(\''+k+'\')">'+l+'</div>').join('')+'</div>';
  h+='<div class="card" style="margin-top:10px;text-align:center;background:var(--accent-bg);border-color:var(--accent)"><div style="font-size:30px;font-weight:700;color:var(--accent)">€'+Math.round(total)+'</div><div style="font-size:12px;color:var(--accent)">💰 '+lbl('sTotalSpend','Σύνολο αγορών')+' '+(usingInv?('('+inv.length+' '+lbl('wInvoices','τιμολόγια')+')'):('('+lbl('sFromHist','από ιστορικό')+')'))+'</div></div>';
  // ανά προμηθευτή
  const bySup={};
  if(usingInv){inv.forEach(v=>{const k=v.supplier_name||supName(v.supplier_id)||'—';bySup[k]=(bySup[k]||0)+(parseFloat(v.total_gross)||0);});}
  else{hist.forEach(r=>{const k=resolveSupName(r);bySup[k]=(bySup[k]||0)+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0));});}
  const list=Object.entries(bySup).sort((a,b)=>b[1]-a[1]);
  h+='<div style="width:calc(100vw - 24px);position:relative;left:50%;margin-left:calc(-50vw + 12px)"><div style="max-width:1400px;margin:0 auto"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;align-items:start">';
  if(list.length){const max=list[0][1]||1;
    h+='<div class="card" style="margin:0"><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">💶 '+lbl('sExpSup','ΕΞΟΔΑ ΑΝΑ ΠΡΟΜΗΘΕΥΤΗ')+'</h3>';
    list.forEach(([n,v])=>{h+='<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(n)+'</span><span style="font-weight:700">€'+Math.round(v)+'</span></div><div style="height:5px;background:var(--line);border-radius:3px;margin-top:3px"><div style="height:5px;width:'+Math.round(v/max*100)+'%;background:var(--accent);border-radius:3px"></div></div></div>';});
    h+='</div>';
  }
  // top προϊόντα (από γραμμές, ενοποιημένα)
  const byProd={};hist.forEach(r=>{const pid=resolveProductId(r);const p=pid&&ST.products.find(x=>x.id===pid);const nm=p?p.sku:(r.raw_product||'—');const sp=(parseFloat(r.price)||0)*(parseFloat(r.quantity)||0);if(sp>0)byProd[nm]=(byProd[nm]||0)+sp;});
  const topProd=Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(topProd.length){const pmax=topProd[0][1]||1;
    h+='<div class="card" style="margin:0"><h3 style="font-size:13px;color:var(--muted);margin-bottom:8px">📦 '+lbl('sTopProd','TOP ΠΡΟΪΟΝΤΑ (δαπάνη)')+'</h3>';
    topProd.forEach(([n,v])=>{h+='<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(n)+'</span><span style="font-weight:700">€'+Math.round(v)+'</span></div><div style="height:5px;background:var(--line);border-radius:3px;margin-top:3px"><div style="height:5px;width:'+Math.round(v/pmax*100)+'%;background:var(--ok);border-radius:3px"></div></div></div>';});
    h+='</div>';
  }
  h+='</div></div></div>';
  return h;
}
// ---- Purchased DB (τι αγόρασες, ανά προϊόν, με φίλτρα) ----
function pcSet(k,v){ST.pc=ST.pc||{};ST.pc[k]=v;if(k==='category')ST.pc.sub='';renderStats();}
function resolveProductId(r){ if(r.product_id)return r.product_id; return matchProduct(r.raw_product||'')||null; }
function resolveSupName(r){ if(r.supplier_id)return supName(r.supplier_id); const sid=matchSupplier(r.supplier_name||''); if(sid)return supName(sid); return r.supplier_name||'—'; }
function unitDivisor(unit){
  // Επιστρέφει σε πόσα τεμάχια σπάει η μονάδα. ΜΟΝΟ κιβώτιο διαιρείται.
  const u=normStr(unit); // NFD, κεφαλαία, χωρίς τόνους
  if(!u)return 1;
  // ΒΑΡΕΛΙ ή όγκος/βάρος → ΔΕΝ διαιρείται (μία μονάδα αγοράς)
  if(/\bΒΑΡ|BARREL|KEG\b/.test(u))return 1;
  // ΚΙΒΩΤΙΟ → βρες αριθμό φιαλών (ΚΙΒ24, ΠΛΑΣΤ ΚΙΒ ΜΕ 24Φ, ΚΙΒΩΤΙΟ 24, CASE 24)
  if(/ΚΙΒ|CASE|CRATE/.test(u)){
    const m=u.match(/(\d+)/);           // πρώτος αριθμός = φιάλες/κιβώτιο
    const n=m?parseInt(m[1],10):0;
    return (n>1)?n:1;
  }
  return 1;  // ml, L, gr, φιάλη, βαρέλι → ως έχει
}

  else { const days={Week:7,Month:30,Quarter:90,'6 Months':180,'9 Months':270,Year:365}; from=new Date(Date.now()-(days[C.period]||30)*86400000); }
  const inRange=ds=>{ if(!ds)return true; const p=String(ds).split('-'); if(p.length!==3)return true; const d=new Date(+p[0],+p[1]-1,+p[2]); if(from&&d<from)return false; if(to&&d>to)return false; return true; };
  const agg={};let totalSpend=0;const orderSet={};

    if(C.category&&cat!==C.category)return;

async function saveManual(){
  const pid=document.getElementById('mp-prod').value;
  const sid=document.getElementById('mp-sup').value;
  const supname=(document.getElementById('mp-supname').value||'').trim();
  const qty=parseFloat(document.getElementById('mp-qty').value)||0;
  const price=Math.round((parseFloat(document.getElementById('mp-price').value)||0)*100)/100;
  const unit=(document.getElementById('mp-unit').value||'').trim();
  const date=document.getElementById('mp-date').value;
  const upd=document.getElementById('mp-upd').checked;
  if(!pid){toast('❌ Διάλεξε προϊόν');return;}
  if(price<=0){toast('❌ Βάλε τιμή');return;}
  const p=ST.products.find(x=>x.id===pid);
  const b=ST.best[pid]||{};
  const prev=parseFloat(b.price)||null;
  let chE=null,chP=null;
  if(prev&&prev>0){const d=Math.round((price-prev)*100)/100;if(d!==0){chE=d;chP=Math.round((d/prev)*10000)/10000;}}
  const name=supname||(sid?supName(sid):'Χωρίς τιμολόγιο');
  const btn=document.getElementById('mp-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';

    if(upd&&sid){
      await sb.from('product_prices').upsert({tenant_id:p.tenant_id,product_id:pid,supplier_id:sid,price:price,is_override:true},{onConflict:'product_id,supplier_id'});
      await sb.from('product_prices').update({is_override:false}).eq('product_id',pid).neq('supplier_id',sid);
      await refreshPrices();
    }
    const _th=curTenant();let _hq=sb.from('price_history').select('*');if(_th)_hq=_hq.eq('tenant_id',_th);const {data:hist}=await _hq.order('date',{ascending:false}).limit(400);
    ST.history=hist||[];
    btn.disabled=false;toast('✅ Καταγράφηκε');keepScroll(renderInvoices);
  }catch(e){btn.disabled=false;toast('❌ '+(e.message||e));}
}
// Τελευταία ΧΡΕΩΜΕΝΗ αγορά προϊόντος από τον ΙΔΙΟ προμηθευτή (τελευταίες 45 μέρες)
function lastPurchase(pid){
  const sid=(document.getElementById('ocr-sup')||{}).value||'';
  if(!sid||!pid)return null;
  const cutoff=new Date(Date.now()-45*86400000).toISOString().slice(0,10);
  const rows=(ST.history||[]).filter(r=>r.product_id===pid&&r.supplier_id===sid&&(parseFloat(r.price)||0)>0&&(r.date||'')>=cutoff)
    .sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(!rows.length)return null;
  const r=rows[0];
  const qty=parseFloat(r.quantity)||0, price=parseFloat(r.price)||0;
  return {id:r.id,date:r.date,qty,price,total:qty*price};
}
// 🎁 Δωρεάν γραμμή = δώρο από ΠΡΟΗΓΟΥΜΕΝΟ τιμολόγιο (ίδιος προμηθευτής)
async function ocrGiftPrev(i){
  const ln=ST.ocr.lines[i];
  const freeQty=parseFloat(ln.qty)||0;
  const prev=lastPurchase(ln.productId);
  if(!prev||freeQty<=0){toast('❌ '+L('Δεν βρέθηκε προηγούμενη αγορά','No previous purchase found'));return;}
  const totalPcs=prev.qty+freeQty;
  const newPrice=Math.round((prev.total/totalPcs)*100)/100;
  if(!confirm(L('Διόρθωση τιμής προηγούμενης αγοράς:','Correct previous purchase price:')+'\n\n'+
    prev.qty+' + '+freeQty+' '+L('δώρο','free')+' = '+totalPcs+'\n'+
    money(prev.price)+' → '+money(newPrice)+'/'+L('τεμ','pc')))return;
  try{
    // Διόρθωσε το ιστορικό
    await sb.from('price_history').update({quantity:totalPcs,price:newPrice}).eq('id',prev.id);
    const hr=(ST.history||[]).find(x=>x.id===prev.id); if(hr){hr.quantity=totalPcs;hr.price=newPrice;}
    // Διόρθωσε και την τρέχουσα τιμή προμηθευτή
    const sid=(document.getElementById('ocr-sup')||{}).value||'';
    if(sid)await sb.from('product_prices').upsert({tenant_id:curTenant(),product_id:ln.productId,supplier_id:sid,price:newPrice,is_override:false},{onConflict:'product_id,supplier_id'});
    await refreshPrices();
    ln.skip=true; ln.productId=null;   // η δωρεάν γραμμή δεν καταχωρείται ξεχωριστά
    ln.giftApplied=true; ln.giftNote=L('δώρο σε προηγούμενη αγορά','gift on previous purchase');
    renderOcr();
    toast('🎁 '+L('Διορθώθηκε','Corrected')+' → '+money(newPrice)+'/'+L('τεμ','pc'));
  }catch(e){toast('❌ '+(e.message||e));}
}

function ocrMergeGift(i,freeIdx){
  const o=ST.ocr; const ln=o.lines[i]; const fl=o.lines[freeIdx];
  const q=parseFloat(ln.qty)||0, fq=parseFloat(fl.qty)||0;
  const tot=parseFloat(ln.lineTotal)||((parseFloat(ln.price)||0)*q);
  const totalPcs=q+fq;
  if(totalPcs<=0){toast('❌ '+L('Μη έγκυρες ποσότητες','Invalid quantities'));return;}
  if(ln._preGiftQty==null){ln._preGiftQty=ln.qty;ln._preGiftPrice=ln.price;}
  ln.qty=totalPcs;
  ln.price=Math.round((tot/totalPcs)*100)/100;
  ln.lineTotal=Math.round(tot*100)/100;
  ln.giftApplied=true; ln.giftNote=q+' + '+fq+' '+L('δώρο','free');
  fl._mergedInto=i; fl.skip=true;   // η δωρεάν γραμμή δεν καταχωρείται ξεχωριστά
  fl.productId=null;
  renderOcr();
  toast('🎁 '+L('Ενώθηκε','Merged')+' — '+money(ln.price)+'/'+L('τεμ','pc'));
}
function ocrApplyGift(i,freeQty){
  const ln=ST.ocr.lines[i];
  freeQty=parseFloat(freeQty)||0;
  const q=parseFloat(ln.qty)||0;
  if(freeQty<=0||q<=0){toast('❌ '+L('Δώσε αριθμό δωρεάν τεμαχίων','Enter number of free items'));return;}
  const tot=parseFloat(ln.lineTotal)||((parseFloat(ln.price)||0)*q);
  const totalPcs=q+freeQty;
  if(ln._preGiftQty==null){ln._preGiftQty=ln.qty;ln._preGiftPrice=ln.price;}
  ln.qty=totalPcs;
  ln.price=Math.round((tot/totalPcs)*100)/100;
  ln.lineTotal=Math.round(tot*100)/100;
  ln.giftApplied=true; ln.giftNote=q+' + '+freeQty+' '+L('δώρο','free');
  renderOcr();
  toast('🎁 '+money(ln.price)+'/'+L('τεμ','pc'));
}
function ocrUndoGift(i){
  const o=ST.ocr; const ln=o.lines[i];
  if(ln._preGiftQty!=null){ln.qty=ln._preGiftQty;ln.price=ln._preGiftPrice;ln.lineTotal=(parseFloat(ln.price)||0)*(parseFloat(ln.qty)||0);}
  o.lines.forEach(l=>{if(l._mergedInto===i){l.skip=false;l._mergedInto=null;}});
  ln.giftApplied=false;ln.giftNote=null;ln._preGiftQty=null;ln._preGiftPrice=null;
  renderOcr();
}
function detectPacks(raw){
  const s=String(raw||''); const out=[]; const seen={}; let m;
  const reMul=/(\d{1,3})\s*[*x×X]\s*(\d{1,3})/g;
  while(m=reMul.exec(s)){const a=+m[1],b=+m[2],pc=a*b;if(pc>1&&pc<10000&&!seen['k'+pc]){seen['k'+pc]=1;out.push({label:a+'×'+b,perCase:pc});}}
  const reAdd=/(\d{1,3})\s*\+\s*(\d{1,3})/g;
  while(m=reAdd.exec(s)){const a=+m[1],b=+m[2],pc=a+b;if(pc>1&&pc<10000&&!seen['k'+pc]){seen['k'+pc]=1;out.push({label:a+'+'+b,perCase:pc});}}
  return out;
}
function ocrApplyPack(i,perCase,label){
  const ln=ST.ocr.lines[i]; perCase=parseFloat(perCase);
  const q=parseFloat(ln.qty)||0;
  if(!perCase||perCase<=0||q<=0){toast('❌ '+L('Δώσε έγκυρο τεμ/κιβώτιο','Enter valid pieces/case'));return;}
  const total=parseFloat(ln.lineTotal)|| ((parseFloat(ln.price)||0)*q);
  if(ln._preQty==null){ln._preQty=ln.qty;ln._prePrice=ln.price;ln._preTotal=ln.lineTotal;}
  const pieces=q*perCase;
  ln.qty=pieces;
  ln.price=Math.round((total/pieces)*100)/100;
  ln.lineTotal=Math.round(total*100)/100;
  ln.packApplied=true; ln.packPerCase=perCase; ln.packNote=(label||('×'+perCase))+' ('+q+'×'+perCase+')';
  renderOcr();
}

function compressFile(f){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxD=2000;let w=img.width,h=img.height;
      if(Math.max(w,h)>maxD){const s=maxD/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      let dataUrl;
      try{const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);dataUrl=cv.toDataURL('image/jpeg',0.72);}
      catch(e){dataUrl=rd.result;}
      res({b64:String(dataUrl).split(',')[1],mediaType:'image/jpeg'});
    };
    img.onerror=()=>{const dataUrl=rd.result;res({b64:String(dataUrl).split(',')[1],mediaType:f.type||'image/jpeg'});};
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});}
async function onOcrFile(inp){
  const files=Array.from(inp.files||[]); if(!files.length)return; inp.value='';
  const st=document.getElementById('ocr-status'); if(st)st.innerHTML='<div class="card" style="text-align:center"><span class="spin"></span> '+L('Ετοιμάζω','Preparing')+' '+files.length+' '+L('φωτο','photos')+'…</div>';
  const q=[]; for(const f of files){ try{q.push(await compressFile(f));}catch(e){} }
  window._ocrQueue=q; window._ocrIdx=0; ST.ocr=null; renderOcr();
  loadOcrFromQueue(0);
}

    '<button class="btn" style="margin-top:10px" onclick="doOcr()">🔍 '+lbl('oRead','Διάβασε τιμολόγιο')+prog+'</button>';

async function ocrApprove(){
  if(window._ocrBusy)return;   // κλείδωμα: να μη περαστεί 2η/3η φορά
  const o=ST.ocr;const sid=document.getElementById('ocr-sup').value;const date=document.getElementById('ocr-date').value;
  if(!sid){toast('❌ '+L('Διάλεξε προμηθευτή','Choose a supplier'));return;}
  const good=o.lines.filter(l=>l.productId&&(parseFloat(l.price)||0)>0&&!l.skip);
  if(!good.length){toast('❌ '+L('Καμία έτοιμη γραμμή','No ready line'));return;}
  const tid=curTenant();
  const supN=supName(sid);
  let gross=0;good.forEach(l=>{gross+=(parseFloat(l.price)||0)*(parseFloat(l.qty)||0);});
  const grossR=Math.round(gross*100)/100;
  const dup=(ST.invoices||[]).find(v=>v.supplier_id===sid&&v.date===date&&Math.abs((parseFloat(v.total_gross)||0)-grossR)<0.5);
  if(dup&&!confirm('Υπάρχει ήδη τιμολόγιο ίδιου προμηθευτή/ημερομηνίας/ποσού ('+supName(sid)+' · '+date+' · '+money(grossR)+').\n\nΣίγουρα να το ξαναπεράσεις;'))return;
  window._ocrBusy=true;   // από εδώ και κάτω κλειδωμένο
  const _ab=document.getElementById('ocr-approve-btn');if(_ab){_ab.disabled=true;_ab.style.opacity='.6';_ab.innerHTML='<span class="spin"></span> '+L('Καταχώρηση…','Saving…');}
  const anyBev=good.some(l=>{const p=ST.products.find(x=>x.id===l.productId);return p&&p.kind==='beverage';});
  let invId=null;
  // ανέβασμα φωτό τιμολογίου στο Storage (bucket 'invoices')
  let fileUrl=null;
  if(window._ocrImg&&window._ocrImg.b64){
    try{
      const bin=atob(window._ocrImg.b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
      const ext=(window._ocrImg.mediaType||'').includes('png')?'png':'jpg';
      const path=tid+'/'+date+'-'+Date.now()+'.'+ext;
      const {error:upErr}=await sb.storage.from('invoices').upload(path,arr,{contentType:window._ocrImg.mediaType||'image/jpeg',upsert:true});
      if(!upErr){const {data:pub}=sb.storage.from('invoices').getPublicUrl(path);fileUrl=(pub&&pub.publicUrl)||null;}
      else console.error(upErr);
    }catch(e){console.error(e);}
  }
  try{
    const payMethod=(document.getElementById('ocr-paymethod')||{}).value||null;
    const {data:invRow}=await sb.from('invoices').insert({tenant_id:tid,supplier_id:sid,supplier_name:supN,date:date,invoice_number:o.invoiceNo||null,category:anyBev?'Beverage':'Food',total_net:(o.netTotal!=null?o.netTotal:grossR),vat_pct:(o.vatTotal!=null?o.vatTotal:null),total_gross:(o.grandTotal!=null?o.grandTotal:grossR),payment_method:payMethod,file_url:fileUrl,status:'approved'}).select().single();
    if(invRow)invId=invRow.id;
  }catch(e){console.error(e);}
  let ok=0;
  for(const ln of good){
    const price=Math.round((parseFloat(ln.price)||0)*100)/100;const qty=parseFloat(ln.qty)||null;
    const b=ST.best[ln.productId]||{};const prev=parseFloat(b.price)||null;
    let chE=null,chP=null;if(prev&&prev>0){const d=Math.round((price-prev)*100)/100;if(d!==0){chE=d;chP=Math.round((d/prev)*10000)/10000;}}
    try{
      await sb.from('product_prices').upsert({tenant_id:tid,product_id:ln.productId,supplier_id:sid,price:price},{onConflict:'product_id,supplier_id'});
      await sb.from('price_history').insert({tenant_id:tid,product_id:ln.productId,supplier_id:sid,supplier_name:supN,invoice_id:invId,date:date,raw_product:ln.raw,unit:ln.unit||null,quantity:qty,price:price,prev_price:prev,change_eur:chE,change_pct:chP,notes:(ln.vintage?('Χρονιά '+ln.vintage):'Τιμολόγιο')});
      ok++;
    }catch(e){console.error(e);}
  }
  await Promise.all([refreshPrices(),
    (async()=>{const _th=curTenant();let _hq=sb.from('price_history').select('*');if(_th)_hq=_hq.eq('tenant_id',_th);const {data:hist}=await _hq.order('date',{ascending:false}).limit(400);ST.history=hist||[];})(),
    (async()=>{const _ti=curTenant();let _iq=sb.from('invoices').select('*');if(_ti)_iq=_iq.eq('tenant_id',_ti);const {data:inv}=await _iq.order('date',{ascending:false}).limit(300);ST.invoices=inv||[];})()
  ]);
  toast('✅ Καταχωρήθηκαν '+ok+' γραμμές + τιμολόγιο');
  await markGmailDone();
  await checkDelivery(sid,date,good);   // ⚠️ έλεγχος παραλαβής + ενημέρωση αποθέματος
  nextOcrOrReset();
}

function periodFrom(p){
  const d=new Date();
  if(p==='week')d.setDate(d.getDate()-7);
  else if(p==='month')d.setMonth(d.getMonth()-1);
  else if(p==='3m')d.setMonth(d.getMonth()-3);
  else if(p==='6m')d.setMonth(d.getMonth()-6);
  else if(p==='9m')d.setMonth(d.getMonth()-9);
  else if(p==='year')d.setFullYear(d.getFullYear()-1);
  else return '';
  return d.toISOString().slice(0,10);
}

  if(!rows.length){h+='<div class="card muted" style="text-align:center">'+lbl('pdNoRec','Καμία εγγραφή σε αυτή την περίοδο')+'</div>';return h;}
  // Ομαδοποίηση ανά (ημερομηνία + προμηθευτής) = ένα τιμολόγιο/παραλαβή, όπως στο app
  const groups={};
  rows.forEach(r=>{
    const sup=resolveSupName(r)||'—';

  });
  const gk=Object.keys(groups).sort((a,b)=>{const da=groups[a].date,db=groups[b].date;return db.localeCompare(da);});
  h+='<div class="muted" style="font-size:12px;margin:2px 2px 6px">'+gk.length+' '+lbl('phDeliv','παραλαβές')+' · '+rows.length+' '+lbl('phLines','γραμμές')+'</div>';
  h+='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px)"><div style="max-width:1400px;margin:0 auto">';
  gk.slice(0,60).forEach(k=>{
    const g=groups[k];let gtot=0;
    // Αν ο προμηθευτής είναι '—', προσπάθησε να βρεις από Best Supplier των προϊόντων
    let gSup=g.sup;
    if(!gSup||gSup==='—'){
      const cnt={};
      g.items.forEach(r=>{const pid=resolveProductId(r);const b=pid?ST.best[pid]:null;if(b&&b.sup&&b.sup!=='—')cnt[b.sup]=(cnt[b.sup]||0)+1;});
      const top=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0];
      if(top)gSup=top;
    }
    let body='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="width:100%;min-width:620px;border-collapse:collapse;font-size:12px;margin-top:6px;white-space:nowrap">'+
      '<thead><tr style="color:var(--muted);font-size:11px;border-bottom:1px solid var(--line)">'+
      [lbl('wProduct','Προϊόν'),lbl('wCategory','Κατηγορία'),lbl('phhQty','Ποσότητα'),lbl('phhUnit','Μ/Μ'),lbl('phhPrev','Προηγούμενη Τιμή'),lbl('phhPrice','Τιμή'),lbl('phhChgEur','Μεταβολή €'),lbl('phhChgPct','Μεταβολή %'),lbl('thNotes','Σημειώσεις'),lbl('phhBest','Best')].map(c=>'<th style="padding:4px 6px;text-align:center;font-weight:600">'+c+'</th>').join('')+
      '</tr></thead><tbody>';
    g.items.forEach(r=>{
      const pid=resolveProductId(r);
      const p=ST.products.find(x=>x.id===pid);const nm=p?p.sku:(r.raw_product||'—');

      const qty=parseFloat(r.quantity)||0;const price=parseFloat(r.price)||0;gtot+=qty*price;
      const cp=parseFloat(r.change_pct);const ce=parseFloat(r.change_eur);
      const chP=(!isNaN(cp)&&cp!==0)?((cp>0?'▲':'▼')+(Math.abs(cp)*100).toFixed(0)+'%'):'';
      const chE=(!isNaN(ce)&&ce!==0)?((ce>0?'+':'')+money(ce)):'';
      const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');
      const b=pid?ST.best[pid]:null;
      const isBest=b&&b.price&&Math.abs(price-parseFloat(b.price))<0.001;
      let noteTxt=(r.notes||'').replace(/^(Τιμολόγιο|Χωρίς τιμολόγιο)$/,'').replace(/^Χρονιά\s*/,'').trim();
      if(!noteTxt){

        const orig=(r.raw_product||'').match(/\b(ΑΡΓΕΝΤΙΝ\S*|ΒΡΑΖΙΛ\S*|ΕΛΛΑΔ\S*|ΕΛΛΗΝ\S*|ΙΣΠΑΝ\S*|ΙΤΑΛ\S*|ΓΑΛΛ\S*|ΧΙΛΗ\S*|ΠΕΡΟΥ\S*|ΜΕΞΙΚ\S*|ΟΛΛΑΝΔ\S*|ΜΑΡΟΚ\S*|ΑΙΓΥΠΤ\S*|ΤΟΥΡΚ\S*|ΚΥΠΡ\S*|ΝΑΞ\S*|ΚΡΗΤ\S*|ΦΛΩΡΙΝ\S*|ΘΕΣΣΑΛ\S*)\b/i);  // προέλευση
        noteTxt=(yr?yr[0]:'')+(yr&&orig?' · ':'')+(orig?orig[0]:'');
      }

        '<td style="padding:5px 6px;text-align:left;font-weight:600">'+esc(nm)+'</td>'+

        '<td style="padding:5px 6px;text-align:center;font-weight:700">'+money(price)+'</td>'+
        '<td style="padding:5px 6px;text-align:center;color:'+col+'">'+(chE||'—')+'</td>'+

      '</tr>';
    });

    h+='<div class="card" style="padding:10px;margin-top:8px">'+
      '<div style="font-weight:700;font-size:14px">🧾 '+esc(gSup||'—')+'</div>'+

function invDbView(){

  if(F.q){const q=F.q.toLowerCase();invs=invs.filter(v=>(v.supplier_name||'').toLowerCase().includes(q)||(v.invoice_number||'').toLowerCase().includes(q));}
  if(F.sup)invs=invs.filter(v=>(v.supplier_name||supName(v.supplier_id))===F.sup);
  if(F.cat)invs=invs.filter(v=>(v.category||'').toLowerCase()===F.cat.toLowerCase());
  if(F.from)invs=invs.filter(v=>(v.date||'')>=F.from);
  if(F.to)invs=invs.filter(v=>(v.date||'')<=F.to);
  if(F.sort==='amount')invs.sort((a,b)=>(parseFloat(b.total_gross)||0)-(parseFloat(a.total_gross)||0));
  else if(F.sort==='sup')invs.sort((a,b)=>String(a.supplier_name||'').localeCompare(String(b.supplier_name||'')));
  else invs.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const supNames=[...new Set(ST.invoices.map(v=>v.supplier_name||supName(v.supplier_id)).filter(Boolean))].sort();
  const cats=[...new Set(ST.invoices.map(v=>v.category).filter(Boolean))];
  const total=invs.reduce((s,v)=>s+(parseFloat(v.total_gross)||0),0);

function pdSet(k,v){ST.pd=ST.pd||{};ST.pd[k]=v;renderStats();}
function priceDbView(){
  ST.pd=ST.pd||{pid:'',period:'all'};
  const P=ST.pd;
  const prods=ST.products.slice().sort((a,b)=>String(a.sku).localeCompare(String(b.sku)));
  if(!P.pid&&prods.length)P.pid=prods[0].id;
  const periods=[['week',lbl('pWeek','Εβδομάδα')],['month',lbl('pMonth','Μήνας')],['3m',lbl('p3m','3 Μήνες')],['6m',lbl('p6m','6 Μήνες')],['9m',lbl('p9m','9 Μήνες')],['year',lbl('pYear','Έτος')],['all',lbl('pAll','Όλα')]];
  const from=periodFrom(P.period);
  let rows=(ST.history||[]).filter(r=>resolveProductId(r)===P.pid);
  if(from)rows=rows.filter(r=>(r.date||'')>=from);
  rows=rows.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const units=rows.reduce((s,r)=>s+(parseFloat(r.quantity)||0),0);
  const spend=rows.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.quantity)||0)),0);
  const prices=rows.map(r=>parseFloat(r.price)).filter(x=>!isNaN(x));
  const avg=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:0;
  const latest=rows.length?parseFloat(rows[0].price):0;
  const oldest=rows.length?parseFloat(rows[rows.length-1].price):0;
  const chE=(rows.length>1)?(latest-oldest):0;
  const chP=(oldest>0)?(chE/oldest):0;
  const b=ST.best[P.pid]||{};
  // ── πραγματικά φθηνότερος προμηθευτής (από όλες τις τιμές, αγνοώντας το χειροκίνητο override) ──
  const prForBest=ST.prices.filter(x=>x.product_id===P.pid);
  let realBest={sup:'',price:Infinity};
  prForBest.forEach(x=>{const pv=parseFloat(x.price)||0;if(pv>0&&pv<realBest.price)realBest={sup:supName(x.supplier_id),price:pv};});
  const bestSup=realBest.sup||b.sup||'';const bestPrice=(realBest.price<Infinity)?realBest.price:(parseFloat(b.price)||0);
  const nInv=new Set(rows.map(r=>r.invoice_id).filter(Boolean)).size||rows.length;
  const tile=(lbl,val,col)=>'<div style="flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:700;color:'+(col||'var(--ink)')+'">'+val+'</div><div style="font-size:10px;color:var(--muted)">'+lbl+'</div></div>';
  let h='<div class="field" style="margin-top:12px"><label>'+lbl('wProduct','Προϊόν')+'</label><select onchange="pdSet(\'pid\',this.value)">'+prods.map(p=>'<option value="'+p.id+'"'+(p.id===P.pid?' selected':'')+'>'+esc(p.sku)+'</option>').join('')+'</select></div>'+
    '<div class="tabs" style="flex-wrap:wrap">'+periods.map(([k,l])=>'<div class="tab '+(P.period===k?'active':'')+'" style="flex:0 0 auto;padding:8px 12px" onclick="pdSet(\'period\',\''+k+'\')">'+l+'</div>').join('')+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'+
      tile(lbl('pdSumQty','Συν. Ποσότητα'),units)+tile(lbl('pdSumSpend','Συν. Δαπάνη'),'€'+Math.round(spend),'var(--accent)')+
      tile(lbl('pdAvgPrice','Μέση Τιμή'),avg>0?'€'+avg.toFixed(2):'—')+tile(lbl('pdLast','Τελευταία'),latest>0?'€'+latest.toFixed(2):'—')+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">'+
      tile(lbl('pdChgE','Μεταβολή €'),(chE>0?'+':'')+'€'+chE.toFixed(2),chE>0?'var(--bad)':(chE<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('pdChgP','Μεταβολή %'),(chP>0?'+':'')+(chP*100).toFixed(1)+'%',chP>0?'var(--bad)':(chP<0?'var(--ok)':'var(--muted)'))+
      tile(lbl('iInvoices','Τιμολόγια'),nInv)+
    '</div>'+
    '<div class="card" style="margin-top:10px"><div class="kv"><span class="k">🏆 Best Supplier</span><span class="v">'+esc(bestSup||'—')+' '+(bestPrice>0?('('+money(bestPrice)+')'):'')+'</span></div></div>';
  h+='<h3 style="font-size:13px;color:var(--muted);margin:16px 2px 6px">'+lbl('pdHistH','ΙΣΤΟΡΙΚΟ')+' ('+rows.length+')</h3>';
  if(!rows.length)h+='<div class="card muted" style="text-align:center;font-size:13px">'+lbl('pdNoRec','Καμία εγγραφή σε αυτή την περίοδο')+'</div>';
  rows.forEach(r=>{const cp=parseFloat(r.change_pct);const ch=(!isNaN(cp)&&cp!==0)?((cp>0?'▲':'▼')+' '+(Math.abs(cp)*100).toFixed(1)+'%'):'';const col=cp>0?'var(--bad)':(cp<0?'var(--ok)':'var(--muted)');let sup=resolveSupName(r);if(!sup||sup==='—'){const m=prForBest.find(x=>Math.abs((parseFloat(x.price)||0)-(parseFloat(r.price)||0))<0.001);sup=m?supName(m.supplier_id):'';}
    h+='<div class="card" style="padding:10px;margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+money(r.price)+(ch?(' <span style="color:'+col+';font-size:12px">'+ch+'</span>'):'')+'</span>'+(r.quantity?('<span style="font-size:12px;color:var(--muted)">'+fmtQty(r.quantity)+(r.unit?(' '+esc(normUnit(r.unit))):'')+'</span>'):'')+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">📅 '+fmtDate(r.date)+(sup?(' · 🏢 '+esc(sup)):'')+'</div></div>';});
  return h;
}

function expPeriodRange(period){
  const now=ST.expRefDate?new Date(ST.expRefDate+'T12:00:00'):new Date();
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let from,to;
  if(period==='day'){from=new Date(y,m,d);to=new Date(y,m,d);}
  else if(period==='week'){const dow=(now.getDay()+6)%7;from=new Date(y,m,d-dow);to=new Date(y,m,d-dow+6);}
  else if(period==='month'){from=new Date(y,m,1);to=new Date(y,m+1,0);}
  else if(period==='quarter'){const q=Math.floor(m/3);from=new Date(y,q*3,1);to=new Date(y,q*3+3,0);}
  else if(period==='half'){const h=m<6?0:6;from=new Date(y,h,1);to=new Date(y,h+6,0);}
  else {from=new Date(y,0,1);to=new Date(y,11,31);}
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}

function payPeriodRange(period){
  const off=ST.payOffset||0;
  const now=new Date(); let y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  let from,to;
  if(period==='day'){ const x=new Date(y,m,d+off); from=new Date(x); to=new Date(x); }
  else if(period==='week'){ const dow=(now.getDay()+6)%7; from=new Date(y,m,d-dow+off*7); to=new Date(y,m,d-dow+6+off*7); }
  else if(period==='half'){
    let base=(d<=15)?0:1; let idx=base+off;
    let mm=m+Math.floor(idx/2); let half=((idx%2)+2)%2;
    if(half===0){from=new Date(y,mm,1);to=new Date(y,mm,15);}
    else {from=new Date(y,mm,16);to=new Date(y,mm+1,0);}
  }
  else { from=new Date(y,m+off,1); to=new Date(y,m+off+1,0); }
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}

    h+='</div></div>'; c.innerHTML=h; return;
  }

  // ── ΣΥΝΟΨΗ ──
  const period=ST.payPeriod||'month'; const range=payPeriodRange(period);
  const inRange=dt=>dt&&dt>=range.from&&dt<=range.to;
  const periods=[['day',T('Ημέρα','Day')],['week',T('Εβδομάδα','Week')],['half',T('15 Μέρες','15 Days')],['month',T('Μήνας','Month')]];

  periods.forEach(p=>{const on=period===p[0];
    h+='<div onclick="ST.payPeriod=\''+p[0]+'\';ST.payOffset=0;drawPayroll()" style="flex:1;text-align:center;padding:7px;border-radius:20px;cursor:pointer;font-size:12px;'+(on?'background:var(--accent);color:#fff':'border:1px solid var(--line);color:var(--muted)')+'">'+p[1]+'</div>';

    '<span onclick="ST.payOffset=(ST.payOffset||0)+1;drawPayroll()" style="cursor:pointer;font-size:18px;padding:0 8px">›</span>'+
  '</div>';
  // Αθροίσματα ανά εργαζόμενο
  const rows=[];
  emps.forEach(e=>{
    const es=shifts.filter(s=>s.employee_id===e.id&&inRange(s.work_date));
    if(!es.length)return;
    const days=es.length;
    const otH=es.reduce((t,s)=>t+n(s.ot_hours),0);
    const gross=es.reduce((t,s)=>t+n(s.total_amount),0);
    const empC=es.reduce((t,s)=>t+n(s.emp_contrib),0);
    const emprC=es.reduce((t,s)=>t+n(s.empr_contrib),0);
    rows.push({id:e.id,name:e.name,position:e.position||T('Χωρίς Θέση','No Position'),days,otH,gross,empC,emprC,net:gross-empC,cost:gross+emprC});

        '<span style="font-size:13px;font-weight:700;color:var(--accent)">'+esc(pos)+'</span>'+
        '<span style="font-size:14px;font-weight:700;color:var(--accent)">'+money2(posCost)+'</span>'+
      '</div>';
    list.forEach(r=>{
      const paid=payrollPaidFor(r.id,range,'wage');
      const due=r.net-paid.total;
      h+='<div style="padding:11px 14px;border-bottom:1px solid var(--line)">'+
        '<div onclick="payrollDetail(\''+r.id+'\')" style="display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer">'+
          '<div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:600;color:var(--accent)">'+esc(r.name)+' ›</div>'+
          '<div class="muted" style="font-size:11px">'+r.days+' '+T('ημέρες','days')+(r.otH>0?' · '+r.otH+' '+T('Υπερωρίες','Over Time'):'')+'</div></div>'+
          '<div style="text-align:right"><div style="font-size:14px;font-weight:700">'+money2(r.cost)+'</div>'+
          (r.empC>0?'<div class="muted" style="font-size:10px">'+T('Καθαρά','Net')+' '+money2(r.net)+'</div>':'')+'</div>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:7px">'+
          '<div style="font-size:11px;flex:1">'+
            (paid.total>0?('<span style="color:var(--ok)">✓ '+T('Πληρώθηκε','Paid')+' '+money2(paid.total)+'</span>'+
              (paid.bank>0?' <span class="muted">🏦 '+money2(paid.bank)+'</span>':'')+
              (paid.cash>0?' <span class="muted">💵 '+money2(paid.cash)+'</span>':'')+
              (due>0.005?' <span style="color:var(--bad)">· '+T('Απομένουν','Remaining')+' '+money2(due)+'</span>':'')

          '</div>'+
          '<button class="btn ghost" style="padding:5px 12px;font-size:12px;width:auto;margin:0" onclick="payWage(\''+r.id+'\','+(due>0?due.toFixed(2):0)+')">💰 '+T('Πληρωμή','Pay')+'</button>'+
        '</div>'+
      '</div>';
    });
    h+='</div>';
  });
  if(rows.length){
    h+='<div class="card" style="margin-top:4px">'+
      '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px"><span class="muted">'+T('Μικτές Αποδοχές','Gross Wages')+'</span><span>'+money2(grandGross)+'</span></div>'+

function periodLabel(period,range){
  const M=[L('Ιανουάριος','January'),L('Φεβρουάριος','February'),L('Μάρτιος','March'),L('Απρίλιος','April'),L('Μάιος','May'),L('Ιούνιος','June'),L('Ιούλιος','July'),L('Αύγουστος','August'),L('Σεπτέμβριος','September'),L('Οκτώβριος','October'),L('Νοέμβριος','November'),L('Δεκέμβριος','December')];
  const f=new Date(range.from+'T12:00:00'), t=new Date(range.to+'T12:00:00');
  if(period==='month')return M[f.getMonth()]+' '+f.getFullYear();
  if(period==='day')return fmtDate(range.from);
  return fmtDate(range.from)+' – '+fmtDate(range.to);
}

function shiftCalc(){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const empId=g('sh-emp'); const e=(ST.employees||[]).find(x=>x.id===empId);
  if(!e)return null;
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const hrs=parseFloat(g('sh-hours'))||0; const otH=parseFloat(g('sh-ot'))||0;
  const isHourly=e.pay_type==='hourly';
  const cls=(e.insured===false)?null:(ST.contribSetup||[]).find(x=>x.name===e.contrib_class);
  const empPct=cls?nn(cls.emp_pct):0;
  const isNet=(e.wage_basis==='net')&&empPct>0&&empPct<100;
  const up=v=>isNet?(v/(1-empPct/100)):v;   // καθαρό → μικτό
  const wage=up(isHourly?(hrs*nn(e.hourly_rate)):nn(e.daily_wage));
  const baseHourly=up(isHourly?nn(e.hourly_rate):(nn(e.daily_wage)/8));
  let otAmt=0;
  if(e.ot_mode==='percent'){ otAmt=otH*baseHourly*(1+nn(e.ot_value)/100); }
  else { otAmt=otH*up(nn(e.ot_value)); }
  const gross=wage+otAmt;
  // Εισφορές από την κατηγορία
  const empC=cls?gross*nn(cls.emp_pct)/100:0;
  const emprC=cls?gross*nn(cls.empr_pct)/100:0;
  return {wage:wage,otAmt:otAmt,total:gross,gross:gross,empC:empC,emprC:emprC,netPay:gross-empC,cost:gross+emprC,emp:e,cls:cls,isNet:isNet};
}

function computeTips(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const emps=ST.employees||[]; const shifts=ST.workShifts||[]; const closes=ST.payCloses||[];
  const T=(el,en)=>L(el,en);
  // Ανά ημέρα: pot ανά βάρδια + σύνολο ωρών ανά βάρδια
  const days={};
  closes.forEach(cl=>{
    const d=cl.close_date; if(!d||d<range.from||d>range.to)return;
    let tp={}; try{tp=(typeof cl.tips_data==='string')?JSON.parse(cl.tips_data):(cl.tips_data||{});}catch(e){tp={};}
    if(!Object.keys(tp).length)return;
    days[d]={pots:tp,hours:{}};
  });
  // Ώρες ανά ημέρα/βάρδια
  shifts.forEach(s=>{
    const d=s.work_date; if(!days[d])return;
    const st=s.shift_type||'all';
    const add=(k,hh)=>{if(hh>0)days[d].hours[k]=(days[d].hours[k]||0)+hh;};
    if(st==='both'){ add('morning',n(s.hours_morning)); add('night',n(s.hours_night)); }
    else if(st==='morning'||st==='night'){ add(st,n(s.hours)); }
    else { add('all',n(s.hours)); }
  });
  // Rate ανά ημέρα/βάρδια, και μοίρασμα
  const perEmp={}; let grandTips=0;
  const rateSum={}, rateCount={};
  Object.keys(days).forEach(d=>{
    const day=days[d];
    Object.keys(day.pots).forEach(k=>{
      const pot=day.pots[k]||{}; const potTotal=n(pot.card)+n(pot.cash);
      if(potTotal<=0)return;
      grandTips+=potTotal;
      // Σταθμισμένες μονάδες: ώρες × μονάδα
      let weighted=0; const parts=[];
      shifts.forEach(s=>{
        if(s.work_date!==d)return;
        const e=emps.find(x=>x.id===s.employee_id); if(!e)return;
        const unit=n(e.tip_units)||1; const st=s.shift_type||'all';
        let hh=0;
        if(st==='both')hh=(k==='morning')?n(s.hours_morning):(k==='night'?n(s.hours_night):0);
        else if(st===k)hh=n(s.hours);
        else if(st==='all'&&k==='all')hh=n(s.hours);
        if(hh<=0)return;
        const w=hh*unit; weighted+=w; parts.push({id:e.id,name:e.name,unit:unit,hh:hh,w:w,k:k});
      });
      if(weighted<=0)return;
      const rate=potTotal/weighted;
      rateSum[k]=(rateSum[k]||0)+rate; rateCount[k]=(rateCount[k]||0)+1;
      const cardShare=potTotal>0?(n(pot.card)/potTotal):0;
      parts.forEach(p=>{
        const amt=p.w*rate;
        if(!perEmp[p.id])perEmp[p.id]={name:p.name,unit:p.unit,total:0,card:0,cash:0,hM:0,hN:0,hA:0};
        perEmp[p.id].total+=amt;
        perEmp[p.id].card+=amt*cardShare;
        perEmp[p.id].cash+=amt*(1-cardShare);
        if(p.k==='morning')perEmp[p.id].hM+=p.hh; else if(p.k==='night')perEmp[p.id].hN+=p.hh; else perEmp[p.id].hA+=p.hh;
      });
    });
  });
  const rates={}; Object.keys(rateSum).forEach(k=>{rates[k]=rateSum[k]/rateCount[k];});
  const rows=Object.keys(perEmp).map(id=>{
    const x=perEmp[id];
    const bits=[];
    if(x.hM>0)bits.push(x.hM+' '+T('Ώρες Πρωί','Hours Morning'));
    if(x.hN>0)bits.push(x.hN+' '+T('Ώρες Βράδυ','Hours Night'));
    if(x.hA>0)bits.push(x.hA+' '+T('Ώρες','Hours'));
    return {id:id,name:x.name,unit:x.unit,total:x.total,card:x.card,cash:x.cash,hoursLbl:bits.join(' + ')||'—'};
  }).sort((a,b)=>b.total-a.total);
  return {rows:rows,rates:rates,grandTips:grandTips};
}

async function recalcContributions(){
  const T=(el,en)=>L(el,en);
  const range=payPeriodRange(ST.payPeriod||'month');
  const n=v=>(v!=null&&v!==''?(+v):0);
  const emps=ST.employees||[];
  const list=(ST.workShifts||[]).filter(s=>s.work_date>=range.from&&s.work_date<=range.to);
  if(!list.length){toast('ℹ️ '+L('Καμία βάρδια σε αυτή την περίοδο','No shifts in this period'));return;}
  if(!confirm(L('Επανυπολογισμός εισφορών για '+list.length+' βάρδιες;','Recalculate contributions for '+list.length+' shifts?')))return;
  let changed=0, skipped=0;
  for(const s of list){
    const e=emps.find(x=>x.id===s.employee_id);
    if(!e){skipped++;continue;}
    const cls=(ST.contribSetup||[]).find(x=>x.name===e.contrib_class);
    const gross=n(s.total_amount);
    const empC=cls?gross*n(cls.emp_pct)/100:0;
    const emprC=cls?gross*n(cls.empr_pct)/100:0;
    if(Math.abs(empC-n(s.emp_contrib))<0.005&&Math.abs(emprC-n(s.empr_contrib))<0.005)continue;
    try{await sb.from('work_shifts').update({emp_contrib:empC,empr_contrib:emprC}).eq('id',s.id);changed++;}
    catch(err){skipped++;}
  }
  toast('✅ '+changed+' '+L('βάρδιες ενημερώθηκαν','shifts updated')+(skipped?' · '+skipped+' '+L('παραλείφθηκαν','skipped'):''));
  keepScroll(renderPayroll);
}

function cfRange(){
  const off=ST.cfOffset||0; const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()+off,1);
  const to=new Date(now.getFullYear(),now.getMonth()+off+1,0);
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}
function computeCashflow(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const inR=d=>d&&d>=range.from&&d<=range.to;
  const closes=(ST.cfCloses||[]).filter(x=>inR(x.close_date));
  const exps=(ST.cfExps||[]).filter(x=>inR(x.exp_date));
  const pays=(ST.cfPays||[]).filter(x=>inR(x.pay_date));
  const pr=(ST.cfPayroll||[]).filter(x=>inR(x.pay_date));
  const st=(ST.cfSettle||[]).filter(x=>inR(x.settle_date));
  const T=(el,en)=>L(el,en);
  // ── ΕΙΣΡΟΕΣ ──
  let cards=0, tillCash=0, tipsCard=0, tipsCash=0, delNet=0;
  closes.forEach(cl=>{
    cards+=n(cl.card_income);
    tillCash+=n(cl.cash_income)+n(cl.off_envelope);
    let tp={}; try{tp=(typeof cl.tips_data==='string')?JSON.parse(cl.tips_data):(cl.tips_data||{});}catch(e){}
    Object.keys(tp).forEach(k=>{tipsCard+=n(tp[k].card);tipsCash+=n(tp[k].cash);});
    let dd=[]; try{dd=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);}catch(e){}
    dd.forEach(d=>{delNet+=(n(d.net_val)||(n(d.gross)-n(d.vat)));});
  });
  const settled=st.reduce((t,x)=>t+n(x.amount),0);
  const inflow=[];
  if(cards>0)inflow.push({label:T('Κάρτες','Cards'),amt:cards,where:'bank'});
  if(tillCash>0)inflow.push({label:T('Ταμείο Ημέρας','Daily Till'),amt:tillCash,where:'till'});
  if(settled>0)inflow.push({label:T('Εισπράξεις Delivery','Delivery Settlements'),amt:settled,where:'bank'});
  // ── ΕΚΡΟΕΣ (ανά όνομα) ──
  const outMap={};
  const addOut=(label,amt,where)=>{const k=label+'|'+where;if(!outMap[k])outMap[k]={label,amt:0,where};outMap[k].amt+=amt;};
  exps.forEach(e=>{
    if(e.category==='suppliers')return;
    const nm=(e.label&&e.label.trim())?e.label.trim():T('Έξοδο','Expense');
    addOut(nm,n(e.amount),e.payment_method==='cash'?'till':'bank');
  });
  pays.forEach(p=>addOut(p.supplier_name||T('Προμηθευτής','Supplier'),n(p.amount),p.payment_method==='cash'?'till':'bank'));
  pr.forEach(p=>{
    const lbl=(p.kind==='efka')?T('Εισφορές','Contributions'):((p.kind==='tips')?T('Φιλοδωρήματα','Tips'):T('Μισθοί','Wages'));
    if(n(p.amount_bank)>0)addOut(lbl,n(p.amount_bank),'bank');
    if(n(p.amount_cash)>0)addOut(lbl,n(p.amount_cash),'till');
  });
  const outflow=Object.values(outMap).sort((a,b)=>b.amt-a.amt);
  // ── ΥΠΟΛΟΙΠΑ ──
  // Φιλοδωρήματα που έχουν ήδη δοθεί (δεν είναι πια υποχρέωση)
  const tipsPaidBank=pr.filter(p=>p.kind==='tips').reduce((t,p)=>t+n(p.amount_bank),0);
  const tipsPaidCash=pr.filter(p=>p.kind==='tips').reduce((t,p)=>t+n(p.amount_cash),0);
  const bal=(ST.cfBalances||[]).filter(b=>b.as_of<=range.from).slice(-1)[0];
  const openBank=bal?n(bal.bank):0, openTill=bal?n(bal.till):0;
  const inBank=inflow.filter(x=>x.where==='bank').reduce((t,x)=>t+x.amt,0);
  const inTill=inflow.filter(x=>x.where==='till').reduce((t,x)=>t+x.amt,0);
  const outBank=outflow.filter(x=>x.where==='bank').reduce((t,x)=>t+x.amt,0);
  const outTill=outflow.filter(x=>x.where==='till').reduce((t,x)=>t+x.amt,0);
  return {inflow,outflow,openBank,openTill,
    bank:openBank+inBank-outBank, till:openTill+inTill-outTill,
    tipsCard:Math.max(0,tipsCard-tipsPaidBank), tipsCash:tipsCash, hasOpening:!!bal};
}

function vatRange(period,offset){
  const off=offset||0; const now=new Date();
  let from,to;
  if(period==='quarter'){
    const q=Math.floor(now.getMonth()/3)+off;
    from=new Date(now.getFullYear(),q*3,1); to=new Date(now.getFullYear(),q*3+3,0);
  } else if(period==='half'){
    const hh=Math.floor(now.getMonth()/6)+off;
    from=new Date(now.getFullYear(),hh*6,1); to=new Date(now.getFullYear(),hh*6+6,0);
  } else if(period==='year'){
    from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31);
  } else {
    from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0);
  }
  const fmt=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:fmt(from),to:fmt(to)};
}
function vatLabel(period,range){
  const M=[L('Ιανουάριος','January'),L('Φεβρουάριος','February'),L('Μάρτιος','March'),L('Απρίλιος','April'),L('Μάιος','May'),L('Ιούνιος','June'),L('Ιούλιος','July'),L('Αύγουστος','August'),L('Σεπτέμβριος','September'),L('Οκτώβριος','October'),L('Νοέμβριος','November'),L('Δεκέμβριος','December')];
  const f=new Date(range.from+'T12:00:00');
  if(period==='year')return ''+f.getFullYear();
  if(period==='quarter')return (Math.floor(f.getMonth()/3)+1)+'ο '+L('Τρίμηνο','Quarter')+' '+f.getFullYear();
  if(period==='half')return (Math.floor(f.getMonth()/6)+1)+'ο '+L('Εξάμηνο','Half')+' '+f.getFullYear();
  return M[f.getMonth()]+' '+f.getFullYear();
}
function computeVat(range){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const inR=d=>d&&d>=range.from&&d<=range.to;
  // Εκροές: από το Ζ, ανά συντελεστή
  const byRate={};
  (ST.vatZ||[]).forEach(z=>{
    if(!inR(z.z_date))return;
    let lines=[]; try{lines=(typeof z.vat_lines==='string')?JSON.parse(z.vat_lines):(z.vat_lines||[]);}catch(e){}
    lines.forEach(ln=>{
      const r=n(ln.rate), net=n(ln.net);
      if(net<=0)return;
      if(!byRate[r])byRate[r]={net:0,vat:0};
      byRate[r].net+=net; byRate[r].vat+=net*r/100;
    });
  });
  const outRows=Object.keys(byRate).map(r=>({rate:+r,net:byRate[r].net,vat:byRate[r].vat})).sort((a,b)=>b.rate-a.rate);
  const outVat=outRows.reduce((t,x)=>t+x.vat,0);
  // Εισροές: από τα τιμολόγια
  const invs=(ST.vatInv||[]).filter(i=>inR((i.date||'').slice(0,10)));
  const inVat=invs.reduce((t,i)=>t+n(i.vat_pct),0);
  return {outRows,outVat,invs,inVat,due:outVat-inVat};
}

function computeSupplierBalances(){
  const sups=ST.suppliers||[]; const invs=ST.invoices||[]; const pays=ST.dailyPayments||[]; const credits=ST.supplierCredits||[];
  const n=v=>(v!=null&&v!==''?(+v):0);
  const bal=[];
  sups.forEach(s=>{
    const opening=n(s.opening_balance);
    const invoiced=invs.filter(i=>i.supplier_id===s.id).reduce((t,i)=>t+n(i.total_gross),0);
    const paid=pays.filter(p=>p.supplier_id===s.id).reduce((t,p)=>t+n(p.amount),0);
    const credited=credits.filter(cr=>cr.supplier_id===s.id).reduce((t,cr)=>t+n(cr.amount)+n(cr.vat),0);
    const owed=opening+invoiced-paid-credited;
    if(Math.abs(owed)>0.005||opening!==0)bal.push({id:s.id,name:s.name,owed:owed});
  });
  bal.sort((a,b)=>b.owed-a.owed);
  ST.supplierBalances=bal;
}

  const g=id=>{const el=document.getElementById(id);return(el&&el.value!=='')?(+el.value):0;};
  // Άθροισμα από όλα τα σημεία (pt-*-cash / pt-*-card)
  let cash=0,card=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{if(el.value!=='')cash+=(+el.value);});
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{if(el.value!=='')card+=(+el.value);});
  const off=g('dc-off'), cn=g('dc-cn');
  // Πληρωμές μετρητά: daily_expenses(cash, μη-suppliers) + supplier_payments(cash) σήμερα
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const cashExp=(ST.dailyExps||[]).filter(e=>e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+nn(e.amount),0);
  const cashPaySup=(ST.dailyPaymentsToday||[]).filter(p=>p.payment_method==='cash').reduce((s,p)=>s+nn(p.amount),0);
  const cashPay=cashExp+cashPaySup;
  // Ζ (επίσημα) = Μετρητά + Κάρτες − Έξοδα cash
  const zOfficial = cash + card - cashPay;
  // Φάκελος = μετρητά που μένουν (πάνε τράπεζα)
  const envelope = cash - cashPay;
  // Πραγματικός Τζίρος = Φάκελος + Εκτός Φακέλου + Κάρτες
  // Έσοδα Delivery (η καθαρή αξία πάει στο μαγαζί)
  let delNet=0;
  document.querySelectorAll('[data-delname]').forEach((el,idx)=>{
    const g2=el.value!==''?(+el.value):0;
    const vEl=document.getElementById('del-vat-'+idx); const v2=(vEl&&vEl.value!=='')?(+vEl.value):0;
    delNet+=(g2-v2);
  });
  const income = envelope + off + card - cn + delNet;
  const incEl=document.getElementById('daily-income'); if(incEl)incEl.textContent=money(Math.round(income*100)/100);
  const envEl=document.getElementById('dc-envelope'); if(envEl)envEl.textContent=money(Math.round(envelope*100)/100);
  recLive();
}
function recLive(){
  const money2=x=>money(Math.round(x*100)/100);
  let cash=0,card=0;
  document.querySelectorAll('[id^="pt-"][id$="-cash"]').forEach(el=>{if(el.value!=='')cash+=(+el.value);});
  document.querySelectorAll('[id^="pt-"][id$="-card"]').forEach(el=>{if(el.value!=='')card+=(+el.value);});
  const offEl=document.getElementById('dc-off'); const off=(offEl&&offEl.value!=='')?(+offEl.value):0;
  const nn=v=>(v!=null&&v!==''?(+v):0);
  const cashPay=(ST.dailyExps||[]).filter(e=>e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+nn(e.amount),0)
    + (ST.dailyPaymentsToday||[]).filter(p=>p.payment_method==='cash').reduce((s,p)=>s+nn(p.amount),0);
  let delGross=0;
  if(ST.daySetup&&ST.daySetup.delInZ){
    document.querySelectorAll('[data-delname]').forEach((el,idx)=>{
      const net=el.value!==''?(+el.value):0; const vatEl=document.getElementById('del-vat-'+idx);
      const vat=(vatEl&&vatEl.value!=='')?(+vatEl.value):0; delGross+=net+vat;
    });
  }
  // Επίσημα (τι πρέπει να δείχνει το Ζ) = Μετρητά + Κάρτες − Έξοδα cash
  const official=cash+card+delGross-cashPay;
  // Σύνολο Ζ (από τα z-net lines)
  let zTotal=0;
  document.querySelectorAll('[data-zrow]').forEach(r=>{const i=r.getAttribute('data-zrow');
    const rEl=document.getElementById('z-rate-'+i), nEl=document.getElementById('z-net-'+i);
    const rate=rEl&&rEl.value!==''?(+rEl.value):0; const net=nEl&&nEl.value!==''?(+nEl.value):0;
    zTotal+=net+net*rate/100;
  });
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('rec-till',money2(cash+card)); set('rec-off','− '+money2(cashPay));
  set('rec-official',money2(official)); set('rec-z',money2(zTotal));
  const diff=official-zTotal;
  const box=document.getElementById('rec-result'), lab=document.getElementById('rec-label'), df=document.getElementById('rec-diff');
  if(box){
    if(zTotal===0){box.style.background='var(--bg)';if(lab)lab.textContent=L('Βάλε το Ζ','Enter Z');if(lab)lab.style.color='var(--muted)';if(df){df.textContent='—';df.style.color='var(--muted)';}}
    else if(Math.abs(diff)<0.01){box.style.background='var(--ok-bg,#E6F7EC)';if(lab){lab.textContent='✓ '+L('Συμφωνούν','Match');lab.style.color='var(--ok)';}if(df){df.textContent=money2(0);df.style.color='var(--ok)';}}
    else{box.style.background='#FFF7E6';if(lab){lab.textContent='⚠ '+L('Διαφορά — έλεγξε','Difference — check');lab.style.color='#B8860B';}if(df){df.textContent=money2(Math.abs(diff));df.style.color='#B8860B';}}
  }
}

async function scanZ(input){
  const file=input.files&&input.files[0]; if(!file)return;
  toast('📷 '+L('Διαβάζω το Ζ…','Reading Z…'));
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(OCR_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify({imageBase64:b64,mediaType:file.type,mode:'zreport'})});
    const data=await r.json();
    if(data.error){toast('❌ '+data.error);return;}
    logUsage('ocr_z',1);
    // Γέμισμα πεδίων Ζ από το αποτέλεσμα
    ST.dailyZ=ST.dailyZ||{};
    if(data.z_number!=null)ST.dailyZ.z_number=data.z_number;
    if(data.receipts_count!=null)ST.dailyZ.receipts_count=data.receipts_count;
    if(data.pay_cash!=null)ST.dailyZ.pay_cash=data.pay_cash;
    if(data.pay_card!=null)ST.dailyZ.pay_card=data.pay_card;
    if(data.voids!=null)ST.dailyZ.voids=data.voids;
    if(data.vat_lines&&data.vat_lines.length)ST.dailyZ.vat_lines=data.vat_lines;
    // Αν το Ζ έχει δική του ημερομηνία και διαφέρει, ρώτα
    if(data.z_date&&/^\d{4}-\d{2}-\d{2}$/.test(data.z_date)&&data.z_date!==dailyDate()){
      if(confirm(L('Το Ζ γράφει ημερομηνία','The Z shows date')+' '+dGRs(data.z_date)+'.\n'+L('Να αλλάξω την ημέρα;','Switch to that day?'))){
        ST.dailyDate=data.z_date; return renderDaily();
      }
    }
    const nL=(data.vat_lines||[]).length;
    toast('✅ '+L('Το Ζ διαβάστηκε','Z read')+(nL?(' · '+nL+' '+L('συντελεστές','rates')):'')+(data.total_gross?(' · '+money(data.total_gross)):''));
    keepScroll(drawDaily);
  }catch(e){toast('❌ '+(e.message||e)+' — '+L('έλεγξε το smart-worker','check smart-worker'));}
}

function drawDailyArchive(){
  const c=document.getElementById('content'); const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0); const money2=x=>money(Math.round(x*100)/100);
  const closes=ST.archCloses||[]; const exps=ST.archExps||[]; const pays=ST.archPays||[];
  const months=monthNamesFull();
  document.getElementById('hTitle').textContent='📁 '+T('Αρχείο Ημερών','Daily Archive');
  // Υπολογισμός ανά μέρα
  const dayData=d=>{
    const cl=d;
    // Ίδια λογική με το Day: Φάκελος = Μετρητά − Έξοδα cash · Τζίρος = Φάκελος + Εκτός + Κάρτες + Delivery(καθαρή)
    const cashExpDay=exps.filter(e=>e.exp_date===cl.close_date&&e.payment_method==='cash'&&e.category!=='suppliers').reduce((s,e)=>s+n(e.amount),0);
    const cashPay=cashExpDay+pays.filter(p=>p.pay_date===cl.close_date&&p.payment_method==='cash').reduce((s,p)=>s+n(p.amount),0);
    const envelope=n(cl.cash_income)-cashPay;
    let delNetDay=0;
    try{const ddArr=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);
      (ddArr||[]).forEach(d=>{delNetDay+=(n(d.net_val)||(n(d.gross)-n(d.vat)));});
    }catch(e){}
    const income=envelope+n(cl.off_envelope)+n(cl.card_income)-n(cl.credit_notes)+delNetDay;
    const net=income;
    return {income,envelope,net};
  };
  // Ομαδοποίηση σε μήνες
  const groups={};
  closes.forEach(cl=>{
    const key=cl.close_date.slice(0,7); // YYYY-MM
    if(!groups[key])groups[key]=[];
    groups[key].push(cl);
  });
  const keys=Object.keys(groups).sort().reverse();
  if(ST.archOpen===undefined)ST.archOpen=keys[0]||null; // πρώτος μήνας ανοιχτός

  let h='<div style="width:calc(100vw - 24px);position:relative;left:50%;right:50%;margin-left:calc(-50vw + 12px);margin-right:calc(-50vw + 12px);margin-top:10px"><div style="max-width:1400px;margin:0 auto">';
  if(!closes.length){
    h+='<div class="card muted" style="text-align:center;padding:20px">'+T('Καμία κλεισμένη μέρα ακόμα','No closed days yet')+'</div>';
  }
  keys.forEach(key=>{
    const y=key.slice(0,4), mo=parseInt(key.slice(5,7),10)-1;
    const monthName=months[mo]+' '+y;
    const days=groups[key];
    const monthTurnover=days.reduce((s,d)=>s+dayData(d).income,0);
    const open=ST.archOpen===key;
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
      '<div onclick="ST.archOpen=(ST.archOpen===\''+key+'\'?null:\''+key+'\');drawDailyArchive()" style="display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--accent-bg);cursor:pointer">'+
        '<div style="font-size:14px;font-weight:700">📂 '+monthName+'</div>'+
        '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;color:var(--muted)">'+T('Τζίρος','Turnover')+' <b style="color:var(--ok)">'+money2(monthTurnover)+'</b></span><span style="color:var(--muted)">'+(open?'▾':'▸')+'</span></div>'+
      '</div>';
    if(open){
      days.forEach(d=>{
        const dd=dayData(d);
        const dt=new Date(d.close_date+'T12:00:00');
        const dayNum=String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
        const wdays=ST.lang==='en'?['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']:['Κυριακή','Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο'];
        const wd=wdays[dt.getDay()];
        h+='<div onclick="openArchDay(\''+d.close_date+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-top:1px solid var(--line);cursor:pointer">'+
          '<div style="font-size:14px">'+dayNum+' · '+wd+'</div>'+
          '<div style="display:flex;gap:10px;font-size:12px;flex-wrap:wrap;justify-content:flex-end">'+
            '<span class="muted">'+T('Τζίρος','Turn')+' <b style="color:var(--fg)">'+money2(dd.income)+'</b></span>'+
            '<span class="muted">📥 <b style="color:var(--fg)">'+money2(dd.envelope)+'</b></span>'+
          '</div>'+
        '</div>';
      });
    }
    h+='</div>';
  });
  h+='</div></div>';
  c.innerHTML=h;
}

function vatList(){
  const raw=(ST.daySetup&&ST.daySetup.vatRates)||[13,24];
  return raw.map(x=>(typeof x==='object'?{rate:+x.rate,role:x.role||''}:{rate:+x,role:''}));
}
function vatByRole(role,fallback){
  const l=vatList();
  const f=l.find(x=>x.role===role);
  if(f)return f.rate;
  // Χωρίς ετικέτα: ο μεγαλύτερος είναι κανονικός, ο μικρότερος μειωμένος
  if(!l.length)return fallback;
  const sorted=l.slice().sort((a,b)=>b.rate-a.rate);
  if(role==='std')return sorted[0].rate;
  if(role==='red')return sorted[sorted.length-1].rate;
  return fallback;
}

async function chooseShop(){

  ST._finMap={}; ST._userCount={};

    // πλήθος χρηστών ανά μαγαζί: profiles.tenant_id + owner_shops
    try{
      const {data:profs}=await sb.from('profiles').select('tenant_id');
      (profs||[]).forEach(p=>{if(p.tenant_id)ST._userCount[p.tenant_id]=(ST._userCount[p.tenant_id]||0)+1;});
      const {data:os}=await sb.from('owner_shops').select('tenant_id');
      (os||[]).forEach(o=>{ST._userCount[o.tenant_id]=(ST._userCount[o.tenant_id]||0)+1;});
    }catch(e){}
  }
  // Μηνιαία αξία μαγαζιού (πακέτο + extra χρήστες − χειροκίνητη έκπτωση)
  const shopValue=t=>{
    const price=planPrice(t.plan||'advanced');
    const free=(t.plan==='basic')?2:3;
    const users=ST._userCount[t.id]||0;
    const extra=Math.max(0,users-free);
    const extraFee=extra*10;
    const gross=price+extraFee;
    const disc=ST._finMap[t.id];
    const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
    return {price,extra,extraFee,gross,disc:(disc!=null?disc:null),net:Math.round(net*100)/100};
  };
  // Κατάσταση συνδρομής ανά μαγαζί

    if(days<=7)return {emo:'🟡',col:'#e0a800',days,expired:false,txt:L('λήγει','expires')+' '+dGRs(t.paid_until)+' ('+days+' '+L('μέρες','days')+')'};
    return {emo:'🟢',col:'var(--ok)',days,expired:false,txt:L('λήγει','expires')+' '+dGRs(t.paid_until)+' ('+days+' '+L('μέρες','days')+')'};
  };

    '<p class="muted" style="font-size:13px;margin:0 0 12px">'+L('Διάλεξε μαγαζί για να μπεις','Pick a shop to enter')+'</p>';
  // Σύνολο (μόνο admin)
  if(ST.role==='admin'&&ST.tenants.length){
    let active=0,soon=0,exp=0,revenue=0;

    ST.tenants.filter(t=>!t.is_demo).forEach(t=>{const s=shopStatus(t);if(s.expired)exp++;else if(s.days!==null&&s.days<=7)soon++;else active++;revenue+=shopValue(t).net;});
    h+='<div class="card" style="background:var(--accent-bg);border-color:var(--accent);text-align:center;font-size:13px;padding:12px">'+
      '<b>'+realCount+'</b> '+L('Μαγαζιά','Shops')+' · 🟢 <b>'+active+'</b> '+L('Ενεργά','Active')+' · 🟡 <b>'+soon+'</b> '+L('Λήγουν','Expiring')+' · 🔴 <b>'+exp+'</b> '+L('Έληξαν','Expired')+
      '<div style="margin-top:6px;font-size:15px;font-weight:800;color:var(--accent)">💶 '+money(revenue)+'/'+L('μήνα','month')+'</div>'+
    '</div>';
  }
  (ST.tenants||[]).forEach(t=>{
    const s=shopStatus(t);
    const plan=(t.plan||'advanced').toUpperCase();
    const isAdmin=ST.role==='admin';

    const valTxt=val?('<div style="font-size:12px;color:var(--accent);font-weight:600">💶 '+(val.extra>0?(money(val.price)+'+'+money(val.extraFee)):money(val.price))+(val.disc?(' − '+val.disc+'%'):'')+' = '+money(val.net)+'/'+L('μήνα','mo')+(val.extra>0?(' <span style="color:var(--muted);font-weight:400">('+val.extra+' extra)</span>'):'')+'</div>'):'';

  else h+='</div></div>';

async function doCreateShop(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const name=g('ns-name').trim(); if(!name){toast('❌ '+L('Βάλε όνομα','Enter a name'));return;}
  const currency=g('ns-currency')||'€';
  const vatRates=g('ns-vat').split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const daySetup={shifts:false,points:[{name:'Ταμείο',emoji:'💰'}],currency:currency,vatRates:vatRates.length?vatRates:[13,24]};
  try{const {data,error}=await sb.from('tenants').insert({name:name,day_setup:daySetup}).select().single();
    if(error)throw error;
    closeModal();
    ST.tenants.push(data); ST.tenant=data.id; ST.shopName=data.name; ST.daySetup=daySetup; ST.view='list';
    try{await sb.from('settings').upsert({tenant_id:data.id,key:'shop_name',value:data.name},{onConflict:'tenant_id,key'});}catch(e){}
    try{
      const tt=(ST.tenants||[]).find(x=>/test/i.test(x.name||''));
      if(tt&&tt.id!==data.id){
        const {data:lab}=await sb.from('settings').select('value').eq('tenant_id',tt.id).eq('key','labels').maybeSingle();
        if(lab&&lab.value){await sb.from('settings').upsert({tenant_id:data.id,key:'labels',value:lab.value},{onConflict:'tenant_id,key'});}
      }
    }catch(e){console.error('template copy',e);}
    toast('✅ '+L('Δημιουργήθηκε','Created')); enterShop();
  }catch(e){toast('❌ '+(e.message||e));}
}

async function deleteShop(){
  if(ST.role!=='admin'){toast(L('Μόνο ο διαχειριστής','Admin only'));return;}
  const tid=curTenant(); const t=(ST.tenants||[]).find(x=>x.id===tid); const nm=(t&&t.name)||ST.shopName||'';
  if(!confirm(L('Διαγραφή του μαγαζιού «','Delete shop «')+nm+L('» και ΟΛΩΝ των δεδομένων του; ΔΕΝ αναιρείται!','» and ALL its data? CANNOT be undone!')))return;
  const typed=prompt(L('Γράψε το όνομα του μαγαζιού για επιβεβαίωση:','Type the shop name to confirm:'));
  if(typed===null)return; if(String(typed).trim()!==nm){toast('❌ '+L('Το όνομα δεν ταιριάζει','Name does not match'));return;}
  const pass=prompt(L('Ο κωδικός σου (για ασφάλεια):','Your password (for security):'));
  if(pass===null||pass==='')return;
  try{const {error}=await sb.auth.signInWithPassword({email:ST.userEmail,password:pass}); if(error){toast('❌ '+L('Λάθος κωδικός','Wrong password'));return;}}
  catch(e){toast('❌ '+L('Λάθος κωδικός','Wrong password'));return;}
  toast('⏳ '+L('Διαγραφή…','Deleting…'));
  const tables=['order_lines','order_history','price_history','product_prices','recipe_ingredients','recipes','agreements','agreement_blocks','invoices','products','suppliers','settings'];
  for(const tb of tables){try{await sb.from(tb).delete().eq('tenant_id',tid);}catch(e){console.error(tb,e);}}
  try{await sb.from('profiles').update({tenant_id:null}).eq('tenant_id',tid);}catch(e){}
  try{await sb.from('tenants').delete().eq('id',tid);}catch(e){}
  ST.tenant=''; try{localStorage.removeItem('ciq_tenant');}catch(e){}
  toast('✅ '+L('Το μαγαζί διαγράφηκε','Shop deleted')); chooseShop();
}
