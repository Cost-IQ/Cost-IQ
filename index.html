</style>

<script>
const SUPABASE_URL="https://jtakdezlvurjekyzkiox.supabase.co";
const SUPABASE_KEY="sb_publishable_dZGDqw545cWsxDp-LvonUA_jJrcOIKs";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const OCR_URL=SUPABASE_URL+"/functions/v1/smart-worker";
const STOP=new Set(['THE','AND','ΤΗΣ','ΤΟΥ','ΚΑΙ','ΤΟ','ΤΑ','ΜΕ','ΓΙΑ','ΑΠΟ']);
const GRK2LAT={'Α':'A','Β':'V','Γ':'G','Δ':'D','Ε':'E','Ζ':'Z','Η':'I','Θ':'TH','Ι':'I','Κ':'K','Λ':'L','Μ':'M','Ν':'N','Ξ':'X','Ο':'O','Π':'P','Ρ':'R','Σ':'S','Τ':'T','Υ':'Y','Φ':'F','Χ':'X','Ψ':'PS','Ω':'O','Ϊ':'I','Ϋ':'Y'};
function greeklish(s){return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().split('').map(ch=>GRK2LAT[ch]!=null?GRK2LAT[ch]:ch).join('');}
function normStr(s){return greeklish(s).replace(/['’`.,\/()%\-]/g,'').replace(/[^\p{L}\p{N} ]/gu,' ').replace(/C/g,'K').replace(/\b(FIA|FIALI|FIALH|FIALES|FIALON|FIALA|TEM|TEMAX|TEMAXIO|TEMAXIA|TMX|PKS|PCS|PC)\b/g,' ').replace(/\b(19[5-9]\d|20[0-3]\d)\b/g,' ').replace(/\s+/g,' ').trim();}
function keyWords(s){return normStr(s).split(' ').filter(w=>(/^\d+$/.test(w)&&w.length>=2)||(w.length>=3&&!STOP.has(w)));}
function _toks(s){const set={};normStr(s).split(' ').forEach(w=>{if(w.length>=2)set[w]=true;});return set;}
let _canon=null;
function buildCanon(){
  const out=[];
  (ST.products||[]).forEach(p=>{
    out.push({id:p.id,norm:normStr(p.sku),set:_toks(p.sku)});
    if(p.invoice_name&&normStr(p.invoice_name)!==normStr(p.sku))
      out.push({id:p.id,norm:normStr(p.invoice_name),set:_toks(p.invoice_name)});
  });
  return out;
}
function matchProduct(raw){
  if(!_canon)_canon=buildCanon();
  const pn=normStr(raw), pset=_toks(raw);
  const ps=Object.keys(pset).length; if(!ps)return null;
  for(let i=0;i<_canon.length;i++){ if(_canon[i].norm===pn) return _canon[i].id; }  // exact πρώτα
  const size=o=>Object.keys(o).length;
  const subset=(a,b)=>{for(const k in a){if(!b[k])return false;}return true;};
  const inter=(a,b)=>{let n=0;for(const k in a){if(b[k])n++;}return n;};
  let best=null,bestScore=-1,tie=false;
  for(let i=0;i<_canon.length;i++){
    const c=_canon[i],cs=size(c.set); if(!cs)continue;
    if(!(subset(c.set,pset)||subset(pset,c.set)))continue;   // ίδιος πυρήνας λέξεων
    const score=inter(c.set,pset)*1000-Math.abs(cs-ps);
    if(score>bestScore){bestScore=score;best=c.id;tie=false;}
    else if(score===bestScore&&best!==c.id){tie=true;}
  }
  return tie?null:best;
}
function matchSupplier(name){
  const n=normStr(name);if(!n)return null;
  let hit=null;
  ST.suppliers.forEach(s=>{
    const cands=[s.name].concat(s.aliases||[]);
    cands.forEach(cn=>{const c=normStr(cn);if(c&&(n.includes(c)||c.includes(n)))hit=s.id;});
  });
  return hit;
}
let ST={products:[],suppliers:[],prices:[],best:{},orders:{},history:[],invoices:[],ocr:null,lang:'el',kind:'beverage',okind:'beverage',mkind:'beverage',invsub:'db',invF:null,pd:null,sortby:'cat',view:'list',prod:null,inv:null,section:'products',role:'',tenant:'',myTenant:'',tenants:[],plan:'advanced',paidUntil:null,tabs:null};
function curTenant(){return ST.tenant||ST.myTenant||(ST.products[0]&&ST.products[0].tenant_id)||(ST.suppliers[0]&&ST.suppliers[0].tenant_id)||null;}
const T={
  el:{tProducts:'📦 Προϊόντα',tSuppliers:'🏢 Προμηθευτές',tOrders:'🛒 Παραγγελίες',tHistory:'📊 Στατιστικά',tOcr:'📷 Πρόσθεσε Τιμολόγιο',tInvoices:'📋 Τιμολόγια',tRecipes:'📖 Συνταγές',tAgree:'🤝 Συμφωνίες',logout:'Έξοδος'},

function normUnit(u){
  // Ενοποίηση εμφάνισης: 0.7L/0.7LT→700ml, 0.2L→200ml, 1L→1000ml (μόνο για λίτρα<10)
  let s=String(u==null?'':u).trim();if(!s)return '';
  const m=s.match(/^(\d+(?:[.,]\d+)?)\s*(L|LT|LITRE|ΛΙΤ|Λ)\.?$/i);
  if(m){const v=parseFloat(m[1].replace(',','.'));if(!isNaN(v)&&v>0&&v<10){return Math.round(v*1000)+'ml';}}
  // κανονικοποίηση ML γραφής: "200ML"/"200 ml"→"200ml"
  const m2=s.match(/^(\d+)\s*(ML|ΜΛ)\.?$/i);if(m2){return m2[1]+'ml';}
  return s;
}
function sz(m){return m?(m>=1000?(m/1000)+'L':m+'ml'):'';}

function idleExpired(){
  try{

    if(!t)return false;                                   // πρώτη φορά, μην κλειδώσεις
    return (Date.now()-t) > IDLE_DAYS*86400000;
  }catch(e){return false;}
}

  return {from:f(from),to:f(to)};
}

// Μηνιαία αξία ενός μαγαζιού: πακέτο + επιπλέον χρήστες − έκπτωση
function shopMonthly(t){
  const price=planPrice(t.plan||'advanced');
  const free=(t.plan==='basic')?2:(t.plan==='pro')?4:3;
  const users=(ST.revUsers||{})[t.id]||0;
  const extra=Math.max(0,users-free);
  const extraFee=extra*10;
  const fin=(ST.revFinance||[]).find(f=>f.tenant_id===t.id);
  const disc=(fin&&fin.owner_discount_pct)||0;
  const gross=price+extraFee;
  const net=disc>0?gross*(1-disc/100):gross;
  return {price:price,extra:extra,extraFee:extraFee,disc:disc,discAmt:gross-net,gross:gross,net:Math.round(net*100)/100};
}
function revCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const range=revRange();
  const inR=d=>d&&String(d)>=range.from&&String(d)<=range.to;
  const onlyOff=!!ST.revOfficial;
  const spread=!!ST.revSpread;
  const keep=x=>!onlyOff||(x.official!==false);
  const allT=ST.revTenants||[];
  const tenants=allT.filter(t=>!t.is_demo);           // τα δοκιμαστικά δεν μετρούν
  const demoIds={}; allT.forEach(t=>{if(t.is_demo)demoIds[t.id]=true;});
  const today=new Date(); today.setHours(0,0,0,0);
  const vatOf=tid=>{const t=allT.find(x=>x.id===tid);return t&&t.vat_pct!=null?n(t.vat_pct):24;};
  // Καθαρό / ΦΠΑ μιας εγγραφής (παλιές: το amount είναι καθαρό)
  const split=x=>{
    const net=(x.amount_net!=null&&x.amount_net!=='')?n(x.amount_net):n(x.amount);
    const vat=(x.vat_amount!=null&&x.vat_amount!=='')?n(x.vat_amount):0;
    return {net:net,vat:vat};
  };
  // ── Προβλεπόμενο: ενεργά μαγαζιά × μηνιαία αξία (καθαρή) ──
  let mrr=0,subTotal=0,extraUsers=0,discounts=0,mrrVat=0;
  const byPlan={basic:{n:0,sum:0},advanced:{n:0,sum:0},pro:{n:0,sum:0}};
  const owing=[];
  tenants.forEach(t=>{
    const m=shopMonthly(t);
    const pl=(t.plan||'advanced');
    const vp=t.vat_pct!=null?n(t.vat_pct):24;
    if(byPlan[pl]){byPlan[pl].n++;byPlan[pl].sum+=m.net;}
    mrr+=m.net; mrrVat+=m.net*vp/100;
    subTotal+=m.price; extraUsers+=m.extraFee; discounts+=m.discAmt;
    if(t.paid_until){
      const pu=new Date(t.paid_until); pu.setHours(0,0,0,0);
      const days=Math.round((pu-today)/86400000);
      if(days<0)owing.push({name:t.name,days:days,amt:m.net,vat:m.net*vp/100,expired:true,date:t.paid_until});
      else if(days<=7)owing.push({name:t.name,days:days,amt:m.net,vat:m.net*vp/100,expired:false,date:t.paid_until});
    }
  });
  const mult=(ST.revView==='year')?12:1;
  mrr*=mult; mrrVat*=mult;
  // ── Εισπραχθέν ──
  // Ταμείο: όλη η πληρωμή στον μήνα που έγινε.
  // Κατανομή: μοιράζεται στους μήνες που καλύπτει.
  let colNet=0,colVat=0; const byMethod={}; const paysShown=[];
  (ST.revPayments||[]).forEach(p=>{
    if(!keep(p)||demoIds[p.tenant_id])return;
    const s=split(p);
    const months=Math.max(1,parseInt(p.months,10)||1);
    if(spread&&months>1){
      // Πόσοι από τους καλυπτόμενους μήνες πέφτουν μέσα στην περίοδο;
      const start=new Date((p.pay_date||range.from)+'T12:00:00');
      let hit=0;
      for(let i=0;i<months;i++){
        const d=new Date(start.getFullYear(),start.getMonth()+i,1);
        const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
        const last=new Date(d.getFullYear(),d.getMonth()+1,0);
        const isoEnd=last.getFullYear()+'-'+String(last.getMonth()+1).padStart(2,'0')+'-'+String(last.getDate()).padStart(2,'0');
        if(isoEnd>=range.from&&iso<=range.to)hit++;
      }
      if(!hit)return;
      const fNet=s.net/months*hit, fVat=s.vat/months*hit;
      colNet+=fNet; colVat+=fVat;
      const mth=p.method||'other'; byMethod[mth]=(byMethod[mth]||0)+fNet+fVat;
      paysShown.push(Object.assign({},p,{_net:fNet,_vat:fVat,_part:hit+'/'+months}));
    } else {
      if(!inR(p.pay_date))return;
      colNet+=s.net; colVat+=s.vat;
      const mth=p.method||'other'; byMethod[mth]=(byMethod[mth]||0)+s.net+s.vat;
      paysShown.push(Object.assign({},p,{_net:s.net,_vat:s.vat,_part:''}));
    }
  });
  // ── Έξτρα χρεώσεις ──
  const chs=(ST.revCharges||[]).filter(x=>inR(x.charge_date)&&keep(x)&&!demoIds[x.tenant_id]);
  let chNet=0,chVat=0;
  chs.forEach(x=>{const s=split(x);chNet+=s.net;chVat+=s.vat;});
  // Setup fees καταγράφονται πλέον ως έξτρα χρεώσεις (shop_charges)
  const setup=0, setupVat=0;
  const targetNet=mrr;                    // MRR: μόνο επαναλαμβανόμενα
  const targetVat=mrrVat;
  const oneOffNet=chNet+setup;            // Εφάπαξ: setup fees + έξτρα χρεώσεις
  const oneOffVat=chVat+setupVat;
  // ΦΠΑ προς απόδοση: μόνο από ΔΗΛΩΜΕΝΕΣ εισπράξεις
  let vatDue=0;
  (ST.revPayments||[]).forEach(p=>{
    if(p.official===false||demoIds[p.tenant_id])return;
    if(!inR(p.pay_date))return;
    const sp=split(p); vatDue+=sp.vat;
  });
  (ST.revCharges||[]).forEach(x=>{
    if(x.official===false||demoIds[x.tenant_id])return;
    if(!inR(x.charge_date))return;
    const sp=split(x); vatDue+=sp.vat;
  });
  return {range:range,mrr:mrr,mrrVat:mrrVat,subTotal:subTotal*mult,extraUsers:extraUsers*mult,discounts:discounts*mult,
    collected:colNet,collectedVat:colVat,collectedGross:colNet+colVat,
    charges:chNet,chargesVat:chVat,setup:setup,setupVat:setupVat,
    oneOff:oneOffNet,oneOffVat:oneOffVat,vatDue:vatDue,
    target:targetNet,targetVat:targetVat,targetGross:targetNet+targetVat,
    grandNet:targetNet+oneOffNet,grandVat:targetVat+oneOffVat,
    pending:Math.max(0,targetNet-colNet),byPlan:byPlan,byMethod:byMethod,
    owing:owing.sort((a,b)=>a.days-b.days),activeShops:tenants.length,pays:paysShown,chs:chs};
}

function bizExpCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const list=(ST.bizExpenses||[]).filter(x=>x.exp_date&&x.exp_date>=r.from&&x.exp_date<=r.to);
  const groups={};
  let net=0,vat=0,vatDed=0;
  list.forEach(x=>{
    const k=x.category||'other';
    if(!groups[k])groups[k]={net:0,vat:0,cnt:0,recurring:false};
    groups[k].net+=n(x.amount_net); groups[k].vat+=n(x.vat_amount); groups[k].cnt++;
    if(x.recurring)groups[k].recurring=true;
    net+=n(x.amount_net); vat+=n(x.vat_amount);
    if(x.vat_deductible!==false)vatDed+=n(x.vat_amount);
  });
  const arr=Object.keys(groups).map(k=>Object.assign({key:k},groups[k])).sort((a,b)=>(b.net+b.vat)-(a.net+a.vat));
  return {list:list,groups:arr,net:net,vat:vat,vatDeductible:vatDed,total:net+vat};
}

// Αντιγράφει τα πάγια έξοδα του προηγούμενου μήνα στον τρέχοντα
async function bizCopyRecurring(){
  const T=(el,en)=>L(el,en);
  const n=v=>(v!=null&&v!==''?(+v):0);
  const cur=bizRange();
  const sv=ST.bizOffset; ST.bizOffset=(ST.bizOffset||0)-1; const prev=bizRange(); ST.bizOffset=sv;
  const src=(ST.bizExpenses||[]).filter(x=>x.recurring&&x.exp_date>=prev.from&&x.exp_date<=prev.to);
  if(!src.length){toast('ℹ️ '+T('Κανένα πάγιο τον προηγούμενο μήνα','No recurring expenses last month'));return;}
  // Όσα υπάρχουν ήδη σε αυτόν τον μήνα, δεν ξαναμπαίνουν
  const existing=(ST.bizExpenses||[]).filter(x=>x.exp_date>=cur.from&&x.exp_date<=cur.to);
  const key=x=>(x.category||'')+'|'+(x.label||'');
  const have={}; existing.forEach(x=>{have[key(x)]=true;});
  const todo=src.filter(x=>!have[key(x)]);
  if(!todo.length){toast('ℹ️ '+T('Έχουν ήδη καταχωρηθεί όλα','All already recorded'));return;}
  const total=todo.reduce((s2,x)=>s2+n(x.amount_net)+n(x.vat_amount),0);
  const lines=todo.map(x=>'• '+(x.label||bizCatLabel(x.category).replace(/^[^ ]+ /,''))+' — '+money(Math.round((n(x.amount_net)+n(x.vat_amount))*100)/100)).join('\n');
  if(!confirm(T('Αντιγραφή','Copy')+' '+todo.length+' '+T('πάγιων εξόδων στον','recurring expenses to')+' '+bizLabel()+';\n\n'+lines+'\n\n'+T('Σύνολο','Total')+': '+money(Math.round(total*100)/100)))return;
  // Ίδια ημέρα του μήνα με το πρωτότυπο
  const rows=todo.map(function(x){
    const d=new Date(x.exp_date+'T12:00:00');
    const tgt=new Date(cur.from+'T12:00:00');
    const last=new Date(tgt.getFullYear(),tgt.getMonth()+1,0).getDate();
    const day=Math.min(d.getDate(),last);
    const iso=tgt.getFullYear()+'-'+String(tgt.getMonth()+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    return {exp_date:iso,category:x.category,label:x.label,amount_net:n(x.amount_net),
      vat_pct:n(x.vat_pct),vat_amount:n(x.vat_amount),vat_deductible:x.vat_deductible!==false,
      payment_method:x.payment_method||'transfer',official:x.official!==false,recurring:true,
      created_by:ST.userEmail||null};
  });
  try{const {error}=await sb.from('biz_expenses').insert(rows); if(error)throw error;
    toast('✅ '+rows.length+' '+T('πάγια αντιγράφηκαν','recurring copied')); bizLoadExpenses();
  }catch(e){toast('❌ '+(e.message||e));}
}

function bizCashCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  const isCash=m=>m==='cash';
  // ── Εισροές: συνδρομές + έξτρα χρεώσεις ──
  const inflow=[]; let inBank=0,inTill=0,vatOut=0;
  let subNet=0,subVat=0,subCashN=0,subCashV=0;
  const demoC={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demoC[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(!inR(p.pay_date)||demoC[p.tenant_id])return;
    const net=(p.amount_net!=null?n(p.amount_net):n(p.amount)), vat=n(p.vat_amount);
    subNet+=net; subVat+=vat;
    if(isCash(p.method)){subCashN+=net;subCashV+=vat;inTill+=net+vat;} else inBank+=net+vat;
    if(p.official!==false)vatOut+=vat;
  });
  if(subNet+subVat>0)inflow.push({label:L('Συνδρομές','Subscriptions'),amt:subNet+subVat,cash:subCashN+subCashV>0,mixed:(subCashN+subCashV>0)&&(subNet+subVat>subCashN+subCashV)});
  let chNet=0,chVat=0,chCash=0,setNet=0,setVat=0,setCash=0;
  (ST.revCharges||[]).forEach(x=>{
    if(!inR(x.charge_date)||demoC[x.tenant_id])return;
    const net=(x.amount_net!=null?n(x.amount_net):n(x.amount)), vat=n(x.vat_amount);
    const setup=(x.label||'').toLowerCase().indexOf('setup')>=0;
    if(setup){setNet+=net;setVat+=vat;} else {chNet+=net;chVat+=vat;}
    inBank+=net+vat;   // οι χρεώσεις δεν έχουν τρόπο πληρωμής — θεωρούνται τράπεζα
    if(x.official!==false)vatOut+=vat;
  });
  if(setNet+setVat>0)inflow.push({label:'Setup Fees',amt:setNet+setVat,cash:false});
  if(chNet+chVat>0)inflow.push({label:L('Έξτρα Χρεώσεις','Extra Charges'),amt:chNet+chVat,cash:false});
  // ── Εκροές: έξοδα ανά κατηγορία ──
  const outMap={}; let outBank=0,outTill=0,vatIn=0;
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const tot=n(x.amount_net)+n(x.vat_amount);
    const k=x.category||'other';
    if(!outMap[k])outMap[k]={amt:0,cash:false};
    outMap[k].amt+=tot;
    if(isCash(x.payment_method)){outMap[k].cash=true;outTill+=tot;} else outBank+=tot;
    if(x.vat_deductible!==false)vatIn+=n(x.vat_amount);
  });
  // ── Μισθοδοσία ──
  let payBank=0,payTill=0;
  (ST.bizPayroll||[]).forEach(p=>{
    if(!inR(p.pay_date))return;

  });

  const openBank=bal?n(bal.bank):0, openTill=bal?n(bal.till):0;
  const vatDue=Math.max(0,vatOut-vatIn);
  const bank=openBank+inBank-outBank, till=openTill+inTill-outTill;
  return {inflow:inflow,outflow:outflow,openBank:openBank,openTill:openTill,hasOpening:!!bal,

    flow:(inBank+inTill)-(outBank+outTill),liquidity:bank+till,available:bank+till-vatDue};

// Υπολογισμός μισθοδοσίας ενός εργαζομένου για την περίοδο
function bizEmpCalc(e){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const cls=(e.insured===false)?null:(ST.bizContrib||[]).find(x=>x.name===e.contrib_class);
  const empPct=cls?n(cls.emp_pct):0, emprPct=cls?n(cls.empr_pct):0;
  const isNet=(e.wage_basis==='net')&&empPct>0&&empPct<100;
  let base=0;
  if(e.pay_type==='monthly')base=n(e.monthly_wage);
  else if(e.pay_type==='daily')base=n(e.daily_wage)*22;      // ενδεικτικά 22 εργάσιμες
  else base=n(e.hourly_rate)*160;                             // ενδεικτικά 160 ώρες
  const gross=isNet?(base/(1-empPct/100)):base;
  const empC=gross*empPct/100, emprC=gross*emprPct/100;
  return {gross:gross,empC:empC,emprC:emprC,net:gross-empC,cost:gross+emprC,isNet:isNet,cls:cls};
}
function bizPaidFor(empId,kind){
  const n=v=>(v!=null&&v!==''?(+v):0);

  const list=(ST.bizPayroll||[]).filter(p=>p.employee_id===empId&&(p.kind||'wage')===kind&&p.period_from===r.from&&p.period_to===r.to);
  const bank=list.reduce((s,p)=>s+n(p.amount_bank),0), cash=list.reduce((s,p)=>s+n(p.amount_cash),0);
  return {bank:bank,cash:cash,total:bank+cash};
}

async function bizSaveEmployee(){

function bizVatRange(off){
  off=off||0; const now=new Date(); const p=ST.bizVatPeriod||'quarter';
  let from,to;
  if(p==='month'){ from=new Date(now.getFullYear(),now.getMonth()+off,1); to=new Date(now.getFullYear(),now.getMonth()+off+1,0); }
  else if(p==='year'){ from=new Date(now.getFullYear()+off,0,1); to=new Date(now.getFullYear()+off,11,31); }
  else { const q=Math.floor(now.getMonth()/3)+off; from=new Date(now.getFullYear(),q*3,1); to=new Date(now.getFullYear(),q*3+3,0); }
  const f=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  return {from:f(from),to:f(to)};
}
function bizVatLabel(off){
  const r=bizVatRange(off); const d=new Date(r.from+'T12:00:00'); const p=ST.bizVatPeriod||'quarter';
  if(p==='month')return monthNamesFull()[d.getMonth()]+' '+d.getFullYear();
  if(p==='year')return ''+d.getFullYear();
  return (Math.floor(d.getMonth()/3)+1)+'ο '+L('Τρίμηνο','Quarter')+' '+d.getFullYear();
}
function bizVatCalc(off){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizVatRange(off||ST.bizVatOffset||0);
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  // Εκροές
  let subNet=0,subVat=0,setNet=0,setVat=0,chNet=0,chVat=0;
  const demo={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demo[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(p.official===false||!inR(p.pay_date)||demo[p.tenant_id])return;
    subNet+=(p.amount_net!=null?n(p.amount_net):n(p.amount)); subVat+=n(p.vat_amount);
  });
  (ST.revCharges||[]).forEach(x=>{
    if(x.official===false||!inR(x.charge_date)||demo[x.tenant_id])return;
    const net=(x.amount_net!=null?n(x.amount_net):n(x.amount)), vat=n(x.vat_amount);
    if((x.label||'').toLowerCase().indexOf('setup')>=0){setNet+=net;setVat+=vat;} else {chNet+=net;chVat+=vat;}
  });
  const out=[];
  if(subVat>0)out.push({label:L('Συνδρομές','Subscriptions'),net:subNet,vat:subVat});
  if(setVat>0)out.push({label:'Setup Fees',net:setNet,vat:setVat});
  if(chVat>0)out.push({label:L('Έξτρα Χρεώσεις','Extra Charges'),net:chNet,vat:chVat});
  const outVat=subVat+setVat+chVat;
  // Εισροές
  const inMap={};
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const k=x.category||'other';
    if(!inMap[k])inMap[k]={vat:0,ded:0,hasNonDed:false};
    inMap[k].vat+=n(x.vat_amount);
    if(x.vat_deductible!==false)inMap[k].ded+=n(x.vat_amount); else inMap[k].hasNonDed=true;
  });
  const inArr=Object.keys(inMap).map(k=>Object.assign({key:k},inMap[k])).sort((a,b)=>b.ded-a.ded);
  const inVat=inArr.reduce((s,x)=>s+x.ded,0);
  return {range:r,out:out,outVat:outVat,in:inArr,inVat:inVat,due:outVat-inVat};
}

function bizProfitCalc(off){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const saved=ST.bizOffset; if(off!=null)ST.bizOffset=off;
  const r=bizRange(); if(off!=null)ST.bizOffset=saved;
  const inR=d=>d&&String(d)>=r.from&&String(d)<=r.to;
  // Έσοδα (καθαρά, χωρίς ΦΠΑ)
  let sub=0,oneOff=0;
  const demoP={}; (ST.revTenants||[]).forEach(t=>{if(t.is_demo)demoP[t.id]=true;});
  (ST.revPayments||[]).forEach(p=>{
    if(!inR(p.pay_date)||demoP[p.tenant_id])return;
    sub+=(p.amount_net!=null?n(p.amount_net):n(p.amount));
  });
  (ST.revCharges||[]).forEach(x=>{
    if(!inR(x.charge_date)||demoP[x.tenant_id])return;
    oneOff+=(x.amount_net!=null?n(x.amount_net):n(x.amount));
  });
  const revenue=sub+oneOff;
  // Έξοδα (καθαρά) ανά κατηγορία + πάγια
  const catMap={}; let opex=0,fixed=0;
  (ST.bizExpenses||[]).forEach(x=>{
    if(!inR(x.exp_date))return;
    const net=n(x.amount_net);
    const k=x.category||'other';
    catMap[k]=(catMap[k]||0)+net;
    opex+=net;
    if(x.recurring)fixed+=net;
  });
  const cats=Object.keys(catMap).map(k=>({key:k,amt:catMap[k],pct:revenue>0?catMap[k]/revenue*100:0})).sort((a,b)=>b.amt-a.amt);
  // Μισθοδοσία (κόστος = μικτά + εργοδοτικές)
  let payroll=0;
  (ST.bizPayroll||[]).forEach(p=>{
    if(!inR(p.pay_date)||p.kind==='efka')return;
    payroll+=n(p.gross)+n(p.empr_contrib);
  });
  const profit=revenue-opex-payroll;
  const taxPct=n((ST.costSettings||{}).tax_pct);
  const tax=(profit>0)?(profit*taxPct/100):0;
  const afterTax=profit-tax;
  const shops=(ST.revTenants||[]).filter(t=>!t.is_demo).length;
  const avgPerShop=shops?revenue/shops:0;
  const fixedTotal=fixed+payroll;
  const breakEven=avgPerShop>0?Math.ceil(fixedTotal/avgPerShop):0;
  return {revenue:revenue,sub:sub,oneOff:oneOff,opex:opex,payroll:payroll,profit:profit,
    taxPct:taxPct,tax:tax,afterTax:afterTax,afterMargin:revenue>0?afterTax/revenue*100:0,
    margin:revenue>0?profit/revenue*100:0,cats:cats,fixed:fixedTotal,shops:shops,
    costPerShop:shops?(opex+payroll)/shops:0,profitPerShop:shops?profit/shops:0,breakEven:breakEven};
}

function bizClientsCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const cs=ST.costSettings||{};
  const perOcr=n(cs.cost_per_ocr), fixedTotal=n(cs.monthly_fixed);
  const inR=d=>{const dd=String(d||'').slice(0,10);return dd>=r.from&&dd<=r.to;};
  // Χρήση ανά μαγαζί
  const use={}; let totalOcr=0;
  (ST.usageLog||[]).forEach(u=>{
    if(!inR(u.created_at))return;
    if(!use[u.tenant_id])use[u.tenant_id]={ocr:0,z:0};
    const units=n(u.units)||1;
    if(u.kind==='ocr_z'){use[u.tenant_id].z+=units;} else {use[u.tenant_id].ocr+=units;}
    totalOcr+=units;
  });
  const tenants=(ST.revTenants||[]).filter(t=>!t.is_demo);
  const shopCount=tenants.length||1;
  // Το πάγιο μοιράζεται: μισό ισομερώς (κάθε μαγαζί κρατά χώρο),
  // μισό αναλογικά με τη χρήση (όποιος σκανάρει πολλά, κοστίζει πιο πολύ)
  const fixedEven=fixedTotal/2/shopCount;
  const fixedByUse=fixedTotal/2;
  const rows=tenants.map(function(t){
    const u=use[t.id]||{ocr:0,z:0};
    const scans=u.ocr+u.z;
    const m=shopMonthly(t);
    const revenue=(ST.bizPeriod==='year')?m.net*12:m.net;
    const varCost=scans*perOcr;
    const share=totalOcr>0?(scans/totalOcr):(1/shopCount);
    const fixCost=(fixedEven+fixedByUse*share)*((ST.bizPeriod==='year')?12:1);
    const cost=varCost+fixCost;
    const profit=revenue-cost;
    return {id:t.id,name:t.name,plan:t.plan||'advanced',scans:scans,ocr:u.ocr,z:u.z,
      revenue:revenue,varCost:varCost,fixCost:fixCost,cost:cost,profit:profit,
      margin:revenue>0?profit/revenue*100:0,users:(ST.revUsers||{})[t.id]||0};
  }).sort((a,b)=>b.cost-a.cost);
  const tRev=rows.reduce((s,x)=>s+x.revenue,0);
  const tCost=rows.reduce((s,x)=>s+x.cost,0);
  return {rows:rows,totalScans:totalOcr,revenue:tRev,cost:tCost,profit:tRev-tCost,
    margin:tRev>0?(tRev-tCost)/tRev*100:0,perOcr:perOcr,fixedTotal:fixedTotal};
}

// Υπολογισμός προμηθειών περιόδου ανά συνεργάτη
function partnerCalc(){
  const n=v=>(v!=null&&v!==''?(+v):0);
  const r=bizRange();
  const inR=d=>d&&String(d).slice(0,10)>=r.from&&String(d).slice(0,10)<=r.to;
  const tenants=ST.revTenants||[];
  const rows=(ST.partners||[]).filter(p=>p.active!==false).map(function(pt){
    const shops=tenants.filter(t=>t.partner_id===pt.id&&!t.is_demo);
    let base=0; const detail=[];
    shops.forEach(function(t){
      // Μέσα στη διάρκεια της συμφωνίας;
      let ok=true;
      if(pt.duration_months&&t.partner_since){
        const st=new Date(t.partner_since+'T12:00:00');
        const end=new Date(st.getFullYear(),st.getMonth()+parseInt(pt.duration_months,10),st.getDate());
        const per=new Date(r.from+'T12:00:00');
        ok=per<end;
      }
      if(!ok){detail.push({name:t.name,amt:0,expired:true});return;}
      let amt=0;
      // Συνδρομές (μόνο ό,τι εισπράχθηκε)
      if(pt.on_subscriptions!==false){
        (ST.revPayments||[]).forEach(function(pay){
          if(pay.tenant_id!==t.id||!inR(pay.pay_date))return;
          amt+=(pay.amount_net!=null?n(pay.amount_net):n(pay.amount));
        });
      }
      // Setup fees και έξτρα χρεώσεις
      (ST.revCharges||[]).forEach(function(x){
        if(x.tenant_id!==t.id||!inR(x.charge_date))return;
        const isSetup=(x.label||'').toLowerCase().indexOf('setup')>=0;
        if(isSetup&&pt.on_setup!==true)return;
        if(!isSetup&&pt.on_extras!==true)return;
        amt+=(x.amount_net!=null?n(x.amount_net):n(x.amount));
      });
      base+=amt;
      detail.push({name:t.name,amt:amt,expired:false});
    });
    const pct=n(pt.pct);
    const commission=base*pct/100;
    // Τι έχει ήδη πληρωθεί
    const paid=(ST.partnerPayments||[]).filter(x=>x.partner_id===pt.id&&x.period_from===r.from&&x.period_to===r.to)
      .reduce((s2,x)=>s2+n(x.amount_net),0);
    // Αν είναι μισθοδοσία, υπολογίζουμε εισφορές
    let empC=0,emprC=0;
    if(pt.kind==='payroll'){
      const cls=(ST.bizContrib||[]).find(x=>x.name===pt.contrib_class);
      if(cls){empC=commission*n(cls.emp_pct)/100;emprC=commission*n(cls.empr_pct)/100;}
    }
    return {p:pt,shops:shops.length,base:base,pct:pct,commission:commission,
      paid:paid,due:commission-paid,detail:detail,empC:empC,emprC:emprC,cost:commission+emprC};
  }).sort((a,b)=>b.commission-a.commission);
  const total=rows.reduce((s2,x)=>s2+x.commission,0);
  const totalCost=rows.reduce((s2,x)=>s2+x.cost,0);
  return {rows:rows,total:total,totalCost:totalCost};
}

function partnerSetKind(k){

async function partnerSave(){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const name=g('pt-name').trim();
  if(!name){toast('❌ '+L('Βάλε όνομα','Enter a name'));return;}
  const row={name:name,phone:g('pt-phone')||null,email:g('pt-email')||null,
    kind:g('pt-kind')||'invoice',vat_no:g('pt-vatno')||null,
    contrib_class:g('pt-contrib')||null,amka:g('pt-amka')||null,hire_date:g('pt-hire')||null,
    pct:parseFloat(g('pt-pct'))||0,
    duration_months:g('pt-dur')?parseInt(g('pt-dur'),10):null,
    on_subscriptions:g('pt-sub')==='1',on_setup:g('pt-setup')==='1',on_extras:g('pt-extras')==='1',
    active:true};
  const id=g('pt-id');
  try{
    if(id){const {error}=await sb.from('partners').update(row).eq('id',id); if(error)throw error;}
    else{const {error}=await sb.from('partners').insert(row); if(error)throw error;}
    closeModal(); toast('✅ '+L('Αποθηκεύτηκε','Saved')); bizLoadPartners();
  }catch(e){toast('❌ '+(e.message||e));}
}

async function partnerAssign(tenantId,partnerId){
  try{
    const upd={partner_id:partnerId||null};
    if(partnerId){
      const t=(ST.revTenants||[]).find(x=>x.id===tenantId);
      if(t&&!t.partner_since)upd.partner_since=todayISO();
    }
    const {error}=await sb.from('tenants').update(upd).eq('id',tenantId);
    if(error)throw error;
    const t=(ST.revTenants||[]).find(x=>x.id===tenantId);
    if(t){t.partner_id=partnerId||null;if(upd.partner_since)t.partner_since=upd.partner_since;}
    toast('✅ '+L('Αποθηκεύτηκε','Saved')); bizDrawPartners();
  }catch(e){toast('❌ '+(e.message||e));}
}

function ppLive(){
  const g=x=>{const el=document.getElementById(x);return el&&el.value!==''?(+el.value):0;};
  const net=g('pp-amount'), vp=g('pp-vat');
  const kind=(document.getElementById('pp-kind')||{}).value||'invoice';
  const vat=net*vp/100;
  const empP=g('pp-emp'), emprP=g('pp-empr');
  const box=document.getElementById('pp-calc');
  if(!box)return;
  let html='';
  if(kind==='payroll'&&(empP>0||emprP>0)){
    const empC=net*empP/100, emprC=net*emprP/100;
    html='<div style="display:flex;justify-content:space-between"><span>'+L('Εισφορές Εργαζομένου','Employee Contributions')+'</span><span>− '+money(Math.round(empC*100)/100)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span>'+L('Καθαρά Πληρωτέα','Net Payable')+'</span><span>'+money(Math.round((net-empC)*100)/100)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid var(--line);margin-top:4px;padding-top:4px"><span>'+L('Πραγματικό Κόστος','Real Cost')+'</span><span>'+money(Math.round((net+emprC)*100)/100)+'</span></div>';
  } else if(vp>0){
    html='<div style="display:flex;justify-content:space-between"><span>'+L('ΦΠΑ','VAT')+' '+vp+'%</span><span>'+money(Math.round(vat*100)/100)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-weight:700"><span>'+L('Πληρώνεις','You pay')+'</span><span>'+money(Math.round((net+vat)*100)/100)+'</span></div>';
  } else {
    html='<div style="display:flex;justify-content:space-between;font-weight:700"><span>'+L('Πληρώνεις','You pay')+'</span><span>'+money(Math.round(net*100)/100)+'</span></div>';
  }
  box.innerHTML=html;

async function partnerSavePay(partnerId){
  const p=(ST.partners||[]).find(x=>x.id===partnerId); if(!p)return;
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const net=parseFloat(g('pp-amount'))||0;
  if(net<=0){toast('❌ '+L('Βάλε ποσό','Enter an amount'));return;}
  const vp=parseFloat(g('pp-vat'))||0; const vat=Math.round(net*vp)/100;
  const empP=parseFloat(g('pp-emp'))||0, emprP=parseFloat(g('pp-empr'))||0;
  const empC=Math.round(net*empP)/100, emprC=Math.round(net*emprP)/100;
  const r=bizRange();
  const official=g('pp-off')==='1';
  try{
    const {error}=await sb.from('partner_payments').insert({partner_id:partnerId,partner_name:p.name,
      period_from:r.from,period_to:r.to,base_amount:parseFloat(g('pp-base'))||0,pct:p.pct,
      amount_net:net,vat_pct:vp,vat_amount:vat,emp_contrib:empC,empr_contrib:emprC,
      payment_method:g('pp-method')||'transfer',official:official,
      pay_date:g('pp-date')||todayISO(),created_by:ST.userEmail||null});
    if(error)throw error;
    // Καταγράφεται και ως έξοδο επιχείρησης
    try{await sb.from('biz_expenses').insert({exp_date:g('pp-date')||todayISO(),
      category:'commission',label:L('Προμήθεια','Commission')+' '+p.name,
      amount_net:net,vat_pct:vp,vat_amount:vat,vat_deductible:(p.kind==='invoice'),
      payment_method:g('pp-method')||'transfer',official:official,recurring:false,
      created_by:ST.userEmail||null});}catch(e2){}
    ST.bizExpenses=null;
    closeModal(); toast('✅ '+L('Καταχωρήθηκε','Recorded')); bizLoadPartners();
  }catch(e){toast('❌ '+(e.message||e));}
}

// ── Μαζική εισαγωγή προϊόντων από CSV ──
function parseCsv(text){
  text=text.replace(/\r\n?/g,'\n').replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===',' ){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
async function importCsv(inp){
  const f=inp.files&&inp.files[0]; if(!f)return; inp.value='';
  const text=await f.text();
  const rows=parseCsv(text);
  if(rows.length<2){toast('❌ Κενό ή λάθος CSV');return;}
  const head=rows[0].map(h=>String(h).trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const iSku=idx('sku'), iKind=idx('kind'), iCat=idx('category'), iSub=idx('sub_category'),
        iInv=idx('invoice_name'), iPack=idx('packaging'), iSize=idx('size_ml'), iUnits=idx('units'),
        iMu=idx('measure_unit'), iAlc=idx('alcohol_pct'), iRet=idx('retail_price');
  if(iSku<0){toast('❌ Λείπει η στήλη sku στο CSV');return;}
  const tid=curTenant();
  if(!tid){toast('❌ Δεν βρέθηκε μαγαζί');return;}
  const num=v=>{const n=parseFloat(String(v==null?'':v).replace(',','.'));return isNaN(n)?null:n;};
  const recs=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const sku=(c[iSku]||'').trim(); if(!sku)continue;
    let kind=(iKind>=0?(c[iKind]||'').trim().toLowerCase():'beverage');
    if(['beverage','food','supplies'].indexOf(kind)<0)kind='beverage';
    const size=iSize>=0?num(c[iSize]):null;
    const alc=iAlc>=0?num(c[iAlc]):null;
    const cat=iCat>=0?(c[iCat]||'').trim():''; const sub=iSub>=0?(c[iSub]||'').trim():'';
    const rec={tenant_id:tid,kind:kind,sku:sku,
      category:cat||null,sub_category:sub||null,
      invoice_name:iInv>=0?((c[iInv]||'').trim()||null):null,
      packaging:iPack>=0?((c[iPack]||'').trim()||null):null,
      size_ml:size, units:iUnits>=0?num(c[iUnits]):null,
      measure_unit:iMu>=0?((c[iMu]||'').trim()||null):null,
      alcohol_pct:alc, retail_price:iRet>=0?num(c[iRet]):null};
    if(kind==='beverage'&&alc){const efk=computeEFK(cat,sub,sku,size,alc);if(efk!=null)rec.efk=efk;}
    recs.push(rec);
  }
  if(!recs.length){toast('❌ Καμία έγκυρη γραμμή');return;}
  if(!confirm('Εισαγωγή '+recs.length+' προϊόντων στο μαγαζί;'))return;
  let ok=0,fail=0;
  for(let i=0;i<recs.length;i+=100){
    const batch=recs.slice(i,i+100);
    try{const {data,error}=await sb.from('products').insert(batch).select();
      if(error)throw error; ok+=(data?data.length:batch.length);
    }catch(e){fail+=batch.length;console.error(e);}
  }
  _canon=null; await loadAll();
  toast('✅ Μπήκαν '+ok+' προϊόντα'+(fail?(' · '+fail+' απέτυχαν'):''));
}

async function acceptTerms(){
  const btn=document.getElementById('tc-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user)throw new Error(L('Δεν βρέθηκε χρήστης','No user found'));
    // 1η προσπάθεια: RPC (παρακάμπτει RLS με ασφάλεια)
    let saved=false;
    try{const {error:rpcErr}=await sb.rpc('accept_terms'); if(!rpcErr)saved=true;}catch(e){}
    // 2η προσπάθεια: κανονικό update (αν υπάρχει δικαίωμα)
    if(!saved){
      const {error}=await sb.from('profiles').update({terms_accepted_at:new Date().toISOString()}).eq('id',user.id);
      if(error)throw error;
    }
    // Επαλήθευση ότι όντως σώθηκε
    const {data:chk}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).maybeSingle();
    if(!chk||!chk.terms_accepted_at)throw new Error(L('Η αποδοχή δεν αποθηκεύτηκε (RLS). Τρέξε το SQL: accept_terms().','Acceptance was not saved (RLS). Run the SQL: accept_terms().'));
    ST.termsOk=true;
    toast('✅ '+L('Ευχαριστούμε!','Thank you!'));
    ST.view='list';
    await enterShop();
  }catch(e){
    ST.termsOk=false;
    if(btn){btn.disabled=false;btn.innerHTML='✅ '+L('Αποδέχομαι & Συνέχεια','Accept & Continue');}
    alert('❌ '+(e.message||e));
  }
}
// ── ΦΡΟΥΡΟΣ: αν γυρίσει πίσω από τους Όρους χωρίς αποδοχή, ξαναδείξε την οθόνη ──
async function guardTerms(){
  if(ST.termsOk)return;                       // ήδη αποδεκτοί σε αυτή τη συνεδρία
  const app=document.getElementById('appView');
  if(!app||app.style.display==='none')return; // δεν είναι μέσα στην εφαρμογή
  try{
    const {data:{user}}=await sb.auth.getUser(); if(!user)return;
    const {data:pr}=await sb.from('profiles').select('terms_accepted_at').eq('id',user.id).single();
    if(pr&&pr.terms_accepted_at){ST.termsOk=true;return;}
    if(ST.view!=='terms')termsGate();          // δεν αποδέχτηκε → ξαναδείξ' το
  }catch(e){}
}

const MIGRATIONS=[
  {needle:'price_history.notes',sql:"alter table price_history add column if not exists notes text;"},
  {needle:'products.notes',sql:"alter table products add column if not exists notes text;"},
  {needle:'price_history.supplier_name',sql:"alter table price_history add column if not exists supplier_name text;"},
  {needle:'invoices.supplier_name',sql:"alter table invoices add column if not exists supplier_name text;"},
  {needle:'invoices.new_balance',sql:"alter table invoices add column if not exists new_balance numeric;"}
];
async function loadAll(){
  _canon=null;
  const c=document.getElementById('content');
  c.innerHTML='<div class="card center" style="min-height:40vh"><span class="spin"></span></div>';
  const T=curTenant();
  const ft=(qb)=>T?qb.eq('tenant_id',T):qb;   // φίλτρο μαγαζιού (admin βλέπει μόνο το επιλεγμένο)
  const res=await Promise.all([
    ft(sb.from('products').select('*')).order('category'),
    ft(sb.from('suppliers').select('*')).order('name'),
    ft(sb.from('product_prices').select('*')),
    sb.from('product_best_price').select('product_id,best_price,best_supplier'),
    ft(sb.from('order_lines').select('*')),
    ft(sb.from('price_history').select('*')).order('date',{ascending:false}).limit(400),
    ft(sb.from('invoices').select('*')).order('date',{ascending:false}).limit(300),
    ft(sb.from('recipes').select('*')),
    ft(sb.from('recipe_ingredients').select('*')),
    ft(sb.from('agreements').select('*')),
    ft(sb.from('agreement_blocks').select('*')),
    ft(sb.from('order_history').select('*')).order('created_at',{ascending:false}).limit(500),
    ft(sb.from('settings').select('*')).in('key',['labels','shop_name'])
  ]);
  ST.products=res[0].data||[];ST.suppliers=res[1].data||[];ST.prices=res[2].data||[];
  ST.orders={};(res[4].data||[]).forEach(o=>ST.orders[o.product_id]=o);
  ST.history=res[5].data||[];ST.invoices=res[6].data||[];
  ST.recipes=res[7].data||[];ST.recipeIng=res[8].data||[];ST.agreements=res[9].data||[];ST.agreementBlocks=res[10].data||[];ST.orderHistory=res[11].data||[];
  try{const rows=(res[12]&&res[12].data)||[]; const labRow=rows.find(r=>r.key==='labels'); const shopRow=rows.find(r=>r.key==='shop_name');
    const v=(labRow&&labRow.value)?JSON.parse(labRow.value):{};
    ST.labels=(v&&(v.el||v.en))?{el:v.el||{},en:v.en||{}}:{el:{},en:v||{}};   // legacy flat -> EN
    ST.shopName=(shopRow&&shopRow.value)?shopRow.value:'';
    try{if(ST.shopName)localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
  }catch(e){ST.labels={el:{},en:{}};}
  ST.best={};(res[3].data||[]).forEach(b=>ST.best[b.product_id]={price:b.best_price,sup:b.best_supplier});
  // ── έλεγχος setup: μάζεψε ό,τι SQL χρειάζεται
  const msgs=res.map(r=>r.error&&r.error.message||'').join(' | ');
  const need=MIGRATIONS.filter(m=>msgs.indexOf(m.needle)>=0);
  ST.setupSql=need.map(m=>m.sql).join('\n');
  if(res[0].error&&!ST.products.length&&msgs.indexOf('products')>=0){
    c.innerHTML='<div class="err">Σφάλμα σύνδεσης: '+esc(res[0].error.message)+'</div>';return;
  }
  try{const nav=JSON.parse(localStorage.getItem('ciq_nav')||localStorage.getItem('ciq_section')&&JSON.stringify({section:localStorage.getItem('ciq_section')})||'{}');
    if(nav.section)ST.section=nav.section;
    // (η γλώσσα φορτώνεται ανά χρήστη από το profile, όχι από localStorage)
    if(nav.kind)ST.kind=nav.kind; if(nav.rkind)ST.rkind=nav.rkind; if(nav.okind)ST.okind=nav.okind; if(nav.invsub)ST.invsub=nav.invsub; if(nav.repsub)ST.repsub=nav.repsub;
    if(nav.payView)ST.payView=nav.payView; if(nav.expView)ST.expView=nav.expView;
    if(nav.payPeriod)ST.payPeriod=nav.payPeriod; if(nav.payOffset)ST.payOffset=nav.payOffset; if(nav.cfOffset)ST.cfOffset=nav.cfOffset; if(nav.pfUseReal!=null)ST.pfUseReal=nav.pfUseReal; if(nav.vatPeriod)ST.vatPeriod=nav.vatPeriod; if(nav.vatOffset)ST.vatOffset=nav.vatOffset; if(nav.expPeriod)ST.expPeriod=nav.expPeriod;
    if(nav.ledgerSid)ST._ledgerSid=nav.ledgerSid; if(nav.delLedgerName)ST._delLedgerName=nav.delLedgerName;
    if(nav.revView)ST.revView=nav.revView; if(nav.revOffset!=null)ST.revOffset=nav.revOffset; if(nav.revOfficial!=null)ST.revOfficial=nav.revOfficial; if(nav.revSpread!=null)ST.revSpread=nav.revSpread;
    if(nav.bizTab)ST.bizTab=nav.bizTab; if(nav.bizPeriod)ST.bizPeriod=nav.bizPeriod; if(nav.bizOffset!=null)ST.bizOffset=nav.bizOffset;
    ST.homeView=!!nav.homeView;
    // Πρώτα το view. Λεπτομέρεια μόνο αν ταιριάζει η ενότητα.
    if(nav.view&&nav.view!=='detail'){ST.view=nav.view;}
    if(nav.view==='detail'){
      if(nav.section==='products'&&nav.prod){const p=ST.products.find(x=>x.id===nav.prod);if(p){ST.prod=p;ST.section='products';ST.view='detail';}}
      else if(nav.section==='recipes'&&nav.recipe){const r=ST.recipes.find(x=>x.id===nav.recipe);if(r){ST.recipe=r;ST.section='recipes';ST.view='detail';}}
      else if(nav.section==='invoices'&&nav.inv){const i=ST.invoices.find(x=>x.id===nav.inv);if(i){ST.inv=i;ST.section='invoices';ST.view='detail';}}
    }
  }catch(e){}
  rerenderCurrent();
}

}
let _ksActive=null;
function keepScroll(fn){
  const y=window.scrollY||window.pageYOffset||0;
  if(!y)return fn();
  // Ακυρώνουμε προηγούμενο keepScroll αν τρέχει
  if(_ksActive){_ksActive();_ksActive=null;}
  const c=document.getElementById('content');
  const hBefore=c?c.offsetHeight:0;
  if(c&&hBefore)c.style.minHeight=hBefore+'px';
  const restore=()=>{
    const cur=window.scrollY||window.pageYOffset||0;
    if(Math.abs(cur-y)>2){ window.scrollTo(0,y); }
  };
  let obs=null;
  if(c&&window.MutationObserver){
    obs=new MutationObserver(restore);
    obs.observe(c,{childList:true,subtree:true});
  }
  const timers=[];
  const stop=()=>{
    if(obs){obs.disconnect();obs=null;}
    timers.forEach(clearTimeout);
    if(c)c.style.minHeight='';
    if(_ksActive===stop)_ksActive=null;
  };
  _ksActive=stop;
  let r;
  try{ r=fn(); }catch(e){ stop(); throw e; }
  restore();
  requestAnimationFrame(restore);
  [10,40,80,150,250,400,600,900,1300].forEach(ms=>timers.push(setTimeout(restore,ms)));
  timers.push(setTimeout(stop,1600));
  return r;
}

// Μετατρέπει βασικό Markdown σε HTML, με ασφάλεια
function supportFmt(t){
  let x=esc(String(t||''));
  // Τίτλοι ### ## #
  x=x.replace(/^#{1,4}\s*(.+)$/gm,function(m,t2){return '<b style="display:block;margin:10px 0 3px">'+t2.replace(/\*\*/g,'')+'</b>';});
  // Έντονα και πλάγια
  x=x.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  x=x.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<i>$2</i>');
  // Κώδικας σε backticks
  x=x.replace(/`([^`]+)`/g,'<code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
  // Οριζόντιες γραμμές
  x=x.replace(/^\s*---+\s*$/gm,'<hr style="border:none;border-top:1px solid var(--line);margin:9px 0">');
  // Λίστες με παύλα ή αστερίσκο
  x=x.replace(/^\s*[-•]\s+(.+)$/gm,'<span style="display:block;padding-left:14px;text-indent:-9px">• $1</span>');
  // Αριθμημένες λίστες
  x=x.replace(/^\s*(\d+)\.\s+(.+)$/gm,'<span style="display:block;padding-left:18px;text-indent:-14px"><b>$1.</b> $2</span>');
  return x;
}
function supportAsk(q){
  const el=document.getElementById('sup-in');
  if(el)el.value=q;
  supportSend();
}
async function supportSend(){
  if(ST.supportBusy)return;
  const el=document.getElementById('sup-in');
  const q=(el?el.value:'').trim();
  if(!q)return;
  if(supportCount()>=SUPPORT_LIMIT){toast('⚠ '+L('Όριο ερωτήσεων','Question limit'));return;}
  ST.supportMsgs=ST.supportMsgs||[];
  ST.supportMsgs.push({role:'user',content:q});
  if(el)el.value='';
  ST.supportBusy=true; drawSupport();
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(SUPABASE_URL+'/functions/v1/support-chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:'')},
      body:JSON.stringify({messages:ST.supportMsgs,context:supportContext(),lang:(ST.lang==='en'?'en':'el')})
    });
    const d=await r.json();
    ST.supportBusy=false;
    if(d.error){ST.supportMsgs.push({role:'assistant',content:'⚠ '+d.error});}
    else{
      ST.supportMsgs.push({role:'assistant',content:d.reply||'—'});
      supportBump();
      logUsage('support_chat',1);
    }
    drawSupport();
    setTimeout(function(){window.scrollTo(0,document.body.scrollHeight);},80);
  }catch(e){
    ST.supportBusy=false;
    ST.supportMsgs.push({role:'assistant',content:'⚠ '+L('Δεν έγινε σύνδεση. Δοκίμασε ξανά.','Connection failed. Try again.')});
    drawSupport();
  }
}

function bevCalc(p,bestPrice){
  const size=parseFloat(p.size_ml)||0, measure=parseFloat(p.measure)||0, retail=parseFloat(p.retail_price)||0;
  let waste=parseFloat(p.waste_pct)||0; if(waste>1)waste=waste/100;
  const costMl=size>0?bestPrice/size:0;
  const unitCost=costMl*measure;
  const realCost=(waste>0&&waste<1)?unitCost/(1-waste):unitCost;
  const vpct=productVat(p);
  const exVat=retail/(1+vpct/100);
  const gross=exVat-realCost;
  const bevCost=exVat>0?realCost/exVat:0;
  return {costMl,unitCost,realCost,exVat,gross,bevCost};
}

// ── ΕΦΚ αυτόματος υπολογισμός (ίδιος με το app updateEFK) ──
function computeEFK(category,sub,sku,sizeMl,alcohol){
  const c=normStr(category)+' '+normStr(sub)+' '+normStr(sku);
  let rate=null;
  if(/VERMOUTH|ΒΕΡΜΟΥΤ|MARTINI|CINZANO|CUCIELO|DANTE|LILLET|PUNT.?E.?MES/.test(c))rate=-1.06;
  else if(/ΟΥΖΟ|OUZO|ΤΣΙΠΟΥΡΟ|TSIPOURO|ΤΣΙΚΟΥΔΙΑ|RAKI|ΡΑΚ/.test(c))rate=12.75;
  else if(/WINE|ΚΡΑΣΙ|SPARKLING|PROSECCO|CHAMPAGNE|ΑΦΡΩΔ/.test(c))rate=0;
  else if(/GIN|VODKA|RUM|TEQUILA|WHISK|LIQUEUR|LIQUER|ΛΙΚΕΡ|BRANDY|COGNAC|MEZCAL|SPIRIT|ΑΠΟΣΤΑΓΜΑ|APERITIF|APERITIVO|APERITIVE|ΑΠΕΡΙΤΙΦ|BITTER|AMARO|METAXA|ΜΕΤΑΞΑ/.test(c))rate=25.50;
  else if(/SOFT|SODA|JUICE|WATER|ΝΕΡΟ|ΧΥΜΟ|NON.?ALC|ΑΝΑΨΥΚΤ/.test(c))rate=0;
  if(/BEER|ΜΠΥΡΑ|ΜΠΙΡΑ|LAGER|IPA|PILSNER|\bALE\b|STOUT|WEISS|RADLER|STELLA|HEINEKEN|AMSTEL|CORONA|ΑΘΗΝΑΙΚΗ|VERGINA|ΒΕΡΓΙΝΑ|FIX|ΦΙΞ|VOREIA|ΒΟΡΕΙΑ/.test(c)){
    const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
    const a=parseFloat(alcohol)||0; if(a<=0)return null;
    const alcPct=a>1?a:a*100;
    const plato=2.5*alcPct;                    // βαθμοί Plato ≈ 2.5 × αλκοόλ%
    return Math.round(((sml/1000)/100)*plato*5*100)/100;  // (Λίτρα÷100)×Plato×5€/hL
  }
  if(rate===null)return null;
  const sml=parseFloat(sizeMl)||0; if(sml<=0)return null;
  const sizeL=sml/1000; const a=parseFloat(alcohol)||0;
  if(rate<0)return Math.round(sizeL*(-rate)*100)/100;
  const alcFrac=a>1?a/100:a;
  return Math.round(sizeL*alcFrac*rate*100)/100;
}
function historyForProduct(pid){
  const p=ST.products.find(x=>x.id===pid);if(!p)return [];
  const keys=keyWords(p.invoice_name||p.sku);
  return (ST.history||[]).filter(r=>{
    if(r.product_id===pid)return true;               // άμεση σύνδεση
    if(r.product_id)return false;                    // ανήκει σε άλλο προϊόν
    if(!keys.length)return false;
    const rtok=normStr(r.raw_product||'').split(' ');  // ταίριασμα με το όνομα τιμολογίου
    return keys.every(k=>rtok.some(w=>w===k||w.startsWith(k)));
  });
}

function liveCost(){
  const p=ST.prod;const b=ST.best[p.id]||{};const bestPrice=parseFloat(b.price)||0;
  const _v=document.getElementById('co-vat');
  const tmp={size_ml:p.size_ml,kind:p.kind,measure:document.getElementById('co-measure').value,retail_price:document.getElementById('co-retail').value,waste_pct:document.getElementById('co-waste').value,vat_pct:(_v&&_v.value!=='')?_v.value:p.vat_pct};
  const cc=bevCalc(tmp,bestPrice);
  const set=(id,v,d)=>{const e=document.getElementById(id);if(e)e.textContent=(v>0?'€'+v.toFixed(d):'—');};
  set('r-costml',cc.costMl,4);set('r-unit',cc.unitCost,2);set('r-real',cc.realCost,2);set('r-exvat',cc.exVat,2);set('r-gross',cc.gross,2);
  const big=document.getElementById('cm-big');if(big){const col=cmColor(cc.bevCost);big.textContent=cc.bevCost>0?(cc.bevCost*100).toFixed(2)+'%':'—';big.style.color=col;}
}
function liveCostFood(){
  const p=ST.prod;const b=ST.best[p.id]||{};const bestPrice=parseFloat(b.price)||0;
  const u=parseFloat(document.getElementById('co-units').value)||0;
  const uc=(u>0&&bestPrice>0)?bestPrice/u:0;
  const s=uc>0?'€'+uc.toFixed(2):'—';
  ['cm-big','r-fuc'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=s;});
}
async function saveCosting(pid){
  const measure=parseFloat(document.getElementById('co-measure').value)||null;
  const retail=parseFloat(document.getElementById('co-retail').value)||null;
  let waste=parseFloat(document.getElementById('co-waste').value);waste=isNaN(waste)?null:(waste/100);
  const _vv=document.getElementById('co-vat'); const vpct=(_vv&&_vv.value!=='')?parseFloat(_vv.value):null;
  const btn=document.getElementById('co-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{await sb.from('products').update({measure,retail_price:retail,waste_pct:waste,vat_pct:vpct}).eq('id',pid);
    const p=ST.products.find(x=>x.id===pid);if(p){p.measure=measure;p.retail_price=retail;p.waste_pct=waste;p.vat_pct=vpct;}ST.prod=p;
    btn.disabled=false;toast('✅ Αποθηκεύτηκε');keepScroll(drawProd);
  }catch(e){btn.disabled=false;toast('❌ '+(e.message||e));}
}
async function saveCostingFood(pid){

function autoEfk(force){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const size=g('pi-size')===''?null:parseFloat(g('pi-size'));
  const alc=g('pi-alc')===''?null:parseFloat(g('pi-alc'));
  const efk=computeEFK(g('pi-cat'),g('pi-sub'),g('pi-sku'),size,alc);
  const efkEl=document.getElementById('pi-efk');if(!efkEl)return;
  if(efk!=null)efkEl.value=efk;                 // αυτόματο (κατηγορία που υποστηρίζεται)
  else if(force)toast('Καμία αυτόματη κατηγορία ΕΦΚ — βάλε χειροκίνητα');
}
async function saveAllProduct(pid){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const sku=(g('pi-sku')||'').trim();
  if(!sku){toast('❌ '+L('Βάλε όνομα','Enter a name'));return;}
  const upd={sku,category:(g('pi-cat')||'').trim()||null,sub_category:(g('pi-sub')||'').trim()||null,invoice_name:(g('pi-inv')||'').trim()||null,notes:(g('pi-notes')||'').trim()||null};
  const sizeV=g('pi-size'); upd.size_ml=sizeV===''?null:parseFloat(sizeV);
  const packEl=document.getElementById('pi-pack'); if(packEl)upd.packaging=(packEl.value||'').trim()||null;
  const kindEl=document.getElementById('pi-kind'); if(kindEl)upd.kind=kindEl.value;
  const unitEl=document.getElementById('pi-unit'); if(unitEl)upd.measure_unit=unitEl.value||null;
  const alcEl=document.getElementById('pi-alc');
  if(alcEl){const av=alcEl.value;upd.alcohol_pct=av===''?null:parseFloat(av);const ev=g('pi-efk');upd.efk=ev===''?null:parseFloat(ev);}
  if(document.getElementById('co-measure')){                 // beverage costing
    const mv=g('co-measure');upd.measure=mv===''?null:parseFloat(mv);
    const rv=g('co-retail');upd.retail_price=rv===''?null:parseFloat(rv);
    const vv2=g('co-vat');upd.vat_pct=vv2===''?null:parseFloat(vv2);
    let w=parseFloat(g('co-waste'));upd.waste_pct=isNaN(w)?null:(w/100);
  }
  if(document.getElementById('co-units')){                    // food/supplies costing
    const uv=g('co-units');upd.units=uv===''?null:parseFloat(uv);
  }
  const btn=document.getElementById('pi-saveall');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    await sb.from('products').update(upd).eq('id',pid);
    const p=ST.products.find(x=>x.id===pid);if(p)Object.assign(p,upd);ST.prod=p;_canon=null;if(upd.kind)ST.kind=upd.kind;
    btn.disabled=false;toast('✅ '+L('Όλα αποθηκεύτηκαν','All saved'));
    goList();   // επιστροφή στη λίστα προϊόντων (στη σωστή κατηγορία Ποτά/Τρόφιμα/Αναλώσιμα)
  }catch(e){btn.disabled=false;toast('❌ '+(e.message||e));}
}
async function saveInfo(pid){
  const sku=(document.getElementById('pi-sku').value||'').trim();
  const cat=(document.getElementById('pi-cat').value||'').trim();
  const sub=(document.getElementById('pi-sub').value||'').trim();
  const inv=(document.getElementById('pi-inv').value||'').trim();
  const sizeV=document.getElementById('pi-size').value;
  const size=sizeV===''?null:parseFloat(sizeV);
  if(!sku){toast('❌ Βάλε όνομα');return;}
  const p=ST.products.find(x=>x.id===pid);
  const notesEl=document.getElementById('pi-notes');
  const upd={sku,category:cat||null,sub_category:sub||null,invoice_name:inv||null,size_ml:size,notes:(notesEl?(notesEl.value||'').trim():'')||null};
  const packEl=document.getElementById('pi-pack'); if(packEl)upd.packaging=(packEl.value||'').trim()||null;
  const kindEl=document.getElementById('pi-kind'); if(kindEl)upd.kind=kindEl.value;
  const unitEl=document.getElementById('pi-unit'); if(unitEl)upd.measure_unit=unitEl.value||null;
  const alcEl=document.getElementById('pi-alc');
  if(alcEl){                                   // beverage: αλκοόλ + ΕΦΚ (χειροκίνητο ή αυτόματο)
    const av=alcEl.value; const alc=av===''?null:parseFloat(av);
    upd.alcohol_pct=alc;

  }
  const btn=document.getElementById('pi-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Αποθήκευση…';
  try{
    await sb.from('products').update(upd).eq('id',pid);
    if(p)Object.assign(p,upd);
    ST.prod=p;_canon=null; if(upd.kind)ST.kind=upd.kind;
    btn.disabled=false;btn.textContent='Αποθήκευση';
    document.getElementById('hTitle').textContent=sku;

  }catch(e){btn.disabled=false;btn.textContent='Αποθήκευση';toast('❌ '+(e.message||e));}
}
async function delProduct(pid){
  if(!confirm('Διαγραφή προϊόντος και των τιμών του;'))return;
  try{await sb.from('product_prices').delete().eq('product_id',pid);
    await sb.from('products').delete().eq('id',pid);
    ST.products=ST.products.filter(x=>x.id!==pid);ST.prices=ST.prices.filter(x=>x.product_id!==pid);delete ST.best[pid];_canon=null;
    toast('🗑 Διαγράφηκε');goList();
  }catch(e){toast('❌ '+(e.message||e));}
}

  if(depth>3)return 0;
  const inner=recipeCalc(hr,depth+1);
  const y=parseFloat(hr.yield_qty)||0;
  return y>0?inner.realCost/y:0;   // κόστος ανά μονάδα παραγωγής
}
function recipeCalc(rec,depth){
  depth=depth||0;
  const ings=ingredientsFor(rec.id);
  let total=0; const lines=[];
  ings.forEach(ing=>{
    const qty=parseFloat(ing.quantity)||0;
    let serve=0,costMl=0,size=0,matched=false,isHome=false;
    const hr=homemadeByName(ing.ingredient);
    if(hr){                                   // υλικό = υποσυνταγή Homemade
      costMl=homemadeUnitCost(hr,depth); size=parseFloat(hr.yield_qty)||0;
      serve=qty*costMl; matched=true; isHome=true;
    }else{
      let pid=ing.product_id, prod=pid?ST.products.find(x=>x.id===pid):null;
      if(!prod){pid=matchProduct(ing.ingredient); prod=pid?ST.products.find(x=>x.id===pid):null;}
      const bestPrice=prod?(parseFloat((ST.best[prod.id]||{}).price)||0):0;
      size=(parseFloat(ing.size)||0)>0?parseFloat(ing.size):(prod?(parseFloat(prod.size_ml)||0):0);
      costMl=size>0?bestPrice/size:0;
      serve=qty*costMl; matched=!!prod;
    }
    total+=serve;
    lines.push({name:ing.ingredient,qty,unit:ing.unit||'',size,costMl,serve,matched,isHome});
  });
  let waste=parseFloat(rec.waste_pct)||0; if(waste>1)waste=waste/100;
  const realCost=total*(1+waste);
  const retail=parseFloat(rec.retail_price)||0;
  const vpct=recipeVat(rec);
  const retailNet=retail/(1+vpct/100);
  const netProfit=retailNet-realCost;
  const costPct=retailNet>0?realCost/retailNet:0;
  return {lines,total,waste,realCost,retail,retailNet,netProfit,costPct};
}

// ═══════════════ ΣΥΜΦΩΝΙΕΣ (Agreements) ═══════════════
function agreementAchieved(sku){
  const keys=keyWords(sku); if(!keys.length)return 0;
  let total=0;
  (ST.history||[]).forEach(r=>{
    const rt=normStr(r.raw_product||'').split(' ');
    if(keys.every(k=>rt.some(w=>w===k||w.startsWith(k)))) total+=parseFloat(r.quantity)||0;
  });
  return total;
}
function efkForSku(sku){
  const pid=matchProduct(sku); const p=pid?ST.products.find(x=>x.id===pid):null;
  return (p&&parseFloat(p.efk)>0)?parseFloat(p.efk):0;
}
// ── Υπολογισμοί block ΑΚΡΙΒΩΣ όπως waAgreementsBlocks ──
function blockCalc(block){
  const prods=(ST.agreements||[]).filter(a=>a.block_id===block.id);
  let tgtEfk=0,tgtNo=0,actEfk=0,actNo=0,rebTgt=0,rebAct=0,mktVar=0,mktAct=0,sumT=0,sumA=0;
  const rows=prods.map(a=>{
    const agp=(parseFloat(a.agreement_price)||0)>0?parseFloat(a.agreement_price):(parseFloat(a.price_incl_excise)||0);
    let efk=efkForSku(a.sku); if(!efk)efk=parseFloat(a.excise_duty)||0;
    const priceNo=agp-efk;
    const target=parseFloat(a.target)||0;
    let rebate=parseFloat(a.rebate)||0; if(rebate>1)rebate=rebate/100;
    const mkt=parseFloat(a.marketing)||0;
    const achieved=agreementAchieved(a.sku);
    const ratio=target>0?Math.min(1,achieved/target):0;
    const rt=priceNo*target*rebate;
    tgtEfk+=agp*target; tgtNo+=priceNo*target; actEfk+=agp*achieved; actNo+=priceNo*achieved;
    rebTgt+=rt; rebAct+=rt*ratio; mktVar+=mkt; mktAct+=mkt*ratio; sumT+=target; sumA+=achieved;
    return {a,agp,efk,priceNo,target,rebate,mkt,achieved,ratio,rebActual:rt*ratio};
  });
  const fixed=parseFloat(block.fixed_marketing)||0;
  const mktTotal=mktVar+fixed, mktActual=mktAct+fixed;
  const proposed=tgtNo>0?(rebTgt+mktTotal)/tgtNo:0;
  return {rows,target:sumT,achieved:sumA,purchaseTarget:tgtNo,purchaseTargetEfk:tgtEfk,
    purchaseActual:actNo,purchaseActualEfk:actEfk,fixed,mktVariable:mktVar,mkt:mktTotal,
    mktCredited:mktActual,rebateTotal:rebTgt,rebateActual:rebAct,proposed};
}

// Backfill: γεμίζει τιμές προμηθευτή από το ιστορικό (smart-match), όπως waBackfillSupplier_ του app
async function backfillSupplier(sid,sname){
  if(!confirm('Να γεμίσω τις τιμές του "'+sname+'" από το ιστορικό αγορών;'))return;
  const tid=curTenant();
  const supN=normStr(sname);
  // 1) Βρες γραμμές ιστορικού αυτού του προμηθευτή (όπου υπάρχει προμηθευτής)
  //    + γραμμές χωρίς προμηθευτή δεν αποδίδονται σε αυτόν (δεν ξέρουμε ποιανού είναι)
  const latest={};  // productId -> {price, date}
  (ST.history||[]).forEach(r=>{
    const rSup=resolveSupName(r);
    if(!rSup||rSup==='—')return;                 // χωρίς προμηθευτή → αγνόησέ το
    if(normStr(rSup)!==supN && !normStr(rSup).includes(supN) && !supN.includes(normStr(rSup)))return;
    const pid=resolveProductId(r);if(!pid)return;
    const price=parseFloat(r.price)||0;if(price<=0)return;
    const d=r.date||'';
    if(!latest[pid]||d>=latest[pid].date)latest[pid]={price:price,date:d};
  });
  const pids=Object.keys(latest);
  if(!pids.length){toast('ℹ️ Καμία τιμή στο ιστορικό για '+sname);return;}
  let n=0;
  for(const pid of pids){
    try{
      await sb.from('product_prices').upsert({tenant_id:tid,product_id:pid,supplier_id:sid,price:latest[pid].price,is_override:false},{onConflict:'product_id,supplier_id'});
      n++;
    }catch(e){console.error(e);}
  }
  await refreshPrices();
  toast('✅ Γέμισαν '+n+' τιμές για '+sname);
  keepScroll(renderSuppliers);
}

function kindLabel(k){return k==='beverage'?('🍺 '+lbl('kindBeverage','Ποτά')):(k==='food'?('🍽️ '+lbl('kindFood','Τρόφιμα')):('📦 '+lbl('kindSupplies','Αναλώσιμα')));}
// Μαζεύει τις τρέχουσες γραμμές αποθέματος του ενεργού τμήματος (από τα πεδία ή τη βάση)
function currentStockLines(){
  const isBev=ST.okind==='beverage';const lines=[];let total=0;
  ST.products.filter(p=>p.kind===ST.okind).forEach(p=>{
    const b=ST.best[p.id]||{};const ol=ST.orders[p.id]||{};
    const gg=k=>{const el=document.getElementById('o-'+p.id+'-'+k);return el?(parseFloat(el.value)||0):(parseFloat(ol[k])||0);};
    const stk=isBev?(gg('cellar_count')+gg('bar_count')+gg('floor_count')):(gg('cellar_count')+gg('kitchen_count'));
    if(stk<=0)return;                       // μόνο προϊόντα με ποσότητα
    const price=parseFloat(b.price)||0;const val=stk*price;total+=val;
    lines.push({product_id:p.id,sku:p.sku,category:p.category||'',qty:stk,unit_price:price,line_value:Math.round(val*100)/100});
  });
  return {lines,total:Math.round(total*100)/100};
}
async function saveStockTake(){
  if(ST.plan==='basic'){toast('🔒 '+L('Το αρχείο απογραφών είναι στο πακέτο ADVANCED','Stock-take archive is an ADVANCED feature'));return;}
  const {lines,total}=currentStockLines();
  if(!lines.length){toast('❌ '+L('Δεν υπάρχει απόθεμα σε αυτό το τμήμα (βάλε ποσότητες πρώτα)','No stock in this section (enter quantities first)'));return;}
  const today=new Date().toISOString().slice(0,10);
  const d=prompt(L('Ημερομηνία απογραφής (YYYY-MM-DD):','Stock-take date (YYYY-MM-DD):'),today);
  if(d===null)return;
  const take_date=(String(d).trim()||today);
  if(!/^\d{4}-\d{2}-\d{2}$/.test(take_date)){toast('❌ '+L('Λάθος ημερομηνία (πχ 2026-01-31)','Bad date (e.g. 2026-01-31)'));return;}
  if(!confirm(kindLabel(ST.okind)+' · '+money(total)+' · '+dGRs(take_date)+'\n\n'+L('Να κλειδωθεί αυτή η απογραφή;','Save this stock-take?')))return;
  const tid=curTenant();
  try{
    const {data:head,error:hErr}=await sb.from('stock_takes').insert({tenant_id:tid,kind:ST.okind,take_date:take_date,total_value:total,item_count:lines.length,created_by:ST.userEmail||null}).select().single();
    if(hErr)throw hErr;
    const rows=lines.map(l=>({take_id:head.id,tenant_id:tid,product_id:l.product_id,sku:l.sku,category:l.category,qty:l.qty,unit_price:l.unit_price,line_value:l.line_value}));

    toast('✅ '+L('Απογραφή αποθηκεύτηκε','Stock-take saved')+' · '+money(total));

async function logOrder(supName){
  const s=ST.suppliers.find(x=>x.name===supName)||{};

  const rows=[];const pids=[];
  ST.products.forEach(p=>{
    const ol=ST.orders[p.id];if(!ol)return;const oq=parseFloat(ol.order_qty)||0;if(oq<=0)return;
    const b=ST.best[p.id]||{};if((b.sup||'—')!==supName)return;
    const prev=stockOf(ol,p.kind==='beverage');
    rows.push({tenant_id:p.tenant_id,product_id:p.id,supplier_id:s.id||null,date:today,sku:p.sku,qty:oq,value:Math.round(oq*(parseFloat(b.price)||0)*100)/100,status:'Pending',prev_stock:prev});

    if(error)throw error;(data||[]).forEach(r=>ST.orderHistory.unshift(r));
    // καθάρισε το Order από την επισκόπηση (μηδενίζει order_qty)

      await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;
    }
    toast('✅ '+L('Στάλθηκε — μπήκε στο ιστορικό','Sent — logged')+' ('+rows.length+')');orderSummary();
  }catch(e){toast('❌ '+(e.message||e));}

async function checkDeliveries(){

  let n=0;const done=[];
  for(const r of (ST.orderHistory||[])){

    const found=(ST.history||[]).some(ph=>{

      const rt=normStr(ph.raw_product||'').split(' ');
      return keys.every(k=>rt.some(w=>w===k||w.startsWith(k)));
    });

          par_level:parseFloat(ol.par_level)||0,order_qty:0,updated_at:new Date().toISOString()};

        ST.orders[r.product_id]=row;

  }

// Ελληνική ημερομηνία: δέχεται 15/07/2026 ή 2026-07-15 → επιστρέφει ISO
function parseGRDate(s){
  s=String(s||'').trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);   // 15/07/2026
  if(m)return m[3]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;           // ήδη ISO
  return null;
}
const MKINDS=[['cocktail','🍸 '+'Cocktails'],['hotcold','☕ Beverages'],['food','🍽️ Food']];

function menuPeriod(a){const f=dGRs(a.analysis_date);const t=a.date_to?dGRs(a.date_to):'';return (t&&t!==f)?(f+' – '+t):f;}
// Κατηγορία & χρώμα από σκορ
function scoreClass(score,cmHigh,sellHigh){
  // 4 τετράγωνα: κέρδος(CM) × δημοτικότητα(πωλήσεις)
  if(sellHigh&&cmHigh)return {k:'champion',emo:'🟢',col:'var(--ok)',el:'Πρωταθλητής',en:'Champion',tipEl:'Κράτα & Πρόβαλέ το',tipEn:'Keep & Promote it'};
  if(sellHigh&&!cmHigh)return {k:'fix',emo:'🟡',col:'#e0a800',el:'Θέλει Διόρθωση',en:'Needs Fixing',tipEl:'Ανέβασε Τιμή ή Ρίξε Κόστος',tipEn:'Raise Price or Cut Cost'};
  if(!sellHigh&&cmHigh)return {k:'hidden',emo:'🔵',col:'var(--accent)',el:'Κρυμμένος Θησαυρός',en:'Hidden Gem',tipEl:'Διαφήμισέ το · Καλύτερη Θέση στο Μενού',tipEn:'Promote it · Better Menu Spot'};
  return {k:'cut',emo:'🔴',col:'var(--bad)',el:'Υποψήφιο για Κόψιμο',en:'Consider Cutting',tipEl:'Σκέψου να το Βγάλεις από το Μενού',tipEn:'Consider Removing from Menu'};
}
// Υπολογίζει την ανάλυση από τα recipes της κατηγορίας + τις πωλήσεις (ST.meSold) + on/off (ST.meOff)
function menuEngCalc(){
  const kind=ST.meKind||'cocktail';
  const sub=ST.meSub||'';
  const recs=(ST.recipes||[]).filter(r=>r.kind===kind && !r.is_homemade && r.is_active!==false && (!sub || r.sub_category===sub));
  const sold=ST.meSold||(ST.meSold={});
  const off=ST.meOff||(ST.meOff={});
  const rows=[];
  let totalSold=0,totalRev=0,totalCM=0,totalCost=0,activeCount=0,sumCM=0;
  recs.forEach(r=>{
    if(off[r.id])return;                                // εξαιρέθηκε (on/off)
    const cc=recipeCalc(r);
    const n=parseFloat(sold[r.id])||0;
    const price=parseFloat(r.retail_price)||0;
    const cm=cc.netProfit;                              // συνεισφορά ανά τεμάχιο (καθαρό - κόστος)
    rows.push({id:r.id,name:r.name,n,price,cost:cc.realCost,cm,netRev:cc.retailNet});
    totalSold+=n; totalRev+=cc.retailNet*n; totalCM+=cm*n; totalCost=(totalCost||0)+cc.realCost*n; sumCM+=cm; activeCount++;
  });
  const avgCM=activeCount?sumCM/activeCount:0;          // μέση συνεισφορά (όριο High/Low κέρδους)
  // Όριο δημοτικότητας: 70% × μέσο μερίδιο (κλασικός κανόνας menu engineering)
  const fairShare=activeCount?(totalSold/activeCount):0;
  const popThreshold=fairShare*0.70;
  rows.forEach(r=>{
    r.mix=totalSold>0?(r.n/totalSold*100):0;
    const cmHigh=r.cm>=avgCM;
    const sellHigh=r.n>=popThreshold;
    r.cls=scoreClass(0,cmHigh,sellHigh);
    // Σκορ 0-100: 50 από κέρδος (σχετικό με max CM) + 50 από πωλήσεις (σχετικό με max πωλήσεις)
    const maxCM=Math.max.apply(null,rows.map(x=>x.cm).concat([0.0001]));
    const maxN=Math.max.apply(null,rows.map(x=>x.n).concat([0.0001]));
    r.score=Math.round((r.cm/maxCM)*50 + (r.n/maxN)*50);
  });
  rows.sort((a,b)=>b.score-a.score);
  return {rows,totalSold,totalRev,totalCM,totalCost,avgCM,activeCount};
}
function loadMenuEng(){

// Διαβάζει CSV με αυτόματη ανίχνευση διαχωριστικού
function meParseCsv(text){
  text=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=text.split('\n').filter(l=>l.trim()!=='');
  if(!lines.length)return null;
  // Διαχωριστικό: ό,τι εμφανίζεται πιο συχνά στην πρώτη γραμμή
  const cands=[';','\t',','];
  let sep=',',best=0;
  cands.forEach(function(c){const n=(lines[0].split(c).length-1);if(n>best){best=n;sep=c;}});
  const split=function(line){
    const out=[]; let cur='',q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
      else if(ch===sep&&!q){ out.push(cur); cur=''; }
      else cur+=ch;
    }
    out.push(cur);
    return out.map(x=>x.trim().replace(/^"|"$/g,''));
  };
  const rows=lines.map(split);
  return {head:rows[0],rows:rows.slice(1)};
}
// Καθαρίζει όνομα για σύγκριση: πεζά, χωρίς τόνους, χωρίς σημεία στίξης
function meNorm(s){
  return String(s||'').toLowerCase()
    .replace(/[άàá]/g,'α').replace(/[έèé]/g,'ε').replace(/[ήèé]/g,'η')
    .replace(/[ίìíϊΐ]/g,'ι').replace(/[όòó]/g,'ο').replace(/[ύùúϋΰ]/g,'υ').replace(/[ώòó]/g,'ω')
    .replace(/[^a-zα-ω0-9]/g,'');
}
// Απόσταση επεξεργασίας: πόσοι χαρακτήρες διαφέρουν
function meDist(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  let prev=new Array(n+1),cur=new Array(n+1);
  for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    const t=prev; prev=cur; cur=t;
  }
  return prev[n];
}
function meNum(v){
  if(v==null)return 0;
  let s=String(v).replace(/[^\d,.\-]/g,'');
  // 1.234,56 → 1234.56 · 1,234.56 → 1234.56
  if(s.indexOf(',')>-1&&s.indexOf('.')>-1){
    s=(s.lastIndexOf(',')>s.lastIndexOf('.'))?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');
  } else if(s.indexOf(',')>-1){
    s=(s.split(',')[1]||'').length<=2?s.replace(',','.'):s.replace(/,/g,'');
  }
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function meImportFile(input){

function meImportProcess(parsed,fname){
  const T=(el,en)=>L(el,en);
  const box=document.getElementById('me-imp-status');
  if(!parsed||!parsed.head||parsed.rows.length===0){
    if(box)box.innerHTML='<div class="card" style="background:#FFF0F0;color:var(--bad);font-size:12.5px;padding:12px">❌ '+T('Το αρχείο είναι άδειο','The file is empty')+'</div>';
    return;
  }
  const head=parsed.head, rows=parsed.rows;
  // ── Αναγνώριση στηλών ──
  const hn=head.map(meNorm);
  const findCol=function(keys){
    for(let i=0;i<hn.length;i++)for(const k of keys)if(hn[i].indexOf(k)>-1)return i;
    return -1;
  };
  let cName=findCol(['itemname','item','product','προιον','ονομα','περιγραφη','description','name','ειδος']);
  let cQty =findCol(['itemssold','quantity','qty','ποσοτητα','τεμαχια','τεμ','sold','πωλησεις','count']);
  const cDate=findCol(['date','ημερομηνια','ημερομ','day','ημερα']);
  // Αν δεν βρέθηκαν, μάντεψε: 1η στήλη κείμενο = όνομα, 1η αριθμητική = ποσότητα
  if(cName<0)cName=0;
  if(cQty<0){
    for(let i=0;i<head.length;i++){
      if(i===cName||i===cDate)continue;
      let ok=0;
      rows.slice(0,8).forEach(function(r){ if(r[i]!=null&&r[i]!==''&&meNum(r[i])>0)ok++; });
      if(ok>=Math.min(3,rows.length)){cQty=i;break;}
    }
  }
  if(cQty<0){
    if(box)box.innerHTML='<div class="card" style="background:#FFF7E6;color:var(--warn);font-size:12.5px;padding:12px">⚠ '+T('Δεν βρήκα στήλη με ποσότητες. Ελέγξτε το αρχείο.','No quantity column found. Check the file.')+'</div>';
    return;
  }
  // ── Συγκέντρωση ανά όνομα ──
  const agg={}; let minD='',maxD='';
  rows.forEach(function(r){
    const nm=(r[cName]||'').trim(); if(!nm)return;
    const q=meNum(r[cQty]); if(q<=0)return;
    const k=meNorm(nm);
    if(!agg[k])agg[k]={name:nm,qty:0};
    agg[k].qty+=q;
    if(cDate>-1&&r[cDate]){
      const iso=meDateIso(r[cDate]);
      if(iso){ if(!minD||iso<minD)minD=iso; if(!maxD||iso>maxD)maxD=iso; }
    }
  });
  // ── Ταίριασμα με ενεργές συνταγές ──
  const recs=(ST.recipes||[]).filter(r=>!r.is_homemade&&r.is_active!==false);
  const byNorm={}; recs.forEach(function(r){ byNorm[meNorm(r.name)]=r; });
  const matched=[], unmatched=[];
  Object.keys(agg).forEach(function(k){
    const a=agg[k];
    let rec=byNorm[k];
    if(!rec){ // μερικό ταίριασμα
      const cands=recs.filter(function(r){const rn=meNorm(r.name);return rn.indexOf(k)>-1||k.indexOf(rn)>-1;});
      if(cands.length===1)rec=cands[0];
    }
    if(!rec&&k.length>=5){ // ανοχή σε μικρές διαφορές γραφής
      let bestR=null,bestD=99;
      recs.forEach(function(r){
        const rn=meNorm(r.name);
        if(Math.abs(rn.length-k.length)>2)return;
        const d=meDist(k,rn);
        if(d<bestD){bestD=d;bestR=r;}
      });
      if(bestR&&bestD<=Math.max(1,Math.floor(k.length*0.12)))rec=bestR;
    }
    if(rec)matched.push({rec:rec,qty:a.qty,src:a.name});
    else unmatched.push(a);
  });
  ST._meImport={matched:matched,unmatched:unmatched,from:minD,to:maxD};
  // ── Αποτέλεσμα ──
  let h='<div class="card" style="padding:0;overflow:hidden">'+
    '<div style="padding:12px 14px;border-bottom:1px solid var(--line)">'+
      '<div style="font-size:13px;font-weight:600">'+esc(fname)+'</div>'+
      '<div class="muted" style="font-size:11.5px;margin-top:2px">'+rows.length+' '+T('γραμμές','rows')+' · '+T('Στήλες','Columns')+': '+esc(head[cName])+' + '+esc(head[cQty])+(cDate>-1?(' + '+esc(head[cDate])):'')+'</div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--ok)">✓ '+T('Ταίριαξαν','Matched')+'</span><b>'+matched.length+'</b></div>';
  if(unmatched.length){
    h+='<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--muted)">'+T('Χωρίς Συνταγή','No Recipe')+'</span><b>'+unmatched.length+'</b></div>';
  }
  if(minD&&maxD){
    h+='<div style="display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px">'+
      '<span style="color:var(--muted)">'+T('Περίοδος','Period')+'</span><b>'+dGRs(minD)+' – '+dGRs(maxD)+'</b></div>';
  }
  h+='</div>';
  if(matched.length){
    h+='<div class="card" style="padding:0;overflow:hidden;margin-top:10px;max-height:220px;overflow-y:auto">';
    matched.slice(0,40).forEach(function(m){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px">'+
        '<div style="min-width:0;flex:1"><div>'+esc(m.rec.name)+'</div>'+
        (meNorm(m.src)!==meNorm(m.rec.name)?('<div class="muted" style="font-size:10.5px">← '+esc(m.src)+'</div>'):'')+'</div>'+
        '<b>'+Math.round(m.qty)+'</b></div>';
    });
    if(matched.length>40)h+='<div class="muted" style="text-align:center;padding:9px;font-size:11.5px">…'+T('και άλλα','and')+' '+(matched.length-40)+'</div>';
    h+='</div>';
  }
  if(unmatched.length){
    h+='<div class="muted" style="font-size:11.5px;margin-top:10px;line-height:1.6">'+T('Δεν βρέθηκε συνταγή για','No recipe found for')+': '+
      unmatched.slice(0,8).map(x=>esc(x.name)).join(', ')+(unmatched.length>8?('… +'+(unmatched.length-8)):'')+'</div>';
  }
  if(matched.length){
    h+='<button class="btn" style="margin-top:12px" onclick="meImportApply()">✓ '+T('Εισαγωγή','Import')+' '+matched.length+' '+T('Προϊόντων','Products')+'</button>';
  }
  if(box)box.innerHTML=h;
}
function meDateIso(v){
  const s=String(v||'').trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{4})/);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  return null;
}
function meImportApply(){
  const D=ST._meImport; if(!D||!D.matched.length)return;
  ST.meSold=ST.meSold||{};
  D.matched.forEach(function(m){ ST.meSold[m.rec.id]=Math.round(m.qty); });
  if(D.from&&D.to){ ST._meImpFrom=D.from; ST._meImpTo=D.to; }
  closeModal();
  toast('✅ '+D.matched.length+' '+L('προϊόντα ενημερώθηκαν','products updated'));
  renderStats();
}

async function checkDelivery(sid,invDate,lines){
  if(!sid||!lines||!lines.length)return;
  const cutoff=new Date(Date.now()-21*86400000).toISOString().slice(0,10);   // παραγγελίες τελευταίων 21 ημερών
  // Εκκρεμείς παραγγελίες αυτού του προμηθευτή
  const pend=(ST.orderHistory||[]).filter(r=>r.supplier_id===sid&&(r.status||'')==='Pending'&&(r.date||'')>=cutoff);
  if(!pend.length)return;

  const missing=[], received=[];
  const byProd={};
  lines.forEach(l=>{ if(l.productId)byProd[l.productId]=(byProd[l.productId]||0)+(parseFloat(l.qty)||0); });

  for(const po of pend){
    const got=byProd[po.product_id]||0;
    const ord=parseFloat(po.qty)||0;
    if(got>0){
      received.push({po,ord,got});
      const st=(got>=ord)?'Delivered':'Partial';
      try{await sb.from('order_history').update({status:st,qty_received:got}).eq('id',po.id);}catch(e){}
      po.status=st; po.qty_received=got;
      if(got<ord)missing.push({name:po.sku,ord,got,miss:Math.round((ord-got)*10)/10});
    }
  }
  if(!received.length)return;

  // ── Ενημέρωση αποθέματος (ΜΟΝΟ αν υπάρχει αποθηκευμένο απόθεμα) ──
  let stockMsg=[];
  for(const r of received){
    const pid=r.po.product_id;
    const ol=ST.orders[pid]; if(!ol)continue;
    const p=(ST.products||[]).find(x=>x.id===pid); if(!p)continue;
    const isBev=p.kind==='beverage';
    const cur=stockOf(ol,isBev);
    if(cur<=0)continue;                       // δεν έχει σώσει απόθεμα → μη πειράξεις
    const field=isBev?'cellar_count':'cellar_count';
    const newVal=(parseFloat(ol[field])||0)+r.got;
    const row={tenant_id:p.tenant_id,product_id:pid,
      cellar_count:isBev?newVal:(parseFloat(ol.cellar_count)||0)+r.got,
      bar_count:parseFloat(ol.bar_count)||0,floor_count:parseFloat(ol.floor_count)||0,
      kitchen_count:parseFloat(ol.kitchen_count)||0,par_level:parseFloat(ol.par_level)||0,
      order_qty:parseFloat(ol.order_qty)||0,
      last_delivery:invDate||null,last_delivery_qty:r.got,
      updated_at:new Date().toISOString()};
    try{await sb.from('order_lines').upsert(row,{onConflict:'product_id'});ST.orders[pid]=row;}catch(e){}
    stockMsg.push(p.sku+': '+cur+' + '+r.got+' = '+(cur+r.got));
  }

  // ── Μήνυμα ──
  let msg='';
  if(missing.length){
    msg='⚠️ '+L('ΔΕΝ ΗΡΘΑΝ ΟΛΑ','NOT ALL DELIVERED')+'\n\n';
    missing.forEach(m=>{msg+='• '+m.name+': '+L('παρήγγειλες','ordered')+' '+m.ord+' · '+L('ήρθαν','received')+' '+m.got+' → '+L('λείπουν','missing')+' '+m.miss+'\n';});
  } else {
    msg='✅ '+L('Όλα παραλήφθηκαν σωστά','All delivered correctly')+'\n';
  }
  if(stockMsg.length){
    msg+='\n📦 '+L('Απόθεμα ενημερώθηκε','Stock updated')+' ('+dGRs(invDate)+'):\n';
    stockMsg.forEach(x=>{msg+='• '+x+'\n';});
  }
  alert(msg);
}

function pPeriodDates(){
  const t=ST.pfType||'month'; const d=ST.pfDate?new Date(ST.pfDate):new Date();
  let s,e;
  if(t==='month'){ s=new Date(d.getFullYear(),d.getMonth(),1); e=new Date(d.getFullYear(),d.getMonth()+1,0); }
  else if(t==='quarter'){ const q=Math.floor(d.getMonth()/3); s=new Date(d.getFullYear(),q*3,1); e=new Date(d.getFullYear(),q*3+3,0); }
  else if(t==='half'){ const hh=d.getMonth()<6?0:6; s=new Date(d.getFullYear(),hh,1); e=new Date(d.getFullYear(),hh+6,0); }
  else { s=new Date(d.getFullYear(),0,1); e=new Date(d.getFullYear(),11,31); }
  const f=x=>{const y=x.getFullYear(),m=String(x.getMonth()+1).padStart(2,'0'),dd=String(x.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;};
  return {start:f(s),end:f(e)};
}

async function loadProfitSources(start,end){
  const out={sales:null,wages:0,social:0,opexList:[],opex:0,cashUnrec:0,delNet:0,tillTotal:0,hasData:false};
  const n=v=>(v!=null&&v!==''?(+v):0);
  const T=(el,en)=>L(el,en);
  try{
    // Ζ: πωλήσεις ανά συντελεστή ΦΠΑ
    const {data:zs}=await sb.from('z_closing').select('*').eq('tenant_id',curTenant()).gte('z_date',start).lte('z_date',end);
    if(zs&&zs.length){
      let byRate={};
      zs.forEach(z=>{
        let lines=[]; try{lines=(typeof z.vat_lines==='string')?JSON.parse(z.vat_lines):(z.vat_lines||[]);}catch(e){}
        lines.forEach(ln=>{const r=n(ln.rate); byRate[r]=(byRate[r]||0)+n(ln.net);});
      });
      if(Object.keys(byRate).length){ out.sales=byRate; out.hasData=true; }
    }
    // Κλείσιμο ημέρας: εκτός φακέλου + delivery
    const {data:cls}=await sb.from('daily_close').select('*').eq('tenant_id',curTenant()).gte('close_date',start).lte('close_date',end);
    (cls||[]).forEach(cl=>{
      out.cashUnrec+=n(cl.off_envelope);
      out.tillTotal+=n(cl.cash_income)+n(cl.card_income)+n(cl.off_envelope);
      let dd=[]; try{dd=(typeof cl.delivery_data==='string')?JSON.parse(cl.delivery_data):(cl.delivery_data||[]);}catch(e){}
      dd.forEach(d=>{const g=n(d.gross)||(n(d.net_val)+n(d.vat));out.delNet+=(n(d.net_val)||(g-n(d.vat)));out.tillTotal+=g;});
    });
    if(cls&&cls.length)out.hasData=true;
    // Μισθοδοσία: μικτά + εργοδοτικές εισφορές
    const {data:sh}=await sb.from('work_shifts').select('*').eq('tenant_id',curTenant()).gte('work_date',start).lte('work_date',end);
    (sh||[]).forEach(s=>{ out.wages+=n(s.total_amount); out.social+=n(s.empr_contrib); });
    if(sh&&sh.length)out.hasData=true;
    // Έξοδα: ανά όνομα (χωρίς προμηθευτές — αυτοί είναι αγορές)
    const {data:ex}=await sb.from('daily_expenses').select('*').eq('tenant_id',curTenant()).gte('exp_date',start).lte('exp_date',end);
    const map={};
    (ex||[]).forEach(e=>{
      if(e.category==='suppliers')return;
      const nm=(e.label&&e.label.trim())?e.label.trim():T('Έξοδο','Expense');
      map[nm]=(map[nm]||0)+n(e.amount);
    });
    out.opexList=Object.keys(map).map(k=>({name:k,amt:map[k]})).sort((a,b)=>b.amt-a.amt);
    out.opex=out.opexList.reduce((t,x)=>t+x.amt,0);
    if(ex&&ex.length)out.hasData=true;
  }catch(e){}
  return out;
}
