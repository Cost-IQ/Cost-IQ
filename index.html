    const planAllow=(ST.plan==='basic')?BASIC_TABS:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history'];
    upd.tabs=j.tabs.filter(t=>planAllow.indexOf(t)>=0);
  }
  try{await sb.from('profiles').update(upd).eq('id',uid);
    toast('вң… '+(jobLabel(job)||L('ОҳОӯПғО·','Title'))+(j.tabs?(' В· '+L('ОҙО№ОәОұО№ПҺОјОұП„Оұ ОҝПҒОҜПғП„О·ОәОұОҪ','permissions set')):''));
    openMembers();
  }catch(e){toast('вқҢ '+(e.message||e));openMembers();}
}
async function toggleGmailAccess(uid,val){
  try{await sb.from('profiles').update({gmail_access:!!val}).eq('id',uid);
    toast(val?('вң… '+L('О”ПҢОёО·ОәОө ПҖПҒПҢПғОІОұПғО· ПғП„Оҝ Gmail','Gmail access granted')):('рҹ”’ '+L('О‘ПҶОұО№ПҒОӯОёО·ОәОө О· ПҖПҒПҢПғОІОұПғО·','Access removed')));
    openMembers();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function editMemberName(uid){
  const m=(ST._members||[]).find(x=>x.id===uid)||{};
  const nm=prompt(L('ОҹОҪОҝОјОұП„ОөПҖПҺОҪП…ОјОҝ:','Full name:'), m.full_name||'');
  if(nm===null)return;
  try{await sb.from('profiles').update({full_name:nm.trim()||null}).eq('id',uid);
    toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved')); openMembers();
  }catch(e){toast('вқҢ '+(e.message||e));}
}
async function changeRole(uid,role){
  if(!['staff','manager','owner'].includes(role))return;
  if(role==='owner'&&ST.role!=='admin'){toast('вқҢ '+L('ОңПҢОҪОҝ Оҝ ОҙО№ОұПҮОөО№ПҒО№ПғП„О®ПӮ','Admin only'));openMembers();return;}
  if(uid===ST.myId){toast('вқҢ '+L('О”ОөОҪ ОұО»О»О¬О¶ОөО№ПӮ П„ОҝОҪ ОҙО№ОәПҢ ПғОҝП… ПҒПҢО»Оҝ','Cannot change your own role'));openMembers();return;}
  try{await sb.from('profiles').update({role}).eq('id',uid);
    toast('вң… '+L('ОЎПҢО»ОҝПӮ О¬О»О»ОұОҫОө','Role changed')+': '+role); openMembers();
  }catch(e){toast('вқҢ '+(e.message||e));openMembers();}
}
async function addMember(){
  if(ST.role!=='admin'&&((ST._members||[]).length>=freeUsers())){toast('вқҢ '+L('ОҢПҒО№Оҝ ПҮПҒО·ПғП„ПҺОҪ П„ОҝП… ПҖОұОәОӯП„ОҝП… вҖ” ОөПҖО№ОәОҝО№ОҪПҺОҪО·ПғОө ОіО№Оұ ОөПҖО№ПҖО»ОӯОҝОҪ (+10вӮ¬/ОјО®ОҪОұ)','Plan user limit вҖ” contact us for extra users (+10вӮ¬/month)'));return;}
  const role=document.getElementById('nm-role').value||'staff';
  const email=(document.getElementById('nm-email').value||'').trim();
  if(!email){toast('вқҢ '+L('О’О¬О»Оө email','Enter email'));return;}
  const password=(document.getElementById('nm-pass').value||'')||(role==='owner'?'placeholder-existing-owner-000':'');
  if(!password){toast('вқҢ '+L('О’О¬О»Оө ОәПүОҙО№ОәПҢ','Enter password'));return;}
  const btn=document.getElementById('nm-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const payload={email,password,role,full_name:(document.getElementById('nm-name')||{}).value||'',job_title:(document.getElementById('nm-job')||{}).value||'',tenant_id:curTenant()};
  try{
    const {data:{session}}=await sb.auth.getSession();
    const call=async(extra)=>{
      const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify(Object.assign({},payload,extra||{}))});
      return r.json();
    };
    let d=await call();
    // Оҹ owner П…ПҖО¬ПҒПҮОөО№ О®ОҙО· вҶ’ ПҒПҺП„Оұ ПҖПҒО№ОҪ ПҖПҒОҝПғОёОӯПғОөО№ПӮ П„Оҝ ОјОұОіОұО¶ОҜ
    if(d.needs_confirm){
      const ok=confirm(L('Оҹ owner ','Owner ')+d.owner_name+L(' ОӯПҮОөО№ О®ОҙО· ','  already has ')+d.shop_count+L(' ОјОұОіОұО¶ОҜ(Оұ). ОқОұ ПҖПҒОҝПғП„ОөОёОөОҜ ОәОұО№ ОұП…П„ПҢ;','  shop(s). Add this one too?'));
      if(!ok){btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');return;}
      d=await call({confirm_add:true});
    }
    btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');
    if(d.error){toast('вқҢ '+d.error);return;}
    if(d.added_shop){toast('вң… '+L('ОӨОҝ ОјОұОіОұО¶ОҜ ПҖПҒОҝПғП„ОӯОёО·ОәОө ПғП„ОҝОҪ owner','Shop added to owner')); openMembers(); return;}
    toast('вң… '+L('ОӨОҝ ОјОӯО»ОҝПӮ ОҙО·ОјО№ОҝП…ПҒОіО®ОёО·ОәОө','Member created')); openMembers();
  }catch(e){btn.disabled=false;btn.innerHTML='вһ• '+L('О”О·ОјО№ОҝП…ПҒОіОҜОұ ОјОӯО»ОҝП…ПӮ','Create member');toast('вқҢ '+(e.message||e));}
}
async function editShop(){
  if(ST.role!=='admin'){toast(L('ОңПҢОҪОҝ Оҝ ОҙО№ОұПҮОөО№ПҒО№ПғП„О®ПӮ ОјПҖОҝПҒОөОҜ','Admin only'));return;}
  const name=prompt(L('ОҢОҪОҝОјОұ ОјОұОіОұО¶О№ОҝПҚ:','Shop name:'),ST.shopName||'');
  if(name===null)return;
  const tid=curTenant();
  try{await sb.from('settings').upsert({tenant_id:tid,key:'shop_name',value:name.trim()},{onConflict:'tenant_id,key'});
    ST.shopName=name.trim(); try{localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
    document.getElementById('hTitle').textContent=brandTitle();
    const le=document.getElementById('loginShop'); if(le)le.textContent=ST.shopName;
    toast('вң… '+L('О‘ПҖОҝОёО·ОәОөПҚП„О·ОәОө','Saved'));
  }catch(e){toast('вқҢ '+(e.message||e));}
}
