function updateFinValue(){
  const el=document.getElementById('fin-value'); if(!el)return;
  const price=planPrice(ST._adminShopPlan||'advanced');
  const free=(ST._adminShopPlan==='basic')?2:3;
  const users=ST._adminShopUsers||0;
  const extra=Math.max(0,users-free);
  const extraFee=extra*10;
  const gross=price+extraFee;
  const discEl=document.getElementById('fin-disc');
  const disc=(discEl&&discEl.value!=='')?parseFloat(discEl.value):null;
  const net=(disc!=null&&disc>0)?(gross*(1-disc/100)):gross;
  const vEl2=document.getElementById('fin-vat');
  const vp=(vEl2&&vEl2.value!=='')?parseFloat(vEl2.value):(ST._adminShopVat!=null?ST._adminShopVat:24);
  const netR=Math.round(net*100)/100, vatR=Math.round(net*vp)/100;
  el.innerHTML='💶 '+(extra>0?(money(price)+'+'+money(extraFee)):money(price))+(disc?(' − '+disc+'%'):'')+' = '+money(netR)+'/'+L('μήνα','month')+(extra>0?(' ('+extra+' extra '+L('χρήστες','users')+')'):'')+
    '<div style="font-size:12px;font-weight:400;color:var(--muted);margin-top:3px">'+L('ΦΠΑ','VAT')+' '+vp+'% '+money(vatR)+' · '+L('Πληρώνει','Pays')+' <b style="color:var(--accent)">'+money(Math.round((net+net*vp/100)*100)/100)+'</b></div>';
}

      '<div><label style="font-size:12px;color:var(--muted)">'+T('Ημερομηνία','Date')+'</label><input id="am-date" type="date" value="'+todayISO()+'" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--line);border-radius:8px"></div>'+
    '</div>'+
    '<div><label style="font-size:12px;color:var(--muted)">'+T('Τρόπος Πληρωμής','Payment Method')+'</label><select id="am-method" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--card)">'+
      '<option value="transfer">🏦 '+T('Τραπεζικό Έμβασμα','Bank Transfer')+'</option>'+
      '<option value="cash">💵 '+T('Μετρητά','Cash')+'</option>'+
      '<option value="card">💳 '+T('Κάρτα','Card')+'</option>'+
    '</select></div>'+
    (ST.sysOwner?'<div onclick="amToggleOfficial()" style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--line);cursor:pointer">'+
      '<div style="font-size:13px">'+T('Δηλωμένη','Declared')+'</div>'+
      '<input type="hidden" id="am-official" value="1">'+
      '<div id="am-sw" style="position:relative;width:52px;height:30px;background:var(--ok);border-radius:30px;transition:.2s;flex:0 0 auto"><div id="am-knob" style="position:absolute;height:24px;width:24px;left:25px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div></div>'+
    '</div>':'<input type="hidden" id="am-official" value="1">')+
  '</div>';
  showModal('💰 '+T('Καταχώρηση Πληρωμής','Record Payment'),html,T('Καταχώρηση','Record'),saveMonthPayment);
  setTimeout(amLive,50);
}
function amLive(){
  const g=x=>{const el=document.getElementById(x);return el&&el.value!==''?(+el.value):0;};
  const net=g('am-amount'), vp=g('am-vat');
  const vat=net*vp/100;
  const box=document.getElementById('am-calc');
  if(box)box.innerHTML='<div style="display:flex;justify-content:space-between"><span>'+L('Καθαρή Αξία','Net')+'</span><span>'+money(Math.round(net*100)/100)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between"><span>'+L('ΦΠΑ','VAT')+' '+vp+'%</span><span>'+money(Math.round(vat*100)/100)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid var(--accent);margin-top:4px;padding-top:4px"><span>'+L('Πληρώνει','Pays')+'</span><span>'+money(Math.round((net+vat)*100)/100)+'</span></div>';
}
function amToggleOfficial(){
  const h=document.getElementById('am-official'); if(!h)return;
  const on=h.value!=='1'; h.value=on?'1':'0';
  const sw=document.getElementById('am-sw'), k=document.getElementById('am-knob');
  if(sw)sw.style.background=on?'var(--ok)':'var(--line)';
  if(k)k.style.left=on?'25px':'3px';
}
async function saveMonthPayment(){
  const g=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const net=parseFloat(g('am-amount'))||0;
  const vp=parseFloat(g('am-vat'))||0;
  const months=parseInt(g('am-months'),10)||1;
  if(net<=0){toast('❌ '+L('Βάλε ποσό','Enter an amount'));return;}
  const vat=Math.round(net*vp)/100;
  const base=(ST.paidUntil&&new Date(ST.paidUntil)>new Date())?new Date(ST.paidUntil):new Date();
  base.setMonth(base.getMonth()+months);
  const until=base.toISOString().slice(0,10);
  try{
    await sb.from('tenants').update({paid_until:until}).eq('id',curTenant());
    try{await sb.from('payments').insert({tenant_id:curTenant(),amount:net,amount_net:net,vat_amount:vat,vat_pct:vp,months:months,method:g('am-method')||'transfer',pay_date:g('am-date')||todayISO(),official:g('am-official')==='1'});}catch(e){}
    ST.paidUntil=until; closeModal();
    toast('✅ '+L('Πληρώθηκε — μέχρι','Paid — until')+' '+dGRs(until)); keepScroll(openMembers);
  }catch(e){toast('❌ '+(e.message||e));}
}
async function toggleTab(uid,tab){
  const {data:pr}=await sb.from('profiles').select('tabs,role').eq('id',uid).single();
  const planAllow=(ST.plan==='basic')?BASIC_TABS:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history'];
  let cur=(pr&&pr.tabs&&pr.tabs.length)?pr.tabs.slice():((pr&&pr.role==='staff')?['ocr','orders']:planAllow.slice());
  const i=cur.indexOf(tab);
  if(i>=0)cur.splice(i,1); else cur.push(tab);
  try{await sb.from('profiles').update({tabs:cur}).eq('id',uid);openMembers();}catch(e){toast('❌ '+(e.message||e));}
}
async function deleteMember(uid,email){
  if(!confirm(L('Διαγραφή του μέλους «','Delete member «')+email+L('»;\n\nΔεν θα μπορεί να συνδεθεί ξανά.','»?\n\nThey will no longer be able to sign in.')))return;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify({action:'delete',user_id:uid})});
    const d=await r.json();
    if(d.error){toast('❌ '+d.error);return;}
    toast('✅ '+L('Το μέλος διαγράφηκε','Member deleted')); keepScroll(openMembers);
  }catch(e){toast('❌ '+(e.message||e));}
}
// ═══════════ ΘΕΣΕΙΣ ΕΡΓΑΣΙΑΣ (πρότυπα δικαιωμάτων) ═══════════
const JOBS={
  '':            {el:'— Χωρίς θέση —',    en:'— No title —',      tabs:null},
  'owner':       {el:'Ιδιοκτήτης',        en:'Owner',             tabs:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history']},
  'gm':          {el:'Γενικός Διευθυντής',en:'General Manager',   tabs:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history']},
  'fbmanager':   {el:'F&B Manager',       en:'F&B Manager',       tabs:['products','suppliers','orders','ocr','invoices','recipes','events','history']},
  'barmanager':  {el:'Bar Manager',       en:'Bar Manager',       tabs:['products','suppliers','orders','ocr','recipes','events']},
  'chef':        {el:'Chef',              en:'Chef',              tabs:['products','suppliers','orders','recipes','events']},
  'souschef':    {el:'Sous Chef',         en:'Sous Chef',         tabs:['products','orders','recipes']},
  'bartender':   {el:'Bartender',         en:'Bartender',         tabs:['orders','recipes']},
  'barista':     {el:'Barista',           en:'Barista',           tabs:['orders','recipes']},
  'waiter':      {el:'Σερβιτόρος',        en:'Waiter',            tabs:['orders']},
  'captain':     {el:'Captain',           en:'Captain',           tabs:['orders','recipes']},
  'maitre':      {el:'Maitre',            en:'Maitre',            tabs:['products','orders','recipes','events']},
  'storekeeper': {el:'Υπεύθυνος Αποθήκης',en:'Storekeeper',       tabs:['products','orders','ocr']},
  'accountant':  {el:'Λογιστήριο',        en:'Accounting',        tabs:['invoices','history']}
};
function jobLabel(k){const j=JOBS[k||''];return j?(ST.lang==='en'?j.en:j.el):'';}
async function changeJob(uid,job){
  const j=JOBS[job||'']; if(!j)return;
  const upd={job_title:job||null};
  // Πρότυπα δικαιώματα (μόνο όσα επιτρέπει το πακέτο)
  if(j.tabs){
    const planAllow=(ST.plan==='basic')?BASIC_TABS:['products','suppliers','orders','ocr','invoices','recipes','events','agree','history'];
    upd.tabs=j.tabs.filter(t=>planAllow.indexOf(t)>=0);
  }
  try{await sb.from('profiles').update(upd).eq('id',uid);
    toast('✅ '+(jobLabel(job)||L('Θέση','Title'))+(j.tabs?(' · '+L('δικαιώματα ορίστηκαν','permissions set')):''));
    keepScroll(openMembers);
  }catch(e){toast('❌ '+(e.message||e));openMembers();}
}
async function toggleGmailAccess(uid,val){
  try{await sb.from('profiles').update({gmail_access:!!val}).eq('id',uid);
    toast(val?('✅ '+L('Δόθηκε πρόσβαση στο Gmail','Gmail access granted')):('🔒 '+L('Αφαιρέθηκε η πρόσβαση','Access removed')));
    openMembers();
  }catch(e){toast('❌ '+(e.message||e));}
}
async function editMemberName(uid){
  const m=(ST._members||[]).find(x=>x.id===uid)||{};
  const nm=prompt(L('Ονοματεπώνυμο:','Full name:'), m.full_name||'');
  if(nm===null)return;
  try{await sb.from('profiles').update({full_name:nm.trim()||null}).eq('id',uid);
    toast('✅ '+L('Αποθηκεύτηκε','Saved')); keepScroll(openMembers);
  }catch(e){toast('❌ '+(e.message||e));}
}
async function changeRole(uid,role){
  if(!['staff','manager','owner'].includes(role))return;
  if(role==='owner'&&ST.role!=='admin'){toast('❌ '+L('Μόνο ο διαχειριστής','Admin only'));openMembers();return;}
  if(uid===ST.myId){toast('❌ '+L('Δεν αλλάζεις τον δικό σου ρόλο','Cannot change your own role'));openMembers();return;}
  try{await sb.from('profiles').update({role}).eq('id',uid);
    toast('✅ '+L('Ρόλος άλλαξε','Role changed')+': '+role); keepScroll(openMembers);
  }catch(e){toast('❌ '+(e.message||e));openMembers();}
}
async function addMember(){
  if(ST.role!=='admin'&&((ST._members||[]).length>=freeUsers())){toast('❌ '+L('Όριο χρηστών του πακέτου — επικοινώνησε για επιπλέον (+10€/μήνα)','Plan user limit — contact us for extra users (+10€/month)'));return;}
  const role=document.getElementById('nm-role').value||'staff';
  const email=(document.getElementById('nm-email').value||'').trim();
  if(!email){toast('❌ '+L('Βάλε email','Enter email'));return;}
  const password=(document.getElementById('nm-pass').value||'')||(role==='owner'?'placeholder-existing-owner-000':'');
  if(!password){toast('❌ '+L('Βάλε κωδικό','Enter password'));return;}
  const btn=document.getElementById('nm-save');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const payload={email,password,role,full_name:(document.getElementById('nm-name')||{}).value||'',job_title:(document.getElementById('nm-job')||{}).value||'',tenant_id:curTenant()};
  try{
    const {data:{session}}=await sb.auth.getSession();
    const call=async(extra)=>{
      const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY),'apikey':SUPABASE_KEY},body:JSON.stringify(Object.assign({},payload,extra||{}))});
      return r.json();
    };
    let d=await call();
    // Ο owner υπάρχει ήδη → ρώτα πριν προσθέσεις το μαγαζί
    if(d.needs_confirm){
      const ok=confirm(L('Ο owner ','Owner ')+d.owner_name+L(' έχει ήδη ','  already has ')+d.shop_count+L(' μαγαζί(α). Να προστεθεί και αυτό;','  shop(s). Add this one too?'));
      if(!ok){btn.disabled=false;btn.innerHTML='➕ '+L('Δημιουργία μέλους','Create member');return;}
      d=await call({confirm_add:true});
    }
    btn.disabled=false;btn.innerHTML='➕ '+L('Δημιουργία μέλους','Create member');
    if(d.error){toast('❌ '+d.error);return;}
    if(d.added_shop){toast('✅ '+L('Το μαγαζί προστέθηκε στον owner','Shop added to owner')); keepScroll(openMembers); return;}
    toast('✅ '+L('Το μέλος δημιουργήθηκε','Member created')); keepScroll(openMembers);
  }catch(e){btn.disabled=false;btn.innerHTML='➕ '+L('Δημιουργία μέλους','Create member');toast('❌ '+(e.message||e));}
}
async function editShop(){
  if(ST.role!=='admin'){toast(L('Μόνο ο διαχειριστής μπορεί','Admin only'));return;}
  const name=prompt(L('Όνομα μαγαζιού:','Shop name:'),ST.shopName||'');
  if(name===null)return;
  const tid=curTenant();
  try{await sb.from('settings').upsert({tenant_id:tid,key:'shop_name',value:name.trim()},{onConflict:'tenant_id,key'});
    ST.shopName=name.trim(); try{localStorage.setItem('ciq_shop',ST.shopName);}catch(e){}
    document.getElementById('hTitle').textContent=brandTitle();
    toast('✅ '+L('Αποθηκεύτηκε','Saved'));
  }catch(e){toast('❌ '+(e.message||e));}
}
(async()=>{try{}catch(e){}
  try{const st=id=>document.getElementById(id);
    if(st('loginSubtitle'))st('loginSubtitle').textContent=L('Σύνδεση στο cloud','Sign in to the cloud');
    if(st('loginBtn'))st('loginBtn').textContent=L('Σύνδεση','Sign In');
    if(st('loginForgot'))st('loginForgot').textContent=L('Ξέχασα τον κωδικό','Forgot password');
    if(st('loginLock'))st('loginLock').textContent=L('🔒 Τα δεδομένα προστατεύονται ανά μαγαζί','🔒 Data is protected per shop');
    if(st('logoutBtn'))st('logoutBtn').textContent=L('Έξοδος','Logout');
  }catch(e){}
  try{const dl=document.getElementById('ciq-emails');
    const prev=JSON.parse(localStorage.getItem('ciq_emails')||'[]');
    if(dl&&prev.length)dl.innerHTML=prev.map(function(x){return '<option value="'+esc(x)+'">';}).join('');
  }catch(e){}
  try{const lv=document.getElementById('loginVer');if(lv)lv.textContent=BUILD;}catch(e){}
  // Εφάπαξ καθάρισμα: παλιό refresh token που είχε μείνει σε συσκευές
  try{localStorage.removeItem('ciq_gmail_rt');}catch(e){}
  try{const tt=localStorage.getItem('ciq_tenant');if(tt)ST.tenant=tt;}catch(e){}
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    if(idleExpired()){
      try{localStorage.removeItem('ciq_seen');}catch(e){}
      await sb.auth.signOut();
      const err=document.getElementById('loginErr');
      if(err)err.innerHTML='<div class="card" style="background:#FFF7E6;border:1px solid #e0a800;color:#B8860B;font-size:13px;padding:10px;border-radius:10px;margin-top:10px">🔒 '+L('Για ασφάλεια, ζητάμε ξανά σύνδεση μετά από '+IDLE_DAYS+' ημέρες χωρίς χρήση.','For security, we ask you to sign in again after '+IDLE_DAYS+' days of inactivity.')+'</div>';
    } else {
      await enterApp();
    }
  }})();
// αυτόματη ανανέωση δεδομένων όταν επιστρέφεις στην εφαρμογή
let _lastRefresh=Date.now();
document.addEventListener('visibilitychange',async()=>{
  if(document.hidden)return;
  if(document.getElementById('appView').style.display!=='block')return;
  if(await checkIdle())return;          // πέρασαν οι μέρες αδράνειας → ζητάει σύνδεση
  touchActivity();
  if(Date.now()-_lastRefresh>15000){ _lastRefresh=Date.now(); loadAll(); }
});
</script>
